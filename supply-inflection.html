<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Inflection · JustHodl.AI</title>
<meta name="description" content="22 supply-tightness signals scored hourly — DRAM, lithium, HBM, copper, oil, etc.">
<style>
  :root {
    --bg: #0a0a0a; --bg-card: #131313; --bg-card-elev: #181818;
    --border: #262626; --border-light: #2e2e2e;
    --text: #e5e5e5; --text-dim: #888; --text-muted: #555;
    --accent: #facc15; --green: #22c55e; --amber: #f59e0b;
    --red: #ef4444; --crimson: #dc2626; --blue: #3b82f6; --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 1300px; margin: 0 auto; padding: 18px; }
  .header { display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 18px;
            flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .header h1 .sub { color: var(--text-dim); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .meta { color: var(--text-dim); font-size: 12px; }
  .meta a { color: var(--accent); text-decoration: none; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
           background: var(--bg-card); border: 1px solid var(--border);
           border-radius: 8px; padding: 14px; margin-bottom: 16px; }
  .stat { padding: 4px 12px; border-left: 2px solid var(--border-light); }
  .stat:first-child { border-left: none; padding-left: 0; }
  .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 22px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
  .panel { background: var(--bg-card); border: 1px solid var(--border);
           border-radius: 6px; padding: 14px; }
  .panel h3 { font-size: 13px; font-weight: 600; text-transform: uppercase;
              letter-spacing: 0.05em; color: var(--text-dim);
              border-bottom: 1px solid var(--border-light);
              padding-bottom: 8px; margin-bottom: 10px; }
  .panel h3 .count { color: var(--text-muted); font-weight: 400; margin-left: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 8px; color: var(--text-dim);
       font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
       border-bottom: 1px solid var(--border-light); }
  td { padding: 8px; border-bottom: 1px solid var(--border-light);
       font-variant-numeric: tabular-nums; vertical-align: top; }
  tr:hover td { background: var(--bg-card-elev); }
  tr:last-child td { border-bottom: none; }
  .signal-name { color: var(--text); font-weight: 500; }
  .signal-desc { color: var(--text-dim); font-size: 11px; margin-top: 2px; line-height: 1.3; }
  .symbol { color: var(--accent); font-weight: 600; font-size: 12px; }
  .flag-pill { display: inline-block; padding: 1px 6px; border-radius: 3px;
                font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .flag-strong-tightening { background: rgba(34,197,94,0.18); color: var(--green); }
  .flag-tightening { background: rgba(250,204,21,0.18); color: var(--accent); }
  .flag-easing { background: rgba(239,68,68,0.15); color: var(--red); }
  .flag-balanced { background: rgba(113,113,122,0.15); color: var(--text-dim); }
  .score-bar { display: inline-block; width: 60px; height: 6px;
               background: var(--border); border-radius: 3px; overflow: hidden; vertical-align: middle; }
  .score-bar-fill { height: 100%; }
  .theme-tag { display: inline-block; padding: 1px 6px; border-radius: 3px;
                font-size: 10px; background: rgba(99,102,241,0.15); color: var(--purple);
                margin-right: 4px; }
  .loader { text-align: center; padding: 40px; color: var(--text-dim); }
  @media (max-width: 720px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    table { font-size: 11px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Supply Inflection Scanner <span class="sub">22 supply-side signals · DRAM, lithium, HBM, copper, oil…</span></h1>
        <div class="meta" id="metaLine">Loading…</div>
      </div>
      <div class="meta">
        <a href="/">← Home</a> ·
        <a href="/theme-tiers.html">Theme Tiers</a> ·
        <a href="/divergence-v2.html">Divergence</a>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">Signals Scored</div><div class="stat-value" id="nScored">—</div></div>
      <div class="stat"><div class="stat-label">Strong Tightening</div><div class="stat-value green" id="nStrong">—</div></div>
      <div class="stat"><div class="stat-label">Tightening</div><div class="stat-value amber" id="nTight">—</div></div>
      <div class="stat"><div class="stat-label">Easing</div><div class="stat-value red" id="nEasing">—</div></div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h3>Top Supply Signals <span class="count" id="signalCount">—</span></h3>
        <div id="signalsHost"><div class="loader">Loading…</div></div>
      </div>
      <div class="panel">
        <h3>Themes by Inflection <span class="count" id="themeCount">—</span></h3>
        <div id="themesHost"><div class="loader">Loading…</div></div>
      </div>
    </div>
  </div>

<script>
const URL = 'https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com/data/supply-inflection.json';

function fmt(v, d=2) {
  if (v === null || v === undefined) return '—';
  const n = Number(v);
  if (isNaN(n)) return String(v).slice(0,30);
  return n.toFixed(d);
}

function flagPillCls(flag) {
  const f = (flag || '').toLowerCase().replace(/_/g, '-');
  if (f.includes('strong') && f.includes('tighten')) return 'flag-strong-tightening';
  if (f.includes('tighten')) return 'flag-tightening';
  if (f.includes('easing')) return 'flag-easing';
  return 'flag-balanced';
}

function scoreBar(score, isPositive) {
  const pct = Math.min(100, Math.abs(score) * 10);
  const color = isPositive ? 'var(--green)' : 'var(--red)';
  return `<span class="score-bar"><span class="score-bar-fill" style="width:${pct}%;background:${color}"></span></span>`;
}

function renderSignals(signals) {
  if (!signals || !signals.length) {
    document.getElementById('signalsHost').innerHTML = '<div class="loader">No signals.</div>';
    return;
  }
  const rows = signals.map(s => {
    const score = Number(s.score || 0);
    const themes = (s.themes || []).slice(0,3).map(t =>
      `<span class="theme-tag">${t}</span>`).join('');
    return `
      <tr>
        <td>
          <div><span class="symbol">${s.symbol||'?'}</span> <span class="signal-name">${s.name||'?'}</span></div>
          ${s.description ? `<div class="signal-desc">${s.description}</div>` : ''}
          <div style="margin-top:4px">${themes}</div>
        </td>
        <td style="text-align:right">
          <div style="font-weight:600">${fmt(score, 2)}</div>
          ${scoreBar(score, score > 0)}
        </td>
        <td><span class="flag-pill ${flagPillCls(s.flag)}">${(s.flag||'').replace(/_/g, ' ')}</span></td>
      </tr>
    `;
  }).join('');
  document.getElementById('signalsHost').innerHTML = `
    <table><thead><tr><th>Signal</th><th style="text-align:right">Score</th><th>State</th></tr></thead><tbody>${rows}</tbody></table>
  `;
  document.getElementById('signalCount').textContent = signals.length;
}

function renderThemes(themes) {
  if (!themes || !themes.length) {
    document.getElementById('themesHost').innerHTML = '<div class="loader">No themes.</div>';
    return;
  }
  const rows = themes.map(t => `
    <tr>
      <td><span class="theme-tag">${t.theme||'?'}</span></td>
      <td style="text-align:right;font-weight:600">${fmt(t.score, 2)}</td>
      <td style="text-align:right;color:var(--green)">${t.n_strong||0}</td>
      <td style="text-align:right;color:var(--amber)">${t.n_tightening||0}</td>
    </tr>
  `).join('');
  document.getElementById('themesHost').innerHTML = `
    <table><thead><tr><th>Theme</th><th style="text-align:right">Score</th><th style="text-align:right">Strong</th><th style="text-align:right">Tightening</th></tr></thead><tbody>${rows}</tbody></table>
  `;
  document.getElementById('themeCount').textContent = themes.length;
}

async function load() {
  try {
    const r = await fetch(URL + '?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const summary = d.summary || {};
    document.getElementById('metaLine').innerHTML =
      `As of <strong>${new Date(d.generated_at).toLocaleString()}</strong> · ${d.fetch_stats?.n_signals||'—'} signals · ${d.duration_s}s`;
    document.getElementById('nScored').textContent = summary.n_signals_scored || '—';
    document.getElementById('nStrong').textContent = summary.n_strong_tightening || 0;
    document.getElementById('nTight').textContent = summary.n_tightening || 0;
    document.getElementById('nEasing').textContent = summary.n_easing || 0;
    renderSignals(summary.top_signals || []);
    renderThemes(summary.top_inflecting_themes || []);
  } catch (e) {
    document.getElementById('signalsHost').innerHTML =
      `<div class="loader">Failed: ${e.message}</div>`;
    console.error(e);
  }
}

load();
setInterval(load, 5*60*1000);
</script>
</body>
</html>
