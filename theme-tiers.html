<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme Tiers · JustHodl.AI</title>
<meta name="description" content="57-theme tier classifier — tier-1/2/3 asymmetric setups across all macro themes.">
<style>
  :root {
    --bg: #0a0a0a; --bg-card: #131313; --bg-card-elev: #181818;
    --border: #262626; --border-light: #2e2e2e;
    --text: #e5e5e5; --text-dim: #888; --text-muted: #555;
    --accent: #facc15; --green: #22c55e; --amber: #f59e0b;
    --red: #ef4444; --crimson: #dc2626; --blue: #3b82f6; --purple: #a78bfa;
    --tier1: #22c55e; --tier2: #facc15; --tier3: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 1500px; margin: 0 auto; padding: 18px; }
  .header { display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 18px;
            flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .header h1 .sub { color: var(--text-dim); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .meta { color: var(--text-dim); font-size: 12px; }
  .meta a { color: var(--accent); text-decoration: none; }
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
           background: var(--bg-card); border: 1px solid var(--border);
           border-radius: 8px; padding: 14px; margin-bottom: 16px; }
  .stat { text-align: left; padding: 4px 12px; border-left: 2px solid var(--border-light); }
  .stat:first-child { border-left: none; padding-left: 0; }
  .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 22px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .controls input { background: var(--bg-card); border: 1px solid var(--border);
                    color: var(--text); padding: 6px 10px; border-radius: 4px;
                    font-size: 13px; width: 200px; }
  .controls select { background: var(--bg-card); border: 1px solid var(--border);
                     color: var(--text); padding: 6px 10px; border-radius: 4px; font-size: 13px; }
  .controls .count { color: var(--text-dim); font-size: 12px; margin-left: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px;
          background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  thead { background: var(--bg-card-elev); }
  th { text-align: left; padding: 8px 10px; color: var(--text-dim);
       font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
       border-bottom: 1px solid var(--border-light); cursor: pointer; user-select: none; }
  th:hover { color: var(--accent); }
  th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  th.sort-desc::after { content: ' ↓'; color: var(--accent); }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border-light);
       font-variant-numeric: tabular-nums; }
  tr:hover td { background: var(--bg-card-elev); }
  tr:last-child td { border-bottom: none; }
  .ticker { font-weight: 600; color: var(--accent); }
  .name { color: var(--text-dim); font-size: 12px; }
  .tier-badge { display: inline-block; padding: 1px 6px; border-radius: 3px;
                font-size: 10px; font-weight: 600; letter-spacing: 0.04em; }
  .tier-1 { background: rgba(34,197,94,0.18); color: var(--tier1); }
  .tier-2 { background: rgba(250,204,21,0.18); color: var(--tier2); }
  .tier-3 { background: rgba(245,158,11,0.18); color: var(--tier3); }
  .phase-pill { display: inline-block; padding: 1px 6px; border-radius: 3px;
                font-size: 10px; background: rgba(99,102,241,0.15); color: var(--purple); }
  .score { font-weight: 600; }
  .loader { text-align: center; padding: 40px; color: var(--text-dim); }
  @media (max-width: 720px) {
    .stats { grid-template-columns: 1fr 1fr 1fr; }
    table { font-size: 11px; }
    th, td { padding: 4px 6px; }
    .name { display: none; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Theme Tier Classifier <span class="sub">57 themes · per-name asymmetric scoring</span></h1>
        <div class="meta" id="metaLine">Loading…</div>
      </div>
      <div class="meta">
        <a href="/">← Home</a> ·
        <a href="/divergence-v2.html">Divergence</a> ·
        <a href="/signals.html">Signals</a> ·
        <a href="/compound-signals.html">Compound</a>
      </div>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><div class="stat-label">Themes Classified</div><div class="stat-value" id="nThemes">—</div></div>
      <div class="stat"><div class="stat-label">Total Classifications</div><div class="stat-value" id="nTotal">—</div></div>
      <div class="stat"><div class="stat-label">Tier-1 (Top)</div><div class="stat-value green" id="nTier1">—</div></div>
      <div class="stat"><div class="stat-label">Tier-2</div><div class="stat-value amber" id="nTier2">—</div></div>
      <div class="stat"><div class="stat-label">Coverage</div><div class="stat-value" id="nCovered">—</div></div>
    </div>

    <div class="controls">
      <input type="text" id="search" placeholder="Filter by ticker, name, theme…" />
      <select id="tierFilter">
        <option value="">All Tiers</option>
        <option value="1">Tier 1 only</option>
        <option value="2">Tier 2 only</option>
        <option value="3">Tier 3 only</option>
      </select>
      <select id="phaseFilter">
        <option value="">All Phases</option>
      </select>
      <span class="count" id="count">—</span>
    </div>

    <div id="tableHost"><div class="loader">Loading theme classifications…</div></div>
  </div>

<script>
const URL = 'https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com/data/theme-tiers.json';

let DATA = null;
let SORT = { col: 'asymmetry_score', dir: 'desc' };

function fmt(v, d=2) {
  if (v === null || v === undefined || v === '') return '—';
  const n = Number(v);
  if (isNaN(n)) return String(v).slice(0,30);
  if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(2)+'K';
  return n.toFixed(d);
}

function tierBadge(tier) {
  const cls = `tier-${tier}`;
  return `<span class="tier-badge ${cls}">T-${tier}</span>`;
}

function getRows() {
  if (!DATA) return [];
  // Combine top_asymmetric + tier2 + tier3 leaderboards into one
  const summary = DATA.summary || {};
  const all = [];
  for (const list of ['top_asymmetric_leaderboard','tier1_leaderboard','tier2_leaderboard','tier3_leaderboard']) {
    if (Array.isArray(summary[list])) {
      summary[list].forEach(r => all.push(r));
    }
  }
  // Dedupe by (ticker, theme_etf)
  const seen = new Set();
  return all.filter(r => {
    const k = (r.ticker||'') + '|' + (r.theme_etf||'');
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

function applyFilters(rows) {
  const q = document.getElementById('search').value.toLowerCase();
  const tier = document.getElementById('tierFilter').value;
  const phase = document.getElementById('phaseFilter').value;
  return rows.filter(r => {
    if (q) {
      const txt = `${r.ticker||''} ${r.name||''} ${r.theme_name||''} ${r.theme_etf||''}`.toLowerCase();
      if (!txt.includes(q)) return false;
    }
    if (tier && String(r.tier) !== tier) return false;
    if (phase && r.theme_phase !== phase) return false;
    return true;
  });
}

function applySort(rows) {
  const { col, dir } = SORT;
  return [...rows].sort((a, b) => {
    let av = a[col], bv = b[col];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av === undefined || av === null) av = dir === 'asc' ? Infinity : -Infinity;
    if (bv === undefined || bv === null) bv = dir === 'asc' ? Infinity : -Infinity;
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

function render() {
  const rows = applySort(applyFilters(getRows()));
  document.getElementById('count').textContent = `${rows.length} setups`;
  const cols = [
    { k: 'ticker', label: 'Ticker' },
    { k: 'name', label: 'Name' },
    { k: 'theme_name', label: 'Theme' },
    { k: 'theme_phase', label: 'Phase' },
    { k: 'tier', label: 'Tier' },
    { k: 'asymmetry_score', label: 'Score' },
    { k: 'p_s', label: 'P/S' },
    { k: 'mcap_to_rev', label: 'MCap/Rev' },
    { k: 'flag', label: 'Flag' },
  ];
  const thead = cols.map(c => {
    const cls = c.k === SORT.col ? `sort-${SORT.dir}` : '';
    return `<th data-col="${c.k}" class="${cls}">${c.label}</th>`;
  }).join('');
  const tbody = rows.slice(0, 200).map(r => `
    <tr>
      <td><span class="ticker">${r.ticker||'?'}</span></td>
      <td class="name">${(r.name||'').slice(0,30)}</td>
      <td>${r.theme_name||'—'} <span style="color:var(--text-muted);font-size:11px">(${r.theme_etf||''})</span></td>
      <td><span class="phase-pill">${r.theme_phase||'—'}</span></td>
      <td>${tierBadge(r.tier)}</td>
      <td class="score">${fmt(r.asymmetry_score, 1)}</td>
      <td>${fmt(r.p_s, 2)}</td>
      <td>${fmt(r.mcap_to_rev, 2)}</td>
      <td style="font-size:11px;color:var(--text-dim)">${(r.flag||'').replace(/_/g,' ')}</td>
    </tr>
  `).join('');
  document.getElementById('tableHost').innerHTML = `
    <table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>
  `;
  // Wire sort handlers
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const c = th.dataset.col;
      SORT.dir = (SORT.col === c && SORT.dir === 'desc') ? 'asc' : 'desc';
      SORT.col = c;
      render();
    });
  });
}

function populatePhaseFilter() {
  const rows = getRows();
  const phases = [...new Set(rows.map(r => r.theme_phase).filter(Boolean))].sort();
  const sel = document.getElementById('phaseFilter');
  phases.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  });
}

async function load() {
  try {
    const r = await fetch(URL + '?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    const fetchStats = DATA.fetch_stats || {};
    const summary = DATA.summary || {};
    document.getElementById('metaLine').innerHTML =
      `As of <strong>${new Date(DATA.generated_at).toLocaleString()}</strong> · ${fetchStats.n_unique_tickers||'—'} tickers · ${DATA.n_themes_classified||'—'} themes · ran in ${DATA.duration_s}s`;
    document.getElementById('nThemes').textContent = DATA.n_themes_classified || '—';
    document.getElementById('nTotal').textContent = summary.n_total_classifications || '—';
    // Count tiers from leaderboards
    const rows = getRows();
    const t1 = rows.filter(r => r.tier === 1).length;
    const t2 = rows.filter(r => r.tier === 2).length;
    document.getElementById('nTier1').textContent = t1;
    document.getElementById('nTier2').textContent = t2;
    document.getElementById('nCovered').textContent = `${fetchStats.n_fundamentals_ok||0}/${fetchStats.n_unique_tickers||0}`;
    populatePhaseFilter();
    render();
  } catch (e) {
    document.getElementById('tableHost').innerHTML =
      `<div class="loader">Failed: ${e.message}</div>`;
    console.error(e);
  }
}

['search','tierFilter','phaseFilter'].forEach(id =>
  document.getElementById(id).addEventListener('input', render));

load();
setInterval(load, 5*60*1000);
</script>

<div style="max-width:1180px;margin:0 auto;padding:0 20px 26px"><h2 style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#00d4ff;margin:26px 0 10px;padding-bottom:6px;border-bottom:1px solid #1c2433">Historical Context — vs Crises, Tops &amp; Bottoms</h2><div id="jhk-hist"><div style="text-align:center;padding:24px;color:#6f7b91;font-family:monospace;font-size:12px">BENCHMARKING vs HISTORY…</div></div></div>
<script src="/interp-kit.js"></script>
<script>document.addEventListener("DOMContentLoaded",function(){if(window.JHKit)JHKit.mountHistContext("jhk-hist",['VIXCLS','T10Y2Y','BAMLH0A0HYM2']);});</script>
</body>
</html>
