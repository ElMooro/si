<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Risk Regime (RORO) · JustHodl.AI</title>
<style>
:root{--bg:#0a0e14;--panel:#111722;--panel2:#0d131c;--line:#1e2836;--txt:#d6e0ee;--dim:#7c8aa0;--grn:#16c784;--red:#ea3943;--amb:#f0a020;--cyan:#3fb6dc;--blu:#4d7cfe;--vio:#a78bfa}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:13px/1.5 ui-monospace,"SF Mono",Menlo,Consolas,monospace;padding:18px 14px 60px}
a{color:var(--cyan);text-decoration:none}
.wrap{max-width:1200px;margin:0 auto}
h1{font-size:20px;letter-spacing:.5px;font-weight:700}
.sub{color:var(--dim);font-size:12px;margin-top:3px}
.topbar{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:10px;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:6px 11px;font-size:12px}
.chip b{color:#fff}
.chip.on{border-color:var(--grn);color:var(--grn)} .chip.off{border-color:var(--red);color:var(--red)} .chip.neu{border-color:var(--amb);color:var(--amb)}
.statbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:18px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 13px}
.stat .v{font-size:21px;font-weight:700;color:#fff} .stat .l{color:var(--dim);font-size:11px;margin-top:2px}
h2{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin:24px 0 10px;border-left:3px solid var(--blu);padding-left:9px;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px}
h2 .h2meta{font-size:11px;letter-spacing:0;text-transform:none;color:var(--dim);font-weight:400}
.gauge{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 16px 14px;margin-bottom:8px}
.gauge .track{position:relative;height:26px;border-radius:13px;background:linear-gradient(90deg,var(--red) 0%,var(--amb) 38%,#26323f 50%,var(--amb) 62%,var(--grn) 100%);opacity:.92}
.gauge .mid{position:absolute;left:50%;top:-5px;bottom:-5px;width:2px;background:var(--dim);transform:translateX(-1px)}
.gauge .needle{position:absolute;top:-7px;bottom:-7px;width:4px;border-radius:2px;background:#fff;box-shadow:0 0 10px rgba(255,255,255,.65);transform:translateX(-2px);transition:left .5s ease}
.gauge .scale{display:flex;justify-content:space-between;color:var(--dim);font-size:10.5px;margin-top:7px}
.gauge .lab{display:flex;justify-content:space-between;font-size:11px;margin-top:2px}
.gauge .lab .off{color:var(--red)} .gauge .lab .on{color:var(--grn)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(262px,1fr));gap:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:12px 13px;position:relative;border-left:4px solid var(--line)}
.card.pos{border-left-color:var(--grn)} .card.neg{border-left-color:var(--red)} .card.flat{border-left-color:var(--amb)} .card.info{border-left-color:var(--blu)} .card.vio{border-left-color:var(--vio)}
.card .nm{font-size:13.5px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.card .nm .sc{font-size:17px;font-weight:800;white-space:nowrap}
.card.pos .sc{color:var(--grn)} .card.neg .sc{color:var(--red)} .card.flat .sc{color:var(--amb)} .card.info .sc{color:var(--cyan)} .card.vio .sc{color:var(--vio)}
.card .wt{font-size:10.5px;color:var(--dim);margin:2px 0 8px}
.card .expl{font-size:10.5px;color:var(--dim);margin:7px 0 1px;line-height:1.4;font-style:italic}
.row{display:flex;justify-content:space-between;font-size:11.5px;padding:3px 0;border-top:1px dashed var(--line);gap:8px}
.row .k{color:var(--dim)} .row .vv{color:var(--txt);text-align:right}
.badge{display:inline-block;padding:1px 7px;border-radius:5px;font-size:10.5px;font-weight:700;border:1px solid var(--line)}
.badge.pos{color:var(--grn);border-color:var(--grn)} .badge.neg{color:var(--red);border-color:var(--red)} .badge.flat{color:var(--amb);border-color:var(--amb)} .badge.info{color:var(--cyan);border-color:var(--cyan)}
.flow{display:flex;flex-direction:column;gap:6px}
.flow .fr{display:grid;grid-template-columns:135px 1fr 92px;align-items:center;gap:10px;font-size:11.5px}
.flow .fr .fl{color:var(--txt)} .flow .fr .fv{text-align:right;font-variant-numeric:tabular-nums}
.flow .bar{position:relative;height:14px;background:var(--panel2);border-radius:4px;overflow:hidden}
.flow .bar i{position:absolute;top:0;bottom:0;border-radius:4px}
.flow .bar i.p{left:50%;background:var(--grn)} .flow .bar i.n{right:50%;background:var(--red)}
.flow .bar .zero{position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--line)}
.tells{list-style:none;margin-top:4px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px}
.tells li{padding:6px 11px;border-left:3px solid var(--line);background:var(--panel);border-radius:0 7px 7px 0;font-size:12px}
.tells li.on{border-left-color:var(--grn)} .tells li.off{border-left-color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
th,td{text-align:right;padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
th{color:var(--dim);font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:.5px}
td:first-child,th:first-child{text-align:left}
tr:hover td{background:var(--panel2)}
.pos{color:var(--grn)} .neg{color:var(--red)} .amb{color:var(--amb)}
.loading{color:var(--dim);padding:40px;text-align:center}
.foot{color:var(--dim);font-size:11px;margin-top:26px;border-top:1px solid var(--line);padding-top:12px;line-height:1.6}
.narr{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--vio);border-radius:8px;padding:11px 14px;margin-bottom:10px;font-size:12.5px;line-height:1.55;color:var(--txt)}
.toc{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.toc a{font-size:11px;padding:4px 9px;border:1px solid var(--line);border-radius:14px;background:var(--panel);color:var(--dim)}
.toc a:hover{color:var(--cyan);border-color:var(--cyan)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Risk Regime · RORO</h1>
      <div class="sub">Cross-asset Risk-On / Risk-Off command center — RORO + credit, rates &amp; bond vol, liquidity &amp; funding plumbing, systemic stress, central banks &amp; currency, foreign capital, vol &amp; positioning. <a href="/directory.html">all dashboards →</a></div>
    </div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="toc" id="toc"></div>
  <div id="content"><div class="loading">Loading ~40 cross-asset engines …</div></div>
  <div class="foot" id="foot"></div>
</div>
<script>
const SRC=p=>[`https://justhodl.ai/${p}?t=${Date.now()}`,
  `https://justhodl-data-proxy.raafouis.workers.dev/${p}?t=${Date.now()}`,
  `https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com/${p}?t=${Date.now()}`];
async function load(p){for(const u of SRC(p)){try{const r=await fetch(u);if(r.ok)return await r.json();}catch(e){}}return null;}
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const num=v=>(typeof v==="number"&&isFinite(v))?v:null;
const f0=v=>num(v)===null?"—":Math.round(v);
const f1=v=>num(v)===null?"—":(v>0?"+":"")+v.toFixed(1);
const f2=v=>num(v)===null?"—":(v>0?"+":"")+v.toFixed(2);
const n1=v=>num(v)===null?"—":v.toFixed(1);
const n2=v=>num(v)===null?"—":v.toFixed(2);
const pc=v=>num(v)===null?"—":(v>0?"+":"")+v.toFixed(1)+"%";
const ypct=v=>num(v)===null?"—":v.toFixed(2)+"%";
const bps=v=>num(v)===null?"—":(v>0?"+":"")+v.toFixed(0)+"bp";
const sgn=v=>num(v)===null?"flat":(v>0.02?"pos":(v<-0.02?"neg":"flat"));
const usd=v=>{if(num(v)===null)return"—";const a=Math.abs(v),s=v<0?"-":"+";if(a>=1e12)return s+"$"+(a/1e12).toFixed(2)+"T";if(a>=1e9)return s+"$"+(a/1e9).toFixed(1)+"b";if(a>=1e6)return s+"$"+(a/1e6).toFixed(0)+"m";return s+"$"+a.toFixed(0);};
function tone(s){const u=(s||"").toUpperCase();
  if(/RISK[_ -]?ON|BOOMING|ABUNDANT|FUNCTIONING|STRONG_FOREIGN|EXPANSION|CALM|GENERATIONAL|RISK APPETITE|SUPPRESSED|CREATING_VALUE|GROWTH_SURPRISE_POS|BULL_STEEP|CREDIT_BULL|INJECT|UNHEDGED|NORMAL|QUIET|STEADY/.test(u))return"pos";
  if(/RISK[_ -]?OFF|FLIGHT|ACUTE|CRITICAL|PANIC|SEVERE|DUMP|RISK_AVERSE|DESTROYED|TIGHTEN|DEFCON 1|DEFCON 2|DRAIN|SCARC|INVERT|FAIL|DEPEG|UNWIND|SLOWING|DESTROY|BEAR/.test(u))return"neg";
  if(/MILD|CONCERNED|WATCH|LEAN|BIFURCAT|MODERATE|ELEVATED|ROTATION|NEUTRAL|LATE|STAGFLAT|OVERHEAT|WARMING|DRIFT|RANGE_BOUND|MINOR/.test(u))return"flat";
  return"info";}
const toneCol=t=>({pos:"var(--grn)",neg:"var(--red)",flat:"var(--amb)",info:"var(--cyan)"}[t]||"var(--dim)");
const badge=(s,t)=>s==null||s===""?"":`<span class="badge ${t||tone(s)}">${esc(s)}</span>`;
function row(k,v,cls){return v==null||v===""||v==="—"?"":`<div class="row"><span class="k">${esc(k)}</span><span class="vv ${cls||""}">${v}</span></div>`;}
function C(title,score,sub,rows,t,expl){return `<div class="card ${t||'info'}"><div class="nm"><span>${title}</span>${score!=null&&score!==""?`<span class="sc" style="font-size:13px">${score}</span>`:''}</div>${sub?`<div class="wt">${sub}</div>`:''}${rows||''}${expl?`<div class="expl">${esc(expl)}</div>`:''}</div>`;}
function sec(id,title,meta){return `<h2 id="${id}">${title}${meta?`<span class="h2meta">${meta}</span>`:""}</h2>`;}

/* ── core RORO ── */
function gauge(score){const s=num(score)??0,pct=Math.max(0,Math.min(100,(s+100)/2));
  return `<div class="gauge"><div class="track"><div class="mid"></div><div class="needle" style="left:${pct}%"></div></div>
    <div class="scale"><span>-100</span><span>-50</span><span>0</span><span>+50</span><span>+100</span></div>
    <div class="lab"><span class="off">◀ RISK-OFF / flight to quality</span><span class="on">RISK-ON / risk appetite ▶</span></div></div>`;}
function blockCard(b,comp){const sc=num(b.score),c=sc===null?"flat":(sc>0.02?"pos":(sc<-0.02?"neg":"flat")),detail=comp[b.block]||{};let rows="";
  const show={fx:[["FX RORO score","fx_roro_score"],["FX regime","regime"]],options:[],vix:[["VIX","vix"],["VIX 3M","vix_3m"],["Term structure","term_structure"]],credit:[["HY OAS %","hy_oas"],["OAS percentile","pctile"],["5d chg (bp)","chg_5d_bp"]]}[b.block]||[];
  show.forEach(([k,kk])=>{let v=detail[kk];if(v!=null)rows+=`<div class="row"><span class="k">${k}</span><span class="vv">${typeof v==="number"?(Math.abs(v)<2?v.toFixed(2):v.toFixed(1)):esc(String(v))}</span></div>`;});
  if(b.block==="options"){["SPY","HYG"].forEach(u=>{const o=detail[u];if(o)rows+=`<div class="row"><span class="k">${u} put/call · skew</span><span class="vv">${num(o.put_call_ratio)?o.put_call_ratio.toFixed(2):"—"} · ${num(o.skew_25d)?o.skew_25d.toFixed(3):"—"}</span></div>`;});}
  const nm={fx:"FX (haven/carry/EM)",options:"Options (put-call · skew)",vix:"VIX (level · term)",credit:"Credit (HY OAS)"}[b.block]||b.block;
  return `<div class="card ${c}"><div class="nm"><span>${nm}</span><span class="sc">${f1(sc===null?null:sc*100)}</span></div><div class="wt">weight ${(num(b.weight)??0).toFixed(2)} · block score ${sc===null?"—":sc.toFixed(2)} (−1..+1)</div>${rows}</div>`;}

function flowBars(items,mx){return `<div class="flow">`+items.map(it=>{const v=num(it.net_flow_5d_usd)||0,w=Math.min(48,Math.abs(v)/mx*48);const bar=v>=0?`<i class="p" style="left:50%;width:${w}%"></i>`:`<i class="n" style="right:50%;width:${w}%"></i>`;return `<div class="fr"><span class="fl">${esc(it.asset_class)}</span><div class="bar"><span class="zero"></span>${bar}</div><span class="fv ${sgn(v)}">${usd(v)}</span></div>`;}).join("")+`</div>`;}
function moneyFlow(x,corr,cbk){if(!x&&!corr&&!cbk)return"";x=x||{};let h=sec("flow","Cross-asset money flow","where capital is actually moving — ETF 5d net flows, the stock↔bond seesaw, foreign &amp; FX flows behind the RORO score");
  if(x.headline)h+=`<div class="narr">${esc(x.headline)}</div>`;
  const rot=(x.asset_class_rotation||[]).filter(r=>num(r.net_flow_5d_usd)!=null);
  if(rot.length){const mx=Math.max(...rot.map(r=>Math.abs(r.net_flow_5d_usd)))||1;h+=flowBars(rot,mx);}
  const ha=x.hard_assets_and_dollar||{},dc=x.dollar_fx_carry||{},ff=x.foreign_flows||{},dp=x.dark_pool||{};
  h+=`<div class="cards" style="margin-top:12px">`;
  h+=C("Hard assets &amp; dollar",esc(ha.metals_state||""),"20-day moves",row("Gold",pc(ha.gold_20d_pct),sgn(ha.gold_20d_pct))+row("Silver",pc(ha.silver_20d_pct),sgn(ha.silver_20d_pct))+row("Gold miners",pc(ha.gold_miners_20d_pct),sgn(ha.gold_miners_20d_pct))+row("Long bonds TLT",pc(ha.long_bonds_20d_pct),sgn(ha.long_bonds_20d_pct))+row("Dollar UUP",pc(ha.dollar_20d_pct),sgn(-(ha.dollar_20d_pct||0)))+row("SPY",pc(ha.spy_20d_pct),sgn(ha.spy_20d_pct)),tone(ha.metals_state));
  h+=C("Dollar · FX · carry",esc(dc.dollar_regime||""),`FX RORO ${f1(dc.fx_roro_score)} · ${esc(dc.fx_roro_regime||"")}`,row("EM FX basket 5d",pc(dc.em_basket_5d_pct),sgn(dc.em_basket_5d_pct))+row("Gold/silver ratio 5d",pc(dc.gold_silver_ratio_chg_5d),sgn(dc.gold_silver_ratio_chg_5d)),tone(dc.dollar_regime),(dc.carry_drivers||[]).filter(Boolean).length?"carry: "+(dc.carry_drivers||[]).filter(Boolean).join(", "):"");
  if(ff.by_asset_class)h+=C("Foreign flows",esc(ff.regime||""),"cross-border, by asset class",Object.entries(ff.by_asset_class).slice(0,5).map(([k,v])=>{const mo=(v&&(v.latest_month_b??v.run_rate_3mo_annualized_b??v.net_b));return row(k.replace(/_/g," "),mo!=null?usd(mo*1e9):"",sgn(mo));}).join(""),tone(ff.regime));
  if(dp&&(dp.accumulation_n!=null||dp.distribution_n!=null))h+=C("Dark-pool tape",`${num(dp.accumulation_n)??"—"}/${num(dp.distribution_n)??"—"}`,"names accumulating / distributing off-exchange",(dp.top_accumulation||[]).length?row("Accumulating",`<span class="pos">${esc((dp.top_accumulation||[]).slice(0,6).join(" "))}</span>`):""+(dp.top_distribution||[]).length?row("Distributing",`<span class="neg">${esc((dp.top_distribution||[]).slice(0,6).join(" "))}</span>`):"","info");
  // Treasury <-> equity flow relationship + active rotation
  if(corr){const pp=corr.headline_pairs||[];const fp2=(a,b)=>pp.find(p=>(p.ticker_a===a&&p.ticker_b===b)||(p.ticker_a===b&&p.ticker_b===a));
    const st=fp2("SPY","TLT"),su=fp2("SPY","UUP"),sg=fp2("SPY","GLD"),sbt=fp2("SPY","IBIT");
    const sc=st?st.corr_30d:null,t=sc==null?"info":(sc>0.2?"neg":sc<-0.2?"pos":"flat");
    h+=C("Stock ↔ bond flow",n2(sc),esc(corr.macro_regime||""),
      (st?row("SPY ↔ TLT (30d)",n2(st.corr_30d),st.corr_30d>0?"neg":"pos"):"")
      +(su?row("SPY ↔ USD",n2(su.corr_30d)):"")
      +(sg?row("SPY ↔ Gold",n2(sg.corr_30d)):"")
      +(sbt?row("SPY ↔ BTC",n2(sbt.corr_30d)):""),
      t, sc!=null&&sc>0.2?"Bonds NOT hedging equities (positive stock-bond corr) — diversification impaired, risk-parity fragile":(sc!=null?"Bonds hedging equities — flight-to-quality channel open":""));}
  if(cbk){const bp=(cbk.top_breaking_pairs||[])[0];
    h+=C("Correlation breaks",f2(cbk.frobenius_z_score_1y),`${num(cbk.n_pairs_above_2sigma)??0} pairs &gt;2σ · what's rotating now`,
      bp?row((bp.labels||[]).join(" ↔ "),`${n2(bp.current_corr)} ← ${n2(bp.baseline_corr)}`,bp.delta>0?"neg":"pos"):"",
      "vio",cbk.interpretation);}
  h+=`</div>`;return h;}

/* ── Credit & ICE BofA ── */
function creditIce(cs,ced,cdsm,cdsp){if(!cs&&!ced&&!cdsm&&!cdsp)return"";let h=sec("credit","Credit &amp; ICE BofA spreads","OAS, credit-equity divergence, CDS &amp; sovereign risk — the bond market's risk verdict");h+=`<div class="cards">`;
  if(cs){const b=cs.current_bps||{},d=cs.derived_spreads||{};h+=C("ICE BofA OAS",null,"option-adjusted spreads (bps)",row("HY (H0A0)",bps(b.BAMLH0A0HYM2),sgn(-(d.hy_minus_ig||0)))+row("IG master (C0A0)",bps(b.BAMLC0A0CM))+row("AAA (C0A1)",bps(b.BAMLC0A1CAAA))+row("HY − IG",bps(d.hy_minus_ig),d.hy_minus_ig>0?"neg":"pos")+row("CCC − BB",bps(d.ccc_minus_bb),d.ccc_minus_bb>0?"neg":"pos")+row("BBB − AAA",bps(d.bbb_minus_aaa)),"info");}
  if(cs&&cs.current_yields_pct){const y=cs.current_yields_pct,cv=cs.ig_yield_curve_pct||{};h+=C("ICE BofA yields (YTW)",ypct(y["HY Master"]),"semi-annual yield-to-worst — the all-in carry",row("HY Master",ypct(y["HY Master"]))+row("CCC",ypct(y["CCC"]),"neg")+row("BB",ypct(y["BB"]))+row("IG Master",ypct(y["IG Master"]))+row("BBB",ypct(y["BBB"]))+row("EM Corp",ypct(y["EM Corp"])),"info",Object.keys(cv).length?"IG curve: "+Object.entries(cv).map(([k,v])=>k+" "+v+"%").join(" · "):"");}
  if(ced){const m=ced.current_metrics||{};h+=C("Credit-equity divergence",esc(ced.state||""),"HYG vs SPY — credit confirming or diverging",row("HYG 20d",pc(m.hyg_20d_ret_pct),sgn(m.hyg_20d_ret_pct))+row("SPY 20d",pc(m.spy_20d_ret_pct),sgn(m.spy_20d_ret_pct))+row("Spread z (252d)",f2(m.spread_zscore_252d)),tone(ced.state),ced.regime_explanation);}
  if(cdsm){const g=cdsm.global_credit_stress||{},a=cdsm.alarm_board||{};h+=C("CDS · credit stress",f0(g.score_0_100),`${esc(g.regime||"")} · ${num(a.n_active)??0} alarm${a.n_active===1?"":"s"}`,(g.read?"":""),tone(g.regime),g.read);}
  if(cdsp){const s=cdsp.sovereigns||{},co=cdsp.corporate||{};h+=C("Sovereign 10y · proxy",esc(cdsp.regime||""),"peripheral EU yields &amp; OAS",row("Italy 10y",n1(s.italy_10y))+row("France 10y",n1(s.france_10y))+row("Germany 10y",n1(s.germany_10y))+row("HY OAS",bps(co.hy_oas))+row("IG OAS",bps(co.ig_oas)),tone(cdsp.regime));}
  h+=`</div>`;return h;}

/* ── Rates, curve & bond vol ── */
function ratesVol(yc,move,bv,ac,ag,vc){if(!yc&&!move&&!bv&&!ac&&!vc)return"";let h=sec("rates","Rates, curve &amp; bond vol","the Treasury complex — curve shape, MOVE, auctions, VIX term structure");h+=`<div class="cards">`;
  if(yc){const inv=yc.inversion_flags||{},de=yc.decomposition||{};h+=C("Yield curve",esc(yc.regime||""),esc(yc.regime_description||""),row("2s10s slope",bps(de.slope_2s10s_bps),de.slope_2s10s_bps<0?"neg":"pos")+row("Level (10y)",n1(de.level_pct))+row("2s10s inverted",inv["2s10s_inverted"]?badge("YES","neg"):badge("no","pos"))+row("3M10Y inverted",inv["3M10Y_inverted"]?badge("YES","neg"):badge("no","pos")),tone(yc.regime));}
  if(move){h+=C("MOVE (bond vol)",f0(move.level),`${esc(move.regime||"")} · ${num(move.percentile)?.toFixed(0)}th pctile`,row("20d change",f1(move.change_20d))+row("1y avg",f0(move.avg_1y)),tone(move.regime),move.interpretation);}
  if(bv){const t=bv.term_structure||{};h+=C("Bond vol structure",esc(bv.regime||""),`composite z ${f2(bv.composite_z_score)} · ${num(bv.regime_streak_days)??"?"}d streak`,row("Front-end z",f2(t.front_end_z))+row("Long-end z",f2(t.long_end_z))+row("Credit z",f2(t.credit_z))+row("Real-rate z",f2(t.real_rate_z)),tone(bv.regime));}

function render(D){
  const rr=D.rr,fx=D.fx;
  if(!rr){document.getElementById("content").innerHTML='<div class="loading">risk-regime.json unavailable.</div>';return;}
  const score=rr.risk_regime_score,regime=rr.risk_regime||"—",post=rr.posture||{},comp=rr.components||{};
  const ch=tone(regime)==="pos"?"on":tone(regime)==="neg"?"off":"neu";
  document.getElementById("chips").innerHTML=
    `<span class="chip ${ch}"><b>${esc(regime)}</b></span>`+`<span class="chip ${ch}">${f1(score)}/100</span>`+
    `<span class="chip">tilt: <b>${esc(post.beta_tilt||"—")}</b></span>`+`<span class="chip">size ×<b>${num(post.size_mult)??"—"}</b></span>`+
    `<span class="chip">hedge: <b>${esc(post.hedge||"—")}</b></span>`+
    (D.crisis?`<span class="chip ${D.crisis.defcon_level<=2?'off':D.crisis.defcon_level===3?'neu':'on'}">DEFCON ${esc(D.crisis.defcon_level)}</span>`:"")+
    (D.move?`<span class="chip ${tone(D.move.regime)==='neg'?'off':tone(D.move.regime)==='pos'?'on':'neu'}">MOVE ${f0(D.move.level)}</span>`:"")+
    (D.yc&&(D.yc.inversion_flags||{}).any_inversion?`<span class="chip off">curve inverted</span>`:"");

  let html=gauge(score);
  html+=`<div class="statbar">
    <div class="stat"><div class="v">${f1(score)}</div><div class="l">RORO score (−100..+100)</div></div>
    <div class="stat"><div class="v" style="font-size:15px;color:${toneCol(tone(regime))}">${esc(regime)}</div><div class="l">regime</div></div>
    <div class="stat"><div class="v" style="font-size:15px">${esc(post.beta_tilt||"—")}</div><div class="l">beta posture</div></div>
    <div class="stat"><div class="v">×${num(post.size_mult)??"—"}</div><div class="l">size multiplier</div></div>
    <div class="stat"><div class="v" style="font-size:15px">${esc(post.hedge||"—")}</div><div class="l">hedge stance</div></div>
  </div>`;

  html+=sec("blocks","Block contributions","the four weighted RORO inputs")+`<div class="cards">`;
  (rr.blocks_used||[]).forEach(b=>{html+=blockCard(b,comp);});html+=`</div>`;

  html+=moneyFlow(D.xaf,D.corr,D.corrbreaks);
  html+=creditIce(D.creditstress,D.crediteq,D.cdsmon,D.cdsproxy);
  html+=ratesVol(D.yc,D.move,D.bv,D.auction,D.auctiongrades,D.vixcurve);
  html+=liqFunding(D.gliq,D.funding,D.liqpulse,D.repo,D.bankstress,D.liqinflect);
  html+=stressPlumbing(D.crisis,D.gstress,D.systemic,D.edplumb,D.edstress,D.fails,D.tailrisk,D.tailhedge);
  html+=cbFx(D.yen,D.boj,D.snb,D.ecb,D.peg,D.fxd,D.fiatpeg,D.carry);
  html+=regimeCycle(D.xar,D.cycle,D.regmap,D.macronow,D.macrosurp,D.gbc);
  html+=foreignCapital(D.capin,D.tic,D.sov,D.dollar);
  html+=volPos(D.vol,D.vvix,D.skew,D.flowconf,D.instpos);

  const tells=rr.tells||[];
  if(tells.length){html+=sec("tells","Tells","discrete risk signals firing now")+`<ul class="tells">`;
    tells.forEach(t=>{const u=t.toUpperCase();const c=u.startsWith("RISK-ON")?"on":(u.startsWith("RISK-OFF")?"off":"");html+=`<li class="${c}">${esc(t)}</li>`;});html+=`</ul>`;}

  const drivers=(fx&&fx.fx_roro&&fx.fx_roro.drivers)||[];
  if(drivers.length){html+=sec("fxdrivers","FX RORO drivers",`${num((fx.fx_roro||{}).fx_roro_score)??"—"}/100 · ${esc((fx.fx_roro||{}).fx_roro_regime||"—")}`);
    html+=`<table><thead><tr><th>Driver</th><th>5d return %</th><th>weight</th><th>contribution</th></tr></thead><tbody>`;
    drivers.sort((a,b)=>Math.abs(num(b.contribution)||0)-Math.abs(num(a.contribution)||0));
    drivers.forEach(d=>{const c=num(d.contribution);html+=`<tr><td>${esc(d.driver||"")}</td><td class="${sgn(d.ret_5d_pct)}">${f1(d.ret_5d_pct)}</td><td>${num(d.weight)??"—"}</td><td class="${sgn(c)}">${c===null?"—":(c>0?"+":"")+c.toFixed(2)}</td></tr>`;});
    html+=`</tbody></table>`;}

  document.getElementById("content").innerHTML=html;
