<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leverage Cycle Monitor — JustHodl.AI</title>
<style>
:root{--bg:#0a0e14;--bg-2:#111722;--card:#0e1420;--line:#1e2836;--fg:#dfe7f3;--fg-2:#9db0c8;--fg-3:#5c6f88;--cyan:#46c8ff;--amber:#ffd24a;--red:#ff5d6c;--green:#37d99a;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:26px 18px 60px}
h1{font-size:21px;margin:0 0 4px;letter-spacing:.4px}
.sub{color:var(--fg-3);font-family:var(--mono);font-size:11.5px;margin-bottom:22px}
a{color:var(--cyan);text-decoration:none}
.hero{display:flex;gap:22px;align-items:center;background:linear-gradient(135deg,var(--card),var(--bg-2));border:1px solid var(--line);border-radius:14px;padding:22px 26px;margin-bottom:20px;flex-wrap:wrap}
.score{font-family:var(--mono);font-size:54px;font-weight:700;line-height:1}
.phase{font-family:var(--mono);font-size:13px;letter-spacing:2px;padding:7px 14px;border-radius:8px;border:1px solid var(--line);background:var(--bg-2)}
.delta{color:var(--fg-2);font-family:var(--mono);font-size:12px}
.meter{flex:1;min-width:240px;height:10px;background:var(--bg-2);border-radius:6px;position:relative;border:1px solid var(--line)}
.meter i{position:absolute;top:-4px;width:4px;height:18px;background:var(--fg);border-radius:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:14px;margin-bottom:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.card h3{margin:0 0 8px;font-size:12px;letter-spacing:1.4px;color:var(--fg-2);font-weight:600}
.big{font-family:var(--mono);font-size:24px;font-weight:700}
.kv{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--fg-2);margin-top:4px}
.chip{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:6px;margin-top:8px;border:1px solid var(--line)}
.note{color:var(--fg-3);font-size:11px;margin-top:9px;line-height:1.45}
.method{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:13px 16px;color:var(--fg-2);font-size:12px;line-height:1.6}
.g{color:var(--green)}.a{color:var(--amber)}.r{color:var(--red)}.c{color:var(--cyan)}
.loading{color:var(--fg-3);font-family:var(--mono);padding:40px;text-align:center}
</style></head><body><div class="wrap">
<h1>⚖️ LEVERAGE CYCLE MONITOR</h1>
<div class="sub" id="sub">Loading system-wide leverage…</div>
<div id="app" class="loading">Loading…</div>
<script src="/jh-nav-drawer.js?v=3335" defer></script>
<script>
const PX=['','https://s3.amazonaws.com/justhodl-dashboard-live/'];
async function getJSON(k){for(const p of PX){try{const r=await fetch(p+k,{cache:'no-store'});if(r.ok)return await r.json()}catch(e){}}return null}
const fmt=(v,d=1)=>v==null?'—':(+v).toFixed(d);
const col=s=>({FORCED_DELEVERAGING:'r',EXCESSIVE_ROLLING:'r',EXCESSIVE_BUILD:'r',EXCESSIVE_BUILDING:'a',DELEVERAGING_STRESS:'r',LEVERAGE_HOT:'a',BUILDING:'a',CONTRACTING:'a',COOLING:'a',TIGHTENING:'a',REBUILDING:'g',LOW:'g',NORMAL:'g',NEUTRAL:'c',OK:'g',UNAVAILABLE:''}[s]||'c');
(async()=>{
 const d=await getJSON('data/leverage-monitor.json')||await getJSON('data/margin-lending.json');
 const app=document.getElementById('app');
 if(!d||!d.leverage_monitor){app.textContent='Feed unavailable.';return}
 const L=d.leverage_monitor,ly=L.layers||{},F=ly.retail_finra||{},N=ly.system_nfci||{},H=ly.hedge_funds_ofr||{},E=ly.spec_etf||{},C=ly.crypto||{};
 document.getElementById('sub').innerHTML=`${L.n_layers_live}/5 layers live · v${L.version} · ${(d.generated_at||'').slice(0,16).replace('T',' ')} UTC · legacy squeeze ${(d.squeeze_risk||{}).score??'—'}/100`;
 const sc=L.cycle_score??50;
 app.className='';app.innerHTML=`
 <div class="hero">
   <div><div class="score ${col(L.phase)}">${fmt(sc,0)}</div><div class="delta">Δ ${L.delta_vs_prior==null?'—':(L.delta_vs_prior>0?'+':'')+L.delta_vs_prior} vs prior run</div></div>
   <div class="phase ${col(L.phase)}">${(L.phase||'').replace(/_/g,' ')}</div>
   <div class="meter"><i style="left:${Math.min(99,Math.max(0,sc))}%"></i></div>
 </div>
 <div class="grid">
  <div class="card"><h3>RETAIL — FINRA MARGIN DEBT</h3>
    <div class="big">$${fmt(F.latest_b,0)}B</div>
    <div class="kv"><span>YoY</span><b class="${(F.yoy_pct||0)>=15?'a':(F.yoy_pct||0)<=-10?'r':'g'}">${F.yoy_pct==null?'—':(F.yoy_pct>0?'+':'')+F.yoy_pct+'%'}</b></div>
    <div class="kv"><span>6-mo</span><b>${F.m6_pct==null?'—':(F.m6_pct>0?'+':'')+F.m6_pct+'%'}</b></div>
    <div class="kv"><span>% of mkt cap</span><b>${fmt(F.pct_of_market_cap,2)}%</b></div>
    <div class="kv"><span>YoY z / months</span><b>${fmt(F.yoy_z,2)} / ${F.months_n||0}</b></div>
    <span class="chip ${col(F.status)}">${F.status||'—'}${F.provisional?' · PROV':''}</span>
    <div class="note">${F.latest_month||''} · ${F.source||''}</div></div>
  <div class="card"><h3>SYSTEM — NFCI LEVERAGE (WEEKLY)</h3>
    <div class="big ${col(N.status)}">${fmt(N.latest,3)}</div>
    <div class="kv"><span>z vs history</span><b>${fmt(N.z,2)}</b></div>
    <div class="kv"><span>Δ 4w</span><b>${N.chg_4w==null?'—':(N.chg_4w>0?'+':'')+N.chg_4w}</b></div>
    <span class="chip ${col(N.status)}">${N.status||'—'}</span>
    <div class="note">Chicago Fed subindex — negative = looser = leverage building. ${N.date||''}</div></div>
  <div class="card"><h3>HEDGE FUNDS — OFR</h3>
    <div class="big">${H.status==='OK'?fmt(H.latest,2):'—'}</div>
    <span class="chip ${col(H.status)}">${H.status||'—'}</span>
    <div class="note">${H.note||H.source||'Form-PF aggregate gross/net leverage'}</div></div>
  <div class="card"><h3>SPEC — LEVERAGED-ETF TILT</h3>
    <div class="big">${E.avg_z==null?'—':fmt(E.avg_z,2)+'z'}</div>
    <div class="kv"><span>net Σ flow</span><b>${E.net_sum==null?'—':'$'+fmt(E.net_sum,0)+'M'}</b></div>
    <div class="kv"><span>complexes</span><b>${E.n_complexes??'—'}</b></div>
    <span class="chip ${col(E.status)}">${E.status||'—'}</span>
    <div class="note">Fleet capital-flow-radar bull-minus-bear leveraged positioning.</div></div>
  <div class="card"><h3>CRYPTO — FUNDING + OI</h3>
    <div class="big">${C.funding_z_med==null?'—':fmt(C.funding_z_med,2)+'z'}</div>
    <div class="kv"><span>agg OI</span><b>${C.oi_usd_total_b==null?'—':'$'+fmt(C.oi_usd_total_b,0)+'B'}</b></div>
    <span class="chip ${col(C.status)}">${C.status||'—'}</span>
    <div class="note">Fleet crypto-funding: perp funding crowding + open interest.</div></div>
 </div>
 <div id="chart-anchor"><h1 style="font-size:14px;letter-spacing:1.5px;color:var(--fg-2)">FINRA MARGIN DEBT — FULL HISTORY ($B)</h1></div>
 <div class="method" style="margin-top:18px"><b>METHOD</b> — ${L.method||''} Legacy v1 blocks (quarterly Z.1 margin, repo proxy, consumer credit, squeeze score) remain in the same feed below the monitor for continuity.</div>`;
 const s=document.createElement('script');s.src='/jh-enhance.js';
 s.setAttribute('data-feed','data/leverage-monitor.json');
 s.setAttribute('data-line','leverage_monitor.layers.retail_finra.history');
 s.setAttribute('data-crisis','1');
 document.getElementById('chart-anchor').appendChild(s);
})();
</script></div>
<script defer src="/jh-page-ai.js"></script>
</body></html>
