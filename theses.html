<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thesis Engine · JustHodl.AI</title>
<link rel="stylesheet" href="/jh-theme.css">
<style>
  body{margin:0;font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--jh-bg,#0C0B09);color:var(--jh-ink,#e8e2d4)}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 16px 60px}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--jh-dim,#8a836f);font-size:12.5px;margin-bottom:16px;line-height:1.5}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--jh-dim,#8a836f);border-bottom:1px solid var(--jh-line,#2B2820)}
  td{padding:8px;border-bottom:1px solid rgba(139,131,111,.14)}
  .num{text-align:right;font-family:'IBM Plex Mono',monospace}
  .fire{background:rgba(240,180,41,.16);color:var(--jh-amber,#F0B429);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700}
  .pos{color:var(--jh-green,#6fce8a)}.neg{color:var(--jh-red,#E07A6A)}
  .strong{font-weight:700}
  .meta{font-size:11px;color:var(--jh-dim,#8a836f);margin-top:12px;line-height:1.6}
</style></head><body>
<div class="wrap">
  <h1>🧭 Thesis Engine <span style="font-size:12px;color:var(--jh-dim,#8a836f);font-weight:400">— your TradingView watchlists, measured</span></h1>
  <div class="sub" id="sub">Loading…</div>
  <div style="margin:-6px 0 16px;font-size:12px"><a href="/watchlists.html" style="color:var(--jh-amber,#F0B429)">📋 Open my TradingView watchlists →</a> <span style="color:var(--jh-dim,#8a836f)">— all 207 lists with every indicator inside</span></div>
  <div id="families" style="margin-bottom:26px"></div>
  <div id="board">…</div>
  <div class="meta" id="method"></div>
</div>
<script src="/jh-nav-drawer.js?v=3335"></script>
<script>
(function(){
  var CDN='https://justhodl-data-proxy.raafouis.workers.dev';
  fetch(CDN+'/data/thesis-engine.json?t='+Date.now()).then(function(r){return r.json();}).then(function(d){
    var b=document.getElementById('board'), s=document.getElementById('sub');
    if(!d||d.status!=='LIVE'){ s.textContent='Waiting for the first watchlist sync.'; b.innerHTML=''; return; }
    var esc=function(x){return String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;');};
    var sig=function(t){return Math.abs(t)>=2?'strong':'';};
    var col=function(v){return v==null?'':(v>=0?'pos':'neg');};
    var br=d.spy_base_rates_pct||{}; s.innerHTML=d.n_theses+' theses · history from <b>'+(d.history_start||'?')+'</b> ('+(d.n_weeks||0)+' weeks) · <b style="color:var(--jh-amber,#F0B429)">'+(d.n_fdr_survivors||0)+'</b> survive FDR · SPY base: 4w '+(br.w4!=null?br.w4:'—')+'% · 13w '+(br.w13!=null?br.w13:'—')+'% · 26w '+(br.w26!=null?br.w26:'—')+'% · '+(d.signals_logged||0)+' live signals · '+esc((d.generated_at||'').slice(0,16).replace('T',' '))+' UTC';
    // family composites (the aggregated, higher-power view)
    var fams=(d.families||[]);
    if(fams.length){
      document.getElementById('families').innerHTML =
        '<h2 style="font-size:15px;margin:0 0 6px">🧬 Family Composites <span style="font-size:11px;color:var(--jh-dim,#8a836f);font-weight:400">— your panels pooled by theme (higher power, 8 tests not 56)</span></h2>'+
        '<table><thead><tr><th>Family</th><th class="num">Panels</th><th class="num">Composite</th><th class="num">SPY 13w excess</th><th class="num">Hit edge</th><th class="num">t (adj)</th><th class="num">Sign test p</th><th class="num">Under EASING</th><th class="num">Under TIGHTENING</th><th>Stable</th><th>Status</th></tr></thead><tbody>'+
        fams.map(function(f){
          var e=(f.event_study||{}).w13||{}; var st=f.sign_test||{};
          return '<tr>'+
            '<td class="strong">'+esc(f.family)+(f.firing?' <span class="fire">FIRING</span>':'')+'</td>'+
            '<td class="num">'+f.n_theses+'</td>'+
            '<td class="num">'+(f.composite_now==null?'—':f.composite_now)+'</td>'+
            '<td class="num '+col(e.excess_vs_base_pct)+'">'+(e.excess_vs_base_pct==null?'—':(e.excess_vs_base_pct>0?'+':'')+e.excess_vs_base_pct+'%')+'</td>'+
            '<td class="num '+col(e.hit_edge_pp)+'">'+(e.hit_edge_pp==null?'—':(e.hit_edge_pp>0?'+':'')+e.hit_edge_pp+'pp')+'</td>'+
            '<td class="num '+sig(e.t_stat||0)+'">'+(e.t_stat==null?'—':e.t_stat)+'</td>'+
            '<td class="num">'+(st.p_value==null?'—':st.p_value)+' <span style="color:var(--jh-dim,#8a836f)">('+(st.n_negative||0)+'/'+(st.n_theses||0)+' neg)</span></td>'+
            (function(){var R=f.by_regime||{};
              return ['EASING','TIGHTENING'].map(function(k){var r=R[k];
                return '<td class="num '+(r?col(r.excess_vs_regime_base_pct):'')+'">'+(r?((r.excess_vs_regime_base_pct>0?'+':'')+r.excess_vs_regime_base_pct+'% <span style="color:var(--jh-dim,#8a836f)">t='+r.t_stat+'</span>'):'—')+'</td>';}).join('');})()+
            '<td>'+(f.stable?'<span class="pos">both halves ✓</span>':'<span class="neg">one half only</span>')+'</td>'+
            '<td>'+(f.fdr_pass?'<span class="fire">FDR ✓</span>':'—')+'</td></tr>';
        }).join('')+'</tbody></table>'+
        '<div class="meta" style="margin-top:6px">Composite = rolling-z of each panel\'s activation, averaged. Families come from YOUR list names (never from observed signs). "Stable" = the edge holds in BOTH halves of 1990-2026, so it is not a single-era artefact.</div>';
    }
    var rows=(d.theses||[]).map(function(t){
      var e=(t.event_study||{}).w13||t.event_study_d21||{};
      return '<tr>'+
        '<td>'+esc(t.name)+(t.firing?' <span class="fire">FIRING</span>':'')+'</td>'+
        '<td class="num">'+t.n_members+'/'+t.n_total+'</td>'+
        '<td class="num">'+(t.activation_now==null?'—':t.activation_now+'%')+'</td>'+
        '<td class="num">'+(t.activation_pctile==null?'—':t.activation_pctile+'th')+'</td>'+
        '<td class="num '+col(e.excess_vs_base_pct)+'">'+(e.excess_vs_base_pct==null?'—':(e.excess_vs_base_pct>0?'+':'')+e.excess_vs_base_pct+'%')+'</td>'+
        '<td class="num '+col(e.hit_edge_pp)+'">'+(e.hit_edge_pp==null?'—':(e.hit_edge_pp>0?'+':'')+e.hit_edge_pp+'pp')+'</td>'+
        '<td class="num '+sig(e.t_stat||0)+'">'+(e.t_stat==null?'—':e.t_stat)+'</td>'+
        '<td class="num">'+(e.n_effective==null?'—':e.n_effective)+'</td>'+
        '<td>'+(t.fdr_pass?'<span class="fire">FDR ✓</span>':'')+'</td></tr>';
    }).join('');
    b.innerHTML='<table><thead><tr><th>Thesis (your watchlist)</th><th class="num">Resolved</th><th class="num">Activation</th><th class="num">Pctile</th><th class="num">SPY 13w excess</th><th class="num">Hit edge</th><th class="num">t (adj)</th><th class="num">n eff</th><th>FDR</th></tr></thead><tbody>'+rows+'</tbody></table>';
    document.getElementById('method').textContent=d.method+' · Only FDR ✓ rows survive multiple-testing across all theses. Negative excess = the thesis firing preceded SPY weakness (a working risk-off tell).';
  }).catch(function(){document.getElementById('sub').textContent='Feed unavailable.';});
})();
</script>
</body></html>
