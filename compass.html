<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Capital Compass — JustHodl.AI</title>
<meta name="description" content="Where does $10k pay you the most over 10 years? Live forward expected returns across stocks, bonds, real estate, gold, crypto — vs 30y history." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0a0e14;
  --panel: #11161f;
  --panel-2: #161c27;
  --border: #1f2937;
  --border-light: #2d3748;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --accent: #f59e0b;
  --best: #10b981;
  --good: #22d3ee;
  --fair: #fbbf24;
  --poor: #f97316;
  --avoid: #ef4444;
  --display: 'Fraunces', Georgia, serif;
  --body: 'Plus Jakarta Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(245, 158, 11, 0.06), transparent),
    radial-gradient(ellipse 50% 30% at 80% 110%, rgba(34, 211, 238, 0.04), transparent);
  min-height: 100vh;
}
.container { max-width: 1480px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── Header ────────────────────────────────────────────── */
.masthead {
  display: flex; align-items: baseline; justify-content: space-between;
  padding-bottom: 18px; margin-bottom: 30px;
  border-bottom: 1px solid var(--border);
}
.masthead-left h1 {
  font-family: var(--display);
  font-size: 38px; font-weight: 600; letter-spacing: -0.02em;
  color: var(--text);
  font-feature-settings: 'ss01';
}
.masthead-left h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
.masthead-left .subtitle {
  font-family: var(--body); font-size: 14px; color: var(--text-muted);
  margin-top: 6px; max-width: 600px;
}
.masthead-right { text-align: right; }
.masthead-right .timestamp { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.masthead-right .horizon {
  display: inline-block; padding: 4px 12px; margin-top: 6px;
  background: var(--panel); border: 1px solid var(--border-light);
  border-radius: 4px; font-family: var(--mono); font-size: 11px;
  color: var(--accent); letter-spacing: 0.05em; text-transform: uppercase;
}

/* ── Pull-quote / headline ─────────────────────────────── */
.pullquote {
  background: linear-gradient(135deg, rgba(245, 158, 11, 0.08), rgba(34, 211, 238, 0.04));
  border-left: 3px solid var(--accent);
  padding: 22px 28px; margin-bottom: 32px; border-radius: 0 8px 8px 0;
}
.pullquote-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
  color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
}
.pullquote-body {
  font-family: var(--display); font-size: 22px; line-height: 1.4;
  font-weight: 400; color: var(--text); font-style: italic;
}
.pullquote-body strong { color: var(--accent); font-style: normal; font-weight: 600; }

/* ── Section labels ────────────────────────────────────── */
.section-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em;
  color: var(--text-muted); text-transform: uppercase;
  margin: 36px 0 14px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: baseline; justify-content: space-between;
}
.section-label .hint { color: var(--text-dim); text-transform: none; letter-spacing: 0; font-size: 12px; }

/* ── Headlines grid ────────────────────────────────────── */
.headlines {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.headline {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 6px; padding: 16px; font-size: 13px;
  color: var(--text-muted);
}
.headline strong { color: var(--text); }

/* ── Asset cards grid ──────────────────────────────────── */
.assets-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 16px;
}
.card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 22px; position: relative;
  transition: border-color 0.2s, transform 0.2s;
}
.card:hover { border-color: var(--border-light); }
.card-verdict-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 8px 8px 0 0;
}
.card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 14px;
}
.card-header .ticker {
  font-family: var(--mono); font-size: 20px; font-weight: 600;
  color: var(--text); letter-spacing: 0.04em;
}
.card-header .name {
  font-size: 12px; color: var(--text-muted); margin-top: 2px;
  max-width: 280px; line-height: 1.35;
}
.card-header .verdict-pill {
  display: inline-block; padding: 4px 10px; border-radius: 4px;
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
}

.headline-num {
  font-family: var(--display); font-size: 42px; font-weight: 600;
  line-height: 1; color: var(--text); margin: 16px 0 4px;
  font-feature-settings: 'tnum';
}
.headline-num small { font-family: var(--body); font-size: 18px; font-weight: 400; color: var(--text-muted); margin-left: 4px; }
.headline-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;
  color: var(--text-muted); text-transform: uppercase; margin-bottom: 14px;
}

/* Percentile bar */
.pctile-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 12px; }
.pctile-bar {
  flex: 1; height: 6px; background: var(--panel-2); border-radius: 3px;
  position: relative; overflow: hidden;
}
.pctile-bar-fill {
  position: absolute; top: 0; left: 0; height: 100%;
  background: linear-gradient(90deg, var(--avoid), var(--poor) 25%, var(--fair) 50%, var(--good) 75%, var(--best));
  border-radius: 3px;
  transition: width 0.6s ease;
}
.pctile-marker {
  position: absolute; top: -3px; width: 2px; height: 12px;
  background: var(--text); box-shadow: 0 0 0 1px var(--bg);
}
.pctile-text { font-family: var(--mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; }

.verdict-text {
  font-size: 13px; color: var(--text-muted); margin-bottom: 14px;
  font-style: italic; padding-left: 10px; border-left: 2px solid var(--border);
}

/* $10k card */
.tenk {
  background: var(--panel-2); border-radius: 6px;
  padding: 14px 16px; margin-bottom: 14px;
}
.tenk-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px;
}
.tenk-central {
  font-family: var(--display); font-size: 26px; font-weight: 600;
  color: var(--accent); line-height: 1;
}
.tenk-band {
  font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 4px;
}
.tenk-band span { color: var(--text-muted); }

/* Risk stats */
.risk-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  background: var(--border); border-radius: 6px; overflow: hidden;
  margin-bottom: 14px;
}
.risk-stat {
  background: var(--panel-2); padding: 10px 12px;
  text-align: center;
}
.risk-stat-value {
  font-family: var(--mono); font-size: 16px; font-weight: 600;
  color: var(--text); line-height: 1;
}
.risk-stat-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  color: var(--text-dim); text-transform: uppercase; margin-top: 4px;
}

.explainer {
  font-size: 12px; color: var(--text-muted); line-height: 1.55;
  padding-top: 12px; border-top: 1px dashed var(--border);
}

/* ── Comparison table ─────────────────────────────────── */
.comparison-wrap {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px; overflow-x: auto;
}
table.compare {
  width: 100%; min-width: 900px; border-collapse: collapse;
  font-size: 13px;
}
table.compare thead th {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  color: var(--text-muted); text-transform: uppercase; font-weight: 500;
  padding: 12px 14px; text-align: right; border-bottom: 1px solid var(--border);
  background: var(--panel-2);
}
table.compare thead th:first-child,
table.compare thead th:nth-child(2) { text-align: left; }
table.compare tbody td {
  padding: 14px; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 13px; text-align: right;
  color: var(--text);
}
table.compare tbody td:first-child { color: var(--text); font-weight: 600; }
table.compare tbody td:nth-child(2) { text-align: left; font-family: var(--body); font-size: 12px; color: var(--text-muted); }
table.compare tbody tr:hover { background: rgba(255, 255, 255, 0.015); }
.verdict-cell {
  display: inline-block; padding: 3px 9px; border-radius: 4px;
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
}

/* ── Benchmark portfolios ──────────────────────────────── */
.portfolios {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 14px;
}
.portfolio-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px;
}
.portfolio-name {
  font-family: var(--display); font-size: 17px; font-weight: 600;
  color: var(--text); margin-bottom: 4px;
}
.portfolio-er {
  font-family: var(--mono); font-size: 24px; color: var(--accent);
  margin: 10px 0 4px;
}
.portfolio-er small { font-family: var(--body); font-size: 13px; color: var(--text-muted); margin-left: 6px; }
.portfolio-tenk {
  font-family: var(--mono); font-size: 13px; color: var(--text);
}
.portfolio-tenk span { color: var(--text-muted); }
.portfolio-desc {
  font-size: 12px; color: var(--text-muted); margin-top: 10px;
  padding-top: 10px; border-top: 1px solid var(--border);
}
.portfolio-weights {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px;
}
.weight-pill {
  font-family: var(--mono); font-size: 10px; padding: 3px 7px;
  background: var(--panel-2); border-radius: 3px; color: var(--text-muted);
}
.weight-pill strong { color: var(--text); }

/* ── Method / footer ──────────────────────────────────── */
.method-note {
  margin-top: 36px; padding: 22px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  font-size: 12px; color: var(--text-muted); line-height: 1.7;
}
.method-note h3 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--text); margin-bottom: 14px; text-transform: uppercase; }
.method-note ul { padding-left: 18px; }
.method-note li { margin-bottom: 6px; }
.disclaimer { margin-top: 20px; padding-top: 14px; border-top: 1px dashed var(--border); font-size: 11px; color: var(--text-dim); font-style: italic; }

/* loading state */
.loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 400px; color: var(--text-muted); font-family: var(--mono); font-size: 13px;
}
.loading::before { content: '●'; color: var(--accent); margin-right: 8px; animation: pulse 1.4s infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

@media (max-width: 720px) {
  .masthead { flex-direction: column; gap: 12px; }
  .masthead-left h1 { font-size: 28px; }
  .container { padding: 20px 14px 60px; }
  .pullquote-body { font-size: 18px; }
}
</style>
<script src="/ai-brief-kit.js"></script>
</head>
<body>
<div class="container">

<div class="masthead">
  <div class="masthead-left">
    <h1>The <em>Capital</em> Compass</h1>
    <div class="subtitle">Where does $10,000 pay you the most over 10 years? Forward expected returns across every asset retail can own — measured against 30 years of history.</div>
  </div>
  <div class="masthead-right">
    <div class="timestamp" id="timestamp">Loading…</div>
    <div class="horizon">10-Year Horizon</div>
    <a href="/wealth-plan.html" style="display:inline-block;margin-top:8px;padding:5px 12px;background:var(--panel);border:1px solid var(--accent);border-radius:4px;color:var(--accent);text-decoration:none;font-family:var(--mono);font-size:11px;letter-spacing:0.05em;text-transform:uppercase">→ Your Wealth Plan</a>
  </div>
</div>

<div id="jh-strategic" style="max-width:1280px;margin:0 auto 20px;padding:0 24px"></div>
<script>/* ops 3615: Capital Compass visual dashboard (mockup-grade, reskin-safe tokens) */
(async function(){try{
  var r1=await fetch('https://justhodl-dashboard-live.s3.amazonaws.com/data/asset-compass.json?t='+Date.now());
  var r2=await fetch('https://justhodl-dashboard-live.s3.amazonaws.com/data/forward-returns.json?t='+Date.now());
  if(!r1.ok) return; var D=await r1.json(); var FR=r2.ok?await r2.json():{};
  var H=D.horizons||{}; var T=D.verdict_trio||{}; var CP=D.cash_path_pct||{}; var FA=FR.assets||{};
  var keys=Object.keys(H); if(!keys.length) return;
  var AMB='#F0B429',GRN='#6fce8a',RED='#E07A6A',NEU='#e8e8e8',MUT='#8b93a3',PBG='#10151d',PBR='rgba(255,255,255,.07)';
  var HOR=10; window._jhOff=window._jhOff||{sectors:true}; window._jhSecX=false;
  function g(s,k){return (H[s]||{})[k];}
  function erk(){return 'er_'+HOR+'y_pct';} function exk(){return 'excess_vs_cash_'+HOR+'y_pct';}
  function tkk(){return 'tenk_'+HOR+'y';} function plk(){return 'p_loss_'+HOR+'y_pct';}
  function ccol(c){return c==='equities'?GRN:c==='sectors'?AMB:(c==='bonds'||c==='cash')?NEU:c==='credit'?'#c9942e':c==='crypto'?RED:c==='metals'?'#FFD45E':MUT;}
  function pct(s){return (FA[s]||{}).current_vs_history_percentile;}
  function card(lbl,sym,big,sub,col,icon){return '<div style="flex:1;min-width:196px;background:'+PBG+';border:1px solid '+PBR+';border-radius:14px;padding:14px 16px;position:relative">'
    +'<div style="position:absolute;top:12px;right:14px;font-size:16px">'+icon+'</div>'
    +'<div style="font-size:11px;color:'+MUT+'">'+lbl+'</div>'
    +'<div style="font-size:26px;font-weight:800;margin:2px 0">'+sym+'</div>'
    +'<div style="font-size:19px;font-weight:800;color:'+col+'">'+big+'</div>'
    +'<div style="font-size:11px;color:'+MUT+';margin-top:2px">'+sub+'</div></div>';}
  // defensive pick = lowest sigma with er>=cash-0.2
  var defSym='BIL' in H?'BIL':(function(){var c=keys.filter(function(k){return H[k].class==='cash'||H[k].class==='bonds';}).sort(function(a,b){return H[a].sigma_pct-H[b].sigma_pct;});return c[0]||keys[0];})();
  if(H.CASH&&!H.BIL) defSym='CASH';
  var hi=T.highest_expected_10y, rr=T.best_risk_reward_10y, at=T.most_attractive_vs_history, wo=T.worst_opportunity;
  var cards='<div style="display:flex;gap:12px;flex-wrap:wrap">'
    +card('Highest Expected Return',hi,(g(hi,'er_10y_pct')||0).toFixed(1)+'%',(H[hi]||{}).confidence?((H[hi]||{}).confidence.toLowerCase()+' confidence'):'',AMB,'🏆')
    +card('Best Risk / Reward',rr,(g(rr,'er_10y_pct')||0).toFixed(1)+'%','RR '+((g(rr,'rr_10y')||0).toFixed(2))+' · balanced upside',GRN,'⚖️')
    +card('Best Defensive Asset',defSym,(g(defSym,'er_10y_pct')||CP['10y']||0).toFixed(1)+'%','capital preservation',NEU,'🛡️')
    +card('Most Attractive vs History',at,(pct(at)!=null?pct(at)+'th':'—')+' pctile','better than '+(pct(at)||'—')+'% of history',GRN,'📊')
    +card('Worst Opportunity',wo,(pct(wo)!=null?pct(wo)+'th':'score '+(g(wo,'opportunity_score')||''))+(pct(wo)!=null?' pctile':''),'poor compensation for risk',RED,'⚠️')
    +'</div>';
  // ── strategic / tactical banner (rule-derived from live percentiles)
  function pl(s){var p=pct(s);return p!=null?p:50;}
  var eqAvg=Math.round((pl('SPY')+pl('QQQ')+pl('IWM'))/3);
  var tactBits=[];
  if(pl('BIL')>=55||((CP['1y']||0)>(g('SPY','er_1y_pct')||9))) tactBits.push('a defensive tilt');
  if(pl('HYG')<=25) tactBits.push('high-yield credit remains unattractive');
  if(pl('TLT')<=25) tactBits.push('long duration poorly compensated');
  var banner='<div style="display:flex;gap:14px;align-items:center;background:'+PBG+';border:1px solid '+PBR+';border-radius:14px;padding:12px 16px;margin:14px 0">'
    +'<div style="font-size:26px">🧭</div><div style="flex:1">'
    +'<div style="font-size:13.5px"><b style="color:'+GRN+'">Strategic 10-Year View:</b> <span style="color:'+NEU+'">Risk assets still offer higher long-run returns than cash ('+(g('SPY','er_10y_pct')||0).toFixed(1)+'% vs '+(CP['10y']||0).toFixed(2)+'%).</span></div>'
    +'<div style="font-size:13.5px;margin-top:3px"><b style="color:'+AMB+'">Tactical 1–6 Month Overlay:</b> <span style="color:'+NEU+'">'+(tactBits.length?('Maintain '+tactBits.join('; ')+'.'):'No strong tactical dislocations vs history.')+'</span></div></div>'
    +'<span style="border:1px solid '+AMB+'66;color:'+AMB+';border-radius:999px;padding:5px 13px;font-size:12px;font-weight:700;white-space:nowrap">Confidence: Medium</span></div>';
  // ── tactical regime rows
  function regRow(icon,name,p,upGood){var act,arr,c;
    if(p==null){act='No signal';arr='·';c=MUT;}
    else if(p>=55){act=upGood?'Increase allocation':'Maintain';arr='↑';c=upGood?GRN:AMB;}
    else if(p<=25){act='Reduce exposure';arr='↓';c=RED;}
    else {act='Maintain neutral';arr='→';c=AMB;}
    return '<div style="display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid '+PBR+'"><span style="width:22px;text-align:center">'+icon+'</span><span style="flex:1;font-weight:700">'+name+'</span><span style="color:'+c+';font-weight:800">'+arr+'</span><span style="color:'+c+';font-size:12.5px;width:140px;text-align:right">'+act+'</span></div>';}
  var whyBits=[];
  if(pl('HYG')<=25)whyBits.push('weak reward for junk-credit risk');
  if(pl('TLT')<=25)whyBits.push('duration poorly paid vs history');
  if(pl('BIL')>=55)whyBits.push('cash yields rank high vs their own history');
  var regime='<div style="background:'+PBG+';border:1px solid '+PBR+';border-radius:14px;padding:14px 16px">'
    +'<div style="font-weight:800;margin-bottom:6px">Current Tactical Regime <span style="color:'+MUT+';font-weight:400;font-size:11px">percentile-driven</span></div>'
    +regRow('💵','Cash',pl('BIL'),true)+regRow('🛡️','TIPS',pl('TIP'),true)+regRow('📈','Equities',eqAvg,false)+regRow('🧨','High Yield',pl('HYG'),true)+regRow('⏳','Long Duration',pl('TLT'),true)
    +'<div style="font-size:11.5px;color:'+MUT+';margin-top:8px">Why: '+(whyBits.join(', ')||'no extreme historical dislocations')+'.</div></div>';
  // ── scatter (ring bubbles, ticker inside when uncrowded)
  function scatter(){var pts=[];var secAgg=[];
    keys.forEach(function(k){var h=H[k];if(!isFinite(h[erk()])||!isFinite(h.sigma_pct))return;
      if(window._jhOff[h.class])return;
      if(h.class==='sectors'&&HOR>1&&!window._jhSecX){secAgg.push([h.sigma_pct,h[erk()]]);return;}
      pts.push({k:k,s:h.sigma_pct,e:h[erk()],c:h.class,fp:(h.fr_percentile!=null?h.fr_percentile:(pct(k)!=null?pct(k):50)),rr:h.rr_10y,sc:h.opportunity_score,cf:h.confidence});});
    if(secAgg.length){var ms=0,me=0;secAgg.forEach(function(x){ms+=x[0];me+=x[1];});pts.push({k:'SECT x'+secAgg.length,s:ms/secAgg.length,e:me/secAgg.length,c:'sectors',fp:50,agg:true});}
    if(!pts.length)return '';
    var W=720,Hh=380,pad=48;
    var xm=Math.max(30,Math.max.apply(null,pts.map(function(p){return p.s;}))*1.1);
    var ym1=Math.max(10,Math.max.apply(null,pts.map(function(p){return p.e;}))+2);
    var ym0=Math.min(0,Math.min.apply(null,pts.map(function(p){return p.e;}))-1);
    function X(v){return pad+v/xm*(W-pad-16);} function Y(v){return 16+(ym1-v)/(ym1-ym0)*(Hh-pad-16);}
    var grid='';for(var gx=10;gx<=xm;gx+=10){grid+='<line x1="'+X(gx)+'" y1="16" x2="'+X(gx)+'" y2="'+(Hh-pad)+'" stroke="#232a36"/><text x="'+X(gx)+'" y="'+(Hh-pad+16)+'" fill="'+MUT+'" font-size="10" text-anchor="middle">'+gx+'%</text>';}
    for(var gy=Math.ceil(ym0/2)*2;gy<=ym1;gy+=2){grid+='<line x1="'+pad+'" y1="'+Y(gy)+'" x2="'+(W-16)+'" y2="'+Y(gy)+'" stroke="#232a36"/><text x="'+(pad-7)+'" y="'+(Y(gy)+3.5)+'" fill="'+MUT+'" font-size="10" text-anchor="end">'+gy+'%</text>';}
    var cash=CP[HOR+'y'];var cl=cash!=null?'<line x1="'+pad+'" y1="'+Y(cash)+'" x2="'+(W-16)+'" y2="'+Y(cash)+'" stroke="'+MUT+'" stroke-dasharray="3 6"/>':'';
    var inBub=pts.length<=24;
    var dots=pts.map(function(p){var c=ccol(p.c);var rad=(p.agg?15:11+p.fp/12);
      var tt=p.k+' | ER '+HOR+'y '+p.e.toFixed(1)+'% | s '+p.s.toFixed(1)+'%'+(p.rr!=null?' | RR '+p.rr.toFixed(2):'')+(p.sc!=null?' | score '+p.sc:'')+' | hist '+p.fp+'%';
      var t='<circle cx="'+X(p.s).toFixed(1)+'" cy="'+Y(p.e).toFixed(1)+'" r="'+rad.toFixed(1)+'" fill="#0b0f15" stroke="'+c+'" stroke-width="2.4"><title>'+tt+'</title></circle>';
      if(inBub)t+='<text x="'+X(p.s).toFixed(1)+'" y="'+(Y(p.e)+3.4).toFixed(1)+'" text-anchor="middle" font-size="'+(p.k.length>4?8.4:9.6)+'" font-weight="800" fill="'+NEU+'">'+p.k+'</text>';
      return t;}).join('');
    var CLSL=['equities','sectors','bonds','credit','cash','metals','reits','commodities','crypto'];
    var chips=CLSL.map(function(c){var off=window._jhOff[c];return '<span class="jh-sc-chip" onclick="window._jhCls(&quot;'+c+'&quot;)" style="cursor:pointer;padding:3px 10px;border-radius:999px;border:1px solid '+(off?'#2c3240':ccol(c))+';color:'+(off?MUT:ccol(c))+';font-size:11px;margin:0 6px 6px 0;display:inline-block">'+c+'</span>';}).join('');
    return '<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px"><div style="font-weight:800">Expected Return vs Risk</div><div style="font-size:10.5px;color:'+MUT+'">● bubble size = historical attractiveness · ring = asset class · dashed = cash hurdle</div></div>'
      +'<div style="margin:8px 0 2px">'+chips+'</div>'
      +'<svg viewBox="0 0 '+W+' '+Hh+'" style="width:100%">'+grid+cl+dots
      +'<text x="'+(W/2)+'" y="'+(Hh-10)+'" fill="'+MUT+'" font-size="11" text-anchor="middle">Volatility / Risk</text>'
      +'<text x="16" y="'+(Hh/2)+'" fill="'+MUT+'" font-size="11" transform="rotate(-90 16 '+(Hh/2)+')" text-anchor="middle">'+HOR+'-Year Expected Annual Return</text></svg>';}
  // ── $10k bars
  function bars(){var ks=keys.filter(function(k){return H[k][tkk()]&&H[k].class!=='sectors';}).sort(function(a,b){return H[a][tkk()].base-H[b][tkk()].base;});
    var mx=Math.max.apply(null,ks.map(function(k){return H[k][tkk()].base;}));
    return '<div style="font-weight:800;margin-bottom:8px">Your $10,000 in '+HOR+' Years <span style="color:'+MUT+';font-size:11px;font-weight:400">ending value (nominal) · base case</span></div>'
      +ks.map(function(k){var t=H[k][tkk()];var c=ccol(H[k].class);var w=(100*t.base/mx).toFixed(1);
        return '<div style="display:flex;align-items:center;gap:9px;margin:4px 0"><div style="width:46px;font-weight:800;font-size:12px;color:'+c+'">'+k+'</div><div style="flex:1;height:15px;background:rgba(255,255,255,.04);border-radius:8px;overflow:hidden"><div style="width:'+w+'%;height:15px;border-radius:8px;background:linear-gradient(90deg,'+c+'44,'+c+')"><title></title></div></div><div style="width:64px;text-align:right;font-size:12px;font-weight:700">$'+(t.base/1000).toFixed(1)+'k</div></div>';}).join('')
      +'<div style="font-size:10.5px;color:'+MUT+';margin-top:6px">10th/90th bands live in the Compass table tooltips · lognormal from (ER, s)</div>';}
  // ── score table
  function verdict(k){var s=g(k,'opportunity_score');var cls=H[k].class;
    if(cls==='cash'||k==='TIP')return ['Defensive',NEU];
    if(s==null)return ['—',MUT];
    if(s>=75)return ['Strong',GRN]; if(s>=60)return ['Good',GRN]; if(s>=45)return ['Neutral',AMB];
    if(s>=35)return ['Weak',RED]; return ['Avoid',RED];}
  function tbl(){var ks=keys.filter(function(k){return H[k].class!=='sectors';}).sort(function(a,b){return (g(b,'opportunity_score')||-1)-(g(a,'opportunity_score')||-1);});
    var rows=ks.map(function(k){var ex=g(k,exk());var v=verdict(k);var t=H[k][tkk()]||{};
      return '<tr title="10th '+(t.p10/1000||0).toFixed(1)+'k · base '+(t.base/1000||0).toFixed(1)+'k · 90th '+(t.p90/1000||0).toFixed(1)+'k"><td style="padding:6px 8px;font-weight:800">'+k+'</td>'
        +'<td style="text-align:right">'+(g(k,erk())!=null?g(k,erk()).toFixed(1)+'%':'—')+'</td>'
        +'<td style="text-align:right;color:'+(ex==null?MUT:ex>=2?GRN:ex>=0?NEU:RED)+'">'+(ex!=null?((ex>0?'+':'')+ex.toFixed(1)+'%'):'—')+'</td>'
        +'<td style="text-align:right;font-weight:800;color:'+AMB+'">'+(g(k,'opportunity_score')!=null?g(k,'opportunity_score'):'—')+'</td>'
        +'<td style="text-align:right;color:'+MUT+'">'+(pct(k)!=null?pct(k)+' pct':'—')+'</td>'
        +'<td style="text-align:right;color:'+MUT+'">'+(g(k,plk())!=null?g(k,plk()).toFixed(0)+'%':'—')+'</td>'
        +'<td style="text-align:right;color:'+v[1]+';font-weight:800">'+v[0]+'</td></tr>';}).join('');
    return '<div style="display:flex;justify-content:space-between;align-items:baseline"><div style="font-weight:800">Capital Compass Score</div><div style="font-size:10.5px;color:'+MUT+'">higher score is better</div></div>'
      +'<div style="overflow:auto;margin-top:6px"><table style="width:100%;border-collapse:collapse;font-size:12.5px"><thead><tr style="color:'+MUT+';font-size:10.5px;text-align:right"><th style="text-align:left;padding:6px 8px">ASSET</th><th>EXP. RETURN ('+HOR+'Y)</th><th>EXCESS vs CASH</th><th>SCORE</th><th>HIST. ATTRACT.</th><th>'+HOR+'Y LOSS PROB.</th><th>VERDICT</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
      +'<div style="font-size:10.5px;color:'+MUT+';margin-top:6px">Scores combine expected return, excess vs cash, valuation vs history, risk-adjusted return and loss probability. Hover a row for 10th/90th $10k bands.</div>';}
  // ── suggested allocations (page-computed from live ERs)
  function alloc(n,name,col,w,cap){var er=0,tot=0;var segs='',dots='';var i=0;
    var CSET=[GRN,AMB,'#FFD45E','#c9942e',NEU,RED,'#3f7d55'];
    Object.keys(w).forEach(function(s){if(g(s,'er_10y_pct')==null)return;er+=w[s]*g(s,'er_10y_pct');tot+=w[s];});
    if(tot>0)er=er/tot; var endv=10000*Math.pow(1+er/100,10);
    Object.keys(w).forEach(function(s){var c=CSET[i++%CSET.length];
      segs+='<div style="width:'+(100*w[s]).toFixed(0)+'%;background:'+c+';height:100%" title="'+s+' '+(100*w[s]).toFixed(0)+'%"></div>';
      dots+='<span style="font-size:10.5px;color:'+MUT+';margin-right:9px"><span style="color:'+c+'">●</span> '+s+' '+(100*w[s]).toFixed(0)+'%</span>';});
    return '<div style="flex:1;min-width:270px;background:'+PBG+';border:1px solid '+PBR+';border-radius:14px;padding:14px 16px">'
      +'<div style="display:flex;align-items:center;gap:8px"><span style="width:22px;height:22px;border-radius:50%;background:'+col+';color:#0b0f15;font-weight:800;display:inline-flex;align-items:center;justify-content:center;font-size:12px">'+n+'</span><b>'+name+'</b></div>'
      +'<div style="display:flex;justify-content:space-between;margin:8px 0 2px"><div><div style="font-size:20px;font-weight:800;color:'+col+'">'+er.toFixed(1)+'%</div><div style="font-size:10.5px;color:'+MUT+'">10Y expected annual return</div></div>'
      +'<div style="text-align:right"><div style="font-size:16px;font-weight:800">$10k → <span style="color:'+col+'">$'+Math.round(endv).toLocaleString()+'</span></div><div style="font-size:10.5px;color:'+MUT+'">ending value (nominal)</div></div></div>'
      +'<div style="display:flex;height:12px;border-radius:6px;overflow:hidden;margin:8px 0 6px">'+segs+'</div><div>'+dots+'</div>'
      +'<div style="font-size:10.5px;color:'+MUT+';margin-top:7px;border-top:1px solid '+PBR+';padding-top:6px">'+cap+'</div></div>';}
  var allocs='<div style="font-weight:800;margin:16px 0 8px">Suggested Allocations <span style="color:'+MUT+';font-size:11px;font-weight:400">computed live from the forward ERs above — not advice</span></div>'
    +'<div style="display:flex;gap:12px;flex-wrap:wrap">'
    +alloc(1,'Maximum Expected Wealth',GRN,{EEM:.25,QQQ:.20,SPY:.15,IWM:.15,EFA:.10,VNQ:.10,BIL:.05},'Higher-growth assets for maximum expected wealth; deepest drawdowns.')
    +alloc(2,'Best Risk / Reward',AMB,{SPY:.20,EEM:.20,QQQ:.20,IWM:.15,EFA:.15,BIL:.10},'Balanced exposure across growth and diversification.')
    +alloc(3,'Capital Preservation',NEU,{BIL:.35,TIP:.25,IEF:.20,GLD:.10,VNQ:.10},'Focus on capital preservation and lower volatility.')
    +'</div>';
  // ── layout
  function render(){document.getElementById('jh-strategic').innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px"><div style="font-size:21px;font-weight:800">🧭 Strategic Capital Compass</div>'
    +'<div>'+[1,5,10].map(function(h){return '<button onclick="window._jhHor('+h+')" style="margin-left:6px;padding:5px 15px;border-radius:999px;border:1px solid '+(HOR===h?AMB:'#2c3240')+';background:'+(HOR===h?AMB+'1f':'transparent')+';color:'+(HOR===h?AMB:NEU)+';font-weight:700;cursor:pointer">'+h+'-Year View</button>';}).join('')+'</div></div>'
    +'<div style="color:'+MUT+';font-size:12.5px;margin:2px 0 12px">Where should $10,000 go? · '+(D.h_meta?D.h_meta.n_assets:keys.length)+' assets incl. 11 sectors · assumptions labeled per asset · refreshed '+((D.generated_at||'').slice(0,16).replace('T',' '))+'</div>'
    +cards+banner
    +'<div style="display:grid;grid-template-columns:minmax(340px,1.5fr) minmax(280px,1fr);gap:14px;align-items:start" class="jh-cc-grid2">'
    +'<div style="background:'+PBG+';border:1px solid '+PBR+';border-radius:14px;padding:14px 16px">'+scatter()+'</div>'+regime+'</div>'
    +'<div style="display:grid;grid-template-columns:minmax(320px,1fr) minmax(340px,1.2fr);gap:14px;align-items:start;margin-top:14px" class="jh-cc-grid2">'
    +'<div style="background:'+PBG+';border:1px solid '+PBR+';border-radius:14px;padding:14px 16px">'+bars()+'</div>'
    +'<div style="background:'+PBG+';border:1px solid '+PBR+';border-radius:14px;padding:14px 16px">'+tbl()+'</div></div>'
    +allocs
    +'<style>@media(max-width:900px){.jh-cc-grid2{grid-template-columns:1fr !important}}</style>';}
  window._jhHor=function(h){HOR=h;render();};
  window._jhCls=function(c){window._jhOff[c]=!window._jhOff[c];render();};
  window._jhSecToggle=function(){window._jhSecX=!window._jhSecX;render();};
  render();
}catch(e){console.error('cc-dash',e);}})();
</script>
<div id="ai-decisive-call" style="max-width:1280px;margin:0 auto 18px;padding:0 24px"></div>
<script>if(window.JHAIBrief)JHAIBrief.mount("ai-decisive-call","compass-decisive-call");</script>

<div id="root"><div class="loading">Loading live data…</div></div>

</div>

<script>
const ENDPOINT = "https://justhodl-dashboard-live.s3.amazonaws.com/data/forward-returns.json";

const fmtPct = (v) => v == null ? "—" : (v >= 0 ? "+" : "") + v.toFixed(1) + "%";
const fmtMoney = (v) => v == null ? "—" : "$" + Math.round(v).toLocaleString();
const fmtMoneyK = (v) => v == null ? "—" : "$" + (v >= 1000 ? (v / 1000).toFixed(1) + "k" : v.toFixed(0));

function render(data) {
  const root = document.getElementById("root");
  const ts = document.getElementById("timestamp");
  ts.textContent = "Refreshed: " + new Date(data.generated_at).toLocaleString();

  const assets = data.assets || {};
  const rankedByOpp = (data.rankings?.by_opportunity_percentile || []).map(t => assets[t]).filter(Boolean);
  const rankedByER = (data.rankings?.by_forward_er || []).map(t => assets[t]).filter(Boolean);
  const headlines = data.headlines || [];
  const portfolios = data.benchmark_portfolios || {};

  // PULL QUOTE
  let pullQuoteHTML = "";
  if (rankedByOpp.length) {
    const best = rankedByOpp[0];
    const worst = rankedByOpp[rankedByOpp.length - 1];
    pullQuoteHTML = `
      <div class="pullquote">
        <div class="pullquote-label">Today's Verdict</div>
        <div class="pullquote-body">
          The best forward opportunity right now is <strong>${best.ticker}</strong>
          paying <strong>${fmtPct(best.forward_er_10y_pct)}</strong> annually
          (${best.current_vs_history_percentile}th percentile vs 30y).
          Avoid <strong>${worst.ticker}</strong> at <strong>${fmtPct(worst.forward_er_10y_pct)}</strong>
          — historically bottom ${100 - worst.current_vs_history_percentile}% entry.
        </div>
      </div>`;
  }

  // HEADLINES
  let headlinesHTML = "";
  if (headlines.length) {
    headlinesHTML = `
      <div class="section-label">Headlines <span class="hint">cross-asset summary</span></div>
      <div class="headlines">
        ${headlines.map(h => `<div class="headline">${h}</div>`).join("")}
      </div>`;
  }

  // ASSET CARDS — ranked by opportunity percentile (best first)
  const cardsHTML = `
    <div class="section-label">All Assets, Ranked by Opportunity <span class="hint">click anywhere for details</span></div>
    <div class="assets-grid">
      ${rankedByOpp.map(a => assetCard(a)).join("")}
    </div>`;

  // COMPARISON TABLE
  const tableHTML = `
    <div class="section-label">Side-by-Side Comparison <span class="hint">scroll for more</span></div>
    <div class="comparison-wrap">
      <table class="compare">
        <thead>
          <tr>
            <th>Asset</th>
            <th>What it is</th>
            <th>Fwd ER (10y)</th>
            <th>30y Median</th>
            <th>%ile vs history</th>
            <th>Vol</th>
            <th>Worst 12mo</th>
            <th>P(loss 10y)</th>
            <th>Sharpe</th>
            <th>$10k → 10y</th>
            <th>Verdict</th>
          </tr>
        </thead>
        <tbody>
          ${rankedByOpp.map(a => `
            <tr>
              <td>${a.ticker}</td>
              <td>${a.name}</td>
              <td>${fmtPct(a.forward_er_10y_pct)}</td>
              <td style="color:var(--text-muted)">${fmtPct(a.history_30y.er_median_pct)}</td>
              <td>${a.current_vs_history_percentile}%</td>
              <td>${a.risk.vol_pct_annualized?.toFixed(1) ?? "—"}%</td>
              <td style="color:${a.risk.worst_12mo_drawdown_pct < -20 ? 'var(--avoid)' : 'var(--text-muted)'}">${a.risk.worst_12mo_drawdown_pct?.toFixed(0) ?? "—"}%</td>
              <td>${a.risk.prob_negative_10y_pct?.toFixed(0) ?? "—"}%</td>
              <td>${a.risk.sharpe_vs_cash ?? "—"}</td>
              <td>${fmtMoneyK(a.ten_k_in_10yr_usd.central)}</td>
              <td><span class="verdict-cell" style="background:${a.verdict_color}22;color:${a.verdict_color}">${a.verdict}</span></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>`;

  // BENCHMARK PORTFOLIOS
  const portCards = Object.entries(portfolios).map(([k, p]) => `
    <div class="portfolio-card">
      <div class="portfolio-name">${p.label}</div>
      <div class="portfolio-er">${fmtPct(p.forward_er_pct)}<small>expected / yr</small></div>
      <div class="portfolio-tenk">$10k → <strong style="color:var(--accent)">${fmtMoney(p.ten_k_10yr)}</strong> <span>in 10 years</span></div>
      <div class="portfolio-weights">
        ${Object.entries(p.weights).map(([s, w]) => `<div class="weight-pill"><strong>${s}</strong> ${((w*100)%1?(w*100).toFixed(1):(w*100).toFixed(0))}%</div>`).join("")}
      </div>
      <div class="portfolio-desc">${p.description}</div>${p.updates?`<div class="portfolio-desc" style="opacity:.75">${p.updates}${p.mapped_coverage_pct!=null?` · mapped ${p.mapped_coverage_pct}%`:``}</div>`:``}${p.holdings_top10?`<div class="portfolio-desc" style="opacity:.75">${p.holdings_top10.join(" · ")}</div>`:``}
    </div>
  `).join("");
  const portfoliosHTML = `
    <div class="section-label">Benchmark Portfolios <span class="hint">classic strategies, forward expected</span></div>
    <div class="portfolios">${portCards}</div>`;

  // METHOD
  const methodHTML = `
    <div class="method-note">
      <h3>Method &amp; Sources</h3>
      <ul>
        <li><strong>Stocks (SPY/QQQ/IWM/EFA/EEM):</strong> ${data.methodology.stocks_er}</li>
        <li><strong>Treasuries (IEF/TLT):</strong> ${data.methodology.bonds_er}</li>
        <li><strong>TIPS (TIP):</strong> ${data.methodology.tips_er}</li>
        <li><strong>Corporate credit (LQD/HYG):</strong> ${data.methodology.credit_er}</li>
        <li><strong>REITs (VNQ):</strong> ${data.methodology.reit_er}</li>
        <li><strong>Gold (GLD):</strong> ${data.methodology.gold_er}</li>
        <li><strong>Commodities (DBC):</strong> ${data.methodology.commodities_er}</li>
        <li><strong>Bitcoin (BTC):</strong> ${data.methodology.btc_er}</li>
        <li><strong>Percentile:</strong> ${data.methodology.percentile}</li>
        <li><strong>Sources:</strong> ${data.methodology.sources}</li>
      </ul>
      <div class="disclaimer">${data.disclaimer}</div>
    </div>`;

  root.innerHTML = pullQuoteHTML + headlinesHTML + cardsHTML + tableHTML + portfoliosHTML + methodHTML;
}

function assetCard(a) {
  return `
    <div class="card">
      <div class="card-verdict-bar" style="background:${a.verdict_color}"></div>
      <div class="card-header">
        <div>
          <div class="ticker">${a.ticker}</div>
          <div class="name">${a.name}</div>
        </div>
        <span class="verdict-pill" style="background:${a.verdict_color}22;color:${a.verdict_color}">${a.verdict}</span>
      </div>

      <div class="headline-label">Forward Expected Return (annual, 10y)</div>
      <div class="headline-num" style="color:${a.verdict_color}">${fmtPct(a.forward_er_10y_pct)}</div>

      <div class="pctile-row">
        <div class="pctile-text">Bottom</div>
        <div class="pctile-bar">
          <div class="pctile-bar-fill" style="width:${a.current_vs_history_percentile}%"></div>
          <div class="pctile-marker" style="left:${a.current_vs_history_percentile}%"></div>
        </div>
        <div class="pctile-text">${a.current_vs_history_percentile}th %ile</div>
      </div>

      <div class="verdict-text">${a.verdict_text}</div>

      <div class="tenk">
        <div class="tenk-label">If you invest $10,000 today</div>
        <div class="tenk-central">${fmtMoney(a.ten_k_in_10yr_usd.central)}</div>
        <div class="tenk-band">
          <span>10y bear case:</span> ${fmtMoney(a.ten_k_in_10yr_usd.p10_bear)}
          &nbsp;·&nbsp;
          <span>bull case:</span> ${fmtMoney(a.ten_k_in_10yr_usd.p90_bull)}
        </div>
      </div>

      <div class="risk-stats">
        <div class="risk-stat">
          <div class="risk-stat-value">${a.risk.vol_pct_annualized?.toFixed(0) ?? "—"}%</div>
          <div class="risk-stat-label">Annual vol</div>
        </div>
        <div class="risk-stat">
          <div class="risk-stat-value" style="color:${a.risk.worst_12mo_drawdown_pct < -20 ? 'var(--avoid)' : 'var(--text)'}">${a.risk.worst_12mo_drawdown_pct?.toFixed(0) ?? "—"}%</div>
          <div class="risk-stat-label">Worst 12mo</div>
        </div>
        <div class="risk-stat">
          <div class="risk-stat-value">${a.risk.sharpe_vs_cash ?? "—"}</div>
          <div class="risk-stat-label">Sharpe vs cash</div>
        </div>
      </div>

      <div class="explainer">${a.explainer_retail}</div>
    </div>`;
}

fetch(ENDPOINT, { cache: "no-cache" })
  .then(r => r.json())
  .then(render)
  .catch(e => {
    document.getElementById("root").innerHTML =
      `<div class="loading" style="color:var(--avoid)">Data temporarily unavailable: ${e.message}</div>`;
  });
</script>
  <script src="/jh-page-ai.js" defer></script>
<script src="/jh-nav-drawer.js" defer></script>
</body>
