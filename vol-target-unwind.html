<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vol-Target Unwind Trigger | JustHodl</title>
<link rel="preconnect" href="https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com">
<style>
:root {
  --bg:#0a0e14; --panel:#0f131a; --panel2:#11161f; --line:#1c2433;
  --txt:#e6eaf2; --mute:#a8b3c7; --dim:#6f7b91;
  --green:#26ffaf; --red:#ff5577; --orange:#ff7a18;
  --yellow:#ffd266; --cyan:#00d4ff; --purple:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.5;padding:24px;max-width:1400px;margin:0 auto;}
a{color:var(--cyan);text-decoration:none;}
a:hover{text-decoration:underline;}
header{border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
h1{font-size:18px;color:var(--cyan);font-weight:600;}
h2{font-size:14px;color:var(--mute);text-transform:uppercase;letter-spacing:0.05em;margin:0 0 12px;}
.subtitle{color:var(--mute);font-size:12px;}
.crumbs{font-size:12px;color:var(--mute);}
.crumbs a{margin:0 4px;}

.banner{padding:20px 24px;border-radius:8px;margin-bottom:24px;background:var(--panel);border:1px solid var(--line);position:relative;overflow:hidden;}
.banner.state-FIRED_UP{border-color:var(--red);background:linear-gradient(135deg, rgba(255,85,119,0.08) 0%, var(--panel) 80%);}
.banner.state-PANIC{border-color:var(--red);background:linear-gradient(135deg, rgba(255,85,119,0.18) 0%, var(--panel) 80%);}
.banner.state-FIRED_DOWN{border-color:var(--green);background:linear-gradient(135deg, rgba(38,255,175,0.08) 0%, var(--panel) 80%);}
.banner.state-ARMED_UP{border-color:var(--orange);background:linear-gradient(135deg, rgba(255,122,24,0.06) 0%, var(--panel) 80%);}
.banner.state-ARMED_DOWN{border-color:var(--yellow);}
.banner.state-COOLDOWN{border-color:var(--purple);}
.banner.state-NULL{border-color:var(--line);}
.state-label{font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:0.1em;}
.state-value{font-size:32px;font-weight:600;letter-spacing:-0.01em;margin:4px 0;}
.state-value.FIRED_UP, .state-value.PANIC{color:var(--red);}
.state-value.FIRED_DOWN{color:var(--green);}
.state-value.ARMED_UP{color:var(--orange);}
.state-value.ARMED_DOWN{color:var(--yellow);}
.state-value.COOLDOWN{color:var(--purple);}
.state-value.NULL{color:var(--mute);}
.signal-bar{height:6px;background:var(--line);border-radius:3px;margin-top:12px;overflow:hidden;}
.signal-fill{height:100%;background:linear-gradient(90deg, var(--green) 0%, var(--yellow) 50%, var(--orange) 75%, var(--red) 100%);transition:width 0.5s;}

.grid{display:grid;gap:16px;margin-bottom:24px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:repeat(3, 1fr);}
.grid-4{grid-template-columns:repeat(4, 1fr);}
@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;}
.panel.accent-green{border-color:rgba(38,255,175,0.3);}
.panel.accent-red{border-color:rgba(255,85,119,0.3);}
.panel.accent-orange{border-color:rgba(255,122,24,0.3);}

.reading{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line);}
.reading:last-child{border-bottom:none;}
.reading-label{color:var(--mute);}
.reading-value{color:var(--txt);font-weight:600;}
.reading-value.danger{color:var(--red);}
.reading-value.warn{color:var(--orange);}
.reading-value.ok{color:var(--green);}

table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{text-align:left;padding:8px;border-bottom:1px solid var(--line);}
th{color:var(--mute);text-transform:uppercase;letter-spacing:0.05em;font-weight:500;font-size:11px;}
td.num{text-align:right;font-variant-numeric:tabular-nums;}
td.pos{color:var(--green);}
td.neg{color:var(--red);}

.horizon-card{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:12px;}
.horizon-card .h{font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:0.05em;}
.horizon-card .val{font-size:24px;font-weight:600;margin:4px 0;}
.horizon-card .val.pos{color:var(--green);}
.horizon-card .val.neg{color:var(--red);}
.horizon-card .meta{font-size:11px;color:var(--dim);}

.cond-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);}
.cond-row:last-child{border-bottom:none;}
.cond-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cond-dot.ok{background:var(--green);box-shadow:0 0 8px var(--green);}
.cond-dot.bad{background:var(--dim);}
.cond-name{flex:1;}
.cond-val{color:var(--mute);font-size:11px;}
.cond-weight{color:var(--dim);font-size:10px;}

.trade-card{background:var(--panel2);border-radius:6px;padding:14px;margin-bottom:12px;border:1px solid var(--line);}
.trade-card h3{font-size:12px;color:var(--cyan);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.trade-card .instrument{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:4px;}
.trade-card .thesis{color:var(--mute);font-size:12px;margin:8px 0;line-height:1.6;}
.trade-card .meta-row{display:flex;justify-content:space-between;margin:4px 0;font-size:11px;}
.trade-card .meta-row span:first-child{color:var(--dim);}

.why-now{background:var(--panel);border-left:3px solid var(--cyan);padding:16px 20px;border-radius:0 6px 6px 0;color:var(--txt);font-size:13px;line-height:1.7;}
.why-now strong{color:var(--cyan);}

.exit-rules{list-style:none;}
.exit-rules li{padding:6px 0;color:var(--mute);font-size:12px;}
.exit-rules li::before{content:"▸ ";color:var(--cyan);margin-right:6px;}

footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--line);color:var(--dim);font-size:11px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}

.aum-bar{margin:8px 0;}
.aum-fill{display:flex;height:24px;border-radius:4px;overflow:hidden;background:var(--line);}
.aum-seg{display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--bg);font-weight:600;}
.aum-rp{background:var(--red);}
.aum-vc{background:var(--orange);}
.aum-cta{background:var(--yellow);}
.aum-tdf{background:var(--cyan);}
</style>
</head>
<body>
<header>
  <div>
    <h1>📉 Vol-Target Unwind Trigger</h1>
    <div class="subtitle">Edge #4 · front-running mechanical de-leveraging by $670B+ in vol-targeting AUM</div>
  </div>
  <div class="crumbs">
    <a href="/">home</a> · <a href="/directory.html">all engines</a> · <a href="/vix-capitulation.html">VIX backwardation</a> · <a href="/breadth-thrust.html">breadth thrust</a>
  </div>
</header>

<div id="root">
  <div class="banner state-NULL">
    <div class="state-label">loading...</div>
    <div class="state-value">—</div>
  </div>
</div>

<footer>
  <span id="ts">—</span>
  <span>data: <a href="https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com/data/vol-target-unwind.json" target="_blank">vol-target-unwind.json</a></span>
</footer>

<script>
const DATA_URL = "https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com/data/vol-target-unwind.json";

function fmt(v, d = 2) {
  if (v === null || v === undefined) return "—";
  if (typeof v !== "number") return v;
  return v.toFixed(d);
}
function fmtPct(v, d = 2) {
  if (v === null || v === undefined) return "—";
  return (v >= 0 ? "+" : "") + v.toFixed(d) + "%";
}
function cls(v) { return v > 0 ? "pos" : v < 0 ? "neg" : ""; }

function mdToHtml(md) {
  if (!md) return "";
  return md
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n\n/g, "</p><p>")
    .replace(/^/, "<p>").concat("</p>");
}

function render(d) {
  const root = document.getElementById("root");
  const state = d.state || "NULL";
  const cr = d.current_readings || {};
  const fwd = d.forward_expectations || {};
  const trade = d.recommended_trade || {};
  const aum = d.aum_breakdown_bn || {};
  const aumTotal = Object.values(aum).reduce((a,b) => a+b, 0);

  const stateClassMap = {
    "FIRED_UP": "FIRED_UP", "PANIC": "PANIC",
    "FIRED_DOWN": "FIRED_DOWN", "ARMED_UP": "ARMED_UP",
    "ARMED_DOWN": "ARMED_DOWN", "COOLDOWN": "COOLDOWN", "NULL": "NULL"
  };
  const sc = stateClassMap[state] || "NULL";

  // Conditions
  const conds = (d.trigger_conditions || []).map(c => `
    <div class="cond-row">
      <div class="cond-dot ${c.satisfied ? 'ok' : 'bad'}"></div>
      <div class="cond-name">${c.name}</div>
      <div class="cond-val">${fmt(c.current)} vs ${fmt(c.threshold)}</div>
      <div class="cond-weight">w=${(c.weight*100).toFixed(0)}%</div>
    </div>
  `).join("");

  // Horizon cards
  function hcard(label, h) {
    if (!h || h.return_pct === null) return `
      <div class="horizon-card">
        <div class="h">${label}</div>
        <div class="val">—</div>
        <div class="meta">no data</div>
      </div>`;
    return `
      <div class="horizon-card">
        <div class="h">next ${label}</div>
        <div class="val ${cls(h.return_pct)}">${fmtPct(h.return_pct)}</div>
        <div class="meta">${h.win_rate_pct}% win · n=${h.n} · med ${fmtPct(h.median_pct)}</div>
        <div class="meta">range ${fmtPct(h.worst_pct)} to ${fmtPct(h.best_pct)}</div>
      </div>`;
  }

  // AUM bar
  const aumBar = `
    <div class="aum-bar">
      <div class="aum-fill">
        ${aum.risk_parity ? `<div class="aum-seg aum-rp" style="flex:${aum.risk_parity};">$${aum.risk_parity}B</div>` : ''}
        ${aum.vol_control ? `<div class="aum-seg aum-vc" style="flex:${aum.vol_control};">$${aum.vol_control}B</div>` : ''}
        ${aum.cta_trend ? `<div class="aum-seg aum-cta" style="flex:${aum.cta_trend};">$${aum.cta_trend}B</div>` : ''}
        ${aum.target_date_glide ? `<div class="aum-seg aum-tdf" style="flex:${aum.target_date_glide};">$${aum.target_date_glide}B</div>` : ''}
      </div>
      <div style="font-size:10px;color:var(--dim);margin-top:4px;">
        risk-parity · vol-control · CTAs · target-date glide · total ~$${aumTotal}B
      </div>
    </div>`;

  // Historical episodes
  const eps = (d.regime_analog_set === 're_lever_down_cross' ? d.historical_episodes_down : d.historical_episodes_up) || [];
  const epsRows = eps.slice(-10).reverse().map(e => `
    <tr>
      <td>${e.date}</td>
      <td class="num">${fmt(e.rv_at_trigger)}</td>
      <td class="num">$${fmt(e.entry_price)}</td>
      <td class="num ${cls(e.fwd_1w_pct)}">${fmtPct(e.fwd_1w_pct)}</td>
      <td class="num ${cls(e.fwd_1m_pct)}">${fmtPct(e.fwd_1m_pct)}</td>
      <td class="num ${cls(e.fwd_3m_pct)}">${fmtPct(e.fwd_3m_pct)}</td>
      <td class="num ${cls(e.fwd_12m_pct)}">${fmtPct(e.fwd_12m_pct)}</td>
    </tr>
  `).join("");

  // Trade cards
  const tradeHtml = `
    ${trade.primary ? `
    <div class="trade-card">
      <h3>PRIMARY</h3>
      <div class="instrument">${trade.primary.instrument}</div>
      <div class="thesis">${trade.primary.thesis}</div>
      <div class="meta-row"><span>direction</span><span>${trade.primary.direction || ''}</span></div>
      <div class="meta-row"><span>size</span><span>${trade.primary.size_guidance || '—'}</span></div>
      <div class="meta-row"><span>max loss</span><span>${trade.primary.max_loss || '—'}</span></div>
      <div class="meta-row"><span>horizon</span><span>${trade.primary.expected_horizon || '—'}</span></div>
      <div class="meta-row"><span>basis</span><span>${trade.primary.expected_return_basis || '—'}</span></div>
    </div>` : ''}
    ${trade.defined_risk_alt ? `
    <div class="trade-card">
      <h3>DEFINED-RISK ALT</h3>
      <div class="instrument">${trade.defined_risk_alt.instrument}</div>
      <div class="thesis">${trade.defined_risk_alt.thesis}</div>
      <div class="meta-row"><span>max loss</span><span>${trade.defined_risk_alt.max_loss || '—'}</span></div>
      <div class="meta-row"><span>max gain</span><span>${trade.defined_risk_alt.max_gain || '—'}</span></div>
    </div>` : ''}
    ${trade.leveraged_alt ? `
    <div class="trade-card">
      <h3>LEVERAGED ALT</h3>
      <div class="instrument">${trade.leveraged_alt.instrument}</div>
      <div class="thesis">${trade.leveraged_alt.thesis}</div>
      <div class="meta-row"><span>size</span><span>${trade.leveraged_alt.size_guidance || '—'}</span></div>
    </div>` : ''}
    ${trade.exit_rules ? `
    <div class="panel" style="margin-top:8px;">
      <h2>Exit rules</h2>
      <ul class="exit-rules">
        ${trade.exit_rules.map(r => `<li>${r}</li>`).join("")}
      </ul>
    </div>` : ''}
  `;

  root.innerHTML = `
    <div class="banner state-${sc}">
      <div class="state-label">live state · regime ${d.regime_analog_set || ''}</div>
      <div class="state-value ${sc}">${state}</div>
      <div style="color:var(--mute);font-size:12px;margin-top:4px;">
        signal strength ${d.signal_strength}/100 · AUM at risk ~$${d.aum_at_risk_usd_bn}B
      </div>
      <div class="signal-bar"><div class="signal-fill" style="width:${d.signal_strength}%;"></div></div>
    </div>

    <div class="grid grid-2">
      <div class="panel">
        <h2>Live readings</h2>
        <div class="reading"><span class="reading-label">SPY close</span><span class="reading-value">$${fmt(cr.spy_close)}</span></div>
        <div class="reading"><span class="reading-label">RV21 (close-to-close)</span><span class="reading-value ${cr.spy_realized_vol_21d_pct >= 20 ? 'danger' : cr.spy_realized_vol_21d_pct >= 18 ? 'warn' : 'ok'}">${fmt(cr.spy_realized_vol_21d_pct)}%</span></div>
        <div class="reading"><span class="reading-label">RV5 (5-day)</span><span class="reading-value">${fmt(cr.spy_realized_vol_5d_pct)}%</span></div>
        <div class="reading"><span class="reading-label">RV21 Yang-Zhang</span><span class="reading-value">${fmt(cr.spy_realized_vol_21d_yang_zhang_pct)}%</span></div>
        <div class="reading"><span class="reading-label">RV5 Parkinson</span><span class="reading-value">${fmt(cr.spy_realized_vol_5d_parkinson_pct)}%</span></div>
        <div class="reading"><span class="reading-label">VIX</span><span class="reading-value">${fmt(cr.vix)}</span></div>
        <div class="reading"><span class="reading-label">VIX − RV21 (risk premium)</span><span class="reading-value">${fmtPct(cr.vix_minus_rv21)}</span></div>
      </div>

      <div class="panel">
        <h2>Trigger conditions</h2>
        ${conds}
        <div style="margin-top:16px;font-size:11px;color:var(--dim);">
          de-lever threshold ${d.thresholds.de_lever_pct}% · panic ${d.thresholds.panic_pct}% · re-lever ${d.thresholds.re_lever_pct}%
        </div>
      </div>
    </div>

    <div class="panel" style="margin-bottom:16px;">
      <h2>Capital at risk — vol-targeting fund AUM</h2>
      ${aumBar}
      <div style="font-size:12px;color:var(--mute);margin-top:8px;">
        These funds carry an explicit mandate to re-balance position size when realized vol breaches threshold. The flow is mechanical, knowable, and front-runnable.
      </div>
    </div>

    <div class="grid grid-4">
      ${hcard("1w (5d)", fwd["1w"])}
      ${hcard("1m (21d)", fwd["1m"])}
      ${hcard("3m (63d)", fwd["3m"])}
      ${hcard("12m (252d)", fwd["12m"])}
    </div>

    <div class="grid grid-2">
      <div class="panel">
        <h2>Why now</h2>
        <div class="why-now">${mdToHtml(d.why_now_explainer)}</div>
      </div>

      <div class="panel">
        <h2>Recommended trade</h2>
        ${tradeHtml}
      </div>
    </div>

    <div class="panel" style="margin-top:16px;">
      <h2>Recent historical analogs (${d.regime_analog_set})</h2>
      <table>
        <thead>
          <tr><th>date</th><th class="num">RV@trigger</th><th class="num">SPY entry</th><th class="num">fwd 1w</th><th class="num">fwd 1m</th><th class="num">fwd 3m</th><th class="num">fwd 12m</th></tr>
        </thead>
        <tbody>${epsRows || '<tr><td colspan="7" style="color:var(--dim);text-align:center;padding:24px;">No historical analogs available.</td></tr>'}</tbody>
      </table>
    </div>

    <div class="panel" style="margin-top:16px;">
      <h2>Methodology</h2>
      <div style="font-size:12px;color:var(--mute);line-height:1.7;">${d.methodology}</div>
      <div style="font-size:11px;color:var(--dim);margin-top:12px;">
        <strong style="color:var(--mute);">Sources:</strong> ${(d.sources || []).join(" · ")}
      </div>
      <div style="font-size:11px;color:var(--dim);margin-top:4px;">
        <strong style="color:var(--mute);">Schedule:</strong> ${d.schedule}
      </div>
    </div>
  `;
  document.getElementById("ts").textContent = `as_of ${d.as_of} · refreshed ${new Date().toLocaleTimeString()}`;
}

async function load() {
  try {
    const r = await fetch(DATA_URL + "?t=" + Date.now());
    const d = await r.json();
    render(d);
  } catch (e) {
    document.getElementById("root").innerHTML = `<div class="panel">Failed to load data: ${e}</div>`;
  }
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
