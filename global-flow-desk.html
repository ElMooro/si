<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Global Flow Desk — JustHodl.AI</title><!-- FLOW DESK v2 -->
<style>
:root{--bg:#06090f;--card:#0c1220;--card2:#0a0f1a;--line:#1b2940;--fg:#e2ecf8;--fg2:#8fa5c2;--fg3:#4f6580;--cy:#3fd0ff;--am:#ffcf4a;--rd:#ff5d6c;--gr:#2fe3a0;--vi:#a78bfa;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1100px 480px at 25% -8%,#0d1b31 0%,var(--bg) 55%);color:var(--fg);font:14px/1.55 -apple-system,Segoe UI,sans-serif}
.wrap{max-width:1320px;margin:0 auto;padding:24px 18px 70px}
h1{font-size:20px;margin:0 0 2px;letter-spacing:.4px}
.sub{color:var(--fg3);font-family:var(--mono);font-size:11px;margin-bottom:16px}
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:13px;margin-bottom:14px}
.dial{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:14px;padding:16px 17px;position:relative}
.dial h3,.c h3{margin:0 0 8px;font-size:10.5px;letter-spacing:1.6px;color:var(--fg2);font-weight:600}
.big{font-family:var(--mono);font-size:33px;font-weight:800;line-height:1}
.lab{font-family:var(--mono);font-size:11.5px;margin-top:4px}
.bar{height:7px;background:#101a2b;border-radius:5px;margin-top:10px;position:relative;overflow:hidden}
.bar i{position:absolute;top:0;bottom:0;width:2px;background:#fff6;left:50%}
.bar b{position:absolute;top:0;bottom:0;border-radius:5px}
.comp{color:var(--fg3);font-size:10px;margin-top:8px;font-family:var(--mono);line-height:1.7}
.spark{position:absolute;right:14px;top:14px;opacity:.9}
.dossier{background:linear-gradient(160deg,#0f1c31,#0a1322);border:1px solid #274668;border-radius:14px;padding:16px 20px;margin:0 0 14px;font-size:14px;line-height:1.7}
.dossier h3{margin:0 0 8px;font-size:10.5px;letter-spacing:1.8px;color:var(--cy)}
.dsrc{color:var(--fg3);font-size:10px;font-family:var(--mono);margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:13px}
.c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.wide{grid-column:1/-1}
.kv{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11.5px;color:var(--fg2);margin:5px 0;gap:8px}
.kv .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar{flex:1;height:6px;background:#0f1828;border-radius:4px;margin:0 4px;position:relative;min-width:40px}
.hbar b{position:absolute;top:0;bottom:0;border-radius:4px}
.chip{font-size:9.5px;padding:2px 7px;border-radius:10px;font-family:var(--mono);white-space:nowrap}
.chip.in{background:#0d2b22;color:var(--gr);border:1px solid #1c4a3a}
.chip.out{background:#2d1218;color:var(--rd);border:1px solid #52222c}
.chip.neu{background:#12203a;color:var(--cy);border:1px solid #22406b}
.chip.warm{background:#2b230d;color:var(--am);border:1px solid #4a3d1c}
.g{color:var(--gr)}.r{color:var(--rd)}.a{color:var(--am)}.cy{color:var(--cy)}.vi{color:var(--vi)}
.load{color:var(--fg3);font-family:var(--mono);padding:44px;text-align:center}
@media(max-width:700px){.big{font-size:27px}}
</style></head><body><div class="wrap">
<h1>🌍 GLOBAL FLOW DESK — WHERE MONEY IS GOING</h1>
<div class="sub" id="meta">Assembling flows…</div>
<div id="app" class="load">Loading…</div>
<script src="/jh-nav-drawer.js?v=3335" defer></script>
<script>
const fin=v=>Number.isFinite(v);
const F=v=>fin(v)||typeof v==='string'?v:'—';
const mUsd=v=>!fin(v)?'—':(v>0?'+':'−')+'$'+(Math.abs(v)>=1000?(Math.abs(v)/1000).toFixed(1)+'B':Math.abs(v).toFixed(0)+'M');
const col=v=>!fin(v)?'var(--fg3)':v>0?'var(--gr)':v<0?'var(--rd)':'var(--cy)';
const esc=s=>String(s??'').replace(/</g,'&lt;');
function spark(rows,key,w=118,h=34){
 const vs=rows.map(r=>r[key]).filter(fin); if(vs.length<3)return'';
 const mn=Math.min(...vs,0),mx=Math.max(...vs,0),rg=(mx-mn)||1;
 const pts=rows.filter(r=>fin(r[key])).map((r,i,a)=>`${(i/(a.length-1))*w},${h-((r[key]-mn)/rg)*h}`).join(' ');
 const zero=h-((0-mn)/rg)*h;
 return `<svg class="spark" width="${w}" height="${h}"><line x1="0" y1="${zero}" x2="${w}" y2="${zero}" stroke="#ffffff22"/><polyline points="${pts}" fill="none" stroke="var(--cy)" stroke-width="1.6"/></svg>`;
}
function hbars(items,fmt,max){
 const mx=max??Math.max(...items.map(x=>Math.abs(x.v)||0),1);
 return items.map(x=>{const w=Math.min(100,Math.abs(x.v)/mx*100);
  return `<div class="kv"><span class="nm">${esc(x.nm)}</span><span class="hbar"><b style="width:${w}%;${x.v>=0?'left:0;':'right:0;'}background:${col(x.v)}"></b></span><b style="color:${col(x.v)};white-space:nowrap">${fmt(x.v)}</b>${x.chip??''}</div>`}).join('');
}
(async()=>{
 let d;try{d=await(await fetch('data/global-flow-desk.json',{cache:'no-store'})).json()}catch(e){}
 const app=document.getElementById('app');
 if(!d||!d.inst_vs_retail){app.textContent='Feed unavailable — data/global-flow-desk.json failed strict JSON parse or fetch.';return}
 document.getElementById('meta').textContent=`${(d.generated_at||'').slice(0,16).replace('T',' ')} UTC · ${d.hot_money.n_scored} countries scored · engine v${d.version}`;
 const IR=d.inst_vs_retail,H=d.history||[],HOT=d.hot_money,C=d.asset_classes||{},S=d.sectors||{},CP=d.capex||{};
 const clsRows=Object.entries(C).map(([k,v])=>({nm:k.replace(/_/g,' '),v:v.net_5d_usd_m})).filter(r=>fin(r.v)).sort((a,b)=>b.v-a.v);
 const secRows=(S.ranked||[]).map(x=>({nm:x.etf,v:x.net_5d_usd_m})).filter(r=>fin(r.v));
 const ctry=Object.entries(HOT.countries||{}).map(([c,e])=>({nm:c,v:e.score,e})).sort((a,b)=>b.v-a.v);
 const dial=(t,v,l,extra,sk)=>`<div class="dial">${sk||''}<h3>${t}</h3>
   <div class="big" style="color:${v>10?'var(--gr)':v<-10?'var(--rd)':'var(--cy)'}">${fin(v)?(v>0?'+':'')+v.toFixed(1):'—'}</div>
   <div class="lab" style="color:${v>10?'var(--gr)':v<-10?'var(--rd)':'var(--cy)'}">${esc(l)}</div>
   <div class="bar"><b style="${v>=0?'left:50%':'right:50%'};width:${Math.min(48,Math.abs(v||0)/2)}%;background:${col(v)}"></b><i></i></div>
   <div class="comp">${extra}</div></div>`;
 app.className='';app.innerHTML=`
 <div class="hero">
  ${dial('INSTITUTIONAL COMPOSITE',IR.institutional,IR.institutional>10?'ACCUMULATING':IR.institutional<-10?'DISTRIBUTING':'NEUTRAL',
    `OWN-DIX ${F(IR.own_dix_pct)}% · radar breadth ${F(IR.radar_breadth_pct)}%`,spark(H,'inst'))}
  ${dial('RETAIL COMPOSITE',IR.retail,IR.retail>10?'BUYING':IR.retail<-10?'FLEEING':'NEUTRAL',
    `AAII spread ${fin(IR.aaii_spread_pct)?(IR.aaii_spread_pct>0?'+':'')+IR.aaii_spread_pct+'pts':'—'} · stablecoin 7d ${mUsd(IR.stablecoin_7d_usd_m)}`,spark(H,'retail'))}
  <div class="dial"><h3>DIVERGENCE VERDICT</h3>
   <div class="big" style="font-size:23px;color:${String(IR.divergence).includes('CONFLICT')?'var(--am)':'var(--cy)'}">${esc(IR.divergence)}</div>
   <div class="comp" style="margin-top:12px">Hot money IN: <b class="g">${(HOT.top_inflows||[]).join(', ')}</b><br>Hot money OUT: <b class="r">${(HOT.top_outflows||[]).join(', ')}</b></div>
   ${HOT.warming_note?`<div class="comp"><span class="chip warm">WARMING ×${(HOT.warming_etfs||[]).length}</span> ${esc(HOT.warming_note)}</div>`:''}</div>
 </div>
 <div class="dossier"><h3>🤖 AI DESK BRIEF</h3>${esc(d.ai_brief)}<div class="dsrc">source: ${d.ai_brief_src==='llm'?'LLM synthesis':'deterministic synthesis (LLM offline)'} · daily 22:50 UTC</div></div>
 <div class="grid">
  <div class="c wide"><h3>💵 HOT MONEY — COUNTRY MAP <small style="color:var(--fg3)">(country ETF 5d $ + TIC 12m Δ + FX 20d momentum)</small></h3>
   ${ctry.map(x=>`<div class="kv"><span class="nm">${esc(x.nm)}</span>
     <span class="hbar"><b style="width:${Math.min(100,Math.abs(x.v))}%;${x.v>=0?'left:0;':'right:0;'}background:${col(x.v)}"></b></span>
     <b style="color:${col(x.v)}">${(x.v>0?'+':'')+x.v}</b>
     <span class="comp" style="margin:0;min-width:150px;text-align:right">ETF ${mUsd(x.e.etf_5d_usd_m)}${fin(x.e.fx_mom_pct)?' · FX '+(x.e.fx_mom_pct>0?'+':'')+x.e.fx_mom_pct+'%':''}${fin(x.e.tic_12m_usd_b)?' · TIC '+(x.e.tic_12m_usd_b>0?'+':'')+x.e.tic_12m_usd_b+'B':''}</span>
     <span class="chip ${x.e.verdict==='HOT MONEY IN'?'in':x.e.verdict==='HOT MONEY OUT'?'out':'neu'}">${x.e.verdict.replace('HOT MONEY ','')}</span></div>`).join('')}</div>
  <div class="c"><h3>🏦 ASSET-CLASS LADDER (net 5d)</h3>${hbars(clsRows,mUsd)}</div>
  <div class="c"><h3>🔄 SECTOR ROTATION (net 5d)</h3>${hbars(secRows,mUsd)}
   <div class="comp">LEADERS <b class="g">${(S.leaders||[]).join(' ')}</b> · LAGGARDS <b class="r">${(S.laggards||[]).join(' ')}</b></div></div>
  <div class="c wide"><h3>🏗️ CAPEX PULSE ${CP.status==='OK'?'':'<span class="chip warm">'+esc(CP.status)+'</span>'}</h3>
   ${CP.status==='OK'?`<div class="kv"><span class="nm">HYPERSCALERS (AI buildout)</span><b class="cy">$${F(CP.hyperscalers_ttm_b)}B</b><b style="color:${col(CP.hyperscalers_yoy_pct)}">${fin(CP.hyperscalers_yoy_pct)?(CP.hyperscalers_yoy_pct>0?'+':'')+CP.hyperscalers_yoy_pct+'% yoy':''}</b></div>
   <div class="kv"><span class="nm">MARKET (top-160)</span><b class="cy">$${F(CP.market_ttm_b)}B</b><b style="color:${col(CP.market_yoy_pct)}">${fin(CP.market_yoy_pct)?(CP.market_yoy_pct>0?'+':'')+CP.market_yoy_pct+'% yoy':''}</b></div>
   <div class="comp">top accelerators: <b class="g">${(CP.top_accelerators||[]).join(' ')}</b>${CP.top_sector?` · hottest sector: <b class="a">${esc(CP.top_sector.name)} +${CP.top_sector.yoy_pct}%</b>`:''} · TTM capex, FMP quarterly, FX-converted</div>`:`<div class="comp">${esc(CP.source||'')}</div>`}</div>
 </div>
 <div class="c" style="margin-top:13px"><div class="comp">${esc(d.method)}</div></div>`;
})();
</script></div>
<script defer src="/jh-page-ai.js"></script>
</body></html>
