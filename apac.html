<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>APAC → US Flow Radar · JustHodl.AI</title><!-- APAC RADAR v1 -->
<style>
:root{--bg:#06090f;--card:#0c1220;--card2:#0a0f1a;--line:#1b2940;--fg:#e2ecf8;--fg2:#8fa5c2;--fg3:#4f6580;--cy:#3fd0ff;--am:#ffcf4a;--rd:#ff5d6c;--gr:#2fe3a0;--vi:#a78bfa;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1100px 480px at 25% -8%,#0d1b31 0%,var(--bg) 55%);color:var(--fg);font:14px/1.55 -apple-system,Segoe UI,sans-serif}
.wrap{max-width:1320px;margin:0 auto;padding:24px 18px 70px}
h1{font-size:20px;margin:0 0 2px}
.sub{color:var(--fg3);font-family:var(--mono);font-size:11px;margin-bottom:14px}
.read{background:linear-gradient(160deg,#0f1c31,#0a1322);border:1px solid #274668;border-radius:14px;padding:15px 19px;margin:0 0 16px;font-size:14px;line-height:1.7}
h2.sec{font-size:12px;letter-spacing:2px;color:var(--cy);margin:22px 0 11px;border-bottom:1px solid var(--line);padding-bottom:6px}
.bridges{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:13px}
.bcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px}
.bcard h3{margin:0 0 4px;font-size:14px}
.verdict{font-family:var(--mono);font-size:11px;padding:5px 9px;border-radius:8px;margin:9px 0;display:inline-block;font-weight:600}
.v-lead{background:#0d2b22;color:var(--gr);border:1px solid #1c4a3a}
.v-conf{background:#0d2438;color:var(--cy);border:1px solid #1e4a6b}
.v-caut{background:#2d1218;color:var(--rd);border:1px solid #52222c}
.v-soft{background:#1a1c26;color:var(--fg3);border:1px solid #2a2f3e}
.leg{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;margin:4px 0;gap:8px}
.leg b{font-size:13px}
.retpills{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.pill{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:9px;border:1px solid var(--line)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}
.c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px}
.c h3{margin:0 0 9px;font-size:10.5px;letter-spacing:1.4px;color:var(--fg2)}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11.5px}
td,th{padding:5px 6px;border-bottom:1px solid #131f33;text-align:right}
td:first-child,th:first-child{text-align:left}
th{color:var(--fg3);font-weight:600;font-size:9.5px;letter-spacing:.5px}
.g{color:var(--gr)}.r{color:var(--rd)}.a{color:var(--am)}.cy{color:var(--cy)}.f3{color:var(--fg3)}
.sbar{height:20px;border-radius:4px;margin:3px 0;position:relative;background:#0f1828}
.sbar b{position:absolute;top:0;bottom:0;border-radius:4px}
.sbar span{position:absolute;left:8px;top:2px;font-family:var(--mono);font-size:10px;color:#dfeaff}
.sbar em{position:absolute;right:8px;top:2px;font-family:var(--mono);font-size:10px;font-style:normal}
.pending{background:#12151f;border:1px dashed #2a3244;border-radius:12px;padding:16px;color:var(--fg3);font-family:var(--mono);font-size:11.5px;line-height:1.6}
.load{color:var(--fg3);font-family:var(--mono);padding:44px;text-align:center}
</style></head><body><div class="wrap">
<h1>🌏 APAC → US Flow Radar</h1>
<div class="sub" id="meta">Loading cross-market flows…</div>
<div id="app" class="load">Loading…</div>
<script src="/jh-nav-drawer.js?v=3335" defer></script>
<script>
const fin=v=>Number.isFinite(v);
const sh=v=>!fin(v)?"—":(v>0?"+":"")+(Math.abs(v)>=1e6?(v/1e6).toFixed(1)+"M":Math.abs(v)>=1e3?(v/1e3).toFixed(0)+"k":v.toFixed(0));
const pct=v=>!fin(v)?"—":(v>0?"+":"")+v.toFixed(1)+"%";
const pc=v=>!fin(v)?"var(--fg3)":v>0?"var(--gr)":"var(--rd)";
function vclass(v){if(!v)return"v-soft";if(v.includes("LEADING"))return"v-lead";if(v.includes("confirmed"))return"v-conf";if(v.includes("caution")||v.includes("extended"))return"v-caut";return"v-soft"}
async function j(p){try{const r=await fetch(p,{cache:"no-store"});return await r.json()}catch(e){return null}}
(async()=>{
 const d=await j("data/apac-flows.json");
 const app=document.getElementById("app");
 if(!d){app.textContent="Feed unavailable.";return}
 const tw=d.taiwan||{},src=d.sources||{};
 document.getElementById("meta").textContent=`${(d.generated_at||"").slice(0,16).replace("T"," ")} UTC · Taiwan ${src.twse_t86?"LIVE":"—"} · Korea ${(d.korea&&d.korea.status==="LIVE")?"LIVE":"pending"} · Japan ${(d.japan&&d.japan.status==="LIVE")?"LIVE":"pending"} · HK ${(d.hongkong&&d.hongkong.status==="LIVE")?"LIVE":"pending"} · US ${d.us_returns_live?"LIVE":"—"} · ${d.history_days||0}d`;
 let h=`<div class="read">🧭 ${d.read||"—"} ${tw.foreign_net_twd_bn!=null?`Market-wide foreign net today: <b style="color:${pc(tw.foreign_net_twd_bn)}">NT$${tw.foreign_net_twd_bn}B</b>.`:""} <span class="f3">The thesis: Taiwan/Korea foreign money often leads the US equivalent — a green "ASIA LEADING" verdict flags a US sector that may not have moved yet.</span></div>`;

 // BRIDGES (hero)
 h+=`<h2 class="sec">ASIA → US CATCH-UP BRIDGES</h2><div class="bridges">`;
 for(const b of (d.bridges||[])){
  const rets=Object.assign({},b.us_etf_ret5d||{},b.us_name_ret5d||{});
  h+=`<div class="bcard"><h3>${b.name}</h3>
   <div class="verdict ${vclass(b.verdict)}">${b.verdict||"—"}</div>
   ${b.tw_foreign_net_shares!=null?`<div class="leg"><span>🇹🇼 TW foreign net</span><b style="color:${pc(b.tw_foreign_net_shares)}">${sh(b.tw_foreign_net_shares)}</b></div>`:""}
   ${b.kr_foreign_net_shares!=null?`<div class="leg"><span>🇰🇷 KR foreign net</span><b style="color:${pc(b.kr_foreign_net_shares)}">${sh(b.kr_foreign_net_shares)}</b></div>`:""}
   ${b.hk_southbound_net!=null?`<div class="leg"><span>🇭🇰 HK Southbound net</span><b style="color:${pc(b.hk_southbound_net)}">${sh(b.hk_southbound_net)}</b></div>`:""}
   <div class="leg"><span>US peers avg 5-day</span><b style="color:${pc(b.us_avg_ret5d)}">${pct(b.us_avg_ret5d)}</b></div>
   <div class="retpills">${Object.keys(rets).map(k=>`<span class="pill" style="color:${pc(rets[k])}">${k} ${pct(rets[k])}</span>`).join("")||'<span class="pill f3">US returns wiring…</span>'}</div></div>`;
 }
 h+=`</div>`;


 // LEAD-LAG (analytical crown)
 const ll=await j("data/apac-leadlag.json");
 if(ll&&ll.pairs){
  h+=`<h2 class="sec">LEAD-LAG — DOES ASIAN FLOW PREDICT THE US? (${ll.status}, ${ll.window_days||140}d window)</h2>`;
  const proven=(ll.proven_leads||[]);
  h+=`<div class="read" style="margin-bottom:12px">📈 ${ll.read||"warming"} <span class="f3">r&gt;0 = Asia buying precedes US gains (follow-through); r&lt;0 = precedes US weakness (contrarian). Significance = |t|≥2 (~95%).</span></div>`;
  h+=`<div class="bridges">`;
  for(const p of ll.pairs){
   const b=p.best;
   const rv=b?b.r:null; const cls=b?(b.significant?(rv>=0?"v-lead":"v-caut"):"v-soft"):"v-soft";
   h+=`<div class="bcard"><h3>${p.name}</h3><div class="f3" style="font-size:10.5px;margin-bottom:6px">${p.desc||""}</div>
    <div class="verdict ${cls}">${b?`r=${(rv>=0?"+":"")+rv.toFixed(2)} · leads ${b.horizon}d · n=${b.n}${b.significant?" · SIGNIFICANT":" · not sig"}`:"insufficient history"}</div>
    <div class="retpills">${(p.by_horizon||[]).map(x=>`<span class="pill" style="color:${x.significant?(x.r>=0?"var(--gr)":"var(--rd)"):"var(--fg3)"}">${x.horizon}d ${(x.r>=0?"+":"")+x.r.toFixed(2)}</span>`).join("")}</div>
    <div class="f3" style="font-family:var(--mono);font-size:9.5px;margin-top:5px">overlap ${p.overlap_days}d</div></div>`;
  }
  h+=`</div>`;
 }
 // Taiwan detail
  if(tw.top_buy){
  h+=`<h2 class="sec">TAIWAN — FOREIGN INVESTOR FLOWS (TWSE, ${tw.as_of||""})</h2><div class="grid2">
   <div class="c"><h3>TOP FOREIGN NET BUYS</h3><table><tr><th>Stock</th><th>Sector</th><th>Net shares</th></tr>
   ${tw.top_buy.slice(0,10).map(x=>`<tr><td>${x.name||x.code}</td><td class="f3">${x.sector||"—"}</td><td class="g">${sh(x.foreign_net_shares)}</td></tr>`).join("")}</table></div>
   <div class="c"><h3>TOP FOREIGN NET SELLS</h3><table><tr><th>Stock</th><th>Sector</th><th>Net shares</th></tr>
   ${tw.top_sell.slice(0,10).map(x=>`<tr><td>${x.name||x.code}</td><td class="f3">${x.sector||"—"}</td><td class="r">${sh(x.foreign_net_shares)}</td></tr>`).join("")}</table></div></div>`;
  const sf=tw.sector_flows_shares||{};const mx=Math.max(1,...Object.values(sf).map(Math.abs));
  h+=`<div class="c" style="margin-top:13px"><h3>FOREIGN NET FLOW BY SECTOR (shares)</h3>
   ${Object.entries(sf).map(([k,v])=>`<div class="sbar"><b style="${v>=0?'left:50%':'right:50%'};width:${Math.abs(v)/mx*48}%;background:${pc(v)}"></b><span>${k}</span><em style="color:${pc(v)}">${sh(v)}</em></div>`).join("")}
   <div class="f3" style="font-family:var(--mono);font-size:9.5px;margin-top:6px">midline = 0; right = net buying, left = net selling. Covers mapped large-caps.</div></div>`;
 }

 // Korea / Japan
 const kr=d.korea||{};
 if(kr.status==="LIVE"&&kr.top_buy){
  const mw=kr.market_wide||{};
  h+=`<h2 class="sec">KOREA — FOREIGN INVESTOR FLOWS (Naver, ${kr.as_of||""})</h2>`;
  if(mw.total_foreign_value!=null){h+=`<div class="read" style="margin-bottom:11px">🇰🇷 <b>Market-wide foreign net</b> (KOSPI+KOSDAQ): <b style="color:${pc(mw.total_foreign_value)}">${sh(mw.total_foreign_value)}</b> <span class="f3">(${mw.unit||""})</span>${mw.KOSPI?` · KOSPI ${sh(mw.KOSPI.foreign_value)}, KOSDAQ ${mw.KOSDAQ?sh(mw.KOSDAQ.foreign_value):"—"}. This is the true whole-market total; the tables below are the tracked large-caps.</span>`:""}</div>`;}
  h+=`<div class="grid2">
   <div class="c"><h3>TOP FOREIGN NET BUYS</h3><table><tr><th>Stock</th><th>Sector</th><th>Net shares</th></tr>
   ${kr.top_buy.slice(0,8).map(x=>`<tr><td>${x.name}</td><td class="f3">${x.sector||"—"}</td><td class="g">${sh(x.foreign_net_shares)}</td></tr>`).join("")}</table></div>
   <div class="c"><h3>TOP FOREIGN NET SELLS</h3><table><tr><th>Stock</th><th>Sector</th><th>Net shares</th></tr>
   ${kr.top_sell.slice(0,8).map(x=>`<tr><td>${x.name}</td><td class="f3">${x.sector||"—"}</td><td class="r">${sh(x.foreign_net_shares)}</td></tr>`).join("")}</table></div></div>`;
  const ks=kr.sector_flows_shares||{};const kmx=Math.max(1,...Object.values(ks).map(Math.abs));
  h+=`<div class="c" style="margin-top:13px"><h3>KOREA FOREIGN NET BY SECTOR (shares)</h3>
   ${Object.entries(ks).map(([k,v])=>`<div class="sbar"><b style="${v>=0?'left:50%':'right:50%'};width:${Math.abs(v)/kmx*48}%;background:${pc(v)}"></b><span>${k}</span><em style="color:${pc(v)}">${sh(v)}</em></div>`).join("")}</div>`;
 }else{
  h+=`<div class="pending">🇰🇷 Korea per-stock source wiring…</div>`;
 }
 // JAPAN
 const jp=d.japan||{};
 h+=`<h2 class="sec">JAPAN — TRADING BY TYPE OF INVESTORS (JPX)</h2>`;
 if(jp.status==="LIVE"){
  const jm=jp.by_market||{};
  h+=`<div class="grid2"><div class="c"><h3>TSE PRIME — LATEST WEEK NET (${jp.week||""})</h3><table>
   <tr><th>Investor</th><th>Net (¥ thousands)</th></tr>
   <tr><td>Foreigners</td><td class="${(jp.foreign_net||0)>=0?"g":"r"}">${sh(jp.foreign_net)}</td></tr>
   <tr><td>Individuals</td><td class="${(jp.individual_net||0)>=0?"g":"r"}">${sh(jp.individual_net)}</td></tr>
   <tr><td>Institutions</td><td class="${(jp.institution_net||0)>=0?"g":"r"}">${sh(jp.institution_net)}</td></tr></table>
   <div class="f3" style="font-family:var(--mono);font-size:9.5px;margin-top:6px">source: ${jp.file||""} · JPX publishes weekly (foreign net = Purchases−Sales balance).</div></div>
   <div class="c"><h3>BY MARKET — FOREIGN NET</h3><table><tr><th>Market</th><th>Foreign net</th></tr>
   ${Object.entries(jm).map(([m,v])=>`<tr><td>${m}</td><td class="${(v.foreign_net||0)>=0?"g":"r"}">${sh(v.foreign_net)}</td></tr>`).join("")}</table></div></div>`;
 }else{h+=`<div class="pending">🇯🇵 JPX weekly Excel — ${jp.err||jp.note||"wiring"}</div>`;}
 // HONG KONG
 const hk=d.hongkong||{};
 h+=`<h2 class="sec">HONG KONG — STOCK CONNECT SOUTHBOUND (mainland → HK)</h2>`;
 if(hk.status==="LIVE"){
  const hm=hk.markets||{};
  h+=`<div class="read" style="margin-bottom:11px">🇭🇰 <b>Southbound net</b> (${hk.as_of||""}): <b style="color:${pc(hk.southbound_net_total)}">${sh(hk.southbound_net_total)} ${hk.unit||""}</b> <span class="f3">— mainland money ${(hk.southbound_net_total||0)>=0?"flowing INTO":"leaving"} Hong Kong via Stock Connect. Rising Southbound is the HK analog of foreign accumulation. (source: ${hk.source||"Eastmoney"}; HKEX's own feed blocks datacenter IPs.)</span></div>
  <div class="grid2"><div class="c"><h3>SOUTHBOUND BY CONNECT (net)</h3><table><tr><th>Channel</th><th>Net</th></tr>
   ${Object.entries(hm).map(([m,v])=>{const n=(typeof v==="number")?v:(v&&v.net);return `<tr><td>${m}</td><td class="${(n||0)>=0?"g":"r"}">${sh(n)}</td></tr>`;}).join("")}</table></div>
   <div class="c"><h3>WHAT IT MEANS</h3><div class="f3" style="font-size:11px;line-height:1.6">Southbound = Shanghai/Shenzhen investors buying HK-listed stocks via Stock Connect. Sustained net buying often precedes strength in US-listed China names (KWEB/BABA/JD) — tracked in the Southbound→US bridge above.</div></div></div>`;
 }else{h+=`<div class="pending">🇭🇰 HKEX Southbound — ${hk.note||hk.err||"wiring"}</div>`;}

 h+=`<div class="c" style="margin-top:16px"><div class="f3" style="font-family:var(--mono);font-size:10px">Sources: TWSE OpenAPI (T86 per-stock foreign net + BFI82U market foreign net) · US returns via FMP · daily 09:30 UTC after Asian close. Foreign-flow leadership is a context signal, not a trade instruction; rigorous lead-lag scoring activates once ~30d of history accrues.</div></div>`;
 app.className="";app.innerHTML=h;
})();
</script></div>
<script defer src="/jh-page-ai.js"></script>
</body></html>
