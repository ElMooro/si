<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Account & Settings · JustHodl AI</title><meta name="robots" content="noindex">
<style>
:root{--bg:#0a0e14;--bg-1:#0c1018;--bg-2:#0f1420;--border:#1c2433;--border-bright:#2a3550;--fg-0:#fff;--fg-1:#e1e8f4;--fg-2:#a8b3c7;--fg-3:#6f7b91;--cyan:#22d3ee;--green:#26ffaf;--violet:#a78bfa;--red:#ff5577;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg-1);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
a{color:var(--cyan);text-decoration:none}
.header{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 24px;background:var(--bg-1)}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-weight:700}
.brand-dot{width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green)}
.nav{display:flex;gap:4px;margin-left:12px;flex-wrap:wrap}.nav a{padding:7px 11px;font-size:12px;color:var(--fg-3);border-radius:5px;font-family:var(--mono)}
.spacer{margin-left:auto}
.wrap{max-width:620px;margin:0 auto;padding:48px 24px 70px}
h1{font-size:26px;font-weight:800;color:var(--fg-0);margin-bottom:24px}
.card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:16px}
.card h2{font-size:14px;font-family:var(--mono);color:var(--cyan);margin-bottom:14px;letter-spacing:.5px}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row .k{color:var(--fg-3);font-size:13px}.row .v{color:var(--fg-0);font-family:var(--mono);font-size:13px}
.badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;border:1px solid}
.badge.free{color:var(--fg-3);border-color:var(--border-bright)}.badge.pro{color:var(--cyan);border-color:var(--cyan)}.badge.elite{color:var(--violet);border-color:var(--violet)}
.btn{display:inline-block;padding:11px 22px;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer;border:1px solid;font-family:var(--sans)}
.btn.primary{background:var(--green);border-color:var(--green);color:var(--bg)}
.btn.ghost{background:transparent;border-color:var(--border-bright);color:var(--fg-2)}
.signin-prompt{text-align:center;padding:50px 20px}
.signin-prompt p{color:var(--fg-2);margin-bottom:20px}
.muted{color:var(--fg-3);font-size:12px;margin-top:8px}
</style></head><body>
<header class="header">
  <div class="brand"><span class="brand-dot"></span><span>JustHodl<span style="color:var(--fg-3)">.AI</span></span></div>
  <nav class="nav"><a href="/">Home</a><a href="/chart-pro.html">Chart Pro</a><a href="/pricing.html">Pricing</a><a href="/my-portfolio.html">My Portfolio</a></nav>
  <div class="spacer"></div><div data-auth-slot></div>
</header>
<div class="wrap">
  <h1>Account &amp; Settings</h1>
  <div id="content"><div class="signin-prompt"><p>Loading…</p></div></div>
</div>
<script src="/auth-config.js?v=6"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js?v=6"></script>
<script>
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(){
  const u = JustHodlAuth.getUser();
  const tier = JustHodlAuth.getTier();
  const el = document.getElementById('content');
  if(!u){
    el.innerHTML = `<div class="signin-prompt">
      <p>Sign in to manage your account, plan, and synced watchlists.</p>
      <button class="btn primary" onclick="JustHodlAuth.openSignIn()">Sign In / Create Account</button>
    </div>`;
    return;
  }
  el.innerHTML = `
    <div class="card"><h2>👤 Account</h2>
      <div class="row"><span class="k">Email</span><span class="v">${esc(u.email||'—')}</span></div>
      <div class="row"><span class="k">User ID</span><span class="v" style="font-size:11px">${esc((u.id||'').slice(0,18))}…</span></div>
      <div class="row"><span class="k">Signed in via</span><span class="v">${esc((u.app_metadata&&u.app_metadata.provider)||'email')}</span></div>
    </div>
    <div class="card"><h2>💎 Plan</h2>
      <div class="row"><span class="k">Current plan</span><span class="badge ${tier}">${tier.toUpperCase()}</span></div>
      <div class="row"><span class="k">Manage</span><span>
        <a href="/pricing.html" class="btn ghost" style="padding:7px 14px;font-size:12px">${tier==='free'?'Upgrade':'Change plan'}</a>
        ${tier!=='free'?'<button id="billing-btn" class="btn ghost" style="padding:7px 14px;font-size:12px;margin-left:8px;cursor:pointer">Manage billing</button>':''}
      </span></div>
      <div class="row"><span class="k">Appearance</span><span>
        <button class="btn ghost jh-themeopt" data-t="dark" style="padding:7px 14px;font-size:12px;cursor:pointer">🌙 Dark</button>
        <button class="btn ghost jh-themeopt" data-t="light" style="padding:7px 14px;font-size:12px;margin-left:8px;cursor:pointer">☀️ Light</button>
      </span></div><!-- JH_SETTINGS_V2 -->
      <div class="muted">${tier==='free'?'On the Free plan. Upgrade to Pro for full access.':'Thanks for supporting JustHodl.'}</div>
    </div>
    <div class="card"><h2>🔭 Watchlists</h2>
      <div class="row"><span class="k">Sync</span><span class="v" style="color:var(--green)">Cloud-synced ✓</span></div>
      <div class="muted">Your watchlists now sync across devices via your account.</div>
    </div>
    <div class="card"><h2>⚙️ Session</h2>
      <button class="btn ghost" onclick="JustHodlAuth.signOut()">Sign Out</button>
    </div>`;
}
function safeRender(){ try{ render(); }catch(e){ console.error('[settings] render error', e); var c=document.getElementById('content'); if(c) c.innerHTML='<div class="signin-prompt"><p>Couldn\'t load your account. Try a refresh, or <button class="btn primary" onclick="window.JustHodlAuth&&JustHodlAuth.openSignIn()">sign in</button>.</p></div>'; } }
function boot(){
  safeRender();                       // render immediately — never leave "Loading…"
  if(!window.JustHodlAuth) return;
  try { JustHodlAuth.onChange(()=>safeRender()); } catch(e){}
  Promise.resolve().then(()=>JustHodlAuth.init())
    .then(()=>safeRender())
    .catch((e)=>{ console.error('[settings] auth init', e); safeRender(); });
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot);
else boot();   // DOM already parsed (scripts ran late/cached) → run now
</script>
<script src="/cmdk.js"></script>
  <script src="/jh-page-ai.js" defer></script>
<script src="/jh-nav-drawer.js?v=3335" defer>
<script>
/* JH_SETTINGS_V2 wiring */
(function(){
  function sbTok(){ try{ for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);
    if(/^sb-.*-auth-token$/.test(k)){var v=JSON.parse(localStorage.getItem(k)||"null");
      return v && (v.access_token || (v.currentSession&&v.currentSession.access_token)) || null;}}}catch(e){} return null; }
  document.addEventListener("click", function(e){
    var t = e.target;
    if (t && t.classList && t.classList.contains("jh-themeopt")) {
      var th = t.getAttribute("data-t");
      if (window.__jhTheme) window.__jhTheme.set(th);
      else { try { localStorage.setItem("jh_theme", th); localStorage.setItem("jh_theme_ts", String(Date.now())); document.documentElement.setAttribute("data-theme", th); } catch(_){} }
    }
    if (t && t.id === "billing-btn") {
      t.disabled = true; t.textContent = "Opening…";
      fetch("https://justhodl-data-proxy.raafouis.workers.dev/billing-portal", {
        method: "POST", headers: { "Authorization": "Bearer " + (sbTok()||"") } })
      .then(function(r){ return r.json(); })
      .then(function(d){ if (d && d.url) location.href = d.url; else { t.textContent = "Unavailable"; } })
      .catch(function(){ t.textContent = "Unavailable"; });
    }
  });
})();
</script>
</body></html>
