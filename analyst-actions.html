<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Analyst Actions · JustHodl.AI</title>
<style>
:root{--bg:#0a0e14;--panel:#111722;--panel2:#0d131c;--line:#1e2836;--txt:#d6e0ee;--dim:#7c8aa0;--grn:#16c784;--red:#ea3943;--amb:#f0a020;--cyan:#3fb6dc;--blu:#4d7cfe}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font:13px/1.5 ui-monospace,"SF Mono",Menlo,Consolas,monospace;padding:18px 14px 60px;margin:0}
a{color:var(--cyan);text-decoration:none}
h1{font-size:20px;margin:0}
.sub{color:var(--dim);font-size:12px;margin-top:3px;max-width:700px}
.topbar{border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}
.statbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin-bottom:6px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 13px}
.stat .v{font-size:20px;font-weight:700;color:#fff}.stat .l{color:var(--dim);font-size:11px;margin-top:2px}
h2{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin:24px 0 10px;border-left:3px solid var(--blu);padding-left:9px}
h2.g{border-color:var(--grn)}h2.r{border-color:var(--red)}h2.c{border-color:var(--cyan)}h2.a{border-color:var(--amb)}
h2 small{text-transform:none;letter-spacing:0;color:var(--dim);font-weight:400;font-size:11px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:12px 13px;border-left:4px solid var(--grn)}
.card.bear{border-left-color:var(--red)}
.card .tk{font-size:16px;font-weight:700;color:#fff}
.card .big{font-size:18px;font-weight:700;margin:3px 0}
.card .sig{font-size:10.5px;color:var(--dim);margin-top:6px;line-height:1.5}
.flowpos{color:var(--grn)}.flowneg{color:var(--red)}
.pick{display:inline-flex;gap:6px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:6px 10px;font-size:12px;margin:0 6px 6px 0}
.pick b{color:#fff}.pick .s{color:var(--cyan)}
table{border-collapse:collapse;width:100%;font-size:12px}
th,td{text-align:right;padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
th{color:var(--dim);font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:.5px;position:sticky;top:0;background:var(--bg)}
td.l,th.l{text-align:left}
tr:hover td{background:var(--panel2)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.cols{grid-template-columns:1fr}}
.loading{color:var(--dim);padding:40px;text-align:center}
.foot{color:var(--dim);font-size:11px;margin-top:24px;border-top:1px solid var(--line);padding-top:12px;line-height:1.6}
</style>
</head>
<body>
<div class="topbar">
  <h1>📈 Analyst Actions</h1>
  <div class="sub">Analyst rating transitions, price-target revisions, and company guidance changes — three of the most robust public-data equity signals. Net analyst score is importance-weighted; guidance raises count most, then upgrades, then PT moves.</div>
</div>
<div class="statbar" id="statbar"></div>
<div id="content"><div class="loading">⟳ loading analyst actions…</div></div>
<div class="foot" id="foot"></div>
<script>
const SRC=p=>[`https://justhodl.ai/${p}?t=${Date.now()}`,
  `https://justhodl-data-proxy.raafouis.workers.dev/${p}?t=${Date.now()}`,
  `https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com/${p}?t=${Date.now()}`];
async function load(p){for(const u of SRC(p)){try{const r=await fetch(u);if(r.ok)return await r.json();}catch(e){}}throw new Error("sources failed");}
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const pct=v=>v==null?"—":(v>=0?"+":"")+(+v).toFixed(1)+"%";
const num=v=>v==null?"—":(+v).toLocaleString(undefined,{maximumFractionDigits:2});

function bullCard(a){
  return `<div class="card">
    <div class="tk">${esc(a.ticker)}</div>
    <div class="big flowpos">+${a.net_score}</div>
    <div class="sig">${(a.signals||[]).slice(0,3).map(esc).join("<br>")}</div>
  </div>`;
}
function bearCard(a){
  return `<div class="card bear">
    <div class="tk">${esc(a.ticker)}</div>
    <div class="big flowneg">${a.net_score}</div>
    <div class="sig">${(a.signals||[]).slice(0,3).map(esc).join("<br>")}</div>
  </div>`;
}
function ratingTbl(rows,dir){
  return `<div style="overflow-x:auto"><table><thead><tr>
    <th class="l">Ticker</th><th class="l">Move</th><th class="l">Firm</th><th>PT</th><th>%</th><th>Imp</th><th>Date</th>
    </tr></thead><tbody>`+
    rows.map(r=>`<tr><td class="l"><b>${esc(r.ticker)}</b></td>
      <td class="l">${esc(r.previous_rating||"")}→${esc(r.rating||"")}</td>
      <td class="l" style="color:var(--dim)">${esc(r.firm||"")}</td>
      <td>${r.pt_prev?esc(r.pt_prev)+"→"+esc(r.pt):(r.pt?esc(r.pt):"—")}</td>
      <td class="${(r.pt_pct||0)>=0?'flowpos':'flowneg'}">${r.pt_pct==null?"—":pct(r.pt_pct)}</td>
      <td>${r.importance||""}</td><td style="color:var(--dim)">${esc(r.date||"")}</td></tr>`).join("")+
    `</tbody></table></div>`;
}
function ptTbl(rows){
  return `<div style="overflow-x:auto"><table><thead><tr>
    <th class="l">Ticker</th><th>Old PT</th><th>New PT</th><th>Change</th><th class="l">Firm</th><th>Imp</th>
    </tr></thead><tbody>`+
    rows.map(r=>`<tr><td class="l"><b>${esc(r.ticker)}</b></td>
      <td>${num(r.pt_prev)}</td><td><b>${num(r.pt)}</b></td>
      <td class="${(r.pt_pct||0)>=0?'flowpos':'flowneg'}">${pct(r.pt_pct)}</td>
      <td class="l" style="color:var(--dim)">${esc(r.firm||"")}</td><td>${r.importance||""}</td></tr>`).join("")+
    `</tbody></table></div>`;
}
function guidTbl(rows){
  return `<div style="overflow-x:auto"><table><thead><tr>
    <th class="l">Ticker</th><th class="l">Period</th><th>EPS</th><th>EPS%</th><th>Rev</th><th class="l">Type</th><th>Date</th>
    </tr></thead><tbody>`+
    rows.map(g=>`<tr><td class="l"><b>${esc(g.ticker)}</b></td>
      <td class="l">${esc(g.fiscal_period||"")}${esc(g.fiscal_year||"")}</td>
      <td>${g.eps_prev?num(g.eps_prev)+"→"+num(g.eps_mid):num(g.eps_mid)}</td>
      <td class="${(g.eps_pct||0)>=0?'flowpos':'flowneg'}">${g.eps_pct==null?"—":pct(g.eps_pct)}</td>
      <td class="${g.rev_dir==='RAISE'?'flowpos':g.rev_dir==='CUT'?'flowneg':''}">${esc(g.rev_dir||"—")}</td>
      <td class="l" style="color:var(--dim)">${esc(g.release_type||"")}</td>
      <td style="color:var(--dim)">${esc(g.date||"")}</td></tr>`).join("")+
    `</tbody></table></div>`;
}

function render(d){
  const c=d.counts||{};
  document.getElementById("statbar").innerHTML=
    `<div class="stat"><div class="v" style="color:var(--grn)">${c.upgrades||0}</div><div class="l">UPGRADES 7D</div></div>`+
    `<div class="stat"><div class="v" style="color:var(--red)">${c.downgrades||0}</div><div class="l">DOWNGRADES 7D</div></div>`+
    `<div class="stat"><div class="v" style="color:var(--grn)">${c.pt_raises||0}</div><div class="l">PT RAISES</div></div>`+
    `<div class="stat"><div class="v" style="color:var(--red)">${c.pt_cuts||0}</div><div class="l">PT CUTS</div></div>`+
    `<div class="stat"><div class="v" style="color:var(--grn)">${c.guidance_raises||0}</div><div class="l">GUIDANCE RAISES</div></div>`+
    `<div class="stat"><div class="v" style="color:var(--red)">${c.guidance_cuts||0}</div><div class="l">GUIDANCE CUTS</div></div>`;

  let h="";
  const picks=d.top_picks||[];
  if(picks.length){
    h+=`<h2 class="g">🎯 Tracked Picks <small>— corroborated bullish names, logged to the signal ledger as eng:analyst-actions; graded vs SPY before any engine trusts them</small></h2><div>`+
      picks.map(p=>`<span class="pick"><b>${esc(p.ticker)}</b> <span class="s">+${p.score}</span></span>`).join("")+`</div>`;
  }
  h+=`<h2 class="g">🟢 Most Bullish <small>— net importance-weighted analyst score</small></h2><div class="cards">${(d.most_bullish||[]).slice(0,9).map(bullCard).join("")}</div>`;
  h+=`<h2 class="a">📋 Guidance Raises <small>— company raised forward guidance (strongest signal)</small></h2>${guidTbl((d.guidance_raises||[]).slice(0,15))}`;
  if((d.guidance_cuts||[]).length) h+=`<h2 class="r">📉 Guidance Cuts</h2>${guidTbl(d.guidance_cuts.slice(0,12))}`;
  h+=`<h2 class="g">⬆️ Upgrades</h2>${ratingTbl((d.upgrades||[]).slice(0,20),"up")}`;
  h+=`<h2 class="r">⬇️ Downgrades</h2>${ratingTbl((d.downgrades||[]).slice(0,20),"down")}`;
  h+=`<h2 class="c">🎯 Biggest Price-Target Raises</h2>${ptTbl((d.pt_raises||[]).slice(0,20))}`;
  if((d.most_bearish||[]).length) h+=`<h2 class="r">🔴 Most Bearish</h2><div class="cards">${d.most_bearish.slice(0,6).map(bearCard).join("")}</div>`;

  document.getElementById("content").innerHTML=h;
  document.getElementById("foot").innerHTML=
    `Source: ${esc(d.data_source||"Benzinga (via Massive)")} · generated ${esc((d.generated_at||"").replace("T"," ").slice(0,16))} UTC · updates daily 13:45 UTC.<br>`+
    (Array.isArray(d.caveats)?esc(d.caveats.join(" ")):esc(d.caveats||""))+" Research only — not investment advice.";
}
load("data/analyst-actions.json").then(render).catch(e=>{document.getElementById("content").innerHTML='<div class="loading">Could not load analyst-actions.json — '+esc(e.message)+'</div>';});
setInterval(()=>load("data/analyst-actions.json").then(render).catch(()=>{}),300000);
</script>
  <script src="/jh-page-ai.js" defer></script>
<script src="/jh-nav-drawer.js" defer></script>
</body>
</html>
