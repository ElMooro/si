<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustHodl | Stock Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--surface:#0d1117;--panel:#111827;--border:#1f2937;--border2:#374151;--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.15);--green:#10b981;--green-dim:rgba(16,185,129,0.15);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--gold:#f59e0b;--purple:#8b5cf6;--text:#f1f5f9;--muted:#64748b;--sub:#94a3b8;--mono:"JetBrains Mono",monospace;--sans:"Syne",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--sans);font-weight:800;font-size:1.1rem;color:var(--blue);text-decoration:none}
.logo span{color:var(--green)}
.search-wrap{display:flex;gap:8px;margin-left:auto}
.search-wrap input{background:var(--panel);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:0.9rem;padding:7px 16px;border-radius:6px;width:160px;outline:none;text-transform:uppercase;letter-spacing:1px;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--blue)}
.search-wrap button{background:var(--blue);color:#fff;border:none;font-family:var(--sans);font-weight:700;font-size:0.85rem;padding:7px 20px;border-radius:6px;cursor:pointer;transition:opacity 0.2s}
.search-wrap button:hover{opacity:0.85}
.container{max-width:1440px;margin:0 auto;padding:24px}
.hero{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;margin-bottom:20px}
.hero-left .symbol{font-family:var(--sans);font-size:2.4rem;font-weight:800;color:var(--text);line-height:1}
.hero-left .company-name{font-size:0.85rem;color:var(--sub);margin-top:4px}
.hero-left .sector-tag{display:inline-block;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.3);font-size:0.7rem;font-weight:500;padding:2px 10px;border-radius:4px;margin-top:6px;letter-spacing:1px;text-transform:uppercase}
.hero-right{text-align:right}
.price-big{font-family:var(--sans);font-size:2.4rem;font-weight:800;line-height:1}
.price-big.up{color:var(--green)}.price-big.dn{color:var(--red)}
.price-change{font-size:0.85rem;margin-top:4px}
.price-change.up{color:var(--green)}.price-change.dn{color:var(--red)}
.kpi-row{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.kpi .k{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.kpi .v{font-size:1rem;font-weight:700;color:var(--text)}
.kpi .v.g{color:var(--green)}.kpi .v.r{color:var(--red)}.kpi .v.b{color:var(--blue)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:0.78rem;font-weight:500;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:0.5px;transition:color 0.15s;text-transform:uppercase}
.tab-btn:hover{color:var(--sub)}.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-pane{display:none}.tab-pane.active{display:block}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.charts-grid.full{grid-template-columns:1fr}
.chart-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:0}
.chart-card h3{font-family:var(--sans);font-size:0.78rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
.chart-wrap{position:relative}
.signals-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sig{font-size:0.68rem;font-weight:700;padding:4px 10px;border-radius:4px;letter-spacing:0.5px;text-transform:uppercase}
.sig.bull{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,0.3)}
.sig.bear{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.sig.neut{background:rgba(245,158,11,0.12);color:var(--gold);border:1px solid rgba(245,158,11,0.3)}
.data-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.data-row{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.data-row .label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.data-row .value{font-size:0.95rem;font-weight:700;color:var(--text)}
.data-row .sub-val{font-size:0.72rem;color:var(--muted);margin-top:2px}
.data-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.data-table th{text-align:left;padding:8px 12px;font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border)}
.data-table td{padding:9px 12px;border-bottom:1px solid rgba(31,41,55,0.5);color:var(--sub)}
.data-table tr:hover td{background:rgba(255,255,255,0.02);color:var(--text)}
.beat{color:var(--green)!important;font-weight:700}.miss{color:var(--red)!important;font-weight:700}.val-hi{color:var(--text)!important;font-weight:600}
.news-item{padding:12px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-item a{color:var(--text);font-size:0.88rem;text-decoration:none;font-weight:500;line-height:1.4}
.news-item a:hover{color:var(--blue)}
.news-meta{font-size:0.7rem;color:var(--muted);margin-top:4px}
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty .icon{font-size:3rem;margin-bottom:12px;opacity:0.4}
.empty h2{font-family:var(--sans);font-size:1.3rem;color:var(--sub);margin-bottom:8px}
.spinner{text-align:center;padding:60px;color:var(--blue);font-size:0.85rem;letter-spacing:2px}
.spinner::after{content:"";display:block;width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;margin:16px auto 0;animation:spin 0.7s linear infinite}
.price-chart-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px}
.price-chart-card h3{font-family:var(--sans);font-size:0.78rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.price-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.price-toolbar .tf-btn{background:var(--border2);border:none;color:var(--muted);font-family:var(--mono);font-size:0.72rem;padding:4px 12px;border-radius:5px;cursor:pointer;transition:background 0.15s}
.price-toolbar .tf-btn:hover{background:var(--blue);color:#fff}
.price-toolbar .tf-btn.active{background:var(--blue);color:#fff}
.price-toolbar .chart-type-btn{background:var(--border2);border:none;color:var(--muted);font-family:var(--mono);font-size:0.72rem;padding:4px 12px;border-radius:5px;cursor:pointer;transition:background 0.15s;margin-left:8px}
.price-toolbar .chart-type-btn.active{background:var(--purple);color:#fff}
.price-toolbar .ma-btn{background:var(--border2);border:none;color:var(--muted);font-family:var(--mono);font-size:0.72rem;padding:4px 12px;border-radius:5px;cursor:pointer}
.price-toolbar .ma-btn.active-50{background:rgba(251,191,36,0.2);color:#fbbf24;border:1px solid rgba(251,191,36,0.4)}
.price-toolbar .ma-btn.active-200{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid rgba(239,68,68,0.4)}
.price-toolbar .ma-btn.active-100{background:rgba(168,85,247,0.2);color:#a855f7;border:1px solid rgba(168,85,247,0.4)}
.price-toolbar .ma-btn.active-cross{background:rgba(99,179,237,0.2);color:#63b3ed;border:1px solid rgba(99,179,237,0.4)}
#priceChart{width:100%;height:520px}
#volumeChart{width:100%;height:120px;margin-top:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(4,1fr)}.charts-grid{grid-template-columns:1fr}}
@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr)}.data-grid{grid-template-columns:repeat(2,1fr)}.hero{grid-template-columns:1fr}.hero-right{text-align:left}}
.chart-card{position:relative}
.chart-expand-btn{position:absolute;top:12px;right:12px;background:var(--border2);border:none;color:var(--sub);cursor:pointer;border-radius:5px;padding:4px 8px;font-size:0.7rem;font-family:var(--mono);z-index:10;transition:background 0.2s}
.chart-expand-btn:hover{background:var(--blue);color:#fff}
.chart-zoom-btns{position:absolute;bottom:10px;right:10px;display:flex;gap:4px;z-index:10}
.chart-zoom-btns button{background:var(--border2);border:none;color:var(--sub);cursor:pointer;border-radius:4px;padding:3px 8px;font-size:0.68rem;font-family:var(--mono);transition:background 0.2s}
.chart-zoom-btns button:hover{background:var(--blue);color:#fff}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--border2);border-radius:14px;padding:24px;width:95vw;max-width:1300px;max-height:90vh;display:flex;flex-direction:column;gap:16px}
.modal-header{display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-family:var(--sans);font-size:0.9rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px}
.modal-close{background:var(--border2);border:none;color:var(--text);cursor:pointer;border-radius:6px;padding:6px 14px;font-family:var(--mono);font-size:0.8rem}
.modal-close:hover{background:var(--red)}
.modal-chart-wrap{position:relative;flex:1;min-height:500px}
.modal-zoom-row{display:flex;gap:8px;flex-wrap:wrap}
.modal-zoom-row button{background:var(--border2);border:none;color:var(--sub);cursor:pointer;border-radius:5px;padding:5px 14px;font-size:0.75rem;font-family:var(--mono);transition:background 0.2s}
.modal-zoom-row button:hover{background:var(--blue);color:#fff}
.modal-zoom-row button.active{background:var(--blue);color:#fff}
</style>
</head>
<body>
<div class="header">
  <a class="logo" href="/">Just<span>Hodl</span>.AI</a>
  <span style="color:var(--muted);font-size:0.75rem;letter-spacing:2px;">STOCK ANALYZER</span>
  <div class="search-wrap">
    <input type="text" id="tickerInput" placeholder="AAPL" maxlength="10" onkeydown="if(event.key==='Enter')analyze()">
    <button onclick="analyze()">ANALYZE</button>
  </div>
</div>
<div class="container" id="main">
  <div class="empty">
    <div class="icon">&#128202;</div>
    <h2>Stock Analyzer</h2>
    <p>Enter a ticker symbol above for full institutional-grade analysis<br>with 25 years of interactive historical charts.</p>
  </div>
</div>
<script>
const STOCK_URL="https://enxmdjjowjfwiydpslyykokjee0qdvml.lambda-url.us-east-1.on.aws/";
const CD={responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{color:"#94a3b8",font:{family:"JetBrains Mono",size:11},boxWidth:12,padding:16}},tooltip:{backgroundColor:"#111827",borderColor:"#1f2937",borderWidth:1,titleColor:"#f1f5f9",bodyColor:"#94a3b8",titleFont:{family:"Syne",size:13,weight:"700"},bodyFont:{family:"JetBrains Mono",size:12},padding:12,displayColors:true}},scales:{x:{ticks:{color:"#64748b",font:{family:"JetBrains Mono",size:10},maxTicksLimit:14},grid:{color:"rgba(31,41,55,0.8)"}},y:{ticks:{color:"#64748b",font:{family:"JetBrains Mono",size:10}},grid:{color:"rgba(31,41,55,0.8)"}}}};
function dm(b,o){const r=JSON.parse(JSON.stringify(b));for(const k in o){if(o[k]&&typeof o[k]==="object"&&!Array.isArray(o[k])){r[k]=dm(r[k]||{},o[k]);}else{r[k]=o[k];}}return r;}
const CH={};
function dc(id){if(CH[id]){CH[id].destroy();delete CH[id];}}
function mk(id,type,data,opts={}){dc(id);const c=document.getElementById(id);if(!c)return;CH[id]=new Chart(c,{type,data,options:dm(CD,opts)});}
function fmt(v){if(v===null||v===undefined)return"N/A";const n=parseFloat(v);if(isNaN(n))return v;if(Math.abs(n)>=1e12)return"$"+(n/1e12).toFixed(2)+"T";if(Math.abs(n)>=1e9)return"$"+(n/1e9).toFixed(2)+"B";if(Math.abs(n)>=1e6)return"$"+(n/1e6).toFixed(2)+"M";return n.toFixed(2);}
function pct(v,d=1){if(v===null||v===undefined)return"N/A";return parseFloat(v).toFixed(d)+"%";}
function money(v,d=2){if(v===null||v===undefined)return"N/A";return"$"+parseFloat(v).toFixed(d);}
function num(v,d=2){if(v===null||v===undefined)return"N/A";return parseFloat(v).toFixed(d);}
function gc(v){if(!v&&v!==0)return"";return parseFloat(v)>=0?"g":"r";}
function sc(s){s=s.toLowerCase();if(s.includes("bull")||s.includes("above")||s.includes("golden"))return"bull";if(s.includes("bear")||s.includes("below")||s.includes("death")||s.includes("oversold"))return"bear";return"neut";}
async function analyze(){
  const ticker=document.getElementById("tickerInput").value.trim().toUpperCase();
  if(!ticker)return;
  document.getElementById("main").innerHTML=`<div class="spinner">LOADING ${ticker}</div>`;
  try{
    const res=await fetch(`${STOCK_URL}?ticker=${ticker}`);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    render(data,ticker);
  }catch(e){document.getElementById("main").innerHTML=`<div class="empty"><div class="icon">&#9888;&#65039;</div><h2>Error</h2><p>${e.message}</p></div>`;}
}
function switchTab(name,btn){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-"+name).classList.add("active");
  setTimeout(()=>{Object.values(CH).forEach(c=>c.resize&&c.resize());},50);
}
function render(d,ticker){
  const tech=d.technicals||{},fund=d.fundamentals||{},hist=d.historical||{},earns=d.earnings||[],divs=d.dividends||[],news=d.news||[],cf=d.cash_flow||{},bs=d.balance_sheet||{};
  const price=tech.price||0;
  const chg=fund.change_pct;
  const pc=!chg?"":parseFloat(chg)>=0?"up":"dn";
  const signals=(tech.signals||"NEUTRAL").split("|").map(s=>s.trim()).filter(Boolean);
  const main=document.getElementById("main");
  main.innerHTML=`
<div class="hero">
  <div class="hero-left">
    <div class="symbol">${fund.name||ticker}</div>
    <div class="company-name">${fund.ceo?"CEO: "+fund.ceo:""}${fund.employees?"&nbsp;|&nbsp;"+Number(fund.employees).toLocaleString()+" employees":""}</div>
    <span class="sector-tag">${fund.sector||""}${fund.industry?" / "+fund.industry:""}</span>
  </div>
  <div class="hero-right">
    <div class="price-big ${pc}">${money(price)}</div>
    <div class="price-change ${pc}">${chg!==undefined?(parseFloat(chg)>=0?"+":"")+num(chg,2)+"%":""}</div>
  </div>
</div>
<div class="kpi-row">
  <div class="kpi"><div class="k">Market Cap</div><div class="v b">${fmt(fund.market_cap)}</div></div>
  <div class="kpi"><div class="k">P/E TTM</div><div class="v">${num(fund.pe,1)}</div></div>
  <div class="kpi"><div class="k">EV/EBITDA</div><div class="v">${num(fund.ev_ebitda,1)}</div></div>
  <div class="kpi"><div class="k">Gross Margin</div><div class="v g">${pct(fund.gross_margin)}</div></div>
  <div class="kpi"><div class="k">Net Margin</div><div class="v g">${pct(fund.net_margin)}</div></div>
  <div class="kpi"><div class="k">ROE</div><div class="v ${gc(fund.roe)}">${pct(fund.roe)}</div></div>
  <div class="kpi"><div class="k">Beta</div><div class="v">${num(fund.beta)}</div></div>
  <div class="kpi"><div class="k">FCF Yield</div><div class="v g">${pct(fund.fcf_yield)}</div></div>
</div>
<div class="signals-row">${signals.map(s=>`<span class="sig ${sc(s)}">${s}</span>`).join("")}</div>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('charts',this)">CHARTS</button>
  <button class="tab-btn" onclick="switchTab('technicals',this)">TECHNICALS</button>
  <button class="tab-btn" onclick="switchTab('fundamentals',this)">FUNDAMENTALS</button>
  <button class="tab-btn" onclick="switchTab('earnings',this)">EARNINGS</button>
  <button class="tab-btn" onclick="switchTab('financials',this)">FINANCIALS</button>
  <button class="tab-btn" onclick="switchTab('dividends',this)">DIVIDENDS</button>
  <button class="tab-btn" onclick="switchTab('news',this)">NEWS</button>
</div>
<div class="tab-pane active" id="tab-charts">
  <div class="price-chart-card">
    <h3 id="priceChartTitle">Price History - Enter a ticker to load</h3>
    <div class="price-toolbar">
      <button class="tf-btn" onclick="setPricePeriod('1M',this)">1M</button>
      <button class="tf-btn" onclick="setPricePeriod('3M',this)">3M</button>
      <button class="tf-btn" onclick="setPricePeriod('6M',this)">6M</button>
      <button class="tf-btn active" onclick="setPricePeriod('1Y',this)">1Y</button>
      <button class="tf-btn" onclick="setPricePeriod('3Y',this)">3Y</button>
      <button class="tf-btn" onclick="setPricePeriod('5Y',this)">5Y</button>
      <button class="tf-btn" onclick="setPricePeriod('10Y',this)">10Y</button>
      <button class="tf-btn" onclick="setPricePeriod('ALL',this)">ALL</button>
      <span style="color:var(--border2);margin:0 6px">|</span>
      <button class="chart-type-btn active" id="btnCandle" onclick="setPriceType('candle',this)">Candle</button>
      <button class="chart-type-btn" id="btnLine" onclick="setPriceType('line',this)">Line</button>
      <span style="color:var(--border2);margin:0 6px">|</span>
      <button class="ma-btn" id="btnMA50" onclick="toggleMA(50)">SMA 50</button>
      <button class="ma-btn" id="btnMA100" onclick="toggleMA(100)">SMA 100</button>
      <button class="ma-btn" id="btnMA200" onclick="toggleMA(200)">SMA 200</button>
      <button class="ma-btn" id="btnCross" onclick="toggleCross()">Crosses</button>
    </div>
    <div id="priceChart" style="width:100%;height:500px"></div>
    <div id="volumeChart" style="width:100%;height:110px;margin-top:2px"></div>
  </div>
  <div class="charts-grid full" style="margin-bottom:16px"><div class="chart-card"><button class="chart-expand-btn" onclick="expandChart('chartRevenue','Revenue &amp; Net Income ($B)')">&#x26F6; Expand</button><h3>Revenue &amp; Net Income - Annual ($B)</h3><div class="chart-wrap" style="height:320px"><canvas id="chartRevenue"></canvas></div></div></div>
  <div class="charts-grid">
    <div class="chart-card"><button class="chart-expand-btn" onclick="expandChart('chartEPS','EPS - Annual')">&#x26F6; Expand</button><h3>Earnings Per Share (EPS) - Annual</h3><div class="chart-wrap" style="height:260px"><canvas id="chartEPS"></canvas></div></div>
    <div class="chart-card"><button class="chart-expand-btn" onclick="expandChart('chartPE','P/E Ratio &amp; Stock Price')">&#x26F6; Expand</button><h3>P/E Ratio &amp; Stock Price - Annual</h3><div class="chart-wrap" style="height:260px"><canvas id="chartPE"></canvas></div></div>
  </div>
  <div class="charts-grid">
    <div class="chart-card"><button class="chart-expand-btn" onclick="expandChart('chartMargins','Margins &amp; ROE')">&#x26F6; Expand</button><h3>Gross Margin / Net Margin / ROE - Annual (%)</h3><div class="chart-wrap" style="height:260px"><canvas id="chartMargins"></canvas></div></div>
    <div class="chart-card"><button class="chart-expand-btn" onclick="expandChart('chartDivs','Annual Dividends')">&#x26F6; Expand</button><h3>Annual Dividends - History ($)</h3><div class="chart-wrap" style="height:260px"><canvas id="chartDivs"></canvas></div></div>
  </div>
</div>
<div class="tab-pane" id="tab-technicals">
  <div class="data-grid">
    <div class="data-row"><div class="label">RSI (14)</div><div class="value ${parseFloat(tech.rsi)>70?"r":parseFloat(tech.rsi)<30?"g":""}">${num(tech.rsi,1)}</div><div class="sub-val">${parseFloat(tech.rsi)>70?"Overbought":parseFloat(tech.rsi)<30?"Oversold":"Neutral"}</div></div>

let priceEChart=null,volumeEChart=null,allOHLCV={},priceType='candle',showMA50=false,showMA100=false,showMA200=false,showCross=false,currentPeriod='1Y';

function initPriceChart(ohlcv,ticker){
  allOHLCV=ohlcv;
  const totalBars=ohlcv.dates?ohlcv.dates.length:0;
  document.getElementById('priceChartTitle').textContent=ticker+' Price History - Weekly Adjusted ('+totalBars+' bars)';
  document.getElementById('btnMA50').className='ma-btn';
  document.getElementById('btnMA100').className='ma-btn';
  document.getElementById('btnMA200').className='ma-btn';
  document.getElementById('btnCross').className='ma-btn';
  showMA50=false;showMA100=false;showMA200=false;showCross=false;priceType='candle';
  document.querySelectorAll('.chart-type-btn').forEach(b=>b.classList.remove('active'));
  const cb=document.getElementById('btnCandle');if(cb)cb.classList.add('active');
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  const yb=document.querySelector('.tf-btn[onclick*="1Y"]');if(yb)yb.classList.add('active');
  currentPeriod='1Y';
  renderPriceCharts();
}

function getSlice(period){
  const dates=allOHLCV.dates||[];
  if(!dates.length)return{start:0,end:0};
  const now=new Date(dates[dates.length-1]);
  let cutoff=new Date(now);
  if(period==='1M')cutoff.setMonth(cutoff.getMonth()-1);
  else if(period==='3M')cutoff.setMonth(cutoff.getMonth()-3);
  else if(period==='6M')cutoff.setMonth(cutoff.getMonth()-6);
  else if(period==='1Y')cutoff.setFullYear(cutoff.getFullYear()-1);
  else if(period==='3Y')cutoff.setFullYear(cutoff.getFullYear()-3);
  else if(period==='5Y')cutoff.setFullYear(cutoff.getFullYear()-5);
  else if(period==='10Y')cutoff.setFullYear(cutoff.getFullYear()-10);
  else return{start:0,end:dates.length};
  const idx=dates.findIndex(d=>new Date(d)>=cutoff);
  return{start:idx<0?0:idx,end:dates.length};
}

function buildPriceOpts(period){
  const{start,end}=getSlice(period);
  const dates=allOHLCV.dates.slice(start,end);
  const opens=allOHLCV.opens.slice(start,end);
  const highs=allOHLCV.highs.slice(start,end);
  const lows=allOHLCV.lows.slice(start,end);
  const closes=allOHLCV.closes.slice(start,end);
  const sma50=(allOHLCV.sma50||[]).slice(start,end);
  const sma200=(allOHLCV.sma200||[]).slice(start,end);
  // Auto-switch to line if too many bars for candles (>300 = too compressed)
  const useCandle = priceType==='candle' && dates.length<=300;
  const series=[];
  if(useCandle){
    series.push({name:'Price',type:'candlestick',
      data:dates.map((_,i)=>[opens[i],closes[i],lows[i],highs[i]]),
      itemStyle:{color:'#10b981',color0:'#ef4444',borderColor:'#10b981',borderColor0:'#ef4444',borderWidth:1},
      barMaxWidth:8,
      emphasis:{itemStyle:{borderWidth:2}}
    });
  }else{
    // Line chart with gradient fill
    series.push({name:'Price',type:'line',data:closes,
      lineStyle:{color:'#3b82f6',width:2},
      areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(59,130,246,0.25)'},{offset:1,color:'rgba(59,130,246,0.01)'}]}},
      symbol:'none',smooth:false,large:true
    });
  }
  const sma100=(allOHLCV.sma100||[]).slice(start,end);
  if(showMA50)series.push({name:'SMA 50',type:'line',data:sma50,lineStyle:{color:'#fbbf24',width:1.5},symbol:'none',smooth:false,connectNulls:true,large:true});
  if(showMA100)series.push({name:'SMA 100',type:'line',data:sma100,lineStyle:{color:'#a855f7',width:1.5},symbol:'none',smooth:false,connectNulls:true,large:true});
  if(showMA200)series.push({name:'SMA 200',type:'line',data:sma200,lineStyle:{color:'#ef4444',width:1.5},symbol:'none',smooth:false,connectNulls:true,large:true});
  // Golden Cross / Death Cross markers
  const crossMarks={type:'scatter',name:'Crosses',symbol:'pin',symbolSize:18,data:[],label:{show:true,fontSize:9,fontFamily:'JetBrains Mono',position:'top'},itemStyle:{},z:10};
  if(showCross){
    for(let i=1;i<sma50.length;i++){
      const p=sma50[i-1],c=sma50[i],p2=sma200[i-1],c2=sma200[i];
      if(!p||!c||!p2||!c2)continue;
      if(p<=p2&&c>c2){// Golden Cross
        crossMarks.data.push({value:[dates[i],closes[i]],itemStyle:{color:'#f59e0b'},label:{formatter:'GC',color:'#f59e0b'}});
      }else if(p>=p2&&c<c2){// Death Cross
        crossMarks.data.push({value:[dates[i],closes[i]],itemStyle:{color:'#ef4444'},label:{formatter:'DC',color:'#ef4444'}});
      }
    }
    if(crossMarks.data.length)series.push(crossMarks);
  }
  return{
    backgroundColor:'transparent',animation:false,
    tooltip:{trigger:'axis',axisPointer:{type:'cross'},backgroundColor:'#111827',borderColor:'#374151',borderWidth:1,
      textStyle:{color:'#f1f5f9',fontFamily:'JetBrains Mono',fontSize:12},
      formatter:params=>{
        let s=`<div style="font-family:Syne;font-weight:700;margin-bottom:6px;color:#63b3ed">${params[0].axisValue}</div>`;
        params.forEach(p=>{
          if(p.seriesType==='candlestick'){
            const[o,c,l,h]=p.data;
            const col=c>=o?'#10b981':'#ef4444';
            s+=`<div style="color:${col}">O:$${o.toFixed(2)} H:$${h.toFixed(2)} L:$${l.toFixed(2)} C:<b>$${c.toFixed(2)}</b></div>`;
          }else{
            s+=`<div><span style="color:${p.color}">&#9679;</span> ${p.seriesName}: <b>$${(p.data||0).toFixed(2)}</b></div>`;
          }
        });
        return s;
      }
    },
    legend:{show:(showMA50||showMA100||showMA200),top:4,textStyle:{color:'#94a3b8',fontFamily:'JetBrains Mono',fontSize:11}},
    grid:{left:64,right:64,top:(showMA50||showMA100||showMA200)?36:10,bottom:10},
    xAxis:{type:'category',data:dates,
      axisLine:{lineStyle:{color:'#1f2937'}},
      axisLabel:{color:'#64748b',fontFamily:'JetBrains Mono',fontSize:10,interval:Math.max(1,Math.floor(dates.length/14)),rotate:dates.length>300?20:0},
      splitLine:{show:false}
    },
    yAxis:{type:'value',position:'right',scale:true,
      axisLine:{lineStyle:{color:'#1f2937'}},
      axisLabel:{color:'#64748b',fontFamily:'JetBrains Mono',fontSize:10,formatter:v=>'$'+v.toFixed(0)},
      splitLine:{lineStyle:{color:'rgba(31,41,55,0.6)'}}
    },
    series
  };
}

function buildVolOpts(period){
  const{start,end}=getSlice(period);
  const dates=allOHLCV.dates.slice(start,end);
  const vols=allOHLCV.volumes.slice(start,end);
  const opens=allOHLCV.opens.slice(start,end);
  const closes=allOHLCV.closes.slice(start,end);
  return{
    backgroundColor:'transparent',animation:false,
    tooltip:{trigger:'axis',backgroundColor:'#111827',borderColor:'#374151',
      textStyle:{color:'#94a3b8',fontFamily:'JetBrains Mono',fontSize:11},
      formatter:p=>p[0]?`<span style="color:#64748b">Vol:</span> <b>${(p[0].data.value/1e6).toFixed(1)}M</b>`:''
    },
    grid:{left:64,right:64,top:4,bottom:24},
    xAxis:{type:'category',data:dates,axisLabel:{show:false},axisLine:{lineStyle:{color:'#1f2937'}},splitLine:{show:false}},
    yAxis:{type:'value',position:'right',
      axisLabel:{color:'#4b5563',fontFamily:'JetBrains Mono',fontSize:9,formatter:v=>v>=1e9?(v/1e9).toFixed(1)+'B':v>=1e6?(v/1e6).toFixed(0)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v},
      splitLine:{lineStyle:{color:'rgba(31,41,55,0.4)'}}
    },
    series:[{type:'bar',
      data:vols.map((v,i)=>({value:v,itemStyle:{color:closes[i]>=opens[i]?'rgba(16,185,129,0.55)':'rgba(239,68,68,0.55)'}})),
      barMaxWidth:8,large:true
    }]
  };
}

function renderPriceCharts(){
  if(!allOHLCV.dates||!allOHLCV.dates.length)return;
  const pEl=document.getElementById('priceChart');
  const vEl=document.getElementById('volumeChart');
  if(!pEl||!vEl)return;
  if(!priceEChart||priceEChart.isDisposed()){priceEChart=echarts.init(pEl,null,{renderer:'canvas'});}
  if(!volumeEChart||volumeEChart.isDisposed()){volumeEChart=echarts.init(vEl,null,{renderer:'canvas'});}
  priceEChart.setOption(buildPriceOpts(currentPeriod),true);
  volumeEChart.setOption(buildVolOpts(currentPeriod),true);
  window.addEventListener('resize',()=>{
    priceEChart&&!priceEChart.isDisposed()&&priceEChart.resize();
    volumeEChart&&!volumeEChart.isDisposed()&&volumeEChart.resize();
  });
}

function setPricePeriod(period,btn){
  currentPeriod=period;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderPriceCharts();
}

function setPriceType(type,btn){
  priceType=type;
  document.querySelectorAll('.chart-type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPriceCharts();
}

function toggleMA(n){
  if(n===50){showMA50=!showMA50;document.getElementById('btnMA50').className=showMA50?'ma-btn active-50':'ma-btn';}
  else if(n===100){showMA100=!showMA100;document.getElementById('btnMA100').className=showMA100?'ma-btn active-100':'ma-btn';}
  else{showMA200=!showMA200;document.getElementById('btnMA200').className=showMA200?'ma-btn active-200':'ma-btn';}
  renderPriceCharts();
}
function toggleCross(){
  showCross=!showCross;
  document.getElementById('btnCross').className=showCross?'ma-btn active-cross':'ma-btn';
  renderPriceCharts();
}
</script>
<!-- Fullscreen Chart Modal -->
<div class="modal-overlay" id="chartModal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Chart</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="modal-zoom-row" id="modalPeriodBtns">
          <button onclick="setModalPeriod('ALL',this)" class="active">ALL</button>
          <button onclick="setModalPeriod('10Y',this)">10Y</button>
          <button onclick="setModalPeriod('5Y',this)">5Y</button>
          <button onclick="setModalPeriod('3Y',this)">3Y</button>
          <button onclick="setModalPeriod('1Y',this)">1Y</button>
        </div>
        <button class="modal-zoom-row" style="background:var(--border2);border:none;color:var(--sub);cursor:pointer;border-radius:5px;padding:5px 14px;font-size:0.75rem;font-family:var(--mono)" onclick="resetModalZoom()">Reset Zoom</button>
        <button class="modal-close" onclick="closeModalDirect()">&#10005; Close</button>
      </div>
    </div>
    <div class="modal-chart-wrap"><canvas id="modalCanvas"></canvas></div>
  </div>
</div>
</body>
</html>
