<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustHodl | Stock Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--surface:#0d1117;--panel:#111827;--border:#1f2937;--border2:#374151;--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.15);--green:#10b981;--green-dim:rgba(16,185,129,0.15);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--gold:#f59e0b;--purple:#8b5cf6;--text:#f1f5f9;--muted:#64748b;--sub:#94a3b8;--mono:"JetBrains Mono",monospace;--sans:"Syne",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--sans);font-weight:800;font-size:1.1rem;color:var(--blue);text-decoration:none}
.logo span{color:var(--green)}
.search-wrap{display:flex;gap:8px;margin-left:auto}
.search-wrap input{background:var(--panel);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:0.9rem;padding:7px 16px;border-radius:6px;width:160px;outline:none;text-transform:uppercase;letter-spacing:1px;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--blue)}
.search-wrap button{background:var(--blue);color:#fff;border:none;font-family:var(--sans);font-weight:700;font-size:0.85rem;padding:7px 20px;border-radius:6px;cursor:pointer;transition:opacity 0.2s}
.search-wrap button:hover{opacity:0.85}
.container{max-width:1440px;margin:0 auto;padding:24px}
.hero{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;margin-bottom:20px}
.hero-left .symbol{font-family:var(--sans);font-size:2.4rem;font-weight:800;color:var(--text);line-height:1}
.hero-left .company-name{font-size:0.85rem;color:var(--sub);margin-top:4px}
.hero-left .sector-tag{display:inline-block;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.3);font-size:0.7rem;font-weight:500;padding:2px 10px;border-radius:4px;margin-top:6px;letter-spacing:1px;text-transform:uppercase}
.hero-right{text-align:right}
.price-big{font-family:var(--sans);font-size:2.4rem;font-weight:800;line-height:1}
.price-big.up{color:var(--green)}.price-big.dn{color:var(--red)}
.price-change{font-size:0.85rem;margin-top:4px}
.price-change.up{color:var(--green)}.price-change.dn{color:var(--red)}
.kpi-row{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.kpi .k{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.kpi .v{font-size:1rem;font-weight:700;color:var(--text)}
.kpi .v.g{color:var(--green)}.kpi .v.r{color:var(--red)}.kpi .v.b{color:var(--blue)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:0.78rem;font-weight:500;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:0.5px;transition:color 0.15s;text-transform:uppercase}
.tab-btn:hover{color:var(--sub)}.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-pane{display:none}.tab-pane.active{display:block}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.charts-grid.full{grid-template-columns:1fr}
.chart-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:0}
.chart-card h3{font-family:var(--sans);font-size:0.78rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
.chart-wrap{position:relative}
.signals-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sig{font-size:0.68rem;font-weight:700;padding:4px 10px;border-radius:4px;letter-spacing:0.5px;text-transform:uppercase}
.sig.bull{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,0.3)}
.sig.bear{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.sig.neut{background:rgba(245,158,11,0.12);color:var(--gold);border:1px solid rgba(245,158,11,0.3)}
.data-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.data-row{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.data-row .label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.data-row .value{font-size:0.95rem;font-weight:700;color:var(--text)}
.data-row .sub-val{font-size:0.72rem;color:var(--muted);margin-top:2px}
.data-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.data-table th{text-align:left;padding:8px 12px;font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border)}
.data-table td{padding:9px 12px;border-bottom:1px solid rgba(31,41,55,0.5);color:var(--sub)}
.data-table tr:hover td{background:rgba(255,255,255,0.02);color:var(--text)}
.beat{color:var(--green)!important;font-weight:700}.miss{color:var(--red)!important;font-weight:700}.val-hi{color:var(--text)!important;font-weight:600}
.news-item{padding:12px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-item a{color:var(--text);font-size:0.88rem;text-decoration:none;font-weight:500;line-height:1.4}
.news-item a:hover{color:var(--blue)}
.news-meta{font-size:0.7rem;color:var(--muted);margin-top:4px}
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty .icon{font-size:3rem;margin-bottom:12px;opacity:0.4}
.empty h2{font-family:var(--sans);font-size:1.3rem;color:var(--sub);margin-bottom:8px}
.spinner{text-align:center;padding:60px;color:var(--blue);font-size:0.85rem;letter-spacing:2px}
.spinner::after{content:"";display:block;width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;margin:16px auto 0;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(4,1fr)}.charts-grid{grid-template-columns:1fr}}
@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr)}.data-grid{grid-template-columns:repeat(2,1fr)}.hero{grid-template-columns:1fr}.hero-right{text-align:left}}
</style>
</head>
<body>
<div class="header">
  <a class="logo" href="/">Just<span>Hodl</span>.AI</a>
  <span style="color:var(--muted);font-size:0.75rem;letter-spacing:2px;">STOCK ANALYZER</span>
  <div class="search-wrap">
    <input type="text" id="tickerInput" placeholder="AAPL" maxlength="10" onkeydown="if(event.key==='Enter')analyze()">
    <button onclick="analyze()">ANALYZE</button>
  </div>
</div>
<div class="container" id="main">
  <div class="empty">
    <div class="icon">&#128202;</div>
    <h2>Stock Analyzer</h2>
    <p>Enter a ticker symbol above for full institutional-grade analysis<br>with 25 years of interactive historical charts.</p>
  </div>
</div>
<script>
const STOCK_URL="https://enxmdjjowjfwiydpslyykokjee0qdvml.lambda-url.us-east-1.on.aws/";
const CD={responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{color:"#94a3b8",font:{family:"JetBrains Mono",size:11},boxWidth:12,padding:16}},tooltip:{backgroundColor:"#111827",borderColor:"#1f2937",borderWidth:1,titleColor:"#f1f5f9",bodyColor:"#94a3b8",titleFont:{family:"Syne",size:13,weight:"700"},bodyFont:{family:"JetBrains Mono",size:12},padding:12,displayColors:true}},scales:{x:{ticks:{color:"#64748b",font:{family:"JetBrains Mono",size:10},maxTicksLimit:14},grid:{color:"rgba(31,41,55,0.8)"}},y:{ticks:{color:"#64748b",font:{family:"JetBrains Mono",size:10}},grid:{color:"rgba(31,41,55,0.8)"}}}};
function dm(b,o){const r=JSON.parse(JSON.stringify(b));for(const k in o){if(o[k]&&typeof o[k]==="object"&&!Array.isArray(o[k])){r[k]=dm(r[k]||{},o[k]);}else{r[k]=o[k];}}return r;}
const CH={};
function dc(id){if(CH[id]){CH[id].destroy();delete CH[id];}}
function mk(id,type,data,opts={}){dc(id);const c=document.getElementById(id);if(!c)return;CH[id]=new Chart(c,{type,data,options:dm(CD,opts)});}
function fmt(v){if(v===null||v===undefined)return"N/A";const n=parseFloat(v);if(isNaN(n))return v;if(Math.abs(n)>=1e12)return"$"+(n/1e12).toFixed(2)+"T";if(Math.abs(n)>=1e9)return"$"+(n/1e9).toFixed(2)+"B";if(Math.abs(n)>=1e6)return"$"+(n/1e6).toFixed(2)+"M";return n.toFixed(2);}
function pct(v,d=1){if(v===null||v===undefined)return"N/A";return parseFloat(v).toFixed(d)+"%";}
function money(v,d=2){if(v===null||v===undefined)return"N/A";return"$"+parseFloat(v).toFixed(d);}
function num(v,d=2){if(v===null||v===undefined)return"N/A";return parseFloat(v).toFixed(d);}
function gc(v){if(!v&&v!==0)return"";return parseFloat(v)>=0?"g":"r";}
function sc(s){s=s.toLowerCase();if(s.includes("bull")||s.includes("above")||s.includes("golden"))return"bull";if(s.includes("bear")||s.includes("below")||s.includes("death")||s.includes("oversold"))return"bear";return"neut";}
async function analyze(){
  const ticker=document.getElementById("tickerInput").value.trim().toUpperCase();
  if(!ticker)return;
  document.getElementById("main").innerHTML=`<div class="spinner">LOADING ${ticker}</div>`;
  try{
    const res=await fetch(`${STOCK_URL}?ticker=${ticker}`);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    render(data,ticker);
  }catch(e){document.getElementById("main").innerHTML=`<div class="empty"><div class="icon">&#9888;&#65039;</div><h2>Error</h2><p>${e.message}</p></div>`;}
}
function switchTab(name,btn){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-"+name).classList.add("active");
  setTimeout(()=>{Object.values(CH).forEach(c=>c.resize&&c.resize());},50);
}
function render(d,ticker){
  const tech=d.technicals||{},fund=d.fundamentals||{},hist=d.historical||{},earns=d.earnings||[],divs=d.dividends||[],news=d.news||[],cf=d.cash_flow||{},bs=d.balance_sheet||{};
  const price=tech.price||0;
  const chg=fund.change_pct;
  const pc=!chg?"":parseFloat(chg)>=0?"up":"dn";
  const signals=(tech.signals||"NEUTRAL").split("|").map(s=>s.trim()).filter(Boolean);
  const main=document.getElementById("main");
  main.innerHTML=`
<div class="hero">
  <div class="hero-left">
    <div class="symbol">${fund.name||ticker}</div>
    <div class="company-name">${fund.ceo?"CEO: "+fund.ceo:""}${fund.employees?"&nbsp;|&nbsp;"+Number(fund.employees).toLocaleString()+" employees":""}</div>
    <span class="sector-tag">${fund.sector||""}${fund.industry?" / "+fund.industry:""}</span>
  </div>
  <div class="hero-right">
    <div class="price-big ${pc}">${money(price)}</div>
    <div class="price-change ${pc}">${chg!==undefined?(parseFloat(chg)>=0?"+":"")+num(chg,2)+"%":""}</div>
  </div>
</div>
<div class="kpi-row">
  <div class="kpi"><div class="k">Market Cap</div><div class="v b">${fmt(fund.market_cap)}</div></div>
  <div class="kpi"><div class="k">P/E TTM</div><div class="v">${num(fund.pe,1)}</div></div>
  <div class="kpi"><div class="k">EV/EBITDA</div><div class="v">${num(fund.ev_ebitda,1)}</div></div>
  <div class="kpi"><div class="k">Gross Margin</div><div class="v g">${pct(fund.gross_margin)}</div></div>
  <div class="kpi"><div class="k">Net Margin</div><div class="v g">${pct(fund.net_margin)}</div></div>
  <div class="kpi"><div class="k">ROE</div><div class="v ${gc(fund.roe)}">${pct(fund.roe)}</div></div>
  <div class="kpi"><div class="k">Beta</div><div class="v">${num(fund.beta)}</div></div>
  <div class="kpi"><div class="k">FCF Yield</div><div class="v g">${pct(fund.fcf_yield)}</div></div>
</div>
<div class="signals-row">${signals.map(s=>`<span class="sig ${sc(s)}">${s}</span>`).join("")}</div>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('charts',this)">CHARTS</button>
  <button class="tab-btn" onclick="switchTab('technicals',this)">TECHNICALS</button>
  <button class="tab-btn" onclick="switchTab('fundamentals',this)">FUNDAMENTALS</button>
  <button class="tab-btn" onclick="switchTab('earnings',this)">EARNINGS</button>
  <button class="tab-btn" onclick="switchTab('financials',this)">FINANCIALS</button>
  <button class="tab-btn" onclick="switchTab('dividends',this)">DIVIDENDS</button>
  <button class="tab-btn" onclick="switchTab('news',this)">NEWS</button>
</div>
<div class="tab-pane active" id="tab-charts">
  <div class="charts-grid full" style="margin-bottom:16px"><div class="chart-card"><h3>Revenue &amp; Net Income - Annual ($B)</h3><div class="chart-wrap" style="height:320px"><canvas id="chartRevenue"></canvas></div></div></div>
  <div class="charts-grid">
    <div class="chart-card"><h3>Earnings Per Share (EPS) - Annual</h3><div class="chart-wrap" style="height:260px"><canvas id="chartEPS"></canvas></div></div>
    <div class="chart-card"><h3>P/E Ratio - Annual</h3><div class="chart-wrap" style="height:260px"><canvas id="chartPE"></canvas></div></div>
  </div>
  <div class="charts-grid">
    <div class="chart-card"><h3>Gross Margin / Net Margin / ROE - Annual (%)</h3><div class="chart-wrap" style="height:260px"><canvas id="chartMargins"></canvas></div></div>
    <div class="chart-card"><h3>Annual Dividends - History ($)</h3><div class="chart-wrap" style="height:260px"><canvas id="chartDivs"></canvas></div></div>
  </div>
</div>
<div class="tab-pane" id="tab-technicals">
  <div class="data-grid">
    <div class="data-row"><div class="label">RSI (14)</div><div class="value ${parseFloat(tech.rsi)>70?"r":parseFloat(tech.rsi)<30?"g":""}">${num(tech.rsi,1)}</div><div class="sub-val">${parseFloat(tech.rsi)>70?"Overbought":parseFloat(tech.rsi)<30?"Oversold":"Neutral"}</div></div>
    <div class="data-row"><div class="label">StochRSI</div><div class="value">${num(tech.stoch_rsi,1)}</div></div>
    <div class="data-row"><div class="label">MACD</div><div class="value">${num(tech.macd,3)}</div></div>
    <div class="data-row"><div class="label">ATR (14)</div><div class="value">${money(tech.atr)}</div></div>
    <div class="data-row"><div class="label">SMA 20</div><div class="value">${money(tech.sma20)}</div></div>
    <div class="data-row"><div class="label">SMA 50</div><div class="value">${money(tech.sma50)}</div></div>
    <div class="data-row"><div class="label">SMA 200</div><div class="value">${money(tech.sma200)}</div></div>
    <div class="data-row"><div class="label">Vol Ratio</div><div class="value">${num(tech.vol_ratio,2)}x</div></div>
    <div class="data-row"><div class="label">vs 50MA</div><div class="value ${gc(tech.vs_50ma)}">${num(tech.vs_50ma,1)}%</div></div>
    <div class="data-row"><div class="label">vs 200MA</div><div class="value ${gc(tech.vs_200ma)}">${num(tech.vs_200ma,1)}%</div></div>
    <div class="data-row"><div class="label">52W High</div><div class="value">${money(tech.week52_high)}</div></div>
    <div class="data-row"><div class="label">52W Low</div><div class="value">${money(tech.week52_low)}</div></div>
    <div class="data-row"><div class="label">BB Upper</div><div class="value">${money(tech.bb_upper)}</div></div>
    <div class="data-row"><div class="label">BB Lower</div><div class="value">${money(tech.bb_lower)}</div></div>
    <div class="data-row"><div class="label">1M Return</div><div class="value ${gc(tech.ret_1m)}">${num(tech.ret_1m,1)}%</div></div>
    <div class="data-row"><div class="label">3M Return</div><div class="value ${gc(tech.ret_3m)}">${num(tech.ret_3m,1)}%</div></div>
  </div>
</div>
<div class="tab-pane" id="tab-fundamentals">
  <div class="data-grid">
    <div class="data-row"><div class="label">Market Cap</div><div class="value b">${fmt(fund.market_cap)}</div></div>
    <div class="data-row"><div class="label">Enterprise Value</div><div class="value">${fmt(fund.ev)}</div></div>
    <div class="data-row"><div class="label">P/E TTM</div><div class="value">${num(fund.pe,1)}</div></div>
    <div class="data-row"><div class="label">P/B Ratio</div><div class="value">${num(fund.pb,1)}</div></div>
    <div class="data-row"><div class="label">P/S Ratio</div><div class="value">${num(fund.ps,1)}</div></div>
    <div class="data-row"><div class="label">PEG Ratio</div><div class="value">${num(fund.peg,2)}</div></div>
    <div class="data-row"><div class="label">EV/EBITDA</div><div class="value">${num(fund.ev_ebitda,1)}</div></div>
    <div class="data-row"><div class="label">FCF Yield</div><div class="value g">${pct(fund.fcf_yield)}</div></div>
    <div class="data-row"><div class="label">Gross Margin</div><div class="value g">${pct(fund.gross_margin)}</div></div>
    <div class="data-row"><div class="label">Net Margin</div><div class="value g">${pct(fund.net_margin)}</div></div>
    <div class="data-row"><div class="label">ROE</div><div class="value g">${pct(fund.roe)}</div></div>
    <div class="data-row"><div class="label">ROA</div><div class="value g">${pct(fund.roa)}</div></div>
    <div class="data-row"><div class="label">ROIC</div><div class="value g">${pct(fund.roic)}</div></div>
    <div class="data-row"><div class="label">Debt/Equity</div><div class="value">${num(fund.de,2)}</div></div>
    <div class="data-row"><div class="label">Current Ratio</div><div class="value">${num(fund.current_ratio,2)}</div></div>
    <div class="data-row"><div class="label">Beta</div><div class="value">${num(fund.beta,2)}</div></div>
  </div>
  <div class="chart-card">
    <h3>Analyst Price Targets</h3>
    <div style="display:flex;gap:24px;flex-wrap:wrap;padding:8px 0 16px">
      <div><div style="font-size:0.7rem;color:var(--muted);margin-bottom:4px">CONSENSUS</div><div style="font-size:1.6rem;font-weight:800;color:var(--blue)">${money(fund.pt_consensus)}</div></div>
      <div><div style="font-size:0.7rem;color:var(--muted);margin-bottom:4px">LOW TARGET</div><div style="font-size:1.6rem;font-weight:800;color:var(--red)">${money(fund.pt_low)}</div></div>
      <div><div style="font-size:0.7rem;color:var(--muted);margin-bottom:4px">HIGH TARGET</div><div style="font-size:1.6rem;font-weight:800;color:var(--green)">${money(fund.pt_high)}</div></div>
      <div><div style="font-size:0.7rem;color:var(--muted);margin-bottom:4px">UPSIDE</div><div style="font-size:1.6rem;font-weight:800;color:var(--gold)">${fund.pt_consensus&&price?(((fund.pt_consensus-price)/price)*100).toFixed(1)+"%":"N/A"}</div></div>
    </div>
    ${fund.pt_low&&fund.pt_high?`<div style="position:relative;height:8px;background:var(--border2);border-radius:4px"><div style="position:absolute;left:0;height:100%;width:${Math.min(100,Math.max(0,((price-fund.pt_low)/(fund.pt_high-fund.pt_low))*100))}%;background:linear-gradient(90deg,var(--red),var(--green));border-radius:4px"></div><div style="position:absolute;top:-4px;left:${Math.min(96,Math.max(0,((price-fund.pt_low)/(fund.pt_high-fund.pt_low))*100))}%;width:16px;height:16px;background:var(--blue);border-radius:50%;border:2px solid var(--bg);transform:translateX(-50%)"></div></div><div style="display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted);margin-top:6px"><span>${money(fund.pt_low)}</span><span style="color:var(--blue)">Current ${money(price)}</span><span>${money(fund.pt_high)}</span></div>`:""}
  </div>
</div>
<div class="tab-pane" id="tab-earnings">
  <div class="charts-grid">
    <div class="chart-card"><h3>EPS - Actual vs Estimate</h3><div class="chart-wrap" style="height:260px"><canvas id="chartEarningsEPS"></canvas></div></div>
    <div class="chart-card"><h3>Revenue - Actual vs Estimate ($B)</h3><div class="chart-wrap" style="height:260px"><canvas id="chartEarningsRev"></canvas></div></div>
  </div>
  <div class="chart-card" style="margin-bottom:16px">
    <h3>Earnings History</h3>
    <table class="data-table">
      <thead><tr><th>Date</th><th>EPS Actual</th><th>EPS Est</th><th>Surprise</th><th>Revenue Actual</th><th>Revenue Est</th></tr></thead>
      <tbody>${earns.map(e=>`<tr><td class="val-hi">${e.date||""}</td><td class="${e.eps_act!==null&&e.eps_est!==null?parseFloat(e.eps_act)>=parseFloat(e.eps_est)?"beat":"miss":""}">${e.eps_act!==null?"$"+parseFloat(e.eps_act).toFixed(2):"N/A"}</td><td>${e.eps_est!==null?"$"+parseFloat(e.eps_est).toFixed(2):"N/A"}</td><td class="${e.surprise_pct!==null?parseFloat(e.surprise_pct)>=0?"beat":"miss":""}">${e.surprise_pct!==null?(parseFloat(e.surprise_pct)>=0?"+":"")+parseFloat(e.surprise_pct).toFixed(1)+"%":"N/A"}</td><td>${e.revenue?fmt(e.revenue):"N/A"}</td><td>${e.revenue_est?fmt(e.revenue_est):"N/A"}</td></tr>`).join("")}</tbody>
    </table>
  </div>
</div>
<div class="tab-pane" id="tab-financials">
  <div class="charts-grid">
    <div class="chart-card"><h3>Revenue &amp; Net Income - Annual ($B)</h3><div class="chart-wrap" style="height:260px"><canvas id="chartFinRev"></canvas></div></div>
    <div class="chart-card"><h3>Free Cash Flow Per Share - Annual ($)</h3><div class="chart-wrap" style="height:260px"><canvas id="chartFCF"></canvas></div></div>
  </div>
  <div class="data-grid">
    <div class="data-row"><div class="label">Operating CF</div><div class="value g">${fmt(cf.operating)}</div></div>
    <div class="data-row"><div class="label">Free Cash Flow</div><div class="value g">${fmt(cf.fcf)}</div></div>
    <div class="data-row"><div class="label">CapEx</div><div class="value r">${fmt(cf.capex)}</div></div>
    <div class="data-row"><div class="label">Buybacks</div><div class="value">${fmt(cf.buybacks)}</div></div>
    <div class="data-row"><div class="label">Cash</div><div class="value g">${fmt(bs.cash)}</div></div>
    <div class="data-row"><div class="label">Total Debt</div><div class="value r">${fmt(bs.debt)}</div></div>
    <div class="data-row"><div class="label">Net Debt</div><div class="value">${fmt(bs.net_debt)}</div></div>
    <div class="data-row"><div class="label">Total Assets</div><div class="value">${fmt(bs.assets)}</div></div>
  </div>
</div>
<div class="tab-pane" id="tab-dividends">
  <div class="charts-grid full" style="margin-bottom:16px"><div class="chart-card"><h3>Annual Dividend - Full History ($)</h3><div class="chart-wrap" style="height:280px"><canvas id="chartDivHistory"></canvas></div></div></div>
  <div class="chart-card" style="margin-bottom:16px">
    <h3>Dividend Payments</h3>
    <table class="data-table">
      <thead><tr><th>Payment Date</th><th>Amount</th><th>Yield</th><th>Frequency</th></tr></thead>
      <tbody>${divs.map(d=>`<tr><td class="val-hi">${d.date||""}</td><td class="beat">${d.dividend?"$"+parseFloat(d.dividend).toFixed(4):"N/A"}</td><td>${d.yield?parseFloat(d.yield).toFixed(3)+"%":"N/A"}</td><td>${d.frequency||""}</td></tr>`).join("")||"<tr><td colspan=4 style=text-align:center;color:var(--muted)>No dividend history</td></tr>"}</tbody>
    </table>
  </div>
</div>
<div class="tab-pane" id="tab-news">
  <div class="chart-card">${news.length?news.map(n=>`<div class="news-item"><a href="${n.url||"#"}" target="_blank">${n.title||""}</a><div class="news-meta">${n.source||""}&nbsp;·&nbsp;${n.published||""}</div></div>`).join(""):"<p style=color:var(--muted);padding:20px>No recent news found.</p>"}</div>
</div>`;
  setTimeout(()=>{drawAll(hist,earns);},60);
}
function drawAll(hist,earns){
  if(!hist||!hist.labels)return;
  const L=hist.labels;
  // Revenue & Net Income
  mk("chartRevenue","bar",{labels:L,datasets:[
    {label:"Revenue ($B)",data:hist.revenue,backgroundColor:"rgba(59,130,246,0.75)",borderRadius:3,borderSkipped:false},
    {label:"Net Income ($B)",data:hist.net_income,backgroundColor:"rgba(16,185,129,0.75)",borderRadius:3,borderSkipped:false}
  ]},{plugins:{tooltip:{callbacks:{label:c=>` ${c.dataset.label}: $${(c.raw||0).toFixed(2)}B`}}},scales:{y:{ticks:{callback:v=>"$"+v+"B"}}}});
  // EPS
  mk("chartEPS","bar",{labels:L,datasets:[
    {label:"EPS ($)",data:hist.eps,backgroundColor:hist.eps.map(v=>v>=0?"rgba(139,92,246,0.8)":"rgba(239,68,68,0.7)"),borderRadius:3}
  ]},{plugins:{tooltip:{callbacks:{label:c=>` EPS: $${(c.raw||0).toFixed(2)}`}}},scales:{y:{ticks:{callback:v=>"$"+v}}}});
  // P/E - filter extreme values
  const peF=hist.pe.map(v=>(v&&Math.abs(v)<500)?v:null);
  mk("chartPE","line",{labels:L,datasets:[
    {label:"P/E Ratio",data:peF,borderColor:"#f59e0b",backgroundColor:"rgba(245,158,11,0.08)",borderWidth:2.5,pointRadius:4,pointHoverRadius:7,pointBackgroundColor:"#f59e0b",fill:true,tension:0.3,spanGaps:true}
  ]},{plugins:{tooltip:{callbacks:{label:c=>` P/E: ${c.raw!==null?c.raw.toFixed(1)+"x":"N/A"}`}}}});
  // Margins & ROE
  mk("chartMargins","line",{labels:L,datasets:[
    {label:"Gross Margin %",data:hist.gross_margin,borderColor:"#10b981",borderWidth:2.5,pointRadius:3,pointHoverRadius:6,fill:false,tension:0.3,spanGaps:true},
    {label:"Net Margin %",data:hist.net_margin,borderColor:"#3b82f6",borderWidth:2.5,pointRadius:3,pointHoverRadius:6,fill:false,tension:0.3,spanGaps:true},
    {label:"ROE %",data:hist.roe.map(v=>v&&Math.abs(v)<500?v:null),borderColor:"#ef4444",borderWidth:2.5,pointRadius:3,pointHoverRadius:6,fill:false,tension:0.3,spanGaps:true}
  ]},{plugins:{tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw!==null?c.raw.toFixed(1)+"%":"N/A"}`}}},scales:{y:{ticks:{callback:v=>v+"%"}}}});
  // Dividends - Charts tab
  const dL=hist.div_labels||[],dV=hist.div_annual||[];
  if(dL.length&&dV.some(v=>v>0)){
    mk("chartDivs","bar",{labels:dL,datasets:[{label:"Annual Dividend ($)",data:dV,backgroundColor:"rgba(16,185,129,0.75)",borderRadius:3}]},{plugins:{tooltip:{callbacks:{label:c=>` Dividend: $${c.raw.toFixed(3)}`}}},scales:{y:{ticks:{callback:v=>"$"+v}}}});
  }else{const c=document.getElementById("chartDivs");if(c)c.parentElement.innerHTML="<div style=height:260px;display:flex;align-items:center;justify-content:center;color:var(--muted)>No dividend history</div>";}
  // Financials tab
  mk("chartFinRev","bar",{labels:L,datasets:[
    {label:"Revenue ($B)",data:hist.revenue,backgroundColor:"rgba(59,130,246,0.75)",borderRadius:3},
    {label:"Net Income ($B)",data:hist.net_income,backgroundColor:"rgba(16,185,129,0.75)",borderRadius:3}
  ]},{scales:{y:{ticks:{callback:v=>"$"+v+"B"}}}});
  mk("chartFCF","bar",{labels:L,datasets:[
    {label:"FCF/Share ($)",data:hist.fcf,backgroundColor:hist.fcf.map(v=>v>=0?"rgba(139,92,246,0.8)":"rgba(239,68,68,0.7)"),borderRadius:3}
  ]},{plugins:{tooltip:{callbacks:{label:c=>` FCF/Share: $${(c.raw||0).toFixed(2)}`}}},scales:{y:{ticks:{callback:v=>"$"+v}}}});
  // Dividends tab
  if(dL.length&&dV.some(v=>v>0)){
    mk("chartDivHistory","bar",{labels:dL,datasets:[{label:"Annual Dividend ($)",data:dV,backgroundColor:"rgba(16,185,129,0.75)",borderRadius:3}]},{plugins:{tooltip:{callbacks:{label:c=>` Annual Dividend: $${c.raw.toFixed(3)}`}}},scales:{y:{ticks:{callback:v=>"$"+v}}}});
  }
  // Earnings tab charts
  if(earns&&earns.length){
    const rev=earns.filter(e=>e.date).slice().reverse();
    const el=rev.map(e=>e.date);
    const ea=rev.map(e=>e.eps_act),ee=rev.map(e=>e.eps_est);
    mk("chartEarningsEPS","bar",{labels:el,datasets:[
      {label:"EPS Actual",data:ea,backgroundColor:ea.map((v,i)=>v!==null&&ee[i]!==null&&v>=ee[i]?"rgba(16,185,129,0.8)":"rgba(239,68,68,0.75)"),borderRadius:3},
      {label:"EPS Estimate",data:ee,backgroundColor:"rgba(100,116,139,0.45)",borderRadius:3}
    ]},{plugins:{tooltip:{callbacks:{label:c=>` ${c.dataset.label}: $${(c.raw||0).toFixed(2)}`}}},scales:{y:{ticks:{callback:v=>"$"+v}}}});
    const ra=rev.map(e=>e.revenue?e.revenue/1e9:null),re=rev.map(e=>e.revenue_est?e.revenue_est/1e9:null);
    mk("chartEarningsRev","bar",{labels:el,datasets:[
      {label:"Revenue Actual ($B)",data:ra,backgroundColor:"rgba(59,130,246,0.8)",borderRadius:3},
      {label:"Revenue Estimate ($B)",data:re,backgroundColor:"rgba(100,116,139,0.45)",borderRadius:3}
    ]},{plugins:{tooltip:{callbacks:{label:c=>` ${c.dataset.label}: $${(c.raw||0).toFixed(2)}B`}}},scales:{y:{ticks:{callback:v=>"$"+v+"B"}}}});
  }
}
const urlT=new URLSearchParams(window.location.search).get("t");
if(urlT){document.getElementById("tickerInput").value=urlT;analyze();}
</script>
</body>
