<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Institutional Footprint — JustHodl.AI</title>
<style>
:root{--bg:#070b12;--card:#0d1420;--line:#1c2a3d;--fg:#dfe9f5;--fg2:#93a8c4;--fg3:#54687f;--cy:#3fd0ff;--am:#ffd24a;--rd:#ff5d6c;--gr:#2fe3a0;--vi:#a78bfa;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1200px 500px at 70% -10%,#0e1a2e 0%,var(--bg) 55%);color:var(--fg);font:14px/1.55 -apple-system,Segoe UI,sans-serif}
.wrap{max-width:1280px;margin:0 auto;padding:26px 18px 70px}
h1{font-size:20px;margin:0 0 2px;letter-spacing:.4px}
.sub{color:var(--fg3);font-family:var(--mono);font-size:11px;margin-bottom:18px}
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:16px}
.dial{background:linear-gradient(160deg,var(--card),#0a111c);border:1px solid var(--line);border-radius:14px;padding:18px}
.dial h3{margin:0 0 6px;font-size:10.5px;letter-spacing:1.6px;color:var(--fg2)}
.big{font-family:var(--mono);font-size:34px;font-weight:800}
.lab{font-family:var(--mono);font-size:12px;margin-top:2px}
.bar{height:7px;background:#101a29;border-radius:5px;margin-top:10px;position:relative;overflow:hidden}
.bar i{position:absolute;top:0;bottom:0;width:3px;background:#fff;left:50%}
.bar b{position:absolute;top:0;bottom:0;border-radius:5px}
.comp{color:var(--fg3);font-size:10px;margin-top:8px;font-family:var(--mono);line-height:1.7}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:13px}
.c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.c h3{margin:0 0 10px;font-size:10.5px;letter-spacing:1.6px;color:var(--fg2)}
.kv{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--fg2);margin:4px 0}
.tk{color:var(--cy);cursor:pointer}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--line);margin:2px 4px 2px 0;background:#0a111c}
.g{color:var(--gr)}.r{color:var(--rd)}.a{color:var(--am)}.cy{color:var(--cy)}.vi{color:var(--vi)}
.dossier{background:linear-gradient(160deg,#101a2c,#0b1220);border:1px solid #26405e;border-radius:12px;padding:16px 18px;margin:16px 0;font-size:13.5px;line-height:1.65}
.dossier h3{margin:0 0 8px;font-size:10.5px;letter-spacing:1.6px;color:var(--cy)}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11.5px}
td,th{padding:6px 8px;border-bottom:1px solid #16233500;text-align:left;color:var(--fg2)}
th{color:var(--fg3);font-size:10px;letter-spacing:1.2px}
.load{color:var(--fg3);font-family:var(--mono);padding:40px;text-align:center}
</style></head><body><div class="wrap">
<h1>🕵️ INSTITUTIONAL FOOTPRINT — SURVEILLANCE DESK</h1>
<div class="sub" id="meta">Assembling dossier…</div>
<div id="app" class="load">Loading…</div>
<script src="/jh-nav-drawer.js" defer></script>
<script>
const F=v=>(v===null||v===undefined||v==='')?'—':v;
const m$=v=>v==null?'—':(v>0?'+':'')+(Math.abs(v)>=1000?(v/1000).toFixed(1)+'B':v.toFixed(0)+'M');
(async()=>{
 let d;try{d=await (await fetch('data/institutional-footprint.json',{cache:'no-store'})).json()}catch(e){}
 const app=document.getElementById('app');
 if(!d||!d.posture){app.textContent='Feed unavailable.';return}
 document.getElementById('meta').textContent=`${d.feeds_alive}/18 source feeds · ${(d.generated_at||'').slice(0,16).replace('T',' ')} UTC`;
 const P=d.posture,S=d.sectors||{},A=d.asset_classes||{},K=d.stocks||{},DP=d.dark_pool_footprint||{},CV=d.conviction_moves||[];
 const dial=(t,v,l,comps)=>{const col=v>15?'var(--gr)':v<-15?'var(--rd)':'var(--cy)';
  const w=Math.min(48,Math.abs(v||0)/2), lft=v>=0?'50%':(50-w)+'%';
  return `<div class="dial"><h3>${t}</h3><div class="big" style="color:${col}">${v??'—'}</div>
   <div class="lab" style="color:${col}">${l||''}</div>
   <div class="bar"><b style="left:${lft};width:${w}%;background:${col}"></b><i></i></div>
   <div class="comp">${Object.entries(comps||{}).map(([k,x])=>k+' '+(x>0?'+':'')+x.toFixed(0)).join(' · ')}</div></div>`};
 const cls=Object.entries(A.etf_net_5d_usd_m||{}).filter(([k,v])=>v!=null).sort((a,b)=>b[1]-a[1]);
 app.className='';app.innerHTML=`
 <div class="hero">
  ${dial('WHAT THEY ARE DOING — RISK NOW',P.risk_now,P.now_label,P.now_components)}
  ${dial('WHAT THEY ARE POSITIONING FOR — FORWARD',P.risk_forward,P.forward_label,P.fwd_components)}
  <div class="dial"><h3>DARK-POOL FOOTPRINT</h3>
   <div class="big" style="color:${DP.own_dix_pct>=57?'var(--gr)':DP.own_dix_pct<52?'var(--rd)':'var(--cy)'}">${F(DP.own_dix_pct)}%</div>
   <div class="lab">${F(DP.read)} · accum ${F(DP.accumulation_n)} / dist ${F(DP.distribution_n)}</div>
   <div class="comp">wholesaler extremes (mo ${F(DP.month)}): ${(DP.wholesaler_extremes||[]).slice(0,3).map(w=>w.ticker+' '+w.top_pct+'% '+(w.top_firm||'').split(' ')[0]).join(' · ')}</div></div>
 </div>
 ${d.ai_dossier?`<div class="dossier"><h3>🧠 ANALYST DOSSIER</h3>${d.ai_dossier}</div>`:''}

 <div class="c" style="margin-bottom:13px"><h3>ASSET LEDGER — LIT vs DARK vs FUTURES (institutional $)</h3>
  <table><tr><th>CLASS</th><th>LIT ETF 5d $</th><th>DARK 5d $ (est)</th><th>CFTC NET-SPEC</th><th>VERDICT</th></tr>
  ${Object.entries(d.asset_ledger||{}).map(([k,v])=>`<tr><td>${k}</td>
    <td style="color:${(v.lit_etf_5d_usd_m||0)>0?'var(--gr)':'var(--rd)'}">${m$(v.lit_etf_5d_usd_m)}</td>
    <td>${v.dark_5d_usd_m_est!=null?m$(v.dark_5d_usd_m_est):'—'}</td>
    <td style="color:${(v.cftc_net_spec||0)>0?'var(--gr)':(v.cftc_net_spec||0)<0?'var(--rd)':'var(--fg3)'}">${F(v.cftc_net_spec)}</td>
    <td class="${v.verdict==='BUYING'?'g':v.verdict==='SELLING'?'r':''}">${v.verdict}</td></tr>`).join('')}</table>
  <div class="comp">DARK est = Σ per-name off-exchange volume × price (single-stock tape, equities/REITs); primary-dealer net ${F(d.primary_dealer_net)}</div></div>
 <div class="c" style="margin-bottom:13px"><h3>DARK $ BY SECTOR (top names)</h3>
  <div style="display:flex;gap:8px;flex-wrap:wrap">${Object.entries(d.dark_by_sector||{}).slice(0,11).map(([sec,v])=>
   `<span class="tag">${sec} <b class="cy">$${(v.dark_usd_5d_m_est/1000).toFixed(1)}B</b> ${v.top.map(x=>x.t).join(' ')}</span>`).join('')}</div></div>
 <div class="grid">
  <div class="c"><h3>SECTORS — INSTITUTIONS BUYING</h3>
   ${(S.buying||[]).map(x=>`<div class="kv"><span>${x.complex}</span><b class="g">${m$(x.usd_5d_m)}</b></div>`).join('')}</div>
  <div class="c"><h3>SECTORS — INSTITUTIONS SELLING</h3>
   ${(S.selling||[]).map(x=>`<div class="kv"><span>${x.complex}</span><b class="r">${m$(x.usd_5d_m)}</b></div>`).join('')}</div>
  <div class="c"><h3>ASSET CLASSES (5d $)</h3>
   ${cls.slice(0,5).map(([k,v])=>`<div class="kv"><span>${k}</span><b class="g">${m$(v)}</b></div>`).join('')}
   ${cls.slice(-4).map(([k,v])=>`<div class="kv"><span>${k}</span><b class="r">${m$(v)}</b></div>`).join('')}
   <div class="comp">CFTC smart-money ${F(A.cftc&&A.cftc.smart_money_flow)} · risk-appetite ${F(A.cftc&&A.cftc.risk_appetite)}</div></div>
  <div class="c"><h3>STOCKS — 13F BUYING</h3>${(K.institutions_buying_13f||[]).map(t=>`<span class="tag g tk" onclick="location='/dossier.html?t='+'${t}'">${t}</span>`).join('')||'<div class="comp">warming</div>'}
   <h3 style="margin-top:12px">13F SELLING</h3>${(K.institutions_selling_13f||[]).map(t=>`<span class="tag r">${t}</span>`).join('')||'<div class="comp">warming</div>'}</div>
  <div class="c"><h3>ACCUMULATION (dark pool)</h3>${(K.dark_pool_accumulation||[]).map(t=>`<span class="tag g tk" onclick="location='/dossier.html?t='+'${t}'">${t}</span>`).join('')||'—'}
   <h3 style="margin-top:12px">⚠ DISTRIBUTION INTO STRENGTH</h3>${(K.distribution_into_strength||[]).map(t=>`<span class="tag a">${t}</span>`).join('')||'<div class="comp">none flagged</div>'}
   ${K.double_confirmed_buys&&K.double_confirmed_buys.length?`<h3 style="margin-top:12px">★ DOUBLE-CONFIRMED (13F ∩ DARK POOL)</h3>${K.double_confirmed_buys.map(t=>`<span class="tag vi">${t}</span>`).join('')}`:''}</div>
  <div class="c"><h3>CONVICTION MOVES</h3>
   <table><tr><th>TICKER</th><th>SIGNAL</th><th>STAGE</th></tr>
   ${CV.map(x=>`<tr><td class="tk" onclick="location='/dossier.html?t='+'${x.ticker}'">${x.ticker}</td><td style="color:${x.signal.includes('DIST')?'var(--am)':'var(--gr)'}">${x.signal}</td><td>${F(x.stage)}</td></tr>`).join('')}</table></div>
 </div>
 <div class="comp" style="margin-top:14px">${d.method||''}</div>`;
})();
</script></div></body></html>
