<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Institutional Footprint — JustHodl.AI</title><!-- v2.0 -->
<style>
:root{--bg:#06090f;--card:#0c1220;--card2:#0a0f1a;--line:#1b2940;--fg:#e2ecf8;--fg2:#8fa5c2;--fg3:#4f6580;--cy:#3fd0ff;--am:#ffcf4a;--rd:#ff5d6c;--gr:#2fe3a0;--vi:#a78bfa;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1100px 480px at 75% -8%,#0d1b31 0%,var(--bg) 55%);color:var(--fg);font:14px/1.55 -apple-system,Segoe UI,sans-serif}
.wrap{max-width:1320px;margin:0 auto;padding:24px 18px 70px}
h1{font-size:20px;margin:0 0 2px;letter-spacing:.4px}
.sub{color:var(--fg3);font-family:var(--mono);font-size:11px;margin-bottom:16px}
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:13px;margin-bottom:14px}
.dial{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:14px;padding:16px 17px;position:relative}
.dial h3,.c h3{margin:0 0 8px;font-size:10.5px;letter-spacing:1.6px;color:var(--fg2);font-weight:600}
.big{font-family:var(--mono);font-size:33px;font-weight:800;line-height:1}
.lab{font-family:var(--mono);font-size:11.5px;margin-top:4px}
.bar{height:7px;background:#101a2b;border-radius:5px;margin-top:10px;position:relative;overflow:hidden}
.bar i{position:absolute;top:0;bottom:0;width:2px;background:#fff6;left:50%}
.bar b{position:absolute;top:0;bottom:0;border-radius:5px}
.comp{color:var(--fg3);font-size:10px;margin-top:8px;font-family:var(--mono);line-height:1.7}
.spark{position:absolute;right:14px;top:14px;opacity:.9}
.dossier{background:linear-gradient(160deg,#0f1c31,#0a1322);border:1px solid #274668;border-radius:14px;padding:16px 20px;margin:0 0 14px;font-size:14px;line-height:1.7}
.dossier h3{margin:0 0 8px;font-size:10.5px;letter-spacing:1.8px;color:var(--cy)}
.dsrc{color:var(--fg3);font-size:10px;font-family:var(--mono);margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:13px}
.c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.wide{grid-column:1/-1}
.kv{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11.5px;color:var(--fg2);margin:5px 0;gap:8px}
.kv .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar{flex:1;height:6px;background:#0f1828;border-radius:4px;margin:0 4px;position:relative;min-width:40px}
.hbar b{position:absolute;top:0;bottom:0;border-radius:4px}
.tk{color:var(--cy);cursor:pointer}
.tag{display:inline-flex;gap:5px;align-items:baseline;font-family:var(--mono);font-size:10.5px;padding:3px 8px;border-radius:6px;border:1px solid var(--line);margin:2px 5px 2px 0;background:#0a111d}
.tag small{color:var(--fg3);font-size:9px}
.g{color:var(--gr)}.r{color:var(--rd)}.a{color:var(--am)}.cy{color:var(--cy)}.vi{color:var(--vi)}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11.5px}
td,th{padding:6px 8px;text-align:left;color:var(--fg2);border-bottom:1px solid #131f3200}
th{color:var(--fg3);font-size:10px;letter-spacing:1.2px;border-bottom:1px solid var(--line)}
tr:hover td{background:#0e1626}
td.num,th.num{text-align:right}
.chip{font-size:9.5px;padding:2px 7px;border-radius:10px;font-family:var(--mono)}
.chip.buy{background:#0d2b22;color:var(--gr);border:1px solid #1c4a3a}
.chip.sell{background:#2d1218;color:var(--rd);border:1px solid #52222c}
.chip.flat{background:#12203a;color:var(--cy);border:1px solid #22406b}
.feeds{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.feeds span{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:5px;background:#0a1420;border:1px solid var(--line);color:var(--fg3)}
.feeds span.dead{color:var(--rd);border-color:#52222c}
.load{color:var(--fg3);font-family:var(--mono);padding:44px;text-align:center}
svg text{font-family:var(--mono)}
@media(max-width:700px){.big{font-size:27px}}
</style></head><body><div class="wrap">
<h1>🕵️ INSTITUTIONAL FOOTPRINT — SURVEILLANCE DESK</h1>
<div class="sub" id="meta">Assembling dossier…</div>
<div id="app" class="load">Loading…</div>
<script src="/jh-nav-drawer.js" defer></script>
<script>
const fin=v=>Number.isFinite(v);
const F=v=>fin(v)||typeof v==='string'?v:'—';
const mUsd=v=>!fin(v)?'—':(v>0?'+':'−')+(Math.abs(v)>=1000?(Math.abs(v)/1000).toFixed(1)+'B':Math.abs(v).toFixed(0)+'M');
const bUsd=v=>!fin(v)?'—':(v>0?'+':'−')+'$'+Math.abs(v).toFixed(1)+'B';
const kCt=v=>!fin(v)?'—':(v>0?'+':'−')+Math.abs(v/1000).toFixed(0)+'k';
const col=v=>!fin(v)?'var(--fg3)':v>0?'var(--gr)':v<0?'var(--rd)':'var(--cy)';
const esc=s=>String(s??'').replace(/</g,'&lt;');
function spark(rows,key,w=120,h=34){
 const vs=rows.map(r=>r[key]).filter(fin); if(vs.length<3)return'';
 const mn=Math.min(...vs,0),mx=Math.max(...vs,0),rg=(mx-mn)||1;
 const pts=rows.filter(r=>fin(r[key])).map((r,i,a)=>`${(i/(a.length-1))*w},${h-((r[key]-mn)/rg)*h}`).join(' ');
 const zero=h-((0-mn)/rg)*h;
 return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
  <line x1="0" y1="${zero}" x2="${w}" y2="${zero}" stroke="#ffffff22"/>
  <polyline points="${pts}" fill="none" stroke="var(--cy)" stroke-width="1.6"/></svg>`;
}
function hbars(items,valKey,nmKey,fmt,max){
 const mx=max??Math.max(...items.map(x=>Math.abs(x[valKey])||0),1);
 return items.map(x=>{const v=x[valKey];const w=Math.min(100,Math.abs(v)/mx*100);
  return `<div class="kv"><span class="nm ${x._tk?'tk':''}" ${x._tk?`onclick="location='/dossier.html?t=${x[nmKey]}'"`:''}>${esc(x[nmKey])}</span>
   <span class="hbar"><b style="width:${w}%;${v>=0?'left:0;':'right:0;'}background:${col(v)}"></b></span>
   <b style="color:${col(v)};white-space:nowrap">${fmt(v)}</b></div>`}).join('');
}
function tenorChart(cb,title){
 if(!cb)return'';
 const ents=Object.entries(cb).map(([t,v])=>[+t,v]).sort((a,b)=>a[0]-b[0]);
 if(!ents.length)return'';
 const W=Math.max(300,ents.length*46),H=120,mx=Math.max(...ents.map(e=>Math.abs(e[1])),1),zero=H/2;
 const bars=ents.map(([t,v],i)=>{const bh=Math.abs(v)/mx*(H/2-16);const y=v>=0?zero-bh:zero;
  return `<rect x="${i*46+10}" y="${y}" width="26" height="${Math.max(2,bh)}" rx="3" fill="${v>=0?'var(--gr)':'var(--rd)'}"/>
   <text x="${i*46+23}" y="${H-2}" font-size="9" fill="var(--fg3)" text-anchor="middle">${t}y</text>
   <text x="${i*46+23}" y="${v>=0?y-4:y+bh+11}" font-size="9" fill="${v>=0?'var(--gr)':'var(--rd)'}" text-anchor="middle">${v>0?'+':''}${v}</text>`}).join('');
 return `<h3 style="margin-top:14px">${title}</h3><svg width="100%" viewBox="0 0 ${W} ${H}" style="max-width:${W}px">
  <line x1="0" y1="${zero}" x2="${W}" y2="${zero}" stroke="#ffffff22"/>${bars}</svg>`;
}
(async()=>{
 let d,AN;try{const[r1,r2]=await Promise.allSettled([fetch('data/institutional-footprint.json',{cache:'no-store'}),fetch('data/positioning-analog.json',{cache:'no-store'})]);
  if(r1.status==='fulfilled')d=await r1.value.json();
  if(r2.status==='fulfilled')AN=await r2.value.json()}catch(e){}
 const app=document.getElementById('app');
 if(!d||!d.posture){app.textContent='Feed unavailable — data/institutional-footprint.json failed strict JSON parse or fetch.';return}
 document.getElementById('meta').textContent=`${d.feeds_alive}/${d.feeds_total??18} source feeds · ${(d.generated_at||'').slice(0,16).replace('T',' ')} UTC · engine v${d.version}`;
 const P=d.posture,S=d.sectors||{},A=d.asset_classes||{},K=d.stocks||{},DP=d.dark_pool_footprint||{},CV=d.conviction_moves||[],L=d.asset_ledger||{},DS=d.dark_by_sector||{},PD=d.pd||{},SU=d.stocks_usd_13f||{},H=d.history||[];
 const usdMap={};[...(SU.buys||[]),...(SU.sells||[])].forEach(r=>{if(usdMap[r.t]===undefined)usdMap[r.t]=r.usd_m});
 const dial=(t,v,l,comps,sk)=>`<div class="dial">${sk||''}<h3>${t}</h3>
   <div class="big" style="color:${v>15?'var(--gr)':v<-15?'var(--rd)':'var(--cy)'}">${F(v)}</div>
   <div class="lab" style="color:${v>15?'var(--gr)':v<-15?'var(--rd)':'var(--cy)'}">${esc(l)}</div>
   <div class="bar"><b style="${v>=0?'left:50%':'right:50%'};width:${Math.min(48,Math.abs(v||0)/2)}%;background:${col(v)}"></b><i></i></div>
   <div class="comp">${Object.entries(comps||{}).map(([k,x])=>`${k} ${x>0?'+':''}${(+x).toFixed(0)}`).join(' · ')}</div></div>`;
 const dsRows=Object.entries(DS).map(([sec,v])=>({sec,usd_b:(v.dark_daily_usd_m_est??NaN)/1000,top:(v.top||[]).map(x=>x.t).join(' ')})).filter(r=>fin(r.usd_b));
 const clsRows=Object.entries(A.etf_net_5d_usd_m||{}).filter(([,v])=>fin(v)).map(([k,v])=>({k,v})).sort((a,b)=>b.v-a.v);
 const buys13=(K.institutions_buying_13f||[]).map(t=>({t,usd:usdMap[t]}));
 const sells13=(K.institutions_selling_13f||[]).map(t=>({t,usd:usdMap[t]}));
 const wholes=(DP.wholesaler_extremes||[]);
 const feedTags=Object.entries(d.feeds||{}).map(([k,ok])=>`<span class="${ok?'':'dead'}">${k.replace('.json','').replace('data/','')}</span>`).join('');
 app.className='';app.innerHTML=`
 <div class="hero">
  ${dial('WHAT THEY ARE DOING — RISK NOW',P.risk_now,P.now_label,P.now_components,spark(H,'now'))}
  ${dial('WHAT THEY ARE POSITIONING FOR — FORWARD',P.risk_forward,P.forward_label,P.fwd_components,spark(H,'fwd'))}
  <div class="dial">${spark(H,'dix')}<h3>DARK-POOL FOOTPRINT</h3>
   <div class="big" style="color:${DP.own_dix_pct>=57?'var(--gr)':DP.own_dix_pct<52?'var(--rd)':'var(--cy)'}">${F(DP.own_dix_pct)}%</div>
   <div class="lab">${esc(DP.read)} · accum <b class="g">${F(DP.accumulation_n)}</b> / dist <b class="r">${F(DP.distribution_n)}</b></div>
   <div class="comp">full-book dark tape ≈ <b class="cy">$${fin(H.at(-1)?.dark_b)?H.at(-1).dark_b:'—'}B/day</b> · wholesaler mo ${F(DP.month)}</div></div>
  <div class="dial"><h3>PRIMARY DEALERS — SETTLED UST BOOK</h3>
   <div class="big" style="color:${col(PD.net_treasury_b)}">${bUsd(PD.net_treasury_b)}</div>
   <div class="lab">coupons WoW ${bUsd(PD.wow_b)} · as of ${F(PD.as_of)}</div>
   <div class="comp">${esc(PD.read)}</div></div>
 </div>
 <div class="dossier"><h3>🧠 ANALYST DOSSIER</h3>${esc(d.ai_dossier)}<div class="dsrc">source: ${d.ai_dossier_src==='llm'?'LLM synthesis':'deterministic synthesis (LLM offline)'} · regenerated nightly 23:10 UTC</div></div>
 <div class="grid">
  <div class="c wide"><h3>ASSET LEDGER — LIT vs DARK vs FUTURES vs DEALERS</h3>
   <table><tr><th>CLASS</th><th class="num">LIT ETF 5d</th><th class="num">DARK 1d (est)</th><th class="num">CFTC NET-SPEC</th><th class="num">PD SETTLED</th><th>VERDICT</th></tr>
   ${Object.entries(L).map(([k,v])=>`<tr><td>${k}</td>
     <td class="num" style="color:${col(v.lit_etf_5d_usd_m)}">${mUsd(v.lit_etf_5d_usd_m)}</td>
     <td class="num cy">${fin(v.dark_daily_usd_m_est)?'$'+(v.dark_daily_usd_m_est/1000).toFixed(1)+'B':'—'}</td>
     <td class="num" style="color:${col(v.cftc_net_spec)}">${kCt(v.cftc_net_spec)}</td>
     <td class="num" style="color:${col(v.pd_net_usd_b)}">${fin(v.pd_net_usd_b)?bUsd(v.pd_net_usd_b):'—'}</td>
     <td><span class="chip ${v.verdict==='BUYING'?'buy':v.verdict==='SELLING'?'sell':'flat'}">${v.verdict}</span></td></tr>`).join('')}</table>
   <div class="comp">DARK = Σ per-name daily off-exchange volume × price (single-stock tape). CFTC in contracts; z-layer & risk-appetite arm automatically as the 7-week COT cache accrues to 12. PD = NY Fed settled inventory book.</div>
   ${tenorChart(PD.coupons_by_tenor_b,'PD TREASURY CURVE — NET SETTLED BY TENOR ($B)')}
  </div>
  <div class="c"><h3>DARK $/DAY BY SECTOR</h3>${hbars(dsRows.map(r=>({nm:r.sec+'  ·  '+r.top,v:r.usd_b})),'v','nm',v=>'$'+v.toFixed(1)+'B')}</div>
  <div class="c"><h3>SECTOR COMPLEXES — 5d $ FLOW</h3>
   ${hbars((S.buying||[]).map(x=>({nm:x.complex,v:x.usd_5d_m})),'v','nm',mUsd)}
   <div style="height:6px"></div>
   ${hbars((S.selling||[]).map(x=>({nm:x.complex,v:x.usd_5d_m})),'v','nm',mUsd)}</div>
  <div class="c"><h3>ASSET CLASSES — 5d ETF $</h3>${hbars(clsRows.map(r=>({nm:r.k,v:r.v})),'v','nm',mUsd)}
   <div class="comp">CFTC smart-money ${kCt(A.cftc&&A.cftc.smart_money_flow)} · risk-appetite ${F(A.cftc&&A.cftc.risk_appetite)} (arms ~5wks)</div></div>
  <div class="c"><h3>13F — INSTITUTIONS BUYING <small style="color:var(--fg3)">(position $)</small></h3>
   ${buys13.map(x=>`<span class="tag g"><b class="tk" onclick="location='/dossier.html?t=${x.t}'">${x.t}</b><small>${fin(x.usd)?'$'+(x.usd>=1000?(x.usd/1000).toFixed(1)+'B':x.usd.toFixed(0)+'M'):''}</small></span>`).join('')}
   <h3 style="margin-top:12px">13F — SELLING</h3>
   ${sells13.map(x=>`<span class="tag r"><b>${x.t}</b><small>${fin(x.usd)?'$'+(x.usd>=1000?(x.usd/1000).toFixed(1)+'B':x.usd.toFixed(0)+'M'):''}</small></span>`).join('')}</div>
  <div class="c"><h3>DARK-POOL ACCUMULATION</h3>
   ${(K.dark_pool_accumulation||[]).map(t=>`<span class="tag g tk" onclick="location='/dossier.html?t=${t}'">${t}</span>`).join('')||'—'}
   <h3 style="margin-top:12px">⚠ DISTRIBUTION INTO STRENGTH</h3>
   ${(K.distribution_into_strength||[]).map(t=>`<span class="tag a">${t}</span>`).join('')||'<div class="comp">none flagged today</div>'}
   ${(K.double_confirmed_buys||[]).length?`<h3 style="margin-top:12px">★ DOUBLE-CONFIRMED (13F ∩ DARK)</h3>${K.double_confirmed_buys.map(t=>`<span class="tag vi">${t}</span>`).join('')}`:''}
   <h3 style="margin-top:12px">WHOLESALER CONCENTRATION (real names)</h3>
   ${wholes.length?wholes.map(w=>`<div class="kv"><span class="tk" onclick="location='/dossier.html?t=${w.ticker}'">${w.ticker}</span><span style="color:var(--fg3);font-size:10px">${esc(w.top_firm)}</span><b class="a">${w.top_pct}%</b></div>`).join(''):'<div class="comp">no concentrated names above filters</div>'}</div>
  ${AN&&AN.analogs?`<div class="c wide"><h3>🔮 CRISIS ANALOGS & FORWARD MAP <small style="color:var(--fg3)">· ${AN.panel_weeks}w panel since ${(AN.method.match(/since (\d{4}-\d{2}-\d{2})/)||[])[1]||'1997'} · ${AN.dims} dims</small></h3>
   <div class="lab" style="color:${AN.verdict.includes('CRISIS')?'var(--rd)':AN.verdict.includes('TOP')?'var(--am)':'var(--cy)'};margin-bottom:8px">${esc(AN.verdict)} — condition-space match, not a price forecast</div>
   <table><tr><th>ANALOG WEEK</th><th>EPISODE</th><th class="num">SIMILARITY</th><th class="num">SPX +1M</th><th class="num">SPX +3M</th></tr>
   ${AN.analogs.map(a=>`<tr><td>${a.date}</td><td style="color:${a.label==='unlabeled regime'?'var(--fg3)':'var(--am)'}">${esc(a.label)}</td>
     <td class="num cy">${a.similarity}</td>
     <td class="num" style="color:${col(a.spx_fwd_1m_pct)}">${fin(a.spx_fwd_1m_pct)?(a.spx_fwd_1m_pct>0?'+':'')+a.spx_fwd_1m_pct+'%':'—'}</td>
     <td class="num" style="color:${col(a.spx_fwd_3m_pct)}">${fin(a.spx_fwd_3m_pct)?(a.spx_fwd_3m_pct>0?'+':'')+a.spx_fwd_3m_pct+'%':'—'}</td></tr>`).join('')}</table>
   <div class="comp">forward map: median +1m <b style="color:${col(AN.forward_stats.median_fwd_1m_pct)}">${F(AN.forward_stats.median_fwd_1m_pct)}%</b> · median +3m <b style="color:${col(AN.forward_stats.median_fwd_3m_pct)}">${F(AN.forward_stats.median_fwd_3m_pct)}%</b> · up 3m <b class="cy">${F(AN.forward_stats.hit_rate_up_3m)}%</b> of analogs · today z: ${Object.entries(AN.vector_today_z).map(([k,v])=>k+' '+(v>0?'+':'')+v).join(' · ')}</div>
   <div class="dossier" style="margin:10px 0 0;padding:12px 14px"><h3>🧠 HISTORIAN OUTLOOK</h3>${esc(AN.ai_outlook)}<div class="dsrc">source: ${AN.ai_outlook_src==='llm'?'LLM synthesis':'deterministic synthesis'} · daily 22:40 UTC</div></div></div>`:''}
  <div class="c wide"><h3>CONVICTION MOVES</h3>
   <table><tr><th>TICKER</th><th>SIGNAL</th><th>SECTOR</th><th>STAGE</th><th class="num">13F $</th></tr>
   ${CV.map(x=>`<tr><td class="tk" onclick="location='/dossier.html?t=${x.ticker}'">${x.ticker}</td>
     <td style="color:${x.signal.includes('DIST')?'var(--am)':x.signal.includes('13F')?'var(--vi)':'var(--gr)'}">${esc(x.signal)}</td>
     <td>${F(x.sector)}</td><td>${F(x.stage)}</td>
     <td class="num">${fin(usdMap[x.ticker])?'$'+(usdMap[x.ticker]>=1000?(usdMap[x.ticker]/1000).toFixed(1)+'B':usdMap[x.ticker].toFixed(0)+'M'):'—'}</td></tr>`).join('')}</table></div>
 </div>
 <div class="c" style="margin-top:13px"><h3>SOURCE FEEDS ${d.feeds_alive}/${d.feeds_total??''}</h3><div class="feeds">${feedTags}</div>
  <div class="comp" style="margin-top:8px">${esc(d.method)}</div></div>`;
})();
</script></div>
<script defer src="/jh-page-ai.js"></script>
</body></html>
