<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACM Term Premium — JustHodl.AI</title>
<style>
:root{--bg:#0a0e14;--bg-2:#111722;--card:#0e1420;--line:#1e2836;--fg:#dfe7f3;--fg-2:#9db0c8;--fg-3:#5c6f88;--cyan:#46c8ff;--amber:#ffd24a;--red:#ff5d6c;--green:#37d99a;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:26px 18px 60px}
h1{font-size:21px;margin:0 0 4px;letter-spacing:.4px}
.sub{color:var(--fg-3);font-family:var(--mono);font-size:11.5px;margin-bottom:22px}
.hero{display:flex;gap:22px;align-items:center;background:linear-gradient(135deg,var(--card),var(--bg-2));border:1px solid var(--line);border-radius:14px;padding:22px 26px;margin-bottom:20px;flex-wrap:wrap}
.score{font-family:var(--mono);font-size:54px;font-weight:700;line-height:1}
.phase{font-family:var(--mono);font-size:12.5px;letter-spacing:2px;padding:7px 14px;border-radius:8px;border:1px solid var(--line);background:var(--bg-2)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:14px;margin-bottom:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.card h3{margin:0 0 8px;font-size:12px;letter-spacing:1.4px;color:var(--fg-2);font-weight:600}
.big{font-family:var(--mono);font-size:24px;font-weight:700}
.kv{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--fg-2);margin-top:4px}
.note{color:var(--fg-3);font-size:11px;margin-top:9px;line-height:1.45}
.method{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:13px 16px;color:var(--fg-2);font-size:12px;line-height:1.6}
.g{color:var(--green)}.a{color:var(--amber)}.r{color:var(--red)}.c{color:var(--cyan)}
.loading{color:var(--fg-3);font-family:var(--mono);padding:40px;text-align:center}
</style></head><body><div class="wrap">
<h1>📐 ACM TERM PREMIUM — NY FED, REAL SERIES</h1>
<div class="sub" id="sub">Loading Adrian-Crump-Moench daily term premia…</div>
<div id="app" class="loading">Loading…</div>
<script src="/jh-nav-drawer.js" defer></script>
<script>
const PX=['','https://s3.amazonaws.com/justhodl-dashboard-live/'];
async function getJSON(k){for(const p of PX){try{const r=await fetch(p+k,{cache:'no-store'});if(r.ok)return await r.json()}catch(e){}}return null}
const lc=l=>({SUPPRESSED:'g',NEGATIVE:'g',LOW_NORMAL:'c',ELEVATED:'a',HIGH:'r'}[l]||'c');
const mc=m=>({SPIKING:'r',RISING:'a',STABLE:'c',FALLING:'g',COLLAPSING:'a'}[m]||'c');
(async()=>{
 const d=await getJSON('data/term-premium.json');
 const app=document.getElementById('app');
 if(!d||!d.latest){app.textContent='Feed unavailable.';return}
 const L=d.latest,D=d.deltas_bps||{},R=d.regime||{},X=d.decomposition||{},C=d.curve||{};
 document.getElementById('sub').innerHTML=`${d.series_n.toLocaleString()} daily obs since ${d.first_date} · source ${d.source} · ${L.date}`;
 app.className='';app.innerHTML=`
 <div class="hero">
   <div><div class="score ${lc(R.level)}">${L.tp10.toFixed(2)}%</div>
   <div style="color:var(--fg-3);font-family:var(--mono);font-size:11px">10-year term premium</div></div>
   <div class="phase ${lc(R.level)}">${(R.level||'').replace(/_/g,' ')}</div>
   <div class="phase ${mc(R.momentum)}">${R.momentum||''} · Δ21d ${(D.d21>0?'+':'')+(D.d21??'—')}bps</div>
 </div>
 <div class="grid">
  <div class="card"><h3>DECOMPOSITION — WHY IS THE 10Y WHERE IT IS</h3>
    <div class="big c">${X.acm_fitted_10y_pct?.toFixed(2)}%</div>
    <div class="kv"><span>expectations (risk-neutral)</span><b class="g">${X.risk_neutral_10y_pct?.toFixed(2)}%</b></div>
    <div class="kv"><span>term premium</span><b class="${lc(R.level)}">${X.term_premium_10y_pct?.toFixed(2)}%</b></div>
    <div class="note">${X.read||''} — vigilante episodes are premium shocks, not path shocks.</div></div>
  <div class="card"><h3>MOMENTUM (bps)</h3>
    <div class="kv"><span>Δ 5d</span><b>${(D.d5>0?'+':'')+(D.d5??'—')}</b></div>
    <div class="kv"><span>Δ 21d</span><b>${(D.d21>0?'+':'')+(D.d21??'—')}</b></div>
    <div class="kv"><span>Δ 63d</span><b>${(D.d63>0?'+':'')+(D.d63??'—')}</b></div>
    <div class="note">+25/+45bps per month = board −1/−2 (risk repricing); mirrored on collapse.</div></div>
  <div class="card"><h3>WHERE IN HISTORY</h3>
    <div class="big">${d.pctile_full_history}<span style="font-size:13px">th pct</span></div>
    <div class="kv"><span>z vs trailing 10y</span><b>${d.z_10y??'—'}</b></div>
    <div class="note">Percentile vs full daily history since ${d.first_date.slice(0,4)}.</div></div>
  <div class="card"><h3>PREMIUM CURVE</h3>
    <div class="kv"><span>TP 2y</span><b>${C.tp2?.toFixed(2)}%</b></div>
    <div class="kv"><span>TP 5y</span><b>${C.tp5?.toFixed(2)}%</b></div>
    <div class="kv"><span>TP 10y</span><b>${C.tp10?.toFixed(2)}%</b></div>
    <div class="kv"><span>10y−2y</span><b>${(C.tp10_minus_tp2_bps>0?'+':'')+C.tp10_minus_tp2_bps}bps</b></div></div>
 </div>
 <div id="chart-anchor"><h1 style="font-size:14px;letter-spacing:1.5px;color:var(--fg-2)">10Y TERM PREMIUM — 15 YEARS (WEEKLY, %)</h1></div>
 <div class="method" style="margin-top:18px"><b>METHOD</b> — ${d.method||''} Published into the fleet's <code>term_premium_proxy_bps</code> field via the yield-curve engine, so cycle-clock and all readers inherit the real series automatically.</div>`;
 const s=document.createElement('script');s.src='/jh-enhance.js';
 s.setAttribute('data-feed','data/term-premium.json');
 s.setAttribute('data-line','history_chart');
 s.setAttribute('data-crisis','1');
 document.getElementById('chart-anchor').appendChild(s);
})();
</script></div>
<script defer src="/jh-page-ai.js"></script>
</body></html>
