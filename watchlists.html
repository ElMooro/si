<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Watchlists · JustHodl.AI</title>
<link rel="stylesheet" href="/jh-theme.css">
<style>
  body{margin:0;font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--jh-bg,#0C0B09);color:var(--jh-ink,#e8e2d4)}
  .wrap{display:flex;height:100vh;overflow:hidden}
  .side{width:330px;flex-shrink:0;border-right:1px solid var(--jh-line,#2B2820);display:flex;flex-direction:column;background:var(--jh-panel,#12110C)}
  .side h1{font-size:14px;margin:0;padding:14px 14px 8px}
  .side .sub{font-size:11px;color:var(--jh-dim,#8a836f);padding:0 14px 10px}
  #q{margin:0 14px 10px;padding:8px 10px;background:var(--jh-panel-2,#17150E);border:1px solid var(--jh-line,#2B2820);border-radius:7px;color:inherit;font-size:12px}
  #lists{overflow-y:auto;flex:1;padding:0 6px 20px}
  .li{padding:8px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;display:flex;gap:8px;align-items:center}
  .li:hover{background:var(--jh-panel-2,#17150E)}
  .li.on{background:rgba(240,180,41,.14);color:var(--jh-amber,#F0B429);font-weight:600}
  .li .n{margin-left:auto;font-size:10.5px;color:var(--jh-dim,#8a836f);font-family:'IBM Plex Mono',monospace}
  .main{flex:1;overflow-y:auto;padding:20px 24px 60px}
  .main h2{font-size:17px;margin:0 0 6px}
  .meta{font-size:11.5px;color:var(--jh-dim,#8a836f);margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:6px}
  .sym{padding:7px 9px;border:1px solid var(--jh-line,#2B2820);border-radius:6px;font-size:11.5px;font-family:'IBM Plex Mono',monospace;display:flex;gap:6px;align-items:center}
  .badge{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
  .b-FRED{background:rgba(111,206,138,.16);color:#6fce8a}
  .b-STOOQ{background:rgba(240,180,41,.16);color:#F0B429}
  .b-COINGECKO{background:rgba(122,162,247,.16);color:#7aa2f7}
  .b-FORMULA{background:rgba(199,146,234,.16);color:#c792ea}
  .b-NONE{background:rgba(224,122,106,.14);color:#E07A6A}
</style></head><body>
<div class="wrap">
  <div class="side">
    <h1>📋 My Watchlists</h1>
    <div class="sub" id="side-sub">loading…</div>
    <input id="q" placeholder="Search lists…" autocomplete="off">
    <div id="lists"></div>
  </div>
  <div class="main">
    <h2 id="title">Select a watchlist</h2>
    <div class="meta" id="meta"></div>
    <div class="grid" id="syms"></div>
  </div>
</div>
<script src="/jh-nav-drawer.js?v=3335"></script>
<script>
(function(){
  var CDN='https://justhodl-data-proxy.raafouis.workers.dev';
  var LISTS=[], MAP={}, DICT={}, cur=null;
  var esc=function(x){return String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;');};
  Promise.all([
    fetch(CDN+'/data/tv-watchlists.json?t='+Date.now()).then(function(r){return r.json();}),
    fetch(CDN+'/data/symbol-map.json?t='+Date.now()).then(function(r){return r.ok?r.json():{map:{}};}).catch(function(){return {map:{}};}),
    fetch(CDN+'/data/symbol-dictionary.json?t='+Date.now()).then(function(r){return r.ok?r.json():{dictionary:{}};}).catch(function(){return {dictionary:{}};})
  ]).then(function(res){
    LISTS=(res[0].lists||[]).filter(function(l){return !String(l.id||'').startsWith('e2e-');});
    MAP=(res[1]&&res[1].map)||{};
    DICT=(res[2]&&res[2].dictionary)||{};
    LISTS.sort(function(a,b){return (b.symbols||[]).length-(a.symbols||[]).length;});
    var tot=LISTS.reduce(function(s,l){return s+(l.symbols||[]).length;},0);
    document.getElementById('side-sub').textContent=LISTS.length+' lists · '+tot.toLocaleString()+' symbols';
    render(''); if(LISTS.length) open(0);
  }).catch(function(e){document.getElementById('side-sub').textContent='feed unavailable';});

  function render(q){
    var el=document.getElementById('lists'); q=(q||'').toLowerCase();
    el.innerHTML=LISTS.map(function(l,i){
      if(q && String(l.name||'').toLowerCase().indexOf(q)<0) return '';
      return '<div class="li'+(cur===i?' on':'')+'" data-i="'+i+'"><span>'+esc(l.name)+'</span><span class="n">'+(l.symbols||[]).length+'</span></div>';
    }).join('');
    Array.prototype.forEach.call(el.querySelectorAll('.li'),function(d){
      d.onclick=function(){open(+d.getAttribute('data-i'));};
    });
  }
  function open(i){
    cur=i; var l=LISTS[i]; if(!l) return;
    render(document.getElementById('q').value);
    document.getElementById('title').textContent=l.name;
    var syms=l.symbols||[];
    var resolved=syms.filter(function(s){var m=MAP[s.toUpperCase()];return m&&m.source;}).length;
    var named=syms.filter(function(x){return (DICT[x.toUpperCase()]||{}).name;}).length;
    document.getElementById('meta').innerHTML=syms.length+' indicators · <b style="color:var(--jh-green,#6fce8a)">'+resolved+'</b> priced from a free source ('+Math.round(100*resolved/Math.max(1,syms.length))+'%) · <b>'+named+'</b> with full names';
    document.getElementById('syms').innerHTML=syms.map(function(s){
      var K=s.toUpperCase(); var m=MAP[K]||{}; var d=DICT[K]||{};
      var src=m.source||d.source||'NONE';
      var srcTicker=(m.id||d.source_id||'');
      var pretty=(src==='FRED'?'FRED: '+srcTicker:(src==='WORLDBANK'?'World Bank: '+String(srcTicker).replace('|',' · '):(srcTicker?src+': '+srcTicker:'')));
      var meta=[d.units,d.frequency&&('freq '+d.frequency),d.history].filter(Boolean).join(' · ');
      return '<div class="sym" style="display:block">'+
        '<div style="display:flex;gap:6px;align-items:center">'+
          '<span style="font-weight:600">'+esc(d.name||s)+'</span>'+
          '<span class="badge b-'+src+'" style="margin-left:auto">'+src+'</span>'+
        '</div>'+
        '<div style="font-size:10px;color:var(--jh-dim,#8a836f);margin-top:3px">'+esc(s)+(pretty?'  →  <b style="color:var(--jh-amber,#F0B429)">'+esc(pretty)+'</b>':'')+'</div>'+
        (meta?'<div style="font-size:9.5px;color:var(--jh-dim,#8a836f);margin-top:2px">'+esc(meta)+'</div>':'')+
      '</div>';
    }).join('');
  }
  document.getElementById('q').oninput=function(){render(this.value);};
})();
</script>
</body></html>
