<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sector Emergence · Early-Innings Bull Detection · JustHodl</title>
<style>
:root{--bg:#0a0e14;--bg-1:#121822;--bg-2:#1a2330;--border:#24303f;--fg-0:#e8eef6;--fg-1:#aebccd;--fg-2:#7c8ba0;--fg-3:#536074;--green:#3fd68c;--amber:#f5b343;--red:#ff5c6c;--cyan:#46c8ff;--violet:#a78bfa;--mono:'SF Mono',ui-monospace,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg-0);font-family:var(--sans);line-height:1.5}
.wrap{max-width:1000px;margin:0 auto;padding:22px 16px 80px}
h1{font-size:21px;margin:0 0 2px}.sub{color:var(--fg-2);font-size:13px;margin-bottom:12px;max-width:820px}
.meta{color:var(--fg-3);font-family:var(--mono);font-size:11px;margin-bottom:14px}
.legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;font-size:10.5px}
.lg{padding:3px 8px;border-radius:6px;font-family:var(--mono);font-weight:700}
.card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:10px}
.card.emerging{border-color:var(--green);box-shadow:0 0 0 1px rgba(63,214,140,.25)}
.top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tk{font-family:var(--mono);font-weight:700;font-size:15px}.nm{color:var(--fg-1);font-size:13px;flex:1}
.badge{font-family:var(--mono);font-weight:700;font-size:11px;padding:3px 9px;border-radius:6px}
.score{font-family:var(--mono);font-weight:700;font-size:17px}
.bars{display:flex;gap:14px;margin:8px 0 6px;font-size:10.5px;color:var(--fg-2)}
.bars b{color:var(--fg-0);font-family:var(--mono)}
.sigs{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.sig{background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--cyan)}
.fals{font-size:11px;color:var(--fg-3);font-family:var(--mono);margin-top:4px}.fals b{color:var(--amber)}
.note{color:var(--fg-3);font-size:11px;margin-top:18px;line-height:1.6}a{color:var(--cyan)}
.loading{padding:50px;text-align:center;color:var(--fg-2)}
</style></head><body><div class="wrap" id="wrap"><div class="loading">Scanning for emerging bulls…</div></div>
<script>
const PROXY="https://justhodl-data-proxy.raafouis.workers.dev";
async function gj(p){try{const r=await fetch(`https://justhodl.ai/${p}?t=${Date.now()}`);if(r.ok)return await r.json();}catch(e){}try{const r=await fetch(`${PROXY}/${p}?t=${Date.now()}`);if(r.ok)return await r.json();}catch(e){}return null;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
const SC={EMERGING:'var(--green)',CONFIRMED:'var(--cyan)',BASING:'var(--violet)',TRANSITION:'var(--amber)',EXTENDED:'var(--amber)',DECLINING:'var(--red)'};
(async function(){
  const d=await gj('data/sector-emergence.json');const w=document.getElementById('wrap');
  if(!d||!d.ok){w.innerHTML='<h1>Sector Emergence</h1><div class="loading">No read yet — updates daily 22:00 UTC.</div>';return;}
  let h=`<h1>🌱 Sector Emergence <span style="color:var(--fg-3);font-size:13px">early-innings bull detection</span></h1>`;
  h+=`<div class="sub">${esc(d.thesis||'')}</div>`;
  h+=`<div class="meta">regime: ${esc(d.regime_context||'—')} · ${(d.generated_at||'').slice(0,16).replace('T',' ')}Z</div>`;
  h+=`<div class="legend">`;
  for(const[k,v] of Object.entries(d.legend||{})){h+=`<span class="lg" style="color:${SC[k]};border:1px solid ${SC[k]}">${k}</span>`;}
  h+=`</div>`;
  for(const o of d.sectors){
    const c=SC[o.stage]||'var(--fg-2)';
    h+=`<div class="card ${o.stage==='EMERGING'?'emerging':''}">
      <div class="top"><span class="tk" style="color:${c}">${esc(o.ticker)}</span><span class="nm">${esc(o.name)}</span>
        <span class="badge" style="color:${c};background:${c}1a;border:1px solid ${c}">${esc(o.stage)}</span>
        <span class="score" style="color:${c}">${o.emergence_score}</span></div>
      <div class="bars"><span>RS <b>${o.rs_score}</b></span><span>Trend <b>${o.trend_score}</b></span><span>Breadth <b>${o.breadth_score}</b></span><span>Mom <b>${o.momentum_score}</b></span><span>RS slope <b>${o.rs_slope_50d_pct>0?'+':''}${o.rs_slope_50d_pct}%</b></span><span>${o.pct_above_50dma}% &gt;50dMA</span></div>`;
    if((o.signals||[]).length){h+=`<div class="sigs">${o.signals.map(s=>`<span class="sig">${esc(s)}</span>`).join('')}</div>`;}
    h+=`<div class="fals"><b>falsifier:</b> ${esc(o.falsifier)}</div></div>`;
  }
  h+=`<div class="note">Detection is staged (Weinstein/O'Neil): RS inflection → reclaim of a rising 150-day MA → breadth broadening → early (not extended) momentum, plus EPS-revision / flow / cycle confirmation. Weighted toward the leading signals because earlier = noisier. <b>EMERGING</b> = the target (early Stage 2); <b>CONFIRMED</b> works but is later; <b>BASING</b> is a watch-list. EMERGING calls are logged and graded forward vs SPY. Research, not investment advice.</div>`;
  w.innerHTML=h;
})();
</script>  <script src="/jh-page-ai.js" defer></script>
<script src="/jh-nav-drawer.js" defer></script>
</body></html>
