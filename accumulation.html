<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accumulation / Distribution Radar · JustHodl</title>
<style>
:root{--bg:#0a0e14;--fg:#e6edf3;--fg2:#9aa5b1;--fg3:#6b7480;--bd:#1d242e;--card:#0f141b;
--grn:#34d399;--red:#f87171;--amb:#fbbf24;--cyan:#38bdf8;--vio:#a78bfa}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:24px 16px 90px}
.hd{border-bottom:1px solid var(--bd);padding-bottom:12px;margin-bottom:14px}
h1{font-size:21px;margin:0 0 2px;letter-spacing:-.3px}.sub{color:var(--fg2);font-size:12.5px}.meta{color:var(--fg3);font-size:11.5px;margin-top:3px}
.thesis{background:var(--card);border:1px solid var(--bd);border-left:3px solid var(--vio);border-radius:8px;padding:11px 14px;font-size:12.5px;color:var(--fg2);line-height:1.5;margin-bottom:8px}
.sec{margin:22px 0 4px;font-size:15px;font-weight:700;letter-spacing:.3px}
.sec.top{color:var(--red)}.sec.bot{color:var(--grn)}.sec .n{color:var(--fg3);font-weight:400;font-size:11.5px}
.grp{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:8px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:9px;padding:9px 11px;position:relative;overflow:hidden}
.card.t{border-left:3px solid var(--red)}.card.b{border-left:3px solid var(--grn)}
.card.acc{border-left:3px solid var(--cyan)}.card.dist{border-left:3px solid var(--amb)}
.r1{display:flex;justify-content:space-between;align-items:baseline}
.tk{font-weight:700;font-size:14.5px}.lb{color:var(--fg3);font-size:11px;font-weight:400}
.ph{font-size:9px;font-weight:700;letter-spacing:.3px;border-radius:4px;padding:2px 6px;text-transform:uppercase}
.l2{font-size:11px;color:var(--fg2);margin-top:5px;line-height:1.55}
.k{color:var(--fg3)}
.div-b{color:var(--red);font-weight:600}.div-u{color:var(--grn);font-weight:600}
.bar{height:4px;border-radius:2px;background:#1a212b;margin-top:7px;overflow:hidden}
.bar>span{display:block;height:100%}
.foot{color:var(--fg3);font-size:11px;margin-top:24px;line-height:1.55}.loading{color:var(--fg3);padding:40px 0}
.tabs{display:flex;gap:6px;margin:6px 0 0}.tab{font-size:12px;color:var(--fg3);border:1px solid var(--bd);border-radius:6px;padding:4px 10px;cursor:pointer}.tab.on{color:var(--fg);border-color:var(--fg3);background:var(--card)}
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.chp{font-size:9.5px;font-weight:700;border:1px solid #2a3444;border-radius:3px;padding:0 4px;background:#0d131d}
</style></head><body><div class="wrap" id="w"><div class="loading">Loading accumulation / distribution radar…</div></div>
<script>
const PROXY="https://justhodl-data-proxy.raafouis.workers.dev";
async function gj(p){try{const r=await fetch(`https://justhodl.ai/${p}?t=${Date.now()}`);if(r.ok)return r.json();}catch(e){}try{const r=await fetch(`${PROXY}/${p}?t=${Date.now()}`);if(r.ok)return r.json();}catch(e){}return null;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
const PHC={ACCUMULATION:'var(--cyan)',MARKUP:'var(--grn)',DISTRIBUTION:'var(--amb)',MARKDOWN:'var(--red)',NEUTRAL:'var(--fg3)'};
function metric(r){
  const div=r.divergence==='bearish'?'<span class="div-b">bearish div</span>':r.divergence==='bullish'?'<span class="div-u">bullish div</span>':'';
  return `<span class="k">RSI</span> ${r.rsi==null?'—':r.rsi} · <span class="k">vs200</span> ${r.pct_vs_200dma==null?'—':(r.pct_vs_200dma>0?'+':'')+r.pct_vs_200dma+'%'} · <span class="k">range</span> ${r.range_pos_pct==null?'—':r.range_pos_pct+'%'}<br><span class="k">CMF</span> ${r.cmf} · <span class="k">OBV</span> ${r.obv_trend>0?'+':''}${r.obv_trend}${div?' · '+div:''}`;
}
function card(r,kind){
  const ph=PHC[r.phase]||'var(--fg3)';
  const sv=kind==='t'?r.top_score:kind==='b'?r.bottom_score:(r.phase==='DISTRIBUTION'?r.top_score:r.bottom_score);
  const sc=kind==='t'||r.phase==='DISTRIBUTION'?'var(--red)':'var(--grn)';
  return `<div class="card ${kind}"><div class="r1"><span class="tk">${esc(r.ticker)} ${r.label?'<span class="lb">'+esc(r.label)+'</span>':''}</span>`
   +`<span class="ph" style="color:${ph};border:1px solid ${ph}55">${esc(r.phase)}</span></div>`
   +`<div class="l2">${metric(r)}</div>`
   +chips(r)
   +`<div class="bar"><span style="width:${Math.min(100,sv)}%;background:${sc}"></span></div></div>`;
}
function chips(r){
  const c=[];
  if(r.dark_pool&&r.dark_pool.state&&r.dark_pool.state!=='NEUTRAL')c.push(`<span class="chp" style="color:${r.dark_pool.state==='ACCUMULATION'?'var(--grn)':'var(--red)'}">DP ${r.dark_pool.state.slice(0,4)}${r.dark_pool.pct!=null?' '+r.dark_pool.pct+'%':''}</span>`);
  if(r.whale_flow_usd!=null&&Math.abs(r.whale_flow_usd)>=25e6)c.push(`<span class="chp" style="color:${r.whale_flow_usd>0?'var(--grn)':'var(--red)'}">🐋 ${(r.whale_flow_usd>0?'+':'−')+'$'+(Math.abs(r.whale_flow_usd)/1e6).toFixed(0)}M</span>`);
  if(r.wyckoff&&r.wyckoff.phase)c.push(`<span class="chp" style="color:var(--cy,#4fc3f7)">WYCKOFF ${r.wyckoff.phase.slice(0,6)}${r.wyckoff.begin?' since '+r.wyckoff.begin.slice(5):''}</span>`);
  if(r.insider)c.push(`<span class="chp" style="color:${r.insider==='BUY_CLUSTER'?'var(--grn)':'var(--red)'}">INSIDER ${r.insider==='BUY_CLUSTER'?'BUYS':'SELLS'}</span>`);
  if(!c.length)return '';
  const n=r.confirm_n>=2?`<span class="chp" style="color:var(--gold,#e8c86a);font-weight:800">★${r.confirm_n} CONFIRM</span>`:'';
  return `<div class="chips">${n}${c.join('')}</div>`;
}
function revCard(r, kind){
  const good = kind === 'b';
  const ac = good ? 'var(--grn)' : 'var(--red)';
  const tierC = r.tier === 'CONFIRMED' ? 'var(--gold,#e8c86a)' : 'var(--fg3)';
  const chps = [];
  if (good && r.breakout) chps.push('<span class="chp" style="color:var(--grn);font-weight:800">BREAKOUT</span>');
  if (!good && r.breakdown) chps.push('<span class="chp" style="color:var(--red);font-weight:800">BREAKDOWN</span>');
  chps.push(`<span class="chp" style="color:${r.vol_ratio_today>=1.5?'var(--gold,#e8c86a)':'var(--fg3)'}" title="today's volume vs the 50-day average — ≥1.5× = institutional participation confirming the move">🔊 ${r.vol_ratio_today}×</span>`);
  if (good && r.up_down_vol_20d != null) chps.push(`<span class="chp" style="color:${r.up_down_vol_20d>=1.3?'var(--grn)':'var(--fg3)'}" title="up-day volume ÷ down-day volume, 20 sessions — >1.3 = accumulation tape">U/D ${r.up_down_vol_20d}</span>`);
  if (!good && r.distribution_days_25 != null) chps.push(`<span class="chp" style="color:${r.distribution_days_25>=5?'var(--red)':'var(--fg3)'}" title="down days on rising volume in 25 sessions — ≥5 marks tops (IBD)">DIST ${r.distribution_days_25}d</span>`);
  if (r.obv_bull_div) chps.push('<span class="chp" style="color:var(--grn)" title="OBV made a higher high while price did not — volume leads price up (Granville)">OBV÷↑</span>');
  if (r.obv_bear_div) chps.push('<span class="chp" style="color:var(--red)" title="price made a higher high but OBV did not — volume abandoning the rally">OBV÷↓</span>');
  if (r.golden_cross_sessions_ago) chps.push(`<span class="chp" style="color:var(--grn)" title="50DMA crossed above the 200DMA — lagging but powerful trend confirmation">GOLDEN ✕ ${r.golden_cross_sessions_ago}d ago</span>`);
  if (r.death_cross_sessions_ago) chps.push(`<span class="chp" style="color:var(--red)" title="50DMA crossed below the 200DMA — the downtrend is now structural">DEATH ✕ ${r.death_cross_sessions_ago}d ago</span>`);
  if (r.capitulation) chps.push('<span class="chp" style="color:var(--gold,#e8c86a)" title="climactic volume at the low — seller exhaustion">CAPITULATION</span>');
  if (r.phase) chps.push(`<span class="chp" style="color:var(--cy,#4fc3f7)">${esc(r.phase)}</span>`);
  const pos = good ? `+${r.pct_off_252d_low}% off the 252d low` : `${r.pct_off_252d_high}% off the 252d high`;
  return `<div class="card ${kind}"><div class="r1"><span class="tk">${esc(r.ticker)}</span><span class="ph" style="color:${tierC};border:1px solid ${tierC}55">${esc(r.tier)}</span></div>`
   + `<div class="l2">${pos}</div><div class="chips">${chps.join('')}</div>`
   + `<div style="font-size:10.5px;color:var(--fg3);margin-top:4px">${(r.evidence||[]).slice(0,4).map(esc).join(' · ')}</div>`
   + `<div class="bar"><span style="width:${Math.min(100,r.score)}%;background:${ac}"></span></div></div>`;
}
function reversalSection(d){
  const rv = d.reversals || {};
  const bt = rv.bottoms || [], tp = rv.tops || [];
  let h = '<div class="sec" style="border:1px solid var(--grn);border-radius:10px;padding:10px 12px;margin:14px 0;background:#07130c" id="rev-bottoms">';
  h += '<h2 style="color:var(--grn);margin:0 0 2px">⬆ TREND REVERSALS — bottomed, now turning up</h2>';
  h += '<div style="font-size:11px;color:var(--fg3);margin-bottom:8px">Prior downtrend + a <b>dated trigger inside 12–15 sessions</b> (50DMA reclaim, 3-month breakout, or golden cross). <b>CONFIRMED</b> = the trigger printed on ≥1.5× the 50-day volume — institutions, not drift.</div>';
  h += bt.length ? `<div class="grid">${bt.map(r=>revCard(r,'b')).join('')}</div>` : '<div class="grp" style="color:var(--fg3)">no fresh bottom reversals today — honest zero beats a forced list</div>';
  h += '</div>';
  h += '<div class="sec" style="border:1px solid var(--red);border-radius:10px;padding:10px 12px;margin:14px 0;background:#160a0c" id="rev-tops">';
  h += '<h2 style="color:var(--red);margin:0 0 2px">⬇ TREND REVERSALS — topped, dump starting</h2>';
  h += '<div style="font-size:11px;color:var(--fg3);margin-bottom:8px">Prior uptrend within 3% of the 252-day high + a dated break: 50DMA loss, 3-month breakdown, or death cross. Conviction selling = ≥1.5× volume on the break and/or ≥5 distribution days in 25 sessions.</div>';
  h += tp.length ? `<div class="grid">${tp.map(r=>revCard(r,'t')).join('')}</div>` : '<div class="grp" style="color:var(--fg3)">no fresh top reversals today</div>';
  h += '</div>';
  const m = rv.method || {};
  h += '<div class="sec" style="border:1px solid var(--fg3);border-radius:10px;padding:10px 12px;margin:14px 0" id="rev-method">';
  h += '<h2 style="color:var(--cy,#4fc3f7);margin:0 0 6px">📚 How we call reversals — and what the volume means</h2>';
  h += '<div style="font-size:11.5px;line-height:1.55;color:var(--fg2,#c9d4e6)">';
  h += '<b style="color:var(--grn)">Bottoms:</b> ' + (m.bottom_signals||[]).map(esc).join(' → ') + '.<br>';
  h += '<b style="color:var(--red)">Tops:</b> ' + (m.top_signals||[]).map(esc).join(' → ') + '.<br><br>';
  h += '<b style="color:var(--gold,#e8c86a)">Volume — how to read it and trade it:</b><br>' + (m.volume_guide||[]).map(x=>'• '+esc(x)).join('<br>');
  h += '<br><br><span style="color:var(--fg3)">Grounding: ' + (m.citations||[]).map(esc).join(' · ') + '.</span></div></div>';
  return h;
}
function confirmedSection(d){
  const cb=d.confirmed_bottoms||[],ct=d.confirmed_tops||[];
  if(!cb.length&&!ct.length)return '';
  let h='<div class="sec" style="border:1px solid var(--gold,#e8c86a);border-radius:10px;padding:10px 12px;margin:14px 0;background:#141007">';
  h+='<h2 style="color:var(--gold,#e8c86a);margin:0 0 2px">⭐ SMART-MONEY CONFIRMED — independent lenses agree</h2>';
  h+='<div style="font-size:11px;color:var(--fg3);margin-bottom:8px">Radar read + ≥2 of: dark-pool prints · 13F whale $ · Wyckoff dated phase · insider clusters. Each lens is an independent data source.</div>';
  if(cb.length)h+=`<div class="grp">✅ Confirmed bottoms / accumulation (${cb.length})</div><div class="grid">${cb.map(r=>card(r,'b')).join('')}</div>`;
  if(ct.length)h+=`<div class="grp">⚠️ Confirmed tops / distribution (${ct.length})</div><div class="grid">${ct.map(r=>card(r,'t')).join('')}</div>`;
  return h+'</div>';
}
function block(book,kind){
  let h='';
  for(const [cl,name] of [['countries','Countries'],['etfs','ETFs'],['stocks','Stocks']]){
    const xs=(book[cl]||[]);if(!xs.length)continue;
    h+=`<div class="grp">${name} <span style="color:var(--fg3)">(${xs.length})</span></div><div class="grid">${xs.map(r=>card(r,kind)).join('')}</div>`;
  }
  return h||'<div class="grp" style="color:var(--fg3)">none flagged today</div>';
}
(async function(){
  const d=await gj('data/accumulation-radar.json');const w=document.getElementById('w');
  window.__d=d;if(!d||!d.tops){w.innerHTML='<div class="hd"><h1>Accumulation / Distribution Radar</h1></div><div class="loading">No data yet — runs daily after close.</div>';return;}
  let h=`<div class="hd"><h1>🔄 Accumulation / Distribution Radar</h1><div class="sub">Wyckoff cycle across stocks, ETFs &amp; countries — who's being accumulated vs distributed, and what's most likely at a top or a bottom.</div><div class="meta">${(d.generated_at||'').slice(0,16).replace('T',' ')}Z · ${d.n_scored} names scored · ${d.buffer_days}d history · v${esc(d.version||'')}</div></div>`;
  h+=`<div class="thesis">${esc(d.thesis||'')}</div>`;
  h+=confirmedSection(d);
  h+=reversalSection(d);
  h+=`<div class="sec top">⚠️ Likely TOPS <span class="n">— over-extended + distribution / bearish divergence</span></div>`+block(d.tops,'t');
  h+=`<div class="sec bot">✅ Likely BOTTOMS <span class="n">— oversold + accumulation / bullish divergence</span></div>`+block(d.bottoms,'b');
  h+=`<div class="sec" style="color:var(--cyan)">Under accumulation <span class="n">— buying pressure in a base</span></div>`+block(d.accumulating,'acc');
  h+=`<div class="sec" style="color:var(--amb)">Under distribution <span class="n">— selling pressure near highs</span></div>`+block(d.distributing,'dist');
  h+=`<div class="foot">Per name: OBV (volume confirmation), Chaikin Money Flow 20d (intrabar buying/selling), RSI(14), price vs 50/200-DMA, position in the 200-day range, and price-vs-OBV divergence — combined into a Wyckoff phase and top/bottom composites. LIKELY_BOTTOM (UP) and LIKELY_TOP (DOWN) calls are logged and graded on forward excess-vs-benchmark (SPY for stocks/ETFs, ACWX for countries) — measure-before-trust.</div>`;
  w.innerHTML=h;
})();
</script><script src="/jh-nav-drawer.js" defer></script>

<script defer src="/jh-page-ai.js"></script>
</body></html>
