name: Build Mobile App

# Builds the Android app bundle (.aab) on a mobile-v* tag, ready to upload to
# Google Play. iOS archiving requires a Mac + Apple signing certs and is run
# locally (see mobile/README.md). This produces the Play Store artifact.
on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Install deps
        run: npm install
      - name: Add Android platform
        run: npx cap add android || true
      - name: Target Android API 35 + bump version (Play requirement)
        run: |
          VG=android/variables.gradle
          if [ -f "$VG" ]; then
            sed -i 's/compileSdkVersion *= *34/compileSdkVersion = 35/' "$VG"
            sed -i 's/targetSdkVersion *= *34/targetSdkVersion = 35/' "$VG"
            echo "--- variables.gradle ---"; cat "$VG"
          fi
          BG=android/app/build.gradle
          if [ -f "$BG" ]; then
            sed -i 's/versionCode 1/versionCode 2/' "$BG"
            sed -i 's/versionName "1.0"/versionName "1.0.2"/' "$BG"
            grep -n "versionCode\|versionName" "$BG" || true
          fi
      - name: Generate icons & splash
        run: npx capacitor-assets generate --android || true
      - name: Sync
        run: npx cap sync android
      - name: Decode upload keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/app/justhodl-upload.keystore
          echo "keystore decoded ($(wc -c < android/app/justhodl-upload.keystore) bytes)"
      - name: Configure signing
        run: |
          cat >> android/app/build.gradle <<'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file("justhodl-upload.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE
          echo "signing config appended"
      - name: Build debug APK (installable for testing)
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      - name: Build SIGNED release AAB (for Play Store)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: cd android && ./gradlew bundleRelease
      - name: Collect artifacts
        run: |
          mkdir -p out
          find android -name "*.apk" -exec cp {} out/ \; || true
          find android -name "*.aab" -exec cp {} out/ \; || true
          ls -la out/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: justhodl-android
          path: mobile/out/*
          if-no-files-found: warn
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
