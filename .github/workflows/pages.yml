# First-party GitHub Pages deploy — lean whitelisted artifact (site files only).
# Ops auto-commits touch aws/** and can NEVER trigger or cancel site deploys.
#
# SELF-HEALING: GitHub-hosted runners intermittently draw a non-allowlisted
# Azure blob host (productionresultssaNN.blob.core.windows.net) when deploy-pages
# fetches the Pages artifact. This is GitHub-side infra flakiness with NO
# user-configurable fix on personal accounts (no org/enterprise egress settings).
# We absorb it: the deploy step is non-fatal, and on a miss we auto-dispatch a
# FRESH run (new build -> new artifact host draw) until it lands, with a circuit
# breaker to prevent runaway loops.
name: Deploy site to Pages
on:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "nav-manifest.json"
      - "*.js"
      - "*.css"
      - "scripts/**"
      - "_redirects"
      - "CNAME"
      - "assets/**"
      - "js/**"
      - "css/**"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: '*/15 * * * *'   # re-bake last-known homepage values
  workflow_dispatch:
    inputs:
      retry_count:
        description: 'Internal self-heal retry counter (do not set manually)'
        required: false
        default: '0'
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble lean site artifact
        run: |
          mkdir -p _site
          shopt -s nullglob
          cp -f *.html *.js *.css _site/ 2>/dev/null || true
          cp -f nav-manifest.json _site/ 2>/dev/null || true
          for f in _redirects CNAME .nojekyll favicon.ico; do [ -f "$f" ] && cp -f "$f" _site/; done
          for d in assets js css img fonts; do [ -d "$d" ] && cp -r "$d" _site/; done
          echo "site files: $(find _site -type f | wc -l), bytes: $(du -sb _site | cut -f1)"
      - name: Bake last-known values into homepage (zero em-dash first paint)
        run: python3 scripts/bake_homepage.py _site/index.html || true
      - name: CI gate — template leaks + dead-paint ratchet
        run: |
          python3 - <<'G'
          import re, glob, os, sys
          leaks, dashes = [], 0
          for f in glob.glob('_site/**/*.html', recursive=True):
              t = open(f, encoding='utf-8', errors='replace').read()
              if re.search(r'{{[A-Z_]+}}', t): leaks.append(f)
              t2 = re.sub(r'<[^>]*data-realtime[^>]*>.*?</[a-z]+>', '', t, flags=re.S)
              dashes += t2.count('>—<')
          if leaks: print('GATE FAIL template leaks:', leaks[:5]); sys.exit(1)
          bpath = 'ci/dash_budget.txt'
          if not os.path.exists(bpath):
              os.makedirs('ci', exist_ok=True); open(bpath,'w').write(str(dashes))
              print(f'gate bootstrap: dash budget set to {dashes}')
          else:
              budget = int(open(bpath).read().strip())
              if dashes > budget: print(f'GATE FAIL dead-dash ratchet: {dashes} > {budget}'); sys.exit(1)
              if dashes < budget: open(bpath,'w').write(str(dashes))
              print(f'gate clean: 0 leaks, dashes {dashes} <= budget {budget}')
          G
      - name: Bake right-rail insight panel (Design audit sec8-C)
        run: python3 scripts/bake_right_rail.py _site || true

      - name: Bake engine directory (real live wiring status)
        run: python3 scripts/bake_engine_directory.py _site || true

      - name: Reskin legacy palette -> Amber (all pages; index+screener untouched)
        run: python3 scripts/reskin_site.py _site || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.deployment.outcome }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Report deploy outcome
        run: |
          echo "deploy-pages outcome: ${{ steps.deployment.outcome }}"
          if [ "${{ steps.deployment.outcome }}" != "success" ]; then
            echo "::notice::Pages deploy hit a transient infra flake — self-heal will re-dispatch a fresh run."
          fi
  self-heal:
    needs: [build, deploy]
    if: always() && needs.build.result == 'success' && needs.deploy.outputs.ok != 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-dispatch a fresh Pages run (deterministic retry cap)
        env:
          GH_TOKEN: ${{ secrets.PAGES_PAT }}
          GH_REPO: ${{ github.repository }}
          RETRY_COUNT: ${{ github.event.inputs.retry_count || '0' }}
        run: |
          rc="${RETRY_COUNT:-0}"
          case "$rc" in ''|*[!0-9]*) rc=0 ;; esac
          next=$((rc + 1))
          if [ "$rc" -ge 4 ]; then
            echo "::warning::Self-heal retry cap reached (attempt $rc) — not re-dispatching. Pages may need a manual check."
            exit 0
          fi
          echo "Deploy hit an egress flake — re-dispatching a fresh run (attempt $next of 4) to redraw the artifact host…"
          gh workflow run pages.yml --ref main -f retry_count="$next"
          echo "Fresh run dispatched (retry_count=$next)."
