# First-party GitHub Pages deploy — lean whitelisted artifact (site files only).
# Ops auto-commits touch aws/** and can NEVER trigger or cancel site deploys.
#
# SELF-HEALING: GitHub-hosted runners intermittently draw a non-allowlisted
# Azure blob host (productionresultssaNN.blob.core.windows.net) when deploy-pages
# fetches the Pages artifact. This is GitHub-side infra flakiness with NO
# user-configurable fix on personal accounts (no org/enterprise egress settings).
# We absorb it: the deploy step is non-fatal, and on a miss we auto-dispatch a
# FRESH run (new build -> new artifact host draw) until it lands, with a circuit
# breaker to prevent runaway loops.
name: Deploy site to Pages
on:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "nav-manifest.json"
      - "*.js"
      - "*.css"
      - "_redirects"
      - "CNAME"
      - "assets/**"
      - "js/**"
      - "css/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble lean site artifact
        run: |
          mkdir -p _site
          shopt -s nullglob
          cp -f *.html *.js *.css _site/ 2>/dev/null || true
          cp -f nav-manifest.json _site/ 2>/dev/null || true
          for f in _redirects CNAME .nojekyll favicon.ico; do [ -f "$f" ] && cp -f "$f" _site/; done
          for d in assets js css img fonts; do [ -d "$d" ] && cp -r "$d" _site/; done
          echo "site files: $(find _site -type f | wc -l), bytes: $(du -sb _site | cut -f1)"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.deployment.outcome }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Report deploy outcome
        run: |
          echo "deploy-pages outcome: ${{ steps.deployment.outcome }}"
          if [ "${{ steps.deployment.outcome }}" != "success" ]; then
            echo "::notice::Pages deploy hit a transient infra flake — self-heal will re-dispatch a fresh run."
          fi
  self-heal:
    needs: [build, deploy]
    if: always() && needs.build.result == 'success' && needs.deploy.outputs.ok != 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-dispatch a fresh Pages run (with circuit breaker)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          runs=$(gh api "/repos/${{ github.repository }}/actions/workflows/pages.yml/runs?per_page=40" \
            --jq "[.workflow_runs[] | select((now - (.created_at|fromdate)) < 1200)] | length")
          echo "Deploy site to Pages runs in the last 20 min: ${runs:-0}"
          if [ "${runs:-0}" -ge 6 ]; then
            echo "::warning::Circuit breaker tripped (${runs} runs in 20 min) — not re-dispatching. Site may need a manual check."
            exit 0
          fi
          echo "Re-dispatching a fresh run to redraw the artifact host (self-heal)…"
          gh workflow run pages.yml --ref main
          echo "Fresh run dispatched."
