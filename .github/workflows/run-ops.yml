name: Run Ops Script

# Serialize runs: accidental double-triggers (push+dispatch, rapid pushes)
# QUEUE instead of racing each other on AWS mutations + the commit-back.
concurrency:
  group: run-ops-serial
  cancel-in-progress: false

# Runs any Python script pushed to aws/ops/pending/*.py with AWS credentials.
# After a successful run the script should be manually moved to aws/ops/history/
# (or left in pending/ if it's idempotent and meant to be re-run).
on:
  push:
    branches: [main]
    paths:
      - 'aws/ops/pending/*.py'
  workflow_dispatch:
    inputs:
      script:
        description: 'Script path relative to repo root (e.g. aws/ops/pending/phase1_lockdown.py)'
        required: true

permissions:
  contents: write
  actions: read

jobs:
  run:
    name: Execute ops script
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 25
          # Use default GITHUB_TOKEN so we can push back reports
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Determine script(s) to run
        id: pick
        run: |
          if [ -n "${{ github.event.inputs.script }}" ]; then
            echo "scripts=${{ github.event.inputs.script }}" >> $GITHUB_OUTPUT
          else
            # Anchor detection to the EXACT push boundaries — immune to auto-commits
            # landing on main between the push and this run (the ops-1004 missed-script mode).
            BASE="${{ github.event.before }}"
            HEADSHA="${{ github.event.after || github.sha }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD^"
            fi
            git fetch -q --depth=50 origin "$BASE" "$HEADSHA" 2>/dev/null || true
            scripts=$(git diff --name-only "$BASE" "$HEADSHA" 2>/dev/null | grep '^aws/ops/pending/.*\.py$' | paste -sd ' ' - || true)
            if [ -z "$scripts" ]; then
              scripts=$(git diff --name-only HEAD^ HEAD | grep '^aws/ops/pending/.*\.py$' | paste -sd ' ' - || true)
            fi
            echo "Scripts to run: $scripts"
            echo "scripts=$scripts" >> $GITHUB_OUTPUT
          fi

      - name: Sync to freshest main (kill stale-checkout race)
        run: |
          # Execution always happens against the newest main at run time — a
          # dispatch or delayed run can never zip/deploy from a stale tree
          # (the 2026-07-05 stale-artifact incident). Detection above already
          # ran against the push's own SHAs, so this cannot skip scripts.
          git fetch -q origin main
          git reset --hard origin/main >/dev/null
          echo "executing-against: $(git rev-parse HEAD) — $(git log -1 --pretty=%s | head -c 70)"

      - name: Run script(s)
        if: steps.pick.outputs.scripts != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY_NEW: ${{ secrets.ANTHROPIC_API_KEY_NEW }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FINVIZ_AUTH: ${{ secrets.FINVIZ_AUTH }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}/aws/ops
        run: |
          set -e
          mkdir -p aws/ops/reports
          : > aws/ops/reports/_lastrun.log
          echo "executing-against: $(git rev-parse HEAD)" | tee -a aws/ops/reports/_lastrun.log
          for s in ${{ steps.pick.outputs.scripts }}; do
            # Skip files that are no longer in the working tree (e.g. moved
            # to ran/ or historical/ in the same push). git diff lists
            # deletes too, but trying to execute a missing file would fail
            # the run and prevent legitimate added scripts from running.
            if [ ! -f "$s" ]; then
              echo "⏭  Skipping $s — not in working tree (moved or deleted)"
              continue
            fi
            echo "══════════════════════════════════════════"
            echo "  Running: $s"
            echo "══════════════════════════════════════════"
            if ( set -o pipefail; python3 "$s" 2>&1 | tee -a aws/ops/reports/_lastrun.log ); then
              echo "✅ $s completed"
              # Auto-move successful scripts to ran/ so the pending dir
              # only contains scripts that are still pending or failed.
              mkdir -p aws/ops/ran
              target="aws/ops/ran/$(basename "$s")"
              if [ ! -e "$target" ]; then
                git mv "$s" "$target" 2>/dev/null && echo "📦 moved to $target" || true
              fi
            else
              echo "❌ OPS-FAIL: $s" | tee -a aws/ops/reports/_lastrun.log
              FAIL=1
            fi
          done
          if [ "${FAIL:-0}" = "1" ]; then exit 1; fi

      - name: Regenerate STATE.md snapshot
        if: always()
        continue-on-error: true
        run: python aws/ops/_gen_state.py || true

      - name: Commit any new/changed reports or imports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Always pull latest to avoid push-rejected races
          git pull --rebase origin main || true
          # Stage the standard ops paths plus root *.html (dashboard pages
          # served by GitHub Pages) and cloudflare/ (CF Worker source).
          # aws/ops/pending/ and aws/ops/ran/ are now both committed so
          # the auto-move logic in the run step persists across runs.
          shopt -s nullglob
          ROOT_HTML=( ./*.html )
          ROOT_JS=( ./*.js )
          shopt -u nullglob
          if [ -n "$(git status --porcelain STATE.md aws/ops/reports/ aws/ops/audit/ aws/ops/pending/ aws/ops/ran/ aws/ops/historical/ aws/lambdas/ aws/shared/ "${ROOT_HTML[@]}" "${ROOT_JS[@]}" cloudflare/ 2>/dev/null)" ]; then
            git add STATE.md aws/ops/reports/ aws/ops/audit/ aws/ops/pending/ aws/ops/ran/ aws/ops/historical/ aws/lambdas/ aws/shared/ "${ROOT_HTML[@]}" "${ROOT_JS[@]}" cloudflare/ 2>/dev/null || git add STATE.md aws/ops/reports/ aws/ops/audit/ aws/lambdas/
            git commit -m "ops: auto-commit from run ${{ github.run_id }} (${{ job.status }}) [skip-deploy]"
            git push || (git pull --rebase origin main && git push)
            echo "Committed changes"
          else
            echo "No changes to commit"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Ops Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "Scripts: \`${{ steps.pick.outputs.scripts }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
