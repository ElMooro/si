name: Deploy Lambdas

# Triggers whenever Claude (or anyone) pushes changes under aws/lambdas/*/source/**
# Detects which lambda changed, zips its source/ dir, and updates the live function.
on:
  push:
    branches: [main]
    paths:
      - 'aws/lambdas/*/source/**'
      - 'aws/lambdas/*/config.json'
  workflow_dispatch:
    inputs:
      function:
        description: 'Lambda name to redeploy (leave blank to deploy all)'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  deploy:
    name: Deploy changed Lambdas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Detect changed Lambdas
        id: detect
        run: |
          set -e
          # Use the actual commit that triggered this workflow, not HEAD —
          # during rapid multi-push sequences HEAD may be newer than the
          # triggering event's sha, causing diffs to miss the real change.
          triggering_sha="${{ github.event.after || github.sha }}"
          parent_sha="${{ github.event.before }}"
          echo "Triggering commit: $triggering_sha"
          echo "Parent commit: $parent_sha"

          # Check the specific triggering commit's message for [skip-deploy]
          commit_msg=$(git log -1 --pretty=%B "$triggering_sha" 2>/dev/null || git log -1 --pretty=%B)
          if echo "$commit_msg" | grep -qF '[skip-deploy]'; then
            echo "Commit message contains [skip-deploy] — exiting"
            echo "targets=" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -n "${{ github.event.inputs.function }}" ]; then
            echo "Manual dispatch for: ${{ github.event.inputs.function }}"
            echo "targets=${{ github.event.inputs.function }}" >> $GITHUB_OUTPUT
          else
            # Fallback to HEAD^ if we don't have both refs
            if [ -n "$parent_sha" ] && [ "$parent_sha" != "0000000000000000000000000000000000000000" ]; then
              changed=$(git diff --name-only "$parent_sha" "$triggering_sha" 2>/dev/null | grep '^aws/lambdas/' || true)
            else
              changed=$(git diff --name-only HEAD^ HEAD | grep '^aws/lambdas/' || true)
            fi
            targets=$(echo "$changed" | awk -F/ '{print $3}' | sort -u | paste -sd ' ' -)
            echo "Changed Lambdas: $targets"
            echo "targets=$targets" >> $GITHUB_OUTPUT
          fi

      - name: Deploy each changed Lambda
        if: steps.detect.outputs.targets != ''
        run: |
          set -e
          # Outer guard: per-Lambda failures recorded but don't kill the loop.
          # `set +e` inside subshell pairs with `|| failures=...` so we surface a final exit.
          declare -a failed_lambdas
          for fn in ${{ steps.detect.outputs.targets }}; do
            (
              set -e
              dir="aws/lambdas/$fn"
              if [ ! -d "$dir/source" ]; then
                echo "::warning::$dir/source not found — skipping"
                exit 0
              fi
              echo "──── Deploying $fn ────"

            # Read config (function_name + create-time config like runtime/timeout/memory/env)
            fn_runtime="python3.12"
            fn_timeout="300"
            fn_memory="512"
            fn_desc="JustHodl.AI Lambda"
            fn_env_args=""
            if [ -f "$dir/config.json" ]; then
              cfg_name=$(jq -r '.function_name // empty' "$dir/config.json")
              [ -n "$cfg_name" ] && fn="$cfg_name"
              fn_runtime=$(jq -r '.runtime // "python3.12"' "$dir/config.json")
              fn_timeout=$(jq -r '.timeout // 300' "$dir/config.json")
              fn_memory=$(jq -r '.memory // 512' "$dir/config.json")
              fn_desc=$(jq -r '.description // "JustHodl.AI Lambda"' "$dir/config.json")
              # Build --environment arg from .environment object (only if non-empty)
              env_kv=$(jq -r '.environment // {} | to_entries | map("\(.key)=\(.value)") | join(",")' "$dir/config.json")
              # If .inherit_env is set, copy specified keys from another Lambda's
              # environment. Useful for cred values like ANTHROPIC_API_KEY that
              # already exist on another function but shouldn't be in git.
              #
              # Two schemas supported:
              #   (a) Single object:
              #       "inherit_env": {"from_function": "X", "keys": ["K1","K2"]}
              #   (b) Array of objects (for keys spread across multiple functions):
              #       "inherit_env": [
              #         {"from_function": "A", "keys": ["K1"]},
              #         {"from_function": "B", "keys": ["K2","K3"]}
              #       ]
              if jq -e '.inherit_env' "$dir/config.json" >/dev/null 2>&1; then
                is_array=$(jq -r '.inherit_env | type == "array"' "$dir/config.json")
                if [ "$is_array" = "true" ]; then
                  n_entries=$(jq -r '.inherit_env | length' "$dir/config.json")
                  for i in $(seq 0 $((n_entries - 1))); do
                    src_fn=$(jq -r ".inherit_env[$i].from_function" "$dir/config.json")
                    inherit_keys=$(jq -r ".inherit_env[$i].keys | join(\" \")" "$dir/config.json")
                    if [ -n "$src_fn" ] && [ -n "$inherit_keys" ] && [ "$src_fn" != "null" ]; then
                      src_env=$(aws lambda get-function-configuration --function-name "$src_fn" --region "${{ secrets.AWS_REGION }}" --query 'Environment.Variables' --output json 2>/dev/null || echo "{}")
                      for k in $inherit_keys; do
                        v=$(echo "$src_env" | jq -r ".\"$k\" // empty")
                        if [ -n "$v" ] && [ "$v" != "null" ]; then
                          if [ -z "$env_kv" ]; then env_kv="$k=$v"; else env_kv="$env_kv,$k=$v"; fi
                          echo "  [inherit_env] inherited $k from $src_fn"
                        else
                          echo "  [inherit_env] WARN $k not found on $src_fn"
                        fi
                      done
                    fi
                  done
                else
                  src_fn=$(jq -r '.inherit_env.from_function' "$dir/config.json")
                  inherit_keys=$(jq -r '.inherit_env.keys | join(" ")' "$dir/config.json")
                  if [ -n "$src_fn" ] && [ -n "$inherit_keys" ]; then
                    src_env=$(aws lambda get-function-configuration --function-name "$src_fn" --region "${{ secrets.AWS_REGION }}" --query 'Environment.Variables' --output json 2>/dev/null || echo "{}")
                    for k in $inherit_keys; do
                      v=$(echo "$src_env" | jq -r "."$k" // empty")
                      if [ -n "$v" ] && [ "$v" != "null" ]; then
                        if [ -z "$env_kv" ]; then env_kv="$k=$v"; else env_kv="$env_kv,$k=$v"; fi
                        echo "  [inherit_env] inherited $k from $src_fn"
                      else
                        echo "  [inherit_env] WARN $k not found on $src_fn"
                      fi
                    done
                  fi
                fi
              fi
              if [ -n "$env_kv" ]; then
                fn_env_args="--environment Variables={$env_kv}"
              fi
            fi

            # Build zip
            tmp=$(mktemp -d)
            (cd "$dir/source" && zip -qr "$tmp/deploy.zip" .)
            echo "Built $(du -h $tmp/deploy.zip | cut -f1) zip for $fn"

            # Check if Lambda exists. If not, create it with defaults / config.json overrides.
            if aws lambda get-function --function-name "$fn" --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1; then
              echo "Updating existing Lambda $fn"
              aws lambda update-function-code \
                --function-name "$fn" \
                --zip-file "fileb://$tmp/deploy.zip" \
                --region "${{ secrets.AWS_REGION }}" \
                --query 'LastModified' --output text

              aws lambda wait function-updated \
                --function-name "$fn" \
                --region "${{ secrets.AWS_REGION }}"

              # Apply config overrides if present (env vars, timeout, memory may have changed)
              if [ -f "$dir/config.json" ]; then
                aws lambda update-function-configuration \
                  --function-name "$fn" \
                  --timeout "$fn_timeout" \
                  --memory-size "$fn_memory" \
                  --region "${{ secrets.AWS_REGION }}" \
                  $fn_env_args \
                  --output text > /dev/null
                aws lambda wait function-updated \
                  --function-name "$fn" \
                  --region "${{ secrets.AWS_REGION }}"
              fi
            else
              echo "Lambda $fn does not exist — creating"
              aws lambda create-function \
                --function-name "$fn" \
                --runtime "$fn_runtime" \
                --role "arn:aws:iam::857687956942:role/lambda-execution-role" \
                --handler "lambda_function.lambda_handler" \
                --zip-file "fileb://$tmp/deploy.zip" \
                --timeout "$fn_timeout" \
                --memory-size "$fn_memory" \
                --description "$fn_desc" \
                --region "${{ secrets.AWS_REGION }}" \
                $fn_env_args \
                --output text > /dev/null

              aws lambda wait function-active-v2 \
                --function-name "$fn" \
                --region "${{ secrets.AWS_REGION }}"
              echo "✅ Created new Lambda $fn"
            fi

            # ── EventBridge schedule (if config.json has .schedule) ──
            if [ -f "$dir/config.json" ] && jq -e '.schedule' "$dir/config.json" >/dev/null 2>&1; then
              rule_name=$(jq -r '.schedule.rule_name' "$dir/config.json")
              cron_expr=$(jq -r '.schedule.cron' "$dir/config.json")
              rule_desc=$(jq -r '.schedule.description // "Scheduled run"' "$dir/config.json")
              region="${{ secrets.AWS_REGION }}"
              acc="857687956942"

              echo "Setting up EventBridge rule $rule_name → $cron_expr"
              aws events put-rule \
                --name "$rule_name" \
                --schedule-expression "$cron_expr" \
                --state ENABLED \
                --description "$rule_desc" \
                --region "$region" \
                --output text > /dev/null

              # Grant invoke permission (idempotent, ignore conflict)
              aws lambda add-permission \
                --function-name "$fn" \
                --statement-id "EventBridge-${rule_name}" \
                --action "lambda:InvokeFunction" \
                --principal "events.amazonaws.com" \
                --source-arn "arn:aws:events:${region}:${acc}:rule/${rule_name}" \
                --region "$region" 2>/dev/null || echo "  permission already exists"

              # Attach target
              aws events put-targets \
                --rule "$rule_name" \
                --targets "Id=target1,Arn=arn:aws:lambda:${region}:${acc}:function:${fn}" \
                --region "$region" \
                --output text > /dev/null
              echo "  ✅ Schedule attached"
            fi

            # ── Function URL (if config.json has .function_url.enabled=true) ──
            if [ -f "$dir/config.json" ] && jq -e '.function_url.enabled' "$dir/config.json" >/dev/null 2>&1; then
              region="${{ secrets.AWS_REGION }}"
              cors_origins=$(jq -r '.function_url.cors_origins // ["*"] | join(",")' "$dir/config.json")
              echo "Setting up Function URL for $fn (CORS: $cors_origins)"

              # Check if URL exists, create or use existing
              existing_url=$(aws lambda get-function-url-config \
                --function-name "$fn" \
                --region "$region" \
                --query 'FunctionUrl' --output text 2>/dev/null || echo "")
              if [ -z "$existing_url" ] || [ "$existing_url" = "None" ]; then
                # Build CORS JSON file (CLI shorthand for list values is brittle)
                jq -n --argjson origins "$(jq '.function_url.cors_origins // ["*"]' "$dir/config.json")" '{AllowOrigins: $origins, AllowMethods: ["GET","OPTIONS"], AllowHeaders: ["content-type"], MaxAge: 86400}' > /tmp/cors.json
                fn_url=$(aws lambda create-function-url-config \
                  --function-name "$fn" \
                  --auth-type NONE \
                  --cors file:///tmp/cors.json \
                  --region "$region" \
                  --query 'FunctionUrl' --output text)
                echo "  ✅ Created Function URL: $fn_url"
              else
                fn_url="$existing_url"
                echo "  ℹ️  Existing Function URL: $fn_url"
              fi

              # Allow public invoke (idempotent)
              aws lambda add-permission \
                --function-name "$fn" \
                --statement-id "FunctionURLAllowPublicAccess" \
                --action "lambda:InvokeFunctionUrl" \
                --principal "*" \
                --function-url-auth-type NONE \
                --region "$region" 2>/dev/null || echo "  permission already exists"

              # Write the URL into the summary (the visible deploy log)
              echo "FUNCTION_URL_${fn}=$fn_url" >> $GITHUB_OUTPUT
              echo "  - **$fn URL**: \`$fn_url\`" >> $GITHUB_STEP_SUMMARY

              # Also write to a tracked file so we can read it from anywhere
              echo "$fn_url" > "$dir/.function-url"
              git add "$dir/.function-url" 2>/dev/null || true
              echo "FN_URL_PATCHED_FILE=$dir/.function-url" >> $GITHUB_ENV

              # If config says to patch a file with this URL, do it
              patch_target=$(jq -r '.function_url.patch_file // empty' "$dir/config.json")
              if [ -n "$patch_target" ] && [ -f "$patch_target" ]; then
                placeholder=$(jq -r '.function_url.placeholder // "__FUNCTION_URL_PLACEHOLDER__"' "$dir/config.json")
                if grep -q "$placeholder" "$patch_target"; then
                  sed -i "s|$placeholder|$fn_url|g" "$patch_target"
                  echo "  ✅ Patched $patch_target with Function URL"
                  # Stage the change so the post-step commits it back
                  echo "FN_URL_PATCHED_FILE=$patch_target" >> $GITHUB_ENV
                fi
              fi
            fi

            echo "✅ $fn deployed"
            rm -rf "$tmp"
            ) || {
              # subshell failed — record and continue
              echo "::error::Deploy failed for $fn"
              failed_lambdas+=("$fn")
            }
          done

          if [ "${#failed_lambdas[@]}" -gt 0 ]; then
            echo "::warning::Lambdas that failed to deploy: ${failed_lambdas[*]}"
            # Don't fail the whole workflow — successful ones already deployed
          fi

      - name: Commit Function URL patches back
        run: |
          set -e
          # Check for any modified or new tracked files (excluding untracked)
          git config user.email "github-actions@justhodl.ai"
          git config user.name "github-actions"
          # Stage everything potentially touched by Function URL setup
          git add -A 'aws/lambdas/*/.function-url' 2>/dev/null || true
          # Also stage the explicitly patched file if set
          if [ -n "$FN_URL_PATCHED_FILE" ] && [ -f "$FN_URL_PATCHED_FILE" ]; then
            git add "$FN_URL_PATCHED_FILE"
          fi
          # And any HTML/JS that may have been patched
          git add 'ma/*.js' 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing staged — no Function URL changes to commit"
            exit 0
          fi
          git status --short
          git commit -m "ops: auto-commit Function URL setup [skip-deploy]"
          git push origin main || echo "push failed — changes applied locally only"

      - name: Summary
        if: always()
        run: |
          echo "### Lambda Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "Targets: \`${{ steps.detect.outputs.targets }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
