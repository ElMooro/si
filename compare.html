<style>
:root {
  --bg-base:        #0a0a0a;
  --bg-card:        #141414;
  --bg-elev:        #1a1a1a;
  --bg-sunken:      #050505;
  --border:         rgba(255,255,255,.08);
  --border-light:   rgba(255,255,255,.05);
  --border-strong:  rgba(255,255,255,.15);
  --text:           #eef2f7;
  --text-dim:       #aab4c0;
  --text-muted:     #6b7785;
  --accent:         #facc15;
  --cyan:           #22d3ee;
  --pos:            #26ffaf;
  --neg:            #ef4444;
  --warn:           #f59e0b;
  --font-mono:      'JetBrains Mono', 'SF Mono', Consolas, monospace;
  --font-sans:      'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 0;
  background: var(--bg-base);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding: 12px 22px; border-bottom: 1px solid var(--border);
  background: rgba(10,10,10,.95); backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 50;
}
.logo { font-family: var(--font-mono); font-weight: 700; font-size: 14px; color: var(--accent); }
.logo a { color: inherit; text-decoration: none; }
.nav-links { display:flex; gap:18px; }
.nav-links a { color: var(--text-dim); text-decoration: none; font-size: 12px; letter-spacing:.04em; }
.nav-links a:hover { color: var(--accent); }

.page { max-width: 1600px; margin: 0 auto; padding: 22px; }

.controls {
  background: linear-gradient(135deg, rgba(250,204,21,.05) 0%, rgba(34,211,238,.03) 100%);
  border: 1px solid rgba(250,204,21,.25); border-radius:10px;
  padding: 18px 22px; margin-bottom: 20px;
}
.controls h2 {
  margin: 0 0 12px; font-size: 16px; color: var(--accent);
  display:flex; align-items:center; gap:8px;
}
.controls .row {
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.controls .ticker-input {
  background: var(--bg-base); border: 1px solid var(--border);
  color: var(--text); padding: 9px 14px; border-radius:6px;
  font-family: var(--font-mono); font-size:13px; width:120px;
  outline:none; text-transform:uppercase;
}
.controls .ticker-input:focus { border-color: var(--accent); }
.controls button {
  background: var(--accent); color: #000; border: none;
  padding: 9px 18px; border-radius:6px; font-weight:700;
  font-size:12px; cursor: pointer; letter-spacing:.04em;
}
.controls button:hover { background: #fde047; }
.controls .hint {
  font-size: 11px; color: var(--text-muted);
  font-family: var(--font-mono);
}

.grid { display: grid; gap: 14px; }
.col-2 { grid-template-columns: repeat(2, 1fr); }
.col-3 { grid-template-columns: repeat(3, 1fr); }
@media (max-width: 900px) {
  .col-2, .col-3 { grid-template-columns: 1fr; }
}

.tcard {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.tcard .head {
  padding: 16px 18px;
  background: linear-gradient(180deg, rgba(250,204,21,.04) 0%, transparent 100%);
  border-bottom: 1px solid var(--border-light);
}
.tcard .head .tkr {
  font-family: var(--font-mono); font-size: 22px; font-weight: 700;
  color: var(--accent); letter-spacing: .04em;
}
.tcard .head .co {
  font-size: 11.5px; color: var(--text-dim); margin-top: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tcard .head .price {
  display:flex; align-items: baseline; gap: 8px; margin-top: 10px;
}
.tcard .head .price .num {
  font-family: var(--font-mono); font-size: 24px; font-weight: 700;
}
.tcard .head .price .chg { font-family: var(--font-mono); font-size: 12px; }
.tcard .head .price .chg.up { color: var(--pos); }
.tcard .head .price .chg.down { color: var(--neg); }

.tcard .verdict {
  margin-top: 12px; padding: 8px 12px; border-radius: 6px;
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  display: inline-flex; align-items:center; gap: 6px;
}
.verdict.STRONG_BUY, .verdict.STRONGBUY { background: var(--pos); color: #000; }
.verdict.BUY        { background: rgba(38,255,175,.18); color: var(--pos); border:1px solid var(--pos); }
.verdict.HOLD       { background: rgba(245,158,11,.15); color: var(--warn); border:1px solid var(--warn); }
.verdict.SELL       { background: rgba(239,68,68,.18); color: var(--neg); border:1px solid var(--neg); }
.verdict.STRONG_SELL, .verdict.STRONGSELL { background: var(--neg); color: #000; }

.tcard .body { padding: 14px 18px; }
.tcard .body .row {
  display:flex; justify-content: space-between; align-items: baseline;
  padding: 6px 0; border-bottom: 1px solid var(--border-light);
}
.tcard .body .row:last-child { border-bottom: none; }
.tcard .body .row .lbl {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .04em;
}
.tcard .body .row .val {
  font-family: var(--font-mono); font-size: 12.5px; font-weight: 600;
}
.tcard .body .row .val.up { color: var(--pos); }
.tcard .body .row .val.down { color: var(--neg); }
.tcard .body .row .val.warn { color: var(--warn); }

.section-h {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .1em; font-weight: 700;
  margin: 14px 0 8px; padding-top: 10px;
  border-top: 1px dashed var(--border-light);
}

.scenario-mini {
  display:grid; grid-template-columns: repeat(3,1fr); gap: 6px;
  margin-top: 6px;
}
.scenario-mini > div {
  background: var(--bg-elev); border-radius:6px; padding: 8px 10px;
  text-align: center;
}
.scenario-mini > div .lbl {
  font-size: 9.5px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: .08em;
}
.scenario-mini > div .pt {
  font-family: var(--font-mono); font-size: 14px; font-weight: 700; margin-top: 2px;
}
.scenario-mini > div .prob {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 2px;
}
.scenario-mini > div.bull { border-top: 2px solid var(--pos); }
.scenario-mini > div.base { border-top: 2px solid var(--cyan); }
.scenario-mini > div.bear { border-top: 2px solid var(--neg); }

.assessment {
  font-size: 11.5px; color: var(--text-dim); font-style: italic;
  line-height: 1.55; padding: 8px 12px;
  background: var(--bg-elev); border-radius: 5px; border-left: 2px solid var(--cyan);
  margin-top: 8px;
}

.err {
  background: rgba(239,68,68,.08); border:1px solid var(--neg);
  color: var(--neg); padding: 16px 20px; border-radius: 8px;
  font-size: 13px; margin: 20px 0;
}
.spinner {
  width: 28px; height: 28px; border:3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading {
  display:flex; align-items:center; gap:14px; padding: 30px;
  color: var(--text-dim); font-size: 13px;
}

.summary-row {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 20px; margin-top: 16px;
}
.summary-row h3 {
  margin: 0 0 12px; font-size: 14px; color: var(--accent);
}
.summary-row .winner-grid {
  display:grid; gap: 10px;
}
.summary-row .winner-row {
  display:flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; background: var(--bg-elev); border-radius: 6px;
  font-size: 12px;
}
.summary-row .winner-row .metric { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
.summary-row .winner-row .winner {
  font-family: var(--font-mono); font-weight: 700;
  color: var(--accent); padding: 3px 10px;
  background: rgba(250,204,21,.12); border-radius: 4px; font-size: 12px;
}
</style>

<header class="topbar">
  <div class="logo"><a href="/">JustHodl.AI</a> · COMPARE</div>
  <nav class="nav-links">
    <a href="/">Home</a>
    <a href="/why.html">Research</a>
  </nav>
</header>

<main class="page">

  <div class="controls">
    <h2>⚖ Side-by-Side Comparison</h2>
    <div class="row">
      <input id="t1" type="text" class="ticker-input" placeholder="AAPL" maxlength="8" autocapitalize="characters" spellcheck="false">
      <input id="t2" type="text" class="ticker-input" placeholder="MSFT" maxlength="8" autocapitalize="characters" spellcheck="false">
      <input id="t3" type="text" class="ticker-input" placeholder="(optional)" maxlength="8" autocapitalize="characters" spellcheck="false">
      <button onclick="runCompare()">COMPARE ↗</button>
      <div class="hint">Compare any 2 or 3 stocks across valuation, scenarios, financial health</div>
    </div>
  </div>

  <div id="content"></div>

</main>

<script>
const CDN_BASE = "https://justhodl-data-proxy.raafouis.workers.dev/equity-research";
const LAMBDA_URL = "https://6nkrwmk2ntjx54okqvtzokosb40whvfb.lambda-url.us-east-1.on.aws/";

// ─── helpers
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "—").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtNum = (n, d=2) => (n == null || isNaN(n)) ? "—" : Number(n).toLocaleString(undefined, {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtPct = (n, d=1) => (n == null || isNaN(n)) ? "—" : (n >= 0 ? "+" : "") + Number(n).toFixed(d) + "%";
const fmt$ = (n, d=2) => {
  if(n == null || isNaN(n)) return "—";
  const a = Math.abs(n);
  if(a >= 1e12) return "$" + (n/1e12).toFixed(d) + "T";
  if(a >= 1e9)  return "$" + (n/1e9).toFixed(d)  + "B";
  if(a >= 1e6)  return "$" + (n/1e6).toFixed(d)  + "M";
  if(a >= 1e3)  return "$" + (n/1e3).toFixed(d)  + "K";
  return "$" + Number(n).toFixed(d);
};
const fmtPrice = (n) => (n == null || isNaN(n)) ? "—" : "$" + Number(n).toFixed(2);

// ─── URL-driven init
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const tickers = (params.get('tickers') || '').split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
  if(tickers[0]) $('t1').value = tickers[0];
  if(tickers[1]) $('t2').value = tickers[1];
  if(tickers[2]) $('t3').value = tickers[2];
  if(tickers.length >= 2) runCompare();
});

function runCompare(){
  const tickers = [$('t1').value, $('t2').value, $('t3').value]
    .map(t => (t || '').trim().toUpperCase())
    .filter(t => /^[A-Z0-9.\-]{1,8}$/.test(t));
  if(tickers.length < 2){
    $('content').innerHTML = `<div class="err">Enter at least 2 tickers to compare.</div>`;
    return;
  }
  // Update URL
  const url = new URL(window.location);
  url.searchParams.set('tickers', tickers.join(','));
  window.history.replaceState({}, '', url);
  fetchAndRender(tickers);
}

async function fetchOneTicker(ticker){
  // Try CDN first
  try {
    const r = await fetch(`${CDN_BASE}/${encodeURIComponent(ticker)}.json?v=${Date.now()}`);
    if(r.ok){
      const doc = await r.json();
      // Stale check (>48h)
      if(doc.generated_at){
        const ageMs = Date.now() - new Date(doc.generated_at).getTime();
        if(ageMs < 48 * 3600 * 1000) return doc;
      }
    }
  } catch(e) {/* fall through */}
  // Lambda fallback with abort signal
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 150000);
  try {
    const r = await fetch(`${LAMBDA_URL}?ticker=${encodeURIComponent(ticker)}`, { signal: ctrl.signal });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } finally {
    clearTimeout(timer);
  }
}

async function fetchAndRender(tickers){
  $('content').innerHTML = `<div class="loading"><div class="spinner"></div>
    <div>Loading research for ${tickers.map(t => `<b style="color:var(--accent)">${esc(t)}</b>`).join(", ")}…
      <div style="color:var(--text-muted); font-size:11px; margin-top:4px">Cached tickers load in 0.2s · uncached take 60-90s each</div>
    </div></div>`;
  try {
    // Fetch all in parallel
    const results = await Promise.allSettled(tickers.map(fetchOneTicker));
    const docs = [];
    const errors = [];
    for(let i = 0; i < tickers.length; i++){
      const r = results[i];
      if(r.status === 'fulfilled' && r.value){
        docs.push({ticker: tickers[i], doc: r.value});
      } else {
        errors.push({ticker: tickers[i], error: (r.reason && r.reason.message) || 'unknown'});
      }
    }
    if(docs.length < 2){
      $('content').innerHTML = `<div class="err">Couldn't load ${errors.map(e => esc(e.ticker)).join(", ")} — ${esc((errors[0]||{}).error)}. Try other tickers (AAPL, MSFT, NVDA, JPM etc are pre-cached).</div>`;
      return;
    }
    renderComparison(docs);
    if(errors.length){
      $('content').innerHTML += `<div class="err">Note: failed to load ${errors.map(e => esc(e.ticker)).join(", ")} (${esc((errors[0]||{}).error)})</div>`;
    }
  } catch(e){
    $('content').innerHTML = `<div class="err">Error: ${esc(e.message || e)}</div>`;
  }
}

// ─── render
function renderComparison(docs){
  const n = docs.length;
  const gridClass = n === 2 ? 'col-2' : 'col-3';
  let html = `<div class="grid ${gridClass}">`;
  for(const {ticker, doc} of docs){
    html += renderTickerCard(ticker, doc);
  }
  html += `</div>`;
  html += renderWinnersTable(docs);
  $('content').innerHTML = html;
}

function renderTickerCard(ticker, d){
  const co = d.company || {};
  const q = d.quote || {};
  const v = d.verdict || {};
  const val = d.valuation || {};
  const grow = d.growth || {};
  const ret = d.returns || {};
  const heath = d.financial_health || {};
  const s = d.scenarios || {};
  const ec = d.earnings_call_sentiment || {};
  const etr = d.earnings_track_record || {};
  const ca = d.capital_allocation || {};

  const changeCls = (q.change_pct || 0) >= 0 ? "up" : "down";
  const rating = v.rating || '—';
  const ratingClean = rating.replace(/[_\s]/g, '');

  return `
    <div class="tcard">
      <div class="head">
        <div class="tkr">${esc(ticker)}</div>
        <div class="co">${esc(co.name || ticker)} · ${esc(co.sector || '—')}</div>
        <div class="price">
          <div class="num">${fmtPrice(q.price)}</div>
          <div class="chg ${changeCls}">${fmtPct(q.change_pct, 2)}</div>
        </div>
        <div class="verdict ${ratingClean}">${esc(rating)} · ${esc(v.conviction_grade || '')}</div>
      </div>
      <div class="body">
        <div class="row">
          <span class="lbl">Market Cap</span>
          <span class="val">${fmt$(co.market_cap, 1)}</span>
        </div>
        <div class="row">
          <span class="lbl">12mo Target</span>
          <span class="val">${fmtPrice(v.price_target_12m)}</span>
        </div>
        ${v.position_size_pct != null ? `<div class="row">
          <span class="lbl">PM Position Size</span>
          <span class="val">${fmtPct(v.position_size_pct, 1)}</span>
        </div>` : ''}

        ${s && s.bull_case && s.bull_case.price_target_12m != null ? `
          <div class="section-h">Scenarios (12mo)</div>
          <div class="scenario-mini">
            <div class="bull">
              <div class="lbl">Bull · ${s.bull_case.probability_pct || '—'}%</div>
              <div class="pt">${fmtPrice(s.bull_case.price_target_12m)}</div>
              <div class="prob">${fmtPct(s.bull_case.upside_pct, 1)}</div>
            </div>
            <div class="base">
              <div class="lbl">Base · ${(s.base_case && s.base_case.probability_pct) || '—'}%</div>
              <div class="pt">${fmtPrice(s.base_case && s.base_case.price_target_12m)}</div>
              <div class="prob">${fmtPct(s.base_case && s.base_case.upside_pct, 1)}</div>
            </div>
            <div class="bear">
              <div class="lbl">Bear · ${(s.bear_case && s.bear_case.probability_pct) || '—'}%</div>
              <div class="pt">${fmtPrice(s.bear_case && s.bear_case.price_target_12m)}</div>
              <div class="prob">${fmtPct(s.bear_case && s.bear_case.upside_pct, 1)}</div>
            </div>
          </div>
          ${s.risk_reward_ratio != null ? `<div class="row" style="margin-top:8px">
            <span class="lbl">Risk / Reward</span>
            <span class="val ${s.risk_reward_ratio >= 2 ? 'up' : s.risk_reward_ratio >= 1 ? 'warn' : 'down'}">${s.risk_reward_ratio.toFixed(2)}x</span>
          </div>` : ''}
          ${s.expected_value_upside_pct != null ? `<div class="row">
            <span class="lbl">Probability-Weighted Upside</span>
            <span class="val ${s.expected_value_upside_pct >= 0 ? 'up' : 'down'}">${fmtPct(s.expected_value_upside_pct, 1)}</span>
          </div>` : ''}
        ` : ''}

        <div class="section-h">Valuation</div>
        <div class="row"><span class="lbl">P/E TTM</span><span class="val">${fmtNum(val.pe_ttm, 1)}</span></div>
        <div class="row"><span class="lbl">P/E 5y avg</span><span class="val">${fmtNum(val.pe_5yr_avg, 1)}</span></div>
        <div class="row"><span class="lbl">EV/EBITDA</span><span class="val">${fmtNum(val.ev_ebitda, 1)}</span></div>
        <div class="row"><span class="lbl">P/B</span><span class="val">${fmtNum(val.pb_ttm, 2)}</span></div>
        <div class="row"><span class="lbl">FCF Yield</span><span class="val">${fmtPct(val.fcf_yield_pct, 2)}</span></div>
        <div class="row"><span class="lbl">Div Yield</span><span class="val">${fmtPct(val.div_yield_pct, 2)}</span></div>

        <div class="section-h">Growth & Returns</div>
        <div class="row"><span class="lbl">Rev 5y CAGR</span><span class="val ${(grow.rev_5y_cagr_pct||0) > 10 ? 'up' : ''}">${fmtPct(grow.rev_5y_cagr_pct, 1)}</span></div>
        <div class="row"><span class="lbl">EPS 5y CAGR</span><span class="val">${fmtPct(grow.eps_5y_cagr_pct, 1)}</span></div>
        <div class="row"><span class="lbl">FCF 5y CAGR</span><span class="val">${fmtPct(grow.fcf_5y_cagr_pct, 1)}</span></div>
        <div class="row"><span class="lbl">1yr Return</span><span class="val ${(ret.return_1y_pct||0) >= 0 ? 'up' : 'down'}">${fmtPct(ret.return_1y_pct, 1)}</span></div>
        <div class="row"><span class="lbl">5yr CAGR</span><span class="val ${(ret.cagr_5y_pct||0) > 10 ? 'up' : ''}">${fmtPct(ret.cagr_5y_pct, 1)}</span></div>
        <div class="row"><span class="lbl">Max Drawdown</span><span class="val down">${fmtPct(ret.max_drawdown_pct, 1)}</span></div>

        <div class="section-h">Quality</div>
        <div class="row"><span class="lbl">ROE TTM</span><span class="val">${fmtPct(val.roe_ttm_pct, 1)}</span></div>
        <div class="row"><span class="lbl">ROIC TTM</span><span class="val">${fmtPct(val.roic_ttm_pct, 1)}</span></div>
        <div class="row"><span class="lbl">Health Score</span><span class="val">${heath.overall_score || '—'}/100</span></div>
        <div class="row"><span class="lbl">Op Margin</span><span class="val">${fmtPct(heath.profitability && heath.profitability.op_margin_pct, 1)}</span></div>
        <div class="row"><span class="lbl">Net Debt / EBITDA</span><span class="val ${(heath.leverage && heath.leverage.debt_to_equity || 0) > 1 ? 'warn' : ''}">${fmtNum(heath.leverage && heath.leverage.debt_to_equity, 2)}x</span></div>

        ${etr.eps_beat_rate_pct != null ? `
          <div class="section-h">Earnings Track Record</div>
          <div class="row"><span class="lbl">Beat Rate</span><span class="val ${etr.eps_beat_rate_pct >= 75 ? 'up' : 'warn'}">${etr.eps_beat_rate_pct}%</span></div>
          <div class="row"><span class="lbl">Streak</span><span class="val ${(etr.eps_current_streak||0) > 0 ? 'up' : (etr.eps_current_streak||0) < 0 ? 'down' : ''}">${etr.eps_current_streak || 0}Q</span></div>
          <div class="row"><span class="lbl">Magnitude Trend</span><span class="val ${etr.eps_magnitude_trend === 'expanding' ? 'up' : etr.eps_magnitude_trend === 'shrinking' ? 'down' : 'warn'}">${(etr.eps_magnitude_trend||'—').toUpperCase()}</span></div>
        ` : ''}

        ${ca.shareholder_yield_pct != null ? `
          <div class="section-h">Capital Return</div>
          <div class="row"><span class="lbl">Shareholder Yield</span><span class="val ${ca.shareholder_yield_pct >= 5 ? 'up' : 'warn'}">${fmtPct(ca.shareholder_yield_pct, 2)}</span></div>
          <div class="row"><span class="lbl">Total Returned 10y</span><span class="val">${fmt$(ca.total_returned_10y, 1)}</span></div>
          <div class="row"><span class="lbl">Buyback Share</span><span class="val">${ca.buyback_share_of_return_pct != null ? ca.buyback_share_of_return_pct.toFixed(0) + '%' : '—'}</span></div>
        ` : ''}

        ${ec && ec.overall_tone ? `
          <div class="section-h">Latest Earnings Call</div>
          <div class="row"><span class="lbl">Tone</span><span class="val ${ec.overall_tone === 'BULLISH' || ec.overall_tone === 'CONFIDENT' ? 'up' : ec.overall_tone === 'CAUTIOUS' || ec.overall_tone === 'DEFENSIVE' ? 'down' : ''}">${esc(ec.overall_tone)}</span></div>
          <div class="row"><span class="lbl">Guidance</span><span class="val ${ec.guidance_change === 'RAISED' ? 'up' : ec.guidance_change === 'LOWERED' ? 'down' : ''}">${esc((ec.guidance_change||'').replace(/_/g,' '))}</span></div>
        ` : ''}

        ${v.verdict_rationale ? `
          <div class="assessment">${esc(v.verdict_rationale)}</div>
        ` : ''}

        <div style="margin-top:14px; padding-top:10px; border-top: 1px solid var(--border-light)">
          <a href="/why.html?ticker=${esc(ticker)}" style="color:var(--cyan); text-decoration:none; font-size:11.5px">
            Full 19-section research for ${esc(ticker)} →
          </a>
        </div>
      </div>
    </div>`;
}

function renderWinnersTable(docs){
  // For each comparable metric, find the winner ticker
  const metrics = [
    {key: 'cheapest_pe', label: 'Cheapest valuation (lowest P/E)',
      pick: d => (d.valuation || {}).pe_ttm,
      better: 'lower'},
    {key: 'highest_growth', label: 'Fastest revenue growth (5y CAGR)',
      pick: d => (d.growth || {}).rev_5y_cagr_pct,
      better: 'higher'},
    {key: 'highest_roic', label: 'Highest return on invested capital',
      pick: d => (d.valuation || {}).roic_ttm_pct,
      better: 'higher'},
    {key: 'best_scenario', label: 'Best expected-value upside',
      pick: d => (d.scenarios || {}).expected_value_upside_pct,
      better: 'higher'},
    {key: 'best_rr', label: 'Best risk / reward asymmetry',
      pick: d => (d.scenarios || {}).risk_reward_ratio,
      better: 'higher'},
    {key: 'best_yield', label: 'Highest shareholder yield',
      pick: d => (d.capital_allocation || {}).shareholder_yield_pct,
      better: 'higher'},
    {key: 'highest_health', label: 'Strongest financial health',
      pick: d => (d.financial_health || {}).overall_score,
      better: 'higher'},
    {key: 'best_streak', label: 'Strongest earnings track record',
      pick: d => (d.earnings_track_record || {}).eps_current_streak,
      better: 'higher'},
  ];

  let rows = '';
  for(const m of metrics){
    const vals = docs.map(({ticker, doc}) => ({ticker, val: m.pick(doc)}))
                       .filter(o => o.val != null && !isNaN(o.val));
    if(vals.length < 2) continue;
    const winner = m.better === 'lower'
      ? vals.reduce((a,b) => (b.val < a.val ? b : a))
      : vals.reduce((a,b) => (b.val > a.val ? b : a));
    const others = vals.filter(o => o.ticker !== winner.ticker);
    rows += `<div class="winner-row">
      <span class="metric">${esc(m.label)}</span>
      <span style="text-align:right">
        <span class="winner">${esc(winner.ticker)} ${fmtNum(winner.val, 2)}</span>
        <span style="color:var(--text-muted); font-size:10.5px; margin-left:8px; font-family:var(--font-mono)">
          vs ${others.map(o => `${esc(o.ticker)} ${fmtNum(o.val, 2)}`).join(' · ')}
        </span>
      </span>
    </div>`;
  }
  if(!rows) return '';
  return `
    <div class="summary-row">
      <h3>🏆 Best in show — by metric</h3>
      <div class="winner-grid">${rows}</div>
      <div style="font-size:10.5px; color:var(--text-muted); margin-top:10px; line-height:1.6">
        These are simple per-metric comparisons. A real PM would weigh based on style: growth-focused (favor high-CAGR
        + best-scenario winners), income-focused (favor highest shareholder yield), or quality-focused (favor strongest
        health score + ROIC).
      </div>
    </div>`;
}
</script>
