<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JustHodl Secretary</title><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#06080d;--surface:#0c1017;--card:#111820;--border:#1c2533;--text:#e0e4ea;--dim:#5a6577;--cyan:#00d4ff;--green:#00e88f;--red:#ff4466;--yellow:#ffb800;--purple:#b06cff;--orange:#ff8c42}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}.mono{font-family:'JetBrains Mono',monospace}.header{position:sticky;top:0;z-index:100;background:rgba(6,8,13,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}.header h1{font-size:17px;font-weight:700;color:var(--cyan);display:flex;align-items:center;gap:8px}.status{display:flex;gap:16px;align-items:center;font-size:12px}.pill{padding:4px 10px;border-radius:99px;font-weight:600;font-size:11px;text-transform:uppercase}.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}.tab{padding:12px 20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--dim);border-bottom:2px solid transparent;white-space:nowrap}.tab:hover{color:var(--text)}.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}.content{padding:20px 24px;max-width:1600px;margin:0 auto}.grid{display:grid;gap:16px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}.card-title{font-size:11px;text-transform:uppercase;color:var(--dim);letter-spacing:.5px;margin-bottom:8px}.big-num{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace}table{width:100%;border-collapse:collapse}th{text-align:left;padding:8px;font-size:10px;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border)}td{padding:8px;border-bottom:1px solid rgba(28,37,51,.5);font-size:12px}.score-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}.chat-container{display:flex;flex-direction:column;height:calc(100vh - 180px)}.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}.chat-msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.6}.chat-msg.user{align-self:flex-end;background:var(--cyan);color:#000}.chat-msg.ai{align-self:flex-start;background:var(--card);border:1px solid var(--border)}.chat-input-wrap{display:flex;gap:8px;padding:16px;border-top:1px solid var(--border)}.chat-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:14px;outline:none}.chat-input:focus{border-color:var(--cyan)}.send-btn{background:var(--cyan);color:#000;border:none;border-radius:8px;padding:0 24px;font-weight:700;cursor:pointer;font-size:14px}.send-btn:disabled{opacity:.4}.qa-btn{padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:11px;cursor:pointer}.qa-btn:hover{color:var(--cyan);border-color:var(--cyan)}.panel{display:none}.panel.active{display:block}.rec{display:flex;align-items:center;gap:12px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}.rec .ticker{font-weight:700;color:var(--cyan);width:60px;font-family:'JetBrains Mono',monospace}.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--dim)}.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin-right:12px}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:900px){.g4,.g5{grid-template-columns:repeat(2,1fr)}.g2,.g3{grid-template-columns:1fr}}</style></head><body><div class="header"><h1>&#127974; JustHodl Financial Secretary</h1><div class="status"><span id="lu" style="color:var(--dim)">Loading...</span><span class="pill" id="rp" style="background:var(--border)">-</span><span class="pill" id="rkp" style="background:var(--border)">-</span><span><span class="live-dot"></span> LIVE</span></div></div><div class="tabs" id="tabs"><div class="tab active" data-tab="ov">Overview</div><div class="tab" data-tab="rec">Recommendations</div><div class="tab" data-tab="liq">Liquidity</div><div class="tab" data-tab="risk">Risk</div><div class="tab" data-tab="cry">Crypto</div><div class="tab" data-tab="news">News</div><div class="tab" data-tab="chat">Chat</div><div class="tab" data-tab="ai">AI Briefing</div></div><div class="content" id="app"><div class="panel active" id="p-ov"><div class="grid g5" id="hero" style="margin-bottom:20px"></div><div class="grid g2"><div id="mkt"></div><div id="tb"></div></div></div><div class="panel" id="p-rec"><div id="rlist"></div></div><div class="panel" id="p-liq"><div class="grid g4" id="lc" style="margin-bottom:20px"></div><div id="ld"></div></div><div class="panel" id="p-risk"><div class="grid g3" id="rg"></div></div><div class="panel" id="p-cry"><div id="ct"></div></div><div class="panel" id="p-news"><div id="nl"></div></div><div class="panel" id="p-chat"><div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 0" id="qa"></div><div class="chat-container"><div class="chat-messages" id="cm"><div class="chat-msg ai">I am your Financial Secretary. Ask me anything - price AAPL, financials NVDA, news TSLA, or just ask a question.</div></div><div class="chat-input-wrap"><input class="chat-input" id="ci" placeholder="Ask anything..." autocomplete="off"><button class="send-btn" id="sb">Send</button></div></div></div><div class="panel" id="p-ai"><div class="card" style="padding:24px"><div class="card-title">AI Briefing</div><div id="ac" style="font-size:14px;line-height:1.8;white-space:pre-wrap;color:#ccc">Loading...</div></div></div></div><script>const API="https://nqzbtg3pnxhcyj4rdlmft2vu4y0xxfvk.lambda-url.us-east-1.on.aws/";let D={};async function init(){try{const r=await fetch(API+"latest");D=await r.json();if(D.status==="no_scan_yet"){document.getElementById("hero").innerHTML='<div class="card" style="grid-column:1/-1;text-align:center;padding:40px">No scan yet. Use Chat tab to run one.</div>';return}renderAll()}catch(e){document.getElementById("hero").innerHTML='<div class="card" style="grid-column:1/-1;text-align:center;padding:40px;color:var(--red)">Error: '+e.message+'</div>'}}function renderAll(){const l=D.liquidity||{},r=D.risk||{},fg=D.fear_greed||{},spy=D.market_snapshot?.spy||{},btc=D.market_snapshot?.btc||{};document.getElementById("hero").innerHTML=[{l:"Net Liquidity",v:"$"+(l.net_liquidity||0).toLocaleString()+"B",s:l.regime,c:l.regime==="EXPANSION"?"var(--green)":l.regime==="CRISIS"?"var(--red)":"var(--yellow)"},{l:"Risk",v:(r.composite||0).toFixed(0)+"/100",s:r.level,c:r.level==="CRITICAL"?"var(--red)":r.level==="LOW"?"var(--green)":"var(--yellow)"},{l:"S&P 500",v:"$"+(spy.price||0).toLocaleString(undefined,{minimumFractionDigits:2}),s:((spy.change_pct||0)>0?"+":"")+(spy.change_pct||0).toFixed(2)+"%",c:(spy.change_pct||0)>=0?"var(--green)":"var(--red)"},{l:"Bitcoin",v:"$"+(btc.price||0).toLocaleString(undefined,{maximumFractionDigits:0}),s:((btc.change_24h||0)>0?"+":"")+(btc.change_24h||0).toFixed(1)+"%",c:(btc.change_24h||0)>=0?"var(--green)":"var(--red)"},{l:"Fear & Greed",v:fg.current||"-",s:fg.label||"-",c:(fg.current||50)>60?"var(--green)":(fg.current||50)<40?"var(--red)":"var(--yellow)"}].map(c=>'<div class="card" style="text-align:center"><div class="card-title">'+c.l+'</div><div class="big-num" style="color:'+c.c+'">'+c.v+'</div><div style="font-size:12px;color:'+c.c+'">'+c.s+'</div></div>').join("");const ms=D.market_snapshot||{};document.getElementById("mkt").innerHTML=["SPY","QQQ","DIA","IWM","GLD","TLT"].map(t=>{const d=ms[t.toLowerCase()]||{};const ch=d.change_pct||d.change_24h||0;return'<div class="rec"><div class="ticker">'+t+'</div><div style="flex:1">'+(d.name||t)+'</div><div class="mono">$'+(d.price||0).toFixed(2)+'</div><div class="mono" style="color:'+(ch>=0?"var(--green)":"var(--red)")+'">'+(ch>=0?"+":"")+ch.toFixed(2)+'%</div></div>'}).join("");const buys=(D.top_buys||[]).slice(0,8);document.getElementById("tb").innerHTML=buys.map(r=>'<div class="rec"><div class="ticker">'+r.ticker+'</div><div style="flex:1;font-size:12px">'+r.name+'</div><div class="mono">$'+r.price?.toFixed(2)+'</div><div style="color:var(--green);font-size:11px">+'+r.upside_pct+'%</div><div style="color:var(--purple);font-size:12px;font-weight:600">'+r.risk_reward+'x</div></div>').join("")||'<div style="color:var(--dim);padding:20px">Run a scan first</div>';const recs=D.recommendations||[];document.getElementById("rlist").innerHTML='<table><tr><th>Ticker</th><th>Name</th><th>Type</th><th>Price</th><th>Action</th><th>Up</th><th>Down</th><th>R:R</th><th>Score</th></tr>'+recs.slice(0,50).map(r=>'<tr><td class="mono" style="color:var(--cyan);font-weight:700">'+r.ticker+'</td><td>'+r.name+'</td><td><span class="score-badge" style="background:'+(r.type==="crypto"?"rgba(255,140,66,.15);color:var(--orange)":"rgba(0,212,255,.15);color:var(--cyan)")+'">'+r.type+'</span></td><td class="mono">$'+r.price?.toFixed(2)+'</td><td><span class="score-badge" style="background:'+(r.action==="BUY"?"rgba(0,232,143,.15);color:var(--green)":r.action==="WATCH"?"rgba(255,184,0,.15);color:var(--yellow)":"rgba(255,68,102,.15);color:var(--red)")+'">'+r.action+'</span></td><td class="mono" style="color:var(--green)">+'+r.upside_pct+'%</td><td class="mono" style="color:var(--red)">-'+r.downside_pct+'%</td><td class="mono" style="color:var(--purple)">'+r.risk_reward+'x</td><td class="mono">'+r.score+'</td></tr>').join("")+'</table>';document.getElementById("lc").innerHTML=[{l:"Net Liquidity",v:"$"+(l.net_liquidity||0).toLocaleString()+"B"},{l:"Fed BS",v:"$"+(l.fed_balance_sheet||0).toLocaleString()+"B"},{l:"RRP",v:"$"+(l.rrp||0).toLocaleString()+"B"},{l:"TGA",v:"$"+(l.tga||0).toLocaleString()+"B"}].map(c=>'<div class="card" style="text-align:center"><div class="card-title">'+c.l+'</div><div class="big-num" style="color:var(--cyan)">'+c.v+'</div></div>').join("");document.getElementById("ld").innerHTML='<div class="card"><div class="big-num" style="color:'+(l.regime==="EXPANSION"?"var(--green)":"var(--yellow)")+'">'+( l.regime||"-")+'</div><div style="margin-top:8px">1M Change: <span class="mono" style="color:'+((l.net_liq_change_1m||0)>0?"var(--green)":"var(--red)")+'">'+ ((l.net_liq_change_1m||0)>0?"+":"")+(l.net_liq_change_1m||0).toFixed(1)+'B</span> | SOFR: '+(l.sofr?.toFixed(2)||"-")+'%</div></div>';const sc=r.scores||{};document.getElementById("rg").innerHTML=Object.entries(sc).map(([k,v])=>{const col=(v||0)>60?"var(--red)":(v||0)>35?"var(--yellow)":"var(--green)";return'<div class="card" style="text-align:center"><div class="card-title">'+k.replace("_"," ")+'</div><div class="big-num" style="color:'+col+'">'+(v||0).toFixed(0)+'</div></div>'}).join("")+'<div class="card" style="text-align:center"><div class="card-title">Composite</div><div class="big-num" style="color:'+(r.level==="CRITICAL"?"var(--red)":r.level==="LOW"?"var(--green)":"var(--yellow)")+'">'+(r.composite||0).toFixed(0)+'/100</div><div style="color:'+(r.level==="CRITICAL"?"var(--red)":"var(--yellow)")+'">'+(r.level||"-")+'</div></div>';const cry=D.crypto_top10||[];document.getElementById("ct").innerHTML='<table><tr><th>#</th><th>Symbol</th><th>Price</th><th>24h</th><th>7d</th><th>MCap</th></tr>'+cry.map(c=>'<tr><td>'+c.rank+'</td><td class="mono" style="color:var(--cyan)">'+c.symbol+'</td><td class="mono">$'+c.price?.toLocaleString(undefined,{maximumFractionDigits:4})+'</td><td class="mono" style="color:'+(c.change_24h>=0?"var(--green)":"var(--red)")+'">'+(c.change_24h>=0?"+":"")+c.change_24h+'%</td><td class="mono" style="color:'+(c.change_7d>=0?"var(--green)":"var(--red)")+'">'+(c.change_7d>=0?"+":"")+c.change_7d+'%</td><td class="mono">$'+(c.market_cap/1e9).toFixed(1)+'B</td></tr>').join("")+'</table>';document.getElementById("nl").innerHTML=(D.news||[]).map(n=>'<div class="card" style="margin-bottom:8px"><a href="'+n.url+'" target="_blank" style="color:var(--cyan);text-decoration:none;font-weight:600">'+n.title+'</a><div style="font-size:11px;color:var(--dim);margin-top:4px">'+n.source+'</div></div>').join("");document.getElementById("ac").textContent=D.ai_briefing||"Run a scan to generate AI briefing.";document.getElementById("lu").textContent=D.timestamp||"";const rpp=document.getElementById("rp");rpp.textContent=l.regime||"-";rpp.style.background=l.regime==="EXPANSION"?"var(--green)":l.regime==="CRISIS"?"var(--red)":"var(--yellow)";rpp.style.color="#000";const rkpp=document.getElementById("rkp");rkpp.textContent="Risk "+(r.composite?.toFixed(0)||"-");rkpp.style.background=r.level==="CRITICAL"?"var(--red)":r.level==="LOW"?"var(--green)":"var(--yellow)";rkpp.style.color="#000"}document.getElementById("tabs").onclick=e=>{if(!e.target.classList.contains("tab"))return;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));e.target.classList.add("active");document.getElementById("p-"+e.target.dataset.tab).classList.add("active")};const qas=[{l:"Scan",m:"scan"},{l:"What to buy?",m:"What should I buy today?"},{l:"Risk",m:"risk"},{l:"Liquidity",m:"liquidity"},{l:"Crypto",m:"crypto"},{l:"NVDA Price",m:"price NVDA"},{l:"AAPL Financials",m:"financials AAPL"},{l:"TSLA News",m:"news TSLA"},{l:"Trade Ideas",m:"Give me 5 trade ideas"},{l:"Portfolio",m:"How should I position?"}];document.getElementById("qa").innerHTML=qas.map(q=>'<button class="qa-btn" data-m="'+q.m+'">'+q.l+'</button>').join("");document.getElementById("qa").onclick=e=>{if(e.target.dataset.m){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));document.querySelector('[data-tab="chat"]').classList.add("active");document.getElementById("p-chat").classList.add("active");sendMsg(e.target.dataset.m)}};const cm=document.getElementById("cm"),ci=document.getElementById("ci"),sb=document.getElementById("sb");async function sendMsg(m){if(!m.trim())return;const ud=document.createElement("div");ud.className="chat-msg user";ud.textContent=m;cm.appendChild(ud);ci.value="";sb.disabled=true;const ld=document.createElement("div");ld.className="chat-msg ai";ld.innerHTML='<div class="spinner" style="display:inline-block;width:16px;height:16px"></div> Analyzing...';cm.appendChild(ld);cm.scrollTop=cm.scrollHeight;try{const r=await fetch(API+"chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:m})});const d=await r.json();let h="";if(d.type==="price"){h="<b>"+d.ticker+"</b> $"+d.price+" ("+(d.change>=0?"+":"")+d.change+"%)"}else if(d.type==="crypto_price"&&d.data){h="<b>"+d.data.symbol+"</b> $"+d.data.price?.toLocaleString()+" 24h:"+d.data.change_24h?.toFixed(1)+"%"}else if(d.type==="financials"){const f=d.data;if(f.error)h=f.error;else{h="<b>"+f.ticker+"</b><br>";(f.income_statements||[]).slice(0,2).forEach(i=>{h+=i.period+": Rev $"+(i.revenue/1e9).toFixed(2)+"B Net $"+(i.net_income/1e9).toFixed(2)+"B EPS $"+i.eps_diluted?.toFixed(2)+"<br>"})}}else if(d.type==="news"){h=(d.data||[]).map(n=>"<b>"+n.title+"</b><br><span style='color:var(--dim)'>"+n.source+"</span><br>").join("<br>")||"No news"}else if(d.type==="risk"){h="Risk: "+d.data.composite.toFixed(0)+"/100 ("+d.data.level+") VIX:"+d.data.vix.toFixed(1)+" HY:"+d.data.hy_spread.toFixed(2)+"%"}else if(d.type==="liquidity"){h=d.data.regime+" Net:$"+d.data.net_liquidity.toLocaleString()+"B"}else if(d.type==="crypto"){h=(d.data||[]).slice(0,15).map(c=>c.symbol+": $"+c.price.toLocaleString(undefined,{maximumFractionDigits:4})+" ("+(c.change_24h>0?"+":"")+c.change_24h+"%)").join("<br>")}else if(d.type==="ai_response"){h=d.message?.replace(/\n/g,"<br>")||""}else if(d.type==="scan_complete"){h=d.message||"Scan done!";try{const r2=await fetch(API+"latest");D=await r2.json();renderAll()}catch(e2){}}else if(d.type==="historical"){const b=d.data||[];if(b.length){const ch=((b[b.length-1].close/b[0].close)-1)*100;h="<b>"+d.ticker+"</b> "+b.length+" days | "+b[0].date+" $"+b[0].close.toFixed(2)+" -> "+b[b.length-1].date+" $"+b[b.length-1].close.toFixed(2)+" ("+(ch>0?"+":"")+ch.toFixed(1)+"%)"}else h="No data"}else h=d.message||JSON.stringify(d);ld.innerHTML=h}catch(e){ld.innerHTML='<span style="color:var(--red)">Error: '+e.message+"</span>"}sb.disabled=false;cm.scrollTop=cm.scrollHeight}sb.onclick=()=>sendMsg(ci.value);ci.onkeydown=e=>{if(e.key==="Enter")sendMsg(ci.value)};setInterval(async()=>{try{const r=await fetch(API+"latest");const nd=await r.json();if(nd.timestamp!==D.timestamp){D=nd;renderAll()}}catch(e){}},300000);init();</script></body></html>
