<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crypto Emergence · Early-Innings Bull Detection · JustHodl</title>
<style>
:root{--bg:#0a0e14;--bg-1:#121822;--bg-2:#1a2330;--border:#24303f;--fg-0:#e8eef6;--fg-1:#aebccd;--fg-2:#7c8ba0;--fg-3:#536074;--green:#3fd68c;--amber:#f5b343;--red:#ff5c6c;--cyan:#46c8ff;--violet:#a78bfa;--orange:#ff9f43;--mono:'SF Mono',ui-monospace,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg-0);font-family:var(--sans);line-height:1.5}
.wrap{max-width:1000px;margin:0 auto;padding:22px 16px 80px}
h1{font-size:21px;margin:0 0 2px}.sub{color:var(--fg-2);font-size:13px;margin-bottom:12px;max-width:820px}
.meta{color:var(--fg-3);font-family:var(--mono);font-size:11px;margin-bottom:14px}
h2{font-size:12px;color:var(--fg-2);margin:22px 0 9px;text-transform:uppercase;letter-spacing:.06em}
.banner{border-radius:13px;padding:16px 18px;margin-bottom:14px;border:1px solid var(--border)}
.banner .lab{font-size:22px;font-weight:700}.banner .sm{color:var(--fg-1);font-size:14px;margin-top:5px}
.trigger{background:var(--bg-1);border:1px solid var(--amber);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.trigger h3{margin:0 0 8px;font-size:13px;color:var(--amber)}
.trigger .row{font-size:13px;color:var(--fg-1);margin:5px 0;line-height:1.5}
.trigger .lvl{font-family:var(--mono);font-weight:700;color:var(--fg-0)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.chip{background:var(--bg-1);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-family:var(--mono);font-size:12px}
.chip b{display:block;font-size:9.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;font-weight:600}
.card{background:var(--bg-1);border:1px solid var(--border);border-radius:11px;padding:11px 14px;margin-bottom:8px}
.card.emerging{border-color:var(--green)}
.top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tk{font-family:var(--mono);font-weight:700;font-size:14px}.nm{color:var(--fg-1);font-size:12.5px}.sct{color:var(--fg-3);font-size:11px}
.badge{font-family:var(--mono);font-weight:700;font-size:10.5px;padding:2px 8px;border-radius:6px;margin-left:auto}
.score{font-family:var(--mono);font-weight:700;font-size:15px}
.det{font-size:11px;color:var(--fg-2);font-family:var(--mono);margin-top:4px}
.sig{background:var(--bg-2);border:1px solid var(--border);border-radius:5px;padding:1px 7px;font-size:10.5px;color:var(--cyan);margin-right:5px}
.note{color:var(--fg-3);font-size:11px;margin-top:18px;line-height:1.6}a{color:var(--cyan)}
.loading{padding:50px;text-align:center;color:var(--fg-2)}
</style></head><body><div style="max-width:1000px;margin:10px auto 0;padding:0 16px"><a href="/crypto-liquidity.html" style="display:inline-block;font:600 12px -apple-system,sans-serif;color:#46c8ff;text-decoration:none;background:rgba(70,200,255,.08);border:1px solid rgba(70,200,255,.35);border-radius:7px;padding:6px 11px">💧 Liquidity context → SSR dry-powder &amp; Fear/Greed oscillator</a></div>
<div class="wrap" id="wrap"><div class="loading">Reading the crypto complex…</div></div>
<script>
const PROXY="https://justhodl-data-proxy.raafouis.workers.dev";
async function gj(p){try{const r=await fetch(`https://justhodl.ai/${p}?t=${Date.now()}`);if(r.ok)return await r.json();}catch(e){}try{const r=await fetch(`${PROXY}/${p}?t=${Date.now()}`);if(r.ok)return await r.json();}catch(e){}return null;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
const SC={EMERGING:'var(--green)',CONFIRMED:'var(--cyan)','CONFIRMED BULL':'var(--cyan)',BASING:'var(--violet)',TRANSITION:'var(--amber)','EXTENDED / TOP-RISK':'var(--orange)',EXTENDED:'var(--orange)',DECLINING:'var(--red)','BEAR / DECLINING':'var(--red)'};
(async function(){
  const d=await gj('data/crypto-emergence.json');const w=document.getElementById('wrap');
  if(!d||!d.ok){w.innerHTML='<h1>Crypto Emergence</h1><div class="loading">No read yet — updates 13:00 & 23:00 UTC.</div>';return;}
  const c=SC[d.complex_stage]||'var(--fg-2)';const tr=d.triggers||{};
  let h=`<h1>🪙 Crypto Emergence <span style="color:var(--fg-3);font-size:13px">early-innings bull detection</span></h1>`;
  h+=`<div class="sub">${esc(d.thesis||'')}</div>`;
  h+=`<div class="meta">${(d.generated_at||'').slice(0,16).replace('T',' ')}Z</div>`;
  h+=`<div class="banner" style="border-left:4px solid ${c}"><div class="lab" style="color:${c}">${esc(d.complex_stage)}</div><div class="sm">${esc(d.complex_read)}</div></div>`;
  h+=`<div class="chips">
    <div class="chip"><b>BTC vs 200d</b><span style="color:${tr.btc_pct_to_200d>=0?'var(--green)':'var(--red)'}">${tr.btc_pct_to_200d>0?'+':''}${tr.btc_pct_to_200d}%</span></div>
    <div class="chip"><b>Breadth &gt;50d</b><span>${d.breadth_pct_above_50d}%</span></div>
    <div class="chip"><b>Breadth &gt;200d</b><span>${d.breadth_pct_above_200d}%</span></div>
    <div class="chip"><b>ETH/BTC 2m</b><span style="color:${(d.ethbtc_2m_trend_pct||0)>=0?'var(--green)':'var(--red)'}">${d.ethbtc_2m_trend_pct>0?'+':''}${d.ethbtc_2m_trend_pct}%</span></div>
    <div class="chip"><b>Alt-season</b><span style="font-size:10px">${esc(tr.alt_season||'—')}</span></div>
    ${d.mvrv!=null?`<div class="chip"><b>MVRV</b><span style="color:${d.mvrv<1?'var(--green)':d.mvrv>3?'var(--red)':'var(--fg-1)'}">${d.mvrv}</span></div>`:''}
    ${d.cycle_risk!=null?`<div class="chip"><b>Dump-risk</b><span style="color:${d.cycle_risk>=70?'var(--red)':d.cycle_risk<=40?'var(--green)':'var(--amber)'}">${d.cycle_risk} ${esc(d.risk_level||'')}</span></div>`:''}
    ${d.market_funding_annualized_pct!=null?`<div class="chip"><b>Funding ann.</b><span style="color:${d.market_funding_annualized_pct<0?'var(--green)':d.market_funding_annualized_pct>25?'var(--red)':'var(--fg-1)'}">${d.market_funding_annualized_pct>0?'+':''}${d.market_funding_annualized_pct}%</span></div>`:''}
  </div>`;
  h+=`<div class="trigger"><h3>⚑ What marks the early innings — the trigger to watch</h3>
    <div class="row">✅ <b>Confirms when:</b> ${esc(tr.early_bull_confirms_when||'')}</div>
    <div class="row">📍 BTC now <span class="lvl">$${(tr.btc_price||0).toLocaleString()}</span> vs 200-day <span class="lvl">$${(tr.btc_200d_level||0).toLocaleString()}</span> (<span style="color:${tr.btc_pct_to_200d>=0?'var(--green)':'var(--red)'}">${tr.btc_pct_to_200d>0?'+':''}${tr.btc_pct_to_200d}%</span>)</div>
    <div class="row">❌ <b>Invalidation:</b> ${esc(tr.invalidation||'')}</div></div>`;
  h+=`<h2>Per-coin stage · RS-vs-BTC</h2>`;
  for(const o of d.coins){const cc=SC[o.stage]||'var(--fg-2)';
    h+=`<div class="card ${o.stage==='EMERGING'?'emerging':''}"><div class="top">
      <span class="tk" style="color:${cc}">${esc(o.ticker)}</span><span class="nm">${esc(o.name)}</span><span class="sct">${esc(o.sector)}</span>
      <span class="badge" style="color:${cc};background:${cc}1a;border:1px solid ${cc}">${esc(o.stage)}</span>
      <span class="score" style="color:${cc}">${o.emergence_score}</span></div>
      <div class="det">RS ${o.rs_score} · Trend ${o.trend_score} · vs-BTC ${o.rs_vs_btc_slope_pct>0?'+':''}${o.rs_vs_btc_slope_pct}% · 3m ${o.ret_3m_pct>0?'+':''}${o.ret_3m_pct}%${o.funding_annualized_pct!=null?' · fund '+(o.funding_annualized_pct>0?'+':'')+o.funding_annualized_pct+'%':''} ${(o.signals||[]).length?'· ':''}${(o.signals||[]).map(s=>`<span class="sig">${esc(s)}</span>`).join('')}</div></div>`;
  }
  h+=`<div class="note">Crypto is scored against <b>BITCOIN</b> internally — an alt gaining on BTC (RS-vs-BTC up) is risk rotating down the curve (alt-season). The <b>200-day reclaim</b> is the decisive trend trigger; breadth across coins separates a real broad bull from a BTC-only bounce. EMERGING coins are logged and graded forward. Research, not investment advice.</div>`;
  w.innerHTML=h;
})();
</script>  <script src="/jh-page-ai.js" defer></script>
<script src="/jh-nav-drawer.js?v=3335" defer></script>
</body></html>
