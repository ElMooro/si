<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Global Bond Desk — JustHodl.AI</title>
<style>
:root{--bg:#0a0e14;--bg-2:#111722;--card:#0e1420;--line:#1e2836;--fg:#dfe7f3;--fg-2:#9db0c8;--fg-3:#5c6f88;--cyan:#46c8ff;--amber:#ffd24a;--red:#ff5d6c;--green:#37d99a;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:1240px;margin:0 auto;padding:26px 18px 60px}
h1{font-size:21px;margin:0 0 4px;letter-spacing:.4px}
.sub{color:var(--fg-3);font-family:var(--mono);font-size:11.5px;margin-bottom:22px}
.hero{display:flex;gap:22px;align-items:center;background:linear-gradient(135deg,var(--card),var(--bg-2));border:1px solid var(--line);border-radius:14px;padding:22px 26px;margin-bottom:14px;flex-wrap:wrap}
.score{font-family:var(--mono);font-size:54px;font-weight:700;line-height:1}
.phase{font-family:var(--mono);font-size:13px;letter-spacing:2px;padding:7px 14px;border-radius:8px;border:1px solid var(--line);background:var(--bg-2)}
.read{background:var(--bg-2);border:1px solid var(--line);border-left:3px solid var(--cyan);border-radius:10px;padding:12px 16px;font-size:12.5px;color:var(--fg-2);margin-bottom:20px;line-height:1.65}
.rgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:20px}
.rc{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;position:relative}
.rc h3{margin:0 0 6px;font-size:11.5px;letter-spacing:1.4px;color:var(--fg-2)}
.rs{font-family:var(--mono);font-size:30px;font-weight:700}
.bar{height:6px;background:var(--bg-2);border-radius:4px;margin:8px 0;overflow:hidden}
.bar i{display:block;height:100%}
.kv{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--fg-2);margin-top:3px}
.note{color:var(--fg-3);font-size:10.5px;margin-top:7px;line-height:1.4}
.stale{position:absolute;top:10px;right:12px;font-family:var(--mono);font-size:9px;color:var(--amber)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.card h3{margin:0 0 8px;font-size:12px;letter-spacing:1.4px;color:var(--fg-2)}
.method{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:13px 16px;color:var(--fg-2);font-size:12px;line-height:1.6}
.g{color:var(--green)}.a{color:var(--amber)}.r{color:var(--red)}.c{color:var(--cyan)}
.loading{color:var(--fg-3);font-family:var(--mono);padding:40px;text-align:center}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
td,th{padding:4px 7px;border-bottom:1px solid var(--line);text-align:right}
td:first-child,th:first-child{text-align:left}
</style></head><body><div class="wrap">
<h1>🌍 GLOBAL BOND DESK — FIXED-INCOME ANXIETY, WORLDWIDE</h1>
<div class="sub" id="sub">Loading US · USD-funding · Europe · Japan · EM…</div>
<div id="app" class="loading">Loading…</div>
<script src="/jh-nav-drawer.js" defer></script>
<script>
const PX=['','https://s3.amazonaws.com/justhodl-dashboard-live/'];
async function getJSON(k){for(const p of PX){try{const r=await fetch(p+k,{cache:'no-store'});if(r.ok)return await r.json()}catch(e){}}return null}
const rc=r=>({STRESS:'r',ANXIOUS:'a',UNEASY:'c',CALM:'g'}[r]||'c');
const sc=v=>v>=75?'var(--red)':v>=60?'var(--amber)':v>=45?'var(--cyan)':'var(--green)';
const bn=v=>v==null?'—':(v/1e9).toFixed(2)+'B';
const F=v=>v==null?'—':v;
(async()=>{
 const d=await getJSON('data/bond-desk.json');
 const app=document.getElementById('app');
 if(!d||!d.regions){app.textContent='Feed unavailable.';return}
 const R=d.regions,US=R.us||{},GF=R.global_funding||{},EU=R.europe||{},JP=R.japan||{},EM=R.em||{};
 const Fw=(US.flows||{}),Cr=(US.credit||{}),Mi=Cr.fred_micro||{},Sx=(US.stress||{}),Bk=Fw.buckets||{};
 document.getElementById('sub').innerHTML=`${d.n_regions_live}/5 regions live · v${d.version} · ${(d.generated_at||'').slice(0,16).replace('T',' ')} UTC`;
 const rcard=(name,r,lines)=>`
  <div class="rc">${r.fresh===false?'<span class="stale">STALE</span>':''}
    <h3>${name}</h3><div class="rs" style="color:${sc(r.score)}">${F(r.score)}</div>
    <div class="bar"><i style="width:${Math.min(100,r.score||0)}%;background:${sc(r.score)}"></i></div>
    ${lines.map(([k,v])=>`<div class="kv"><span>${k}</span><b>${v}</b></div>`).join('')}</div>`;
 app.className='';app.innerHTML=`
 <div class="hero">
   <div><div class="score ${rc(d.regime)}">${d.world_anxiety}</div>
   <div style="color:var(--fg-3);font-family:var(--mono);font-size:11px">world FI anxiety / 100</div></div>
   <div class="phase ${rc(d.regime)}">${d.regime}</div>
   <div class="phase">HOTTEST: ${(d.hottest_region||{}).region?.replace(/_/g,' ').toUpperCase()} ${(d.hottest_region||{}).score}</div>
 </div>
 <div class="read"><b>EQUITY READ</b> — ${d.equity_read||''}</div>
 <div class="rgrid">
  ${rcard('🇺🇸 UNITED STATES (.40)',US,[['eq→bond 5d','$'+bn(Fw.equity_to_bond_5d_usd)],['credit appetite','$'+bn(Fw.credit_appetite_5d_usd)],['duration tilt',F(Fw.duration_tilt)],['ICI bond $M/wk',F(Fw.ici_bond_weekly_usd_m)]])}
  ${rcard('💵 USD FUNDING (.20)',GF,[['severity',F(GF.severity)],['health',F(GF.health)],['Fed CB swaps $bn',F(GF.fed_swaps_bn)],['CNH gap pips',F(GF.cnh_gap_pips)]])}
  ${rcard('🇪🇺 EUROPE (.15)',EU,[['fragmentation',F(EU.fragmentation_score)+' '+F(EU.regime)],['BTP–Bund',F(EU.btp_bund_bp)+'bp'],['Δ 1m',(EU.btp_chg_1m_bp>0?'+':'')+F(EU.btp_chg_1m_bp)+'bp'],['systemic stress',F(EU.systemic_stress)]])}
  ${rcard('🇯🇵 JAPAN / CARRY (.15)',JP,[['carry stress',F(JP.carry_stress)],['JGB10 Δ6m',(JP.jgb10_chg_6m_pp>0?'+':'')+F(JP.jgb10_chg_6m_pp)+'pp'],['JGB10 Δ12m',(JP.jgb10_chg_12m_pp>0?'+':'')+F(JP.jgb10_chg_12m_pp)+'pp'],['duration carry',F(JP.duration_carry_pp)+'pp']])}
  ${rcard('🌏 EMERGING (.10)',EM,[['EM-HY − US-HY',F(EM.em_hy_minus_us_hy_bps)+'bp'],['EM debt flow 5d','$'+bn(EM.em_debt_flow_5d_usd)]])}
 </div>
 <div class="grid">
  <div class="card"><h3>US CREDIT — OWNED ICE LADDER + MICRO</h3>
    <div class="kv"><span>CCC − BB</span><b class="${(Mi.d21_bps||0)>15?'r':'c'}">${F(Cr.ccc_minus_bb_bps)}bp · p${F(Mi.pctile)} · Δ21d ${(Mi.d21_bps>0?'+':'')+F(Mi.d21_bps)}</b></div>
    <div class="kv"><span>HY − IG</span><b>${F(Cr.hy_minus_ig_bps)}bp</b></div>
    <div class="kv"><span>BBB − AAA</span><b>${F(Cr.bbb_minus_aaa_bps)}bp</b></div>
    <div class="kv"><span>ladder regime</span><b>${F(Cr.composite_regime)}</b></div>
    <div class="note">${Cr.source||''}</div></div>
  <div class="card"><h3>US STRESS CROSS-CHECKS</h3>
    <div class="kv"><span>bond-vol</span><b>${F(Sx.bond_vol_regime)} ${Sx.bond_vol_pctile?('p'+Sx.bond_vol_pctile):''}</b></div>
    <div class="kv"><span>auctions</span><b>${F(Sx.auction_regime)}</b></div>
    <div class="kv"><span>fails pctile</span><b>${F(Sx.fails_pctile)}</b></div>
    <div class="kv"><span>ACM TP Δ21d</span><b>${(Sx.acm_tp10_d21_bps>0?'+':'')+F(Sx.acm_tp10_d21_bps)}bp</b></div>
    <div class="kv"><span>dealer survey</span><b>${F(Sx.dealer_survey)}</b></div></div>
  <div class="card"><h3>US FLOW LADDER</h3>
    <table><tr><th>bucket</th><th>5d</th><th>21d</th><th>z90</th><th>n</th></tr>
    ${Object.entries(Bk).map(([k,b])=>`<tr><td>${k.replace(/_/g,' ')}</td><td class="${b.flow_5d_usd<0?'r':'g'}">$${bn(b.flow_5d_usd)}</td><td>$${bn(b.flow_21d_usd)}</td><td>${F(b.avg_z90)}</td><td>${b.n}</td></tr>`).join('')}</table>
    <div class="note">${Fw.matched_tickers} matched — ramping via etf-true-flows universe expansion.</div></div>
 </div>
 <div id="chart-anchor"><h1 style="font-size:14px;letter-spacing:1.5px;color:var(--fg-2)">CCC − BB SPREAD — 5Y WEEKLY (bps) · the junk-within-junk anxiety line</h1></div>
 <div class="method" style="margin-top:18px"><b>METHOD</b> — ${d.method||''}</div>`;
 const s=document.createElement('script');s.src='/jh-enhance.js';
 s.setAttribute('data-feed','data/bond-desk.json');
 s.setAttribute('data-line','chart_ccc_bb');
 s.setAttribute('data-crisis','1');
 document.getElementById('chart-anchor').appendChild(s);
})();
</script></div></body></html>
