<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>On-Chain Desk — Full CryptoQuant Catalog · JustHodl.AI</title><!-- ONCHAIN DESK v3.1 --><!-- FORECAST DESK v1 -->
<style>
:root{--bg:#06090f;--card:#0c1220;--card2:#0a0f1a;--line:#1b2940;--fg:#e2ecf8;--fg2:#8fa5c2;--fg3:#4f6580;--cy:#3fd0ff;--am:#ffcf4a;--rd:#ff5d6c;--gr:#2fe3a0;--vi:#a78bfa;--btc:#f7931a;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1100px 480px at 25% -8%,#0d1b31 0%,var(--bg) 55%);color:var(--fg);font:14px/1.55 -apple-system,Segoe UI,sans-serif}
.wrap{max-width:1380px;margin:0 auto;padding:24px 18px 70px}
h1{font-size:20px;margin:0 0 2px}
.sub{color:var(--fg3);font-family:var(--mono);font-size:11px;margin-bottom:12px}
.master{background:linear-gradient(160deg,#0f1c31,#0a1322);border:1px solid #274668;border-radius:14px;padding:16px 20px;margin:0 0 14px;font-size:14.5px;line-height:1.75}
.master h3{margin:0 0 8px;font-size:10.5px;letter-spacing:1.8px;color:var(--cy)}
.dsrc{color:var(--fg3);font-size:10px;font-family:var(--mono);margin-top:9px}
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-bottom:14px}
.dial{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.dial h3,h2.sec{margin:0 0 7px;font-size:10.5px;letter-spacing:1.6px;color:var(--fg2);font-weight:600}
.big{font-family:var(--mono);font-size:29px;font-weight:800;line-height:1}
.comp{color:var(--fg3);font-size:10.5px;margin-top:7px;font-family:var(--mono);line-height:1.65}
h2.sec{font-size:12px;letter-spacing:2px;color:var(--cy);margin:22px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(335px,1fr));gap:12px}
.c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.hd{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.hd b{font-size:12.5px}
.val{font-family:var(--mono);font-size:17px;font-weight:700}
.mrow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--fg2);margin-top:3px;gap:6px}
.zbar{height:5px;background:#0f1828;border-radius:4px;margin:7px 0 2px;position:relative}
.zbar i{position:absolute;top:-2px;bottom:-2px;width:2px;background:#ffffff44;left:50%}
.zbar b{position:absolute;top:0;bottom:0;border-radius:4px}
.chip{font-size:9px;padding:2px 6px;border-radius:9px;font-family:var(--mono);white-space:nowrap}
.chip.prov{background:#2b230d;color:var(--am);border:1px solid #4a3d1c}
.chip.tw{background:#1a1030;color:var(--vi);border:1px solid #35245e}
.chip.core{background:#0d2438;color:var(--cy);border:1px solid #1e4a6b}
.hist{font-size:11px;color:var(--fg2);margin-top:8px;line-height:1.55;border-left:2px solid #1e4a6b;padding-left:8px}
.ai{font-size:11px;color:#cfe3ff;margin-top:7px;background:#0e1a30;border:1px solid #1d3556;border-radius:8px;padding:7px 9px;line-height:1.55}
.g{color:var(--gr)}.r{color:var(--rd)}.a{color:var(--am)}.cy{color:var(--cy)}
.load{color:var(--fg3);font-family:var(--mono);padding:44px;text-align:center}
#q{width:100%;max-width:420px;background:#0c1524;border:1px solid var(--line);border-radius:9px;color:var(--fg);padding:9px 12px;font:12px var(--mono);margin:2px 0 6px}
.chwrap{cursor:zoom-in;position:relative}
.chwrap:hover{outline:1px solid #234a72;border-radius:6px}
svg.ch{width:100%;height:98px;display:block;margin-top:6px}
.legend{font-family:var(--mono);font-size:9px;color:var(--fg3);display:flex;gap:10px;margin-top:2px;flex-wrap:wrap}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}
#modal{position:fixed;inset:0;background:#04070ccc;backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
#modal.on{display:flex}
#mbox{background:var(--card);border:1px solid #2a4468;border-radius:16px;max-width:1180px;width:100%;padding:18px 22px;max-height:92vh;overflow:auto}
#mbox h3{margin:0;font-size:15px}
#mx{float:right;cursor:pointer;color:var(--fg3);font-size:20px;line-height:1;padding:2px 8px}
#mx:hover{color:var(--rd)}
.tgl{display:inline-flex;gap:0;margin:8px 0 0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.tgl b{padding:5px 14px;font:10.5px var(--mono);color:var(--fg2);cursor:pointer}
.tgl b.on{background:#123252;color:var(--cy)}
svg.bigc{width:100%;height:440px;display:block;margin-top:8px}
.axis{font:10px var(--mono);fill:#4f6580}
</style></head><body><div class="wrap">
<h1>⛓️ ON-CHAIN DESK — Full CryptoQuant Catalog</h1>
<div class="sub" id="meta">Loading catalog…</div>
<div id="app" class="load">Loading…</div>
<div id="modal" onclick="if(event.target.id==='modal')MC()"><div id="mbox"><span id="mx" onclick="MC()">✕</span><h3 id="mt"></h3><div id="msub" class="comp"></div><div class="tgl"><b id="tgP" class="on" onclick="MM('pct')">PERCENTILE (shared 0–100%)</b><b id="tgR" onclick="MM('raw')">RAW (own scales)</b></div><div id="mch"></div><div id="mhist"></div></div></div>
<script src="/jh-nav-drawer.js?v=3335" defer></script>
<script>
const fin=v=>Number.isFinite(v);
const CATS=[["market_indicator","VALUATION & CYCLE INDICATORS"],["exchange_flows","EXCHANGE FLOWS (ENTITY-LABELED)"],["market_data","DERIVATIVES, LEVERAGE & MARKET"],["flow_indicator","FLOW INDICATORS"],["miner_flows","MINER FLOWS"],["network_indicator","NETWORK INDICATORS"],["network_data","NETWORK ACTIVITY"],["stablecoins","STABLECOINS"],["eth","ETHEREUM"],["other","OTHER"]];
const col=v=>!fin(v)?"var(--fg3)":v>0?"var(--rd)":"var(--gr)";
const fV=(u,v)=>{if(!fin(v))return"—";const a=Math.abs(v);if(u==="USD"||u==="USD/d")return"$"+(a>=1e9?(v/1e9).toFixed(2)+"B":a>=1e6?(v/1e6).toFixed(1)+"M":v.toFixed(0));if(a>=1e9)return(v/1e9).toFixed(2)+"B";if(a>=1e6)return(v/1e6).toFixed(2)+"M";if(a>=1e4)return(v/1e3).toFixed(1)+"k";return a>=100?v.toFixed(1):v.toFixed(3)};
async function j(p){try{const r=await fetch(p,{cache:"no-store"});return await r.json()}catch(e){return null}}
let M={},SER={},TW={},BTC=null,MK=null,MODE="pct";
function pctile(v){const s=[...v].sort((a,b)=>a-b),n=s.length;return v.map(x=>{let lo=0,hi=n;while(lo<hi){const m=(lo+hi)>>1;if(s[m]<=x)lo=m+1;else hi=m}return 100*lo/n})}
function pick(k){const tw=TW[k],s=SER[k];
 if(tw&&tw.d&&tw.d.length>600)return{main:tw,recent:s,tw:true};
 return{main:s,recent:null,tw:false}}
function draw(k,W,H,axes,mode){
 const P=pick(k);if(!P.main||!BTC)return"";
 const pad=axes?{l:54,r:64,t:10,b:24}:{l:2,r:2,t:2,b:2};
 const iw=W-pad.l-pad.r,ih=H-pad.t-pad.b;
 // FULL 2010-> time domain on every chart: BTC is the backdrop; metric starts where its data starts.
 const t0=Date.parse(BTC.d[0]),t1=Math.max(Date.parse(BTC.d[BTC.d.length-1]),Date.parse(P.main.d[P.main.d.length-1])),tr=(t1-t0)||1;
 const X=d=>pad.l+((Date.parse(d)-t0)/tr)*iw;
 const Y=(v,mn,mx)=>pad.t+ih-((v-mn)/((mx-mn)||1))*ih;
 function ln(d,v,color,wd,op,mn,mx){return`<polyline points="${d.map((dd,i)=>`${X(dd)},${Y(v[i],mn,mx)}`).join(" ")}" fill="none" stroke="${color}" stroke-width="${wd}" opacity="${op}"/>`}
 let out="",leg="";
 if(mode==="pct"){
  const bp=pctile(BTC.v),mp=pctile(P.main.v);
  out+=ln(BTC.d,bp,"var(--btc)",axes?1.6:1.2,0.8,0,100);
  out+=ln(P.main.d,mp,P.tw?"var(--vi)":"var(--cy)",axes?1.8:1.4,P.tw?0.95:1,0,100);
  if(P.recent&&P.recent.d&&P.tw){const rp=pctile(P.recent.v);out+=ln(P.recent.d,rp,"var(--cy)",axes?1.8:1.4,0.9,0,100)}
  if(axes){for(const g of[25,50,75])out+=`<line x1="${pad.l}" y1="${Y(g,0,100)}" x2="${W-pad.r}" y2="${Y(g,0,100)}" stroke="#ffffff10"/><text class="axis" x="4" y="${Y(g,0,100)+3}">${g}%</text>`;
   out+=`<text class="axis" x="4" y="${pad.t+4}">100%</text><text class="axis" x="4" y="${H-pad.b}">0%</text>`}
 }else{
  const mv=P.main.v,mmin=Math.min(...mv),mmax=Math.max(...mv);
  out+=ln(P.main.d,mv,P.tw?"var(--vi)":"var(--cy)",axes?1.8:1.4,P.tw?0.95:1,mmin,mmax);
  if(P.recent&&P.recent.d&&P.tw)out+=ln(P.recent.d,P.recent.v,"var(--cy)",axes?1.8:1.4,0.9,mmin,mmax);
  const bmin=Math.min(...BTC.v),bmax=Math.max(...BTC.v);
  out+=ln(BTC.d,BTC.v,"var(--btc)",axes?1.5:1.1,0.75,bmin,bmax);
  if(axes)out+=`<text class="axis" x="4" y="${pad.t+8}">${fV(M[k].unit,mmax)}</text><text class="axis" x="4" y="${H-pad.b}">${fV(M[k].unit,mmin)}</text><text class="axis" x="${W-pad.r+5}" y="${pad.t+8}" fill="var(--btc)">$${(bmax/1e3).toFixed(0)}k</text><text class="axis" x="${W-pad.r+5}" y="${H-pad.b}" fill="var(--btc)">$${bmin<1?bmin.toFixed(2):(bmin/1e3).toFixed(1)+"k"}</text>`;
 }
 if(axes){const y0=new Date(t0).getUTCFullYear(),y1=new Date(t1).getUTCFullYear();
  for(let y=y0;y<=y1;y+=2){const t=y+"-01-01";if(Date.parse(t)>=t0)out+=`<line x1="${X(t)}" y1="${pad.t}" x2="${X(t)}" y2="${H-pad.b}" stroke="#ffffff0e"/><text class="axis" x="${X(t)-12}" y="${H-7}">${y}</text>`}}
 return`<svg class="${axes?"bigc":"ch"}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${out}</svg>`;
}
function legend(k,P){const st=P.main?P.main.d[0]:"";
 return`<div class="legend"><span><i class="dot" style="background:${P.tw?"var(--vi)":"var(--cy)"}"></i>${P.tw?"metric 2010→":"metric (from "+st+", accruing)"}</span>${P.tw?'<span><i class="dot" style="background:var(--cy)"></i>CQ 1y</span>':""}<span><i class="dot" style="background:var(--btc)"></i>BTC 2010→</span><span style="margin-left:auto">🔍 enlarge</span></div>`}
function ME(k){MK=k;const m=M[k];document.getElementById("mt").textContent=m.label+"  ·  "+fV(m.unit,m.value);
 document.getElementById("msub").textContent=`z ${m.z365>0?"+":""}${m.z365} · ${m.pctl_1y}th pctl/1y · ρ(BTC,1y) ${m.corr_1y} · stats window: ${m.stats_window}`;
 MM(MODE);
 document.getElementById("mhist").innerHTML=(m.hist_read?`<div class="hist" style="margin-top:12px">${m.hist_read}</div>`:"")+(m.ai_context?`<div class="ai">🤖 ${m.ai_context}</div>`:"");
 document.getElementById("modal").classList.add("on")}
function MM(mode){MODE=mode;document.getElementById("tgP").className=mode==="pct"?"on":"";document.getElementById("tgR").className=mode==="raw"?"on":"";
 if(MK)document.getElementById("mch").innerHTML=draw(MK,1120,470,true,mode)+legend(MK,pick(MK))}
function MC(){document.getElementById("modal").classList.remove("on")}
document.addEventListener("keydown",e=>{if(e.key==="Escape")MC()});
function F(q){q=(q||"").toLowerCase();document.querySelectorAll(".c[data-k]").forEach(el=>{el.style.display=!q||el.dataset.k.includes(q)?"":"none"})}
(async()=>{
 const [d,S]=await Promise.all([j("data/cryptoquant-onchain.json"),j("data/cryptoquant-series.json")]);
 const app=document.getElementById("app");
 if(!d||!d.metrics){app.textContent="Feed unavailable.";return}
 M=d.metrics;SER=(S&&S.series)||{};TW=(S&&S.twins)||{};BTC=S&&S.btc;
 const cz=d.composite_onchain_risk_z,nTw=Object.keys(TW).length;
 document.getElementById("meta").textContent=`${(d.generated_at||"").slice(0,16).replace("T"," ")} UTC · ${d.n_metrics} metrics · ${nTw} with 2010→ history · charts share a percentile axis for like-for-like reads · click any chart to enlarge`;
 const nExt=Object.values(M).filter(m=>fin(m.pctl_1y)&&(m.pctl_1y<=5||m.pctl_1y>=95)).length;
 let html=`<div class="master"><h3>🤖 STATE OF CRYPTO — FULL ${d.n_metrics}-METRIC AI SCAN</h3>${d.ai_master_brief||"—"}<div class="dsrc">source: ${d.ai_master_src==="llm"?"LLM synthesis over the complete metric digest":"deterministic synthesis computed from all metrics (LLM offline — resumes automatically when providers are topped up)"} · refreshed daily 21:05 UTC</div></div>
 ${d.forecasts?`<div class="master" style="border-color:#3a5a2f;background:linear-gradient(160deg,#0f1f14,#0a140d)"><h3 style="color:var(--gr)">🔮 BASE-RATE FORECASTS — 1M · 3M · 6M · 1Y <span class="chip prov">PROVISIONAL · LEDGER-GRADED</span></h3>
 <table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;margin-top:4px">
  <tr style="color:var(--fg3);font-size:10px"><th style="text-align:left">ASSET</th><th>1 MONTH</th><th>3 MONTHS</th><th>6 MONTHS</th><th>1 YEAR</th></tr>
  ${["btc","eth","alt_basket"].map(A=>{const F=d.forecasts[A]||{};const nm=A==="btc"?"BTC $"+(d.forecasts.btc_price_now||0).toLocaleString():A==="eth"?"ETH $"+(d.forecasts.eth_price_now||0).toLocaleString()+" (β "+(F.beta_vs_btc||"—")+")":"ALTS "+((F.assets||[]).join("/"))+" (β "+(F.beta_vs_btc||"—")+")";
   return`<tr style="border-top:1px solid #1a2c1f"><td style="text-align:left;padding:7px 0"><b>${nm}</b></td>${[30,90,180,365].map(h=>{const c=F["h"+h];if(!c)return"<td style=\'text-align:center\'>—</td>";const e=c.exp_pct;return`<td style="text-align:center;padding:7px 4px"><b style="color:${e>0?"var(--gr)":"var(--rd)"};font-size:14px">${e>0?"+":""}${e}%</b>${c.price_target?`<br><span style="color:var(--cy)">$${c.price_target.toLocaleString()}</span>`:""}<br><span style="color:var(--fg3);font-size:9.5px">${(c.p10_pct>0?"+":"")+c.p10_pct}% … ${(c.p90_pct>0?"+":"")+c.p90_pct}%</span></td>`}).join("")}</tr>`}).join("")}
 </table>
 <div style="font-size:12px;line-height:1.65;margin-top:9px">${d.forecasts.ai||""}</div>
 <div class="dsrc">${d.forecasts.method||""} · narration: ${d.forecasts.ai_src}</div></div>`:""}
 <div class="hero">
  <div class="dial"><h3>COMPOSITE ON-CHAIN RISK <span class="chip prov">PROVISIONAL</span></h3>
   <div class="big" style="color:${cz>0.5?"var(--rd)":cz<-0.5?"var(--gr)":"var(--cy)"}">${fin(cz)?(cz>0?"+":"")+cz.toFixed(2)+"z":"—"}</div>
   <div class="comp">${d.read||""}</div></div>
  <div class="dial"><h3>YEARLY EXTREMES</h3><div class="big" style="font-size:24px;color:var(--am)">${nExt}</div>
   <div class="comp">metrics at ≤5th / ≥95th percentile of their year.</div></div>
  <div class="dial"><h3>CHART MODES & HISTORY</h3>
   <div class="comp" style="margin-top:2px">Every chart spans <b class="cy">2010→today</b> (BTC backdrop). <b class="vi">${nTw} metrics</b> carry full 2010→ lines via Coin Metrics twins — including derived NUPL, Realized Price and Puell computed from exact identities. Default view = <b>percentile mode</b>: metric and BTC on one shared 0–100% axis, so a like-for-like read is instant; toggle RAW in the enlarged view. Non-twin metrics begin where CryptoQuant history begins (plan window, deepening daily).</div></div>
 </div><input id="q" placeholder="filter metrics… (reserve, funding, mvrv, puell…)" oninput="F(this.value)">`;
 for(const [ck,ct] of CATS){
  const ks=Object.keys(M).filter(k=>(M[k].category||"other")===ck).sort((a,b)=>Math.abs(50-(M[b].pctl_1y??50))-Math.abs(50-(M[a].pctl_1y??50)));
  if(!ks.length)continue;
  html+=`<h2 class="sec">${ct} · ${ks.length}</h2><div class="grid">`;
  for(const k of ks){const m=M[k],z=m.z365,w=Math.min(48,Math.abs(z||0)*16),P=pick(k);
   html+=`<div class="c" data-k="${(k+" "+(m.label||"")).toLowerCase()}">
    <div class="hd"><b>${m.label||k} ${m.in_composite?'<span class="chip core">CORE</span>':""}${P.tw?'<span class="chip tw">2010→</span>':""}</b><span class="val">${fV(m.unit,m.value)}</span></div>
    <div class="mrow"><span style="color:${col(z)}">z ${fin(z)?(z>0?"+":"")+z.toFixed(2):"—"} · ${fin(m.pctl_1y)?m.pctl_1y+"th pctl":""}</span><span>${fin(m.corr_1y)?"ρ(BTC) "+m.corr_1y:""}</span></div>
    <div class="zbar"><b style="${z>=0?"left:50%":"right:50%"};width:${w}%;background:${col(z)}"></b><i></i></div>
    <div class="chwrap" onclick="ME('${k}')">${draw(k,335,98,false,"pct")}</div>
    ${legend(k,P)}
    ${m.hist_read?`<div class="hist">${m.hist_read}</div>`:""}
    ${m.ai_context?`<div class="ai">🤖 ${m.ai_context}</div>`:""}
   </div>`}
  html+=`</div>`;
 }
 html+=`<div class="c" style="margin-top:16px"><div class="comp">${d.source||""} · ${d.grading||""} · ${d.plan_note||""}</div></div>`;
 app.className="";app.innerHTML=html;
})();
</script></div>
<script defer src="/jh-page-ai.js"></script>
</body></html>
