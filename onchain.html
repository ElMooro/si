<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>On-Chain Desk — Full CryptoQuant Catalog · JustHodl.AI</title><!-- ONCHAIN DESK v2 -->
<style>
:root{--bg:#06090f;--card:#0c1220;--card2:#0a0f1a;--line:#1b2940;--fg:#e2ecf8;--fg2:#8fa5c2;--fg3:#4f6580;--cy:#3fd0ff;--am:#ffcf4a;--rd:#ff5d6c;--gr:#2fe3a0;--vi:#a78bfa;--btc:#f7931a;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1100px 480px at 25% -8%,#0d1b31 0%,var(--bg) 55%);color:var(--fg);font:14px/1.55 -apple-system,Segoe UI,sans-serif}
.wrap{max-width:1360px;margin:0 auto;padding:24px 18px 70px}
h1{font-size:20px;margin:0 0 2px}
.sub{color:var(--fg3);font-family:var(--mono);font-size:11px;margin-bottom:14px}
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:14px}
.dial{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:14px;padding:15px 16px}
.dial h3,h2.sec{margin:0 0 8px;font-size:10.5px;letter-spacing:1.6px;color:var(--fg2);font-weight:600}
.big{font-family:var(--mono);font-size:30px;font-weight:800;line-height:1}
.comp{color:var(--fg3);font-size:10.5px;margin-top:8px;font-family:var(--mono);line-height:1.7}
h2.sec{font-size:12px;letter-spacing:2px;color:var(--cy);margin:22px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
.c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.hd{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.hd b{font-size:12.5px}
.val{font-family:var(--mono);font-size:17px;font-weight:700}
.mrow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--fg2);margin-top:3px;gap:6px}
.zbar{height:5px;background:#0f1828;border-radius:4px;margin:7px 0 2px;position:relative}
.zbar i{position:absolute;top:-2px;bottom:-2px;width:2px;background:#ffffff44;left:50%}
.zbar b{position:absolute;top:0;bottom:0;border-radius:4px}
.chip{font-size:9px;padding:2px 6px;border-radius:9px;font-family:var(--mono);white-space:nowrap}
.chip.prov{background:#2b230d;color:var(--am);border:1px solid #4a3d1c}
.chip.tw{background:#1a1030;color:var(--vi);border:1px solid #35245e}
.chip.core{background:#0d2438;color:var(--cy);border:1px solid #1e4a6b}
.hist{font-size:11px;color:var(--fg2);margin-top:8px;line-height:1.55;border-left:2px solid #1e4a6b;padding-left:8px}
.ai{font-size:11px;color:#cfe3ff;margin-top:7px;background:#0e1a30;border:1px solid #1d3556;border-radius:8px;padding:7px 9px;line-height:1.55}
.g{color:var(--gr)}.r{color:var(--rd)}.a{color:var(--am)}.cy{color:var(--cy)}.vi{color:var(--vi)}
.load{color:var(--fg3);font-family:var(--mono);padding:44px;text-align:center}
#q{width:100%;max-width:420px;background:#0c1524;border:1px solid var(--line);border-radius:9px;color:var(--fg);padding:9px 12px;font:12px var(--mono);margin:2px 0 6px}
svg.ch{width:100%;height:88px;display:block;margin-top:6px}
.legend{font-family:var(--mono);font-size:9px;color:var(--fg3);display:flex;gap:10px;margin-top:2px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}
</style></head><body><div class="wrap">
<h1>⛓️ ON-CHAIN DESK — Full CryptoQuant Catalog</h1>
<div class="sub" id="meta">Loading catalog…</div>
<input id="q" placeholder="filter metrics… (e.g. reserve, funding, mvrv)" oninput="F(this.value)">
<div id="app" class="load">Loading…</div>
<script src="/jh-nav-drawer.js" defer></script>
<script>
const fin=v=>Number.isFinite(v);
const CATS=[["market_indicator","VALUATION & CYCLE INDICATORS"],["exchange_flows","EXCHANGE FLOWS (ENTITY-LABELED)"],["market_data","DERIVATIVES, LEVERAGE & MARKET"],["flow_indicator","FLOW INDICATORS"],["miner_flows","MINER FLOWS"],["network_indicator","NETWORK INDICATORS"],["network_data","NETWORK ACTIVITY"],["stablecoins","STABLECOINS"],["eth","ETHEREUM"],["other","OTHER"]];
const col=v=>!fin(v)?"var(--fg3)":v>0?"var(--rd)":"var(--gr)";
const fV=(u,v)=>{if(!fin(v))return"—";const a=Math.abs(v);if(u==="USD"||u==="USD/d")return"$"+(a>=1e9?(v/1e9).toFixed(2)+"B":a>=1e6?(v/1e6).toFixed(1)+"M":v.toFixed(0));if(a>=1e9)return(v/1e9).toFixed(2)+"B";if(a>=1e6)return(v/1e6).toFixed(2)+"M";if(a>=1e4)return(v/1e3).toFixed(1)+"k";return a>=100?v.toFixed(1):v.toFixed(3)};
async function j(p){try{const r=await fetch(p,{cache:"no-store"});return await r.json()}catch(e){return null}}
function chart(id,s,btc,twin){
 const W=330,H=88,pad=2;
 function line(d,v,color,op,yspan){
  if(!d||d.length<3)return"";
  const mn=Math.min(...v),mx=Math.max(...v),rg=(mx-mn)||1;
  const t0=Date.parse(d[0]),t1=Date.parse(d[d.length-1]),tr=(t1-t0)||1;
  const pts=d.map((dd,i)=>`${pad+((Date.parse(dd)-t0)/tr)*(W-2*pad)},${H-pad-((v[i]-mn)/rg)*(H-2*pad)}`).join(" ");
  return`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.4" opacity="${op}"/>`;
 }
 // align BTC overlay to the metric's own date span
 let ov="";
 if(btc&&s){const t0=Date.parse(s.d[0]);const idx=btc.d.map((d,i)=>[d,i]).filter(x=>Date.parse(x[0])>=t0);
  if(idx.length>3){ov=line(idx.map(x=>x[0]),idx.map(x=>btc.v[x[1]]),"var(--btc)",.75)}}
 const tw=twin?line(twin.d,twin.v,"var(--vi)",.55):"";
 return`<svg class="ch" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${twin?tw:""}${s?line(s.d,s.v,"var(--cy)",1):""}${ov}</svg>
 <div class="legend"><span><i class="dot" style="background:var(--cy)"></i>metric ${twin?"(1y, accruing)":""}</span><span><i class="dot" style="background:var(--btc)"></i>BTC price</span>${twin?'<span><i class="dot" style="background:var(--vi)"></i>2010→ twin (Coin Metrics)</span>':""}</div>`;
}
let ALL=[];
function F(q){q=(q||"").toLowerCase();document.querySelectorAll(".c[data-k]").forEach(el=>{el.style.display=!q||el.dataset.k.includes(q)?"":"none"})}
(async()=>{
 const [d,S]=await Promise.all([j("data/cryptoquant-onchain.json"),j("data/cryptoquant-series.json")]);
 const app=document.getElementById("app");
 if(!d||!d.metrics){app.textContent="Feed unavailable.";return}
 const M=d.metrics,SER=(S&&S.series)||{},TW=(S&&S.twins)||{},BTC=S&&S.btc,cz=d.composite_onchain_risk_z;
 document.getElementById("meta").textContent=`${(d.generated_at||"").slice(0,16).replace("T"," ")} UTC · ${d.n_metrics} metrics live across ${Object.keys(d.categories||{}).length} categories · staleness ${d.max_staleness_days}d · ${d.plan_note||""}`;
 const nExt=Object.values(M).filter(m=>fin(m.pctl_1y)&&(m.pctl_1y<=5||m.pctl_1y>=95)).length;
 let html=`<div class="hero">
  <div class="dial"><h3>COMPOSITE ON-CHAIN RISK <span class="chip prov">PROVISIONAL</span></h3>
   <div class="big" style="color:${cz>0.5?"var(--rd)":cz<-0.5?"var(--gr)":"var(--cy)"}">${fin(cz)?(cz>0?"+":"")+cz.toFixed(2)+"z":"—"}</div>
   <div class="comp">${d.read||""} · curated core-8 only; the long tail is displayed and graded, never blindly composited.</div></div>
  <div class="dial"><h3>HISTORICAL CONTEXT ENGINE</h3>
   <div class="comp" style="margin-top:2px">Every metric carries a computed answer to one question: <b class="cy">what did BTC do next when this metric last sat at today's level?</b> Percentile-conditional forward 7/21/60-day returns — over <b class="vi">2010→present</b> where a free Coin Metrics twin exists, else over the accruing plan window (CryptoQuant API history = 1 year on Professional; labeled honestly per card).</div></div>
  <div class="dial"><h3>EXTREMES & LEDGER</h3>
   <div class="big" style="font-size:24px;color:var(--am)">${nExt}</div>
   <div class="comp">metrics at ≤5th or ≥95th yearly percentile right now. Composite logged daily vs BTC-USD (1/3/7/14/21d); AI narration on extremes when LLM providers are live.</div></div>
 </div>`;
 for(const [ck,ct] of CATS){
  const ks=Object.keys(M).filter(k=>(M[k].category||"other")===ck).sort((a,b)=>Math.abs(50-(M[b].pctl_1y??50))-Math.abs(50-(M[a].pctl_1y??50)));
  if(!ks.length)continue;
  html+=`<h2 class="sec">${ct} · ${ks.length}</h2><div class="grid">`;
  for(const k of ks){const m=M[k],z=m.z365,w=Math.min(48,Math.abs(z||0)*16);
   html+=`<div class="c" data-k="${(k+" "+(m.label||"")).toLowerCase()}">
    <div class="hd"><b>${m.label||k} ${m.in_composite?'<span class="chip core">CORE</span>':""}${m.twin?'<span class="chip tw">2010→</span>':""}</b><span class="val">${fV(m.unit,m.value)}</span></div>
    <div class="mrow"><span style="color:${col(z)}">z ${fin(z)?(z>0?"+":"")+z.toFixed(2):"—"} · ${fin(m.pctl_1y)?m.pctl_1y+"th pctl":""}</span><span>${fin(m.wow)?"WoW "+(m.wow>0?"+":"")+fV(m.unit,Math.abs(m.wow))*0+fV(m.unit,m.wow):""}</span><span>${fin(m.corr_1y)?"ρ(BTC) "+m.corr_1y:""}</span></div>
    <div class="zbar"><b style="${z>=0?"left:50%":"right:50%"};width:${w}%;background:${col(z)}"></b><i></i></div>
    ${chart(k,SER[k],BTC,TW[k])}
    ${m.hist_read?`<div class="hist">${m.hist_read} <span style="color:var(--fg3)">[window: ${m.stats_window}]</span></div>`:""}
    ${m.ai_context?`<div class="ai">🤖 ${m.ai_context}</div>`:""}
   </div>`}
  html+=`</div>`;
 }
 html+=`<div class="c" style="margin-top:16px"><div class="comp">${d.source||""} · ${d.grading||""} · adapter daily 21:05 UTC; spec-driven (endpoint drift = config fix); ratios 21:20 → exchange-flows 21:55 → ledger. Chart lines: metric (cyan, 1y accruing) · BTC price (orange, aligned span) · Coin Metrics twin (violet, 2010→) where available.</div></div>`;
 app.className="";app.innerHTML=html;
})();
</script></div></body></html>
