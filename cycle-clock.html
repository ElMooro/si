</style></head><body><div class="wrap" id="wrap"><div class="loading">Reading the clock…</div></div>
<script>
const PROXY="https://justhodl-data-proxy.raafouis.workers.dev";
async function gj(p){try{const r=await fetch(`https://justhodl.ai/${p}?t=${Date.now()}`);if(r.ok)return await r.json();}catch(e){}try{const r=await fetch(`${PROXY}/${p}?t=${Date.now()}`);if(r.ok)return await r.json();}catch(e){}return null;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function r1(x){return x==null?'—':(Math.round(x*10)/10);}

// ── growth × inflation investment clock with 12-month trail + per-quadrant asset leadership ──
const QHERO={OVERHEAT:['OVERHEAT','Commodities','#f5b343'],STAGFLATION:['STAGFLATION','Cash · Gold','#ff8a5c'],
             DOWNTURN:['DOWNTURN','Long bonds','#ff5c6c'],GOLDILOCKS:['GOLDILOCKS','Equities','#3fd68c']};
function clockGI(cy){
  const trail=cy.trail||[];const co=cy.coordinates||(trail.length?trail[trail.length-1]:null);
  const active=cy.headline_quadrant||cy.quadrant_2d;
  const SP=2.6,L=30,R=330,C=180;
  const X=g=>C+Math.max(-1,Math.min(1,(g||0)/SP))*150;
  const Y=i=>C-Math.max(-1,Math.min(1,(i||0)/SP))*150;
  const quads=[['OVERHEAT',180,30],['STAGFLATION',30,30],['DOWNTURN',30,180],['GOLDILOCKS',180,180]];
  let s=`<svg viewBox="0 0 360 384" style="width:100%;max-width:430px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">`;
  for(const [q,x,y] of quads){const h=QHERO[q];const on=q===active;
    s+=`<rect x="${x}" y="${y}" width="150" height="150" fill="${h[2]}" fill-opacity="${on?0.14:0.05}" stroke="${h[2]}" stroke-opacity="${on?0.9:0.25}" stroke-width="${on?1.5:1}"/>`;
    const tx=x+75;
    s+=`<text x="${tx}" y="${y+ (y<C?26:132)}" fill="${h[2]}" fill-opacity="${on?1:0.6}" font-size="12" font-weight="700" text-anchor="middle" font-family="sans-serif">${h[0]}</text>`;
    s+=`<text x="${tx}" y="${y+ (y<C?40:146)}" fill="${h[2]}" fill-opacity="${on?0.95:0.55}" font-size="11" text-anchor="middle" font-family="monospace">▸ ${h[1]}</text>`;}
  s+=`<line x1="${C}" y1="30" x2="${C}" y2="330" stroke="#2a3550" stroke-dasharray="3 4"/><line x1="30" y1="${C}" x2="330" y2="${C}" stroke="#2a3550" stroke-dasharray="3 4"/>`;
  s+=`<text x="332" y="176" fill="#536074" font-size="9" text-anchor="end" font-family="monospace">growth +</text><text x="28" y="176" fill="#536074" font-size="9" font-family="monospace">growth −</text>`;
  s+=`<text x="186" y="40" fill="#536074" font-size="9" font-family="monospace">inflation +</text><text x="186" y="326" fill="#536074" font-size="9" font-family="monospace">inflation −</text>`;
  if(trail.length){let pts=trail.map(p=>`${X(p.g).toFixed(1)},${Y(p.i).toFixed(1)}`).join(' ');
    s+=`<polyline points="${pts}" fill="none" stroke="#46c8ff" stroke-opacity="0.45" stroke-width="2"/>`;
    trail.forEach((p,k)=>{const op=0.2+0.8*(k/(trail.length-1||1));const rr=3+2.4*(k/(trail.length-1||1));
      s+=`<circle cx="${X(p.g).toFixed(1)}" cy="${Y(p.i).toFixed(1)}" r="${rr.toFixed(1)}" fill="#46c8ff" fill-opacity="${op.toFixed(2)}"/>`;});
    s+=`<text x="${X(trail[0].g).toFixed(1)}" y="${(Y(trail[0].i)+16).toFixed(1)}" fill="#46c8ff" fill-opacity="0.55" font-size="8.5" text-anchor="middle" font-family="monospace">${esc(trail[0].m)}</text>`;}
  if(co){const nx=X(co.g),ny=Y(co.i);
    if(trail.length>1){const pv=trail[trail.length-2];const dx=nx-X(pv.g),dy=ny-Y(pv.i);const L2=Math.hypot(dx,dy)||1;const ex=nx+dx/L2*16,ey=ny+dy/L2*16;
      s+=`<line x1="${nx.toFixed(1)}" y1="${ny.toFixed(1)}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="#fff" stroke-width="2"/>`;}
    s+=`<circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="9" fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="2"/><circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="6.5" fill="#fff"/>`;
    s+=`<text x="${nx.toFixed(1)}" y="${(ny-13).toFixed(1)}" fill="#fff" font-size="11" font-weight="700" text-anchor="middle" font-family="monospace">NOW</text>`;}
  s+=`</svg>`;return s;
}
function recDial(p){
  if(p==null)return '';
  const a=(180-1.8*Math.max(0,Math.min(100,p)))*Math.PI/180;
  const ex=(60+50*Math.cos(a)).toFixed(1),ey=(62-50*Math.sin(a)).toFixed(1);
  const col=p>=60?'#ff5c6c':p>=35?'#f5b343':'#3fd68c';
  return `<svg viewBox="0 0 120 78" width="120" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 62 A50 50 0 0 1 110 62" fill="none" stroke="#1a2330" stroke-width="9" stroke-linecap="round"/>
    <path d="M10 62 A50 50 0 0 1 ${ex} ${ey}" fill="none" stroke="${col}" stroke-width="9" stroke-linecap="round"/>
    <text x="60" y="56" text-anchor="middle" font-size="22" font-weight="800" fill="${col}" font-family="monospace">${Math.round(p)}%</text></svg>`;
}
function sparkline(series,w,hh){
  if(!series||series.length<2)return '';
  const vs=series.map(p=>p.v);const mn=Math.min(...vs),mx=Math.max(...vs);const rng=(mx-mn)||1;
  const pts=series.map((p,i)=>`${(i/(series.length-1)*w).toFixed(1)},${(hh-(p.v-mn)/rng*hh).toFixed(1)}`).join(' ');
  const up=vs[vs.length-1]>=vs[0];
  return `<svg viewBox="0 0 ${w} ${hh}" width="${w}" height="${hh}" preserveAspectRatio="none" style="display:block"><polyline points="${pts}" fill="none" stroke="${up?'#3fd68c':'#ff5c6c'}" stroke-width="1.5"/></svg>`;
}
function cryptoSection(cr){
  if(!cr||(cr.dvol_btc==null&&cr.liquidity_regime==null))return '';
  const vc={LOW:'#3fd68c',NORMAL:'#46c8ff',ELEVATED:'#f5b343',HIGH:'#ff5c6c'}[cr.dvol_btc_regime]||'#7c8ba0';
  const lc=/LOADED/i.test(cr.liquidity_regime||'')?'#3fd68c':/SPENT|GREED/i.test(cr.liquidity_regime||'')?'#ff5c6c':'#46c8ff';
  const fgv=cr.fear_greed;const fgc=fgv==null?'#7c8ba0':fgv<=25?'#3fd68c':fgv>=75?'#ff5c6c':'#f5b343';
  const fc=cr.funding_composite||{};
  let s=`<h2>Crypto — liquidity, leverage &amp; volatility</h2><div class="panel">`;
  s+=`<div class="tilegrid" style="margin-bottom:13px">`;
  s+=tile('BTC DVOL',cr.dvol_btc==null?'—':r1(cr.dvol_btc),`${cr.dvol_btc_regime||''}${cr.dvol_btc_pctile!=null?' · '+cr.dvol_btc_pctile+'th pctile':''}${cr.dvol_btc_trend?' · '+String(cr.dvol_btc_trend).toLowerCase():''}`,vc);
  s+=tile('ETH DVOL',cr.dvol_eth==null?'—':r1(cr.dvol_eth),'implied vol','#46c8ff');
  s+=tile('Perp funding',cr.funding_regime,fc.vw_funding_annualized_pct!=null?`vw ${r1(fc.vw_funding_annualized_pct)}% APR · OI $${r1(fc.total_oi_usd_billions)}B`:'',/CROWD|EXTREME|SQUEEZE|LONG|SHORT/i.test(cr.funding_regime||'')?'#f5b343':'#46c8ff');
  s+=tile('Stablecoin liquidity',cr.liquidity_regime,cr.ssr!=null?`SSR ${cr.ssr} · ${r1(cr.ssr_pctile)}th pctile`:'',lc);
  s+=tile('Fear & Greed',fgv==null?'—':`${fgv}`,cr.fear_greed_class||'',fgc);
  s+=`</div>`;
  if(cr.ssr_read)s+=`<div style="border-left:3px solid ${lc};background:rgba(255,255,255,.02);border-radius:8px;padding:9px 12px;margin-bottom:11px;font-size:12px;color:var(--fg-1);line-height:1.5"><b style="color:${lc}">Stablecoin dry powder · </b>${esc(cr.ssr_read)}${cr.directional_read?` — ${esc(cr.directional_read)}`:''}</div>`;
  if(cr.squeeze_candidates&&cr.squeeze_candidates.length){
    s+=`<div style="font-size:9.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Perp squeeze candidates · funding z-score</div><div class="assets">`;
    s+=cr.squeeze_candidates.map(c=>{const cc=/BEARISH/i.test(c.regime||'')?'lag':/BULLISH|LONG_SQUEEZE/i.test(c.regime||'')?'lead':'';return `<span class="chip ${cc}">${esc(c.coin)} z${c.z>=0?'+':''}${c.z}</span>`;}).join('');
    s+=`</div>`;
  }
  if(cr.rr_25d!=null||cr.puell!=null||cr.cash_carry_3m!=null){
    const rrc=cr.rr_25d==null?'#7c8ba0':cr.rr_25d<=-6?'#ff5c6c':cr.rr_25d>=3?'#3fd68c':'#f5b343';
    const tc=/BACKWARD/i.test(cr.vol_term_regime||'')?'#ff5c6c':/CONTANGO/i.test(cr.vol_term_regime||'')?'#3fd68c':'#7c8ba0';
    const hc=/CAPITUL/i.test(cr.hash_ribbon||'')?'#f5b343':/RECOVERY|BUY/i.test(cr.hash_ribbon||'')?'#3fd68c':'#46c8ff';
    const pz=cr.puell_zone||'';const pc=/DEEP VALUE|UNDERVALUED/i.test(pz)?'#3fd68c':/OVERHEAT|ELEVATED/i.test(pz)?'#ff5c6c':'#46c8ff';
    const cc3=cr.cash_carry_3m;const ccc=cc3==null?'#7c8ba0':cc3<=-2?'#ff5c6c':cc3>=15?'#f5b343':'#46c8ff';
    s+=`<div style="font-size:9.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.04em;margin:4px 0 5px">Options skew · miners · carry</div>`;
    s+=`<div class="tilegrid" style="margin-bottom:11px">`;
    s+=tile('25&#916; risk reversal',cr.rr_25d==null?'—':(cr.rr_25d>0?'+':'')+r1(cr.rr_25d),cr.rr_25d==null?'':(cr.rr_25d<=-6?'put skew · hedging':cr.rr_25d>=3?'call skew · upside':'balanced'),rrc);
    s+=tile('Vol term',cr.vol_term_regime?String(cr.vol_term_regime).split(' ')[0]:'—','30d ATM vs 7/90d',tc);
    s+=tile('Hash ribbon',cr.hash_ribbon||'—',cr.days_in_capitulation?`${cr.days_in_capitulation}d capitulation`:'miner hash 30/60d',hc);
    s+=tile('Puell multiple',cr.puell==null?'—':r1(cr.puell),pz,pc);
    s+=tile('Cash &amp; carry 3m',cc3==null?'—':r1(cc3)+'%',cr.carry_regime?String(cr.carry_regime).split(' (')[0]:'annualized basis',ccc);
    s+=`</div>`;
  }
  s+=`<div style="font-size:10.5px;color:var(--fg-3);margin-top:10px">Crypto implied vol (Deribit DVOL), perp funding/OI positioning (crypto-funding) and stablecoin dry-powder/SSR + Fear &amp; Greed (crypto-liquidity), plus 25&#916; risk reversal + vol term structure (options-surface), hash ribbons + Puell (miners) and 3m cash-and-carry basis (basis). Extreme Fear + low SSR = sidelined cash / contrarian setup; put skew + vol backwardation = near-term hedging; miner capitulation + low Puell = bottoming setup; carry backwardation = deleveraging.</div></div>`;
  return s;
}
function crossAssetSection(ca){
  if(!ca||!ca.returns||!ca.returns.length)return '';
  const conf=ca.confirmation||{};
  const sc={CONFIRMED:'#3fd68c',MIXED:'#f5b343',CONTRADICTED:'#ff5c6c'}[conf.status]||'#7c8ba0';
  const mx=Math.max(...ca.returns.map(x=>Math.abs(x.ret_1m)),1);
  let s=`<h2>Cross-asset confirmation — is the prescription actually working?</h2><div class="panel">`;
  if(conf.status)s+=`<div style="border-left:3px solid ${sc};background:rgba(255,255,255,.02);border-radius:8px;padding:10px 13px;margin-bottom:13px"><span style="font-family:var(--mono);font-size:12px;font-weight:800;color:${sc}">TAPE ${esc(conf.status)}</span> <span style="font-size:9.5px;color:var(--fg-3)">· ${esc(conf.beating_spy||'')} expected leaders beating SPY (1m)</span><div style="font-size:12.5px;color:var(--fg-1);margin-top:5px;line-height:1.5">${esc(conf.note||'')}</div></div>`;
  s+=`<div style="font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px">1-month return · ranked &nbsp;·&nbsp; <span style="color:var(--fg-3)">3-month in grey</span></div>`;
  for(const x of ca.returns){const c=x.ret_1m>=0?'#3fd68c':'#ff5c6c';const wp=Math.abs(x.ret_1m)/mx*100;

    tile('Fed drift',rfv.fed_drift,`z ${r1(rfv.fed_drift_z)}`,HAWK(rfv.fed_drift)),
    tile('MOVE · bond vol',rfv.move_level==null?'—':r1(rfv.move_level),`${rfv.move_pctile==null?'':r1(rfv.move_pctile)+'th pctile · '}${rfv.move_regime||''}`,(rfv.move_pctile!=null&&rfv.move_pctile<15)?'#f5b343':'#46c8ff'),
    tile('Equity vol',rfv.equity_vol_regime,`composite ${r1(rfv.equity_vol_score)}`,rfv.equity_vol_regime==='PANIC'?'#ff5c6c':rfv.equity_vol_regime==='CONCERNED'?'#f5b343':'#3fd68c'),
    tile('Vol-of-vol',rfv.vov_state,'VVIX regime',/QUIET|CALM/i.test(rfv.vov_state||'')?'#3fd68c':'#f5b343'),
    tile('Tail risk',rfv.tail_gauge==null?'—':`${r1(rfv.tail_gauge)}/100`,`${rfv.tail_regime||''} · protection ${String(rfv.tail_valuation||'').toLowerCase()}`,/ELEVATED|HIGH/i.test(rfv.tail_regime||'')?'#ff5c6c':/WARM/i.test(rfv.tail_regime||'')?'#f5b343':'#3fd68c'),
    tile('Crypto vol (DVOL)',rfv.crypto_dvol==null?'—':r1(rfv.crypto_dvol),`${rfv.crypto_dvol_regime||''}${rfv.crypto_dvol_pctile!=null?' · '+rfv.crypto_dvol_pctile+'th':''}${rfv.crypto_dvol_trend?' · '+String(rfv.crypto_dvol_trend).toLowerCase():''}`,{LOW:'#3fd68c',NORMAL:'#46c8ff',ELEVATED:'#f5b343',HIGH:'#ff5c6c'}[rfv.crypto_dvol_regime]||'#7c8ba0'),
  ],'Market-implied Fed path from fed funds futures (fedwatch), Fed communication tone/drift, bond vol (MOVE), the equity-vol complex, and the option-implied tail gauge. Futures pricing hikes into suppressed vol = policy-vol underpriced.');

  h+=yieldCurveSection(d.yield_curve);

  const ps=d.positioning||{};
  const aaiiCol=ps.aaii_extreme==='EXTREME_BULL'?'#ff5c6c':ps.aaii_extreme==='EXTREME_BEAR'?'#3fd68c':'#46c8ff';
  h+=tileGrid('Positioning, sentiment & market internals',[
    tile('AAII retail',ps.aaii_bull_pct==null?'—':`${ps.aaii_bull_pct}% bull`,ps.aaii_extreme==='EXTREME_BULL'?'⚠ euphoric — contrarian':`bear ${ps.aaii_bear_pct}% · z ${r1(ps.aaii_spread_z)}`,aaiiCol),
    tile('Futures (COT)',(ps.cot||{}).smart_money||'—',ps.cot?`pos ${r1(ps.cot.score)} · risk-app ${r1(ps.cot.risk_appetite)}`:'',/DISTRIBUT/i.test((ps.cot||{}).smart_money||'')?'#ff5c6c':/ACCUMULAT/i.test((ps.cot||{}).smart_money||'')?'#3fd68c':'#46c8ff'),
    tile('Retail flow',ps.retail_regime,ps.retail_note?String(ps.retail_note).slice(0,38):'','#46c8ff'),
    tile('Credit vs equity',ps.credit_equity_state,'HYG vs SPY',/BULL_RICH/.test(ps.credit_equity_state||'')?'#f5b343':/BEAR/.test(ps.credit_equity_state||'')?'#ff5c6c':'#3fd68c'),
    tile('Breadth thrust',ps.breadth_thrust_state==='NULL'?'none':ps.breadth_thrust_state,`strength ${ps.breadth_thrust_strength==null?'—':ps.breadth_thrust_strength}`,'#7c8ba0'),
    tile('Gold vs equity',ps.gold_equity_state,'rotation','#46c8ff'),
  ],'Where the crowd sits and whether the market is healthy underneath. Euphoric retail + complacent credit are classic late-cycle contrarian tells.');

  const gd=d.growth_depth||{};
  const labCol=/weaken|contract|slow/i.test(gd.labor_regime||'')?'#ff5c6c':/strong|expand/i.test(gd.labor_regime||'')?'#3fd68c':'#f5b343';
  const resScarce=(gd.reserves_to_gdp_pct!=null&&gd.reserves_to_gdp_pct<11);
  h+=tileGrid('Growth & recession depth',[
    tile('Leading labor',gd.labor_regime,gd.labor_note?String(gd.labor_note).slice(0,40):'',labCol),
    tile('Activity nowcast',gd.activity_index==null?'—':`${gd.activity_index}`,`${gd.activity_regime||''} · mom ${gd.activity_momentum||''}`,gd.activity_regime==='EXPANDING'?'#3fd68c':'#f5b343'),
    tile('Consumer pulse',gd.consumer_index==null?'—':`${gd.consumer_index}`,gd.consumer_regime,'#46c8ff'),
    tile('Bank stress',gd.bank_stress_regime,`score ${r1(gd.bank_stress_score)}`,/TIGHTEN|STRESS/i.test(gd.bank_stress_regime||'')?'#f5b343':'#3fd68c'),
    tile('Bank reserves',gd.reserves_to_gdp_pct==null?'—':`${r1(gd.reserves_to_gdp_pct)}% GDP`,resScarce?'⚠ scarcity zone':'adequate',resScarce?'#ff5c6c':'#3fd68c'),
  ],'Leading labor, activity, consumer and bank-funding health — the slow-moving inputs that lead the cycle. Reserves below ~11% of GDP is the repo-stress pre-condition.');

  // ── liquidity row: net liquidity + squeeze + RORO ──
  h+=`<h2>Liquidity &amp; cross-asset risk</h2><div class="grid3">`;
  const nl=lq.net_liquidity;
  if(nl){
    const dr=nl.net_13w_delta_bn;
    const mx=Math.max(nl.walcl_tn||0,0.001);
    const bar=(v,c)=>`<div class="col"><div class="vlab" style="color:${c}">$${r1(v)}T</div><div class="bar" style="height:${Math.max(6,(Math.abs(v)/mx)*70)}px;background:${c}"></div></div>`;
    h+=`<div class="panel"><h3>Fed net liquidity</h3>
      <div class="big">$${r1(nl.net_tn)}T <span style="font-size:12px;color:${dr>=0?'var(--green)':'var(--red)'}">${dr>=0?'+':''}${r1(dr)}B/13w ${dr>=0?'↗':'↘'}</span></div>
      <div class="wf">${bar(nl.walcl_tn,'#46c8ff')}<div class="col" style="flex:.3;color:var(--fg-3);align-self:center">−</div>${bar(nl.rrp_tn,'#ff8a5c')}<div class="col" style="flex:.3;color:var(--fg-3);align-self:center">−</div>${bar(nl.tga_tn,'#ff8a5c')}<div class="col" style="flex:.3;color:var(--fg-3);align-self:center">=</div>${bar(nl.net_tn,dr>=0?'#3fd68c':'#ff5c6c')}</div>
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--fg-3)"><span>balance sheet</span><span>RRP</span><span>TGA</span><span>NET</span></div>
      ${nl.series?`<div style="margin-top:9px">${sparkline(nl.series,220,26)}<div style="font-size:9.5px;color:var(--fg-3);font-family:var(--mono);margin-top:2px">26-wk net liquidity · ${nl.percentile_since_2018==null?'—':nl.percentile_since_2018+'th pctile since 2018'}</div></div>`:''}</div>`;
  }
  h+=`<div class="panel"><h3>Liquidity-squeeze risk</h3>
    <div class="big" style="color:${SC[lq.level]||'#fff'}">${lq.squeeze_risk_score==null?'—':lq.squeeze_risk_score} · ${esc(lq.level)}</div>
    <div class="gauge"><div class="pin" style="left:${Math.max(0,Math.min(100,lq.squeeze_risk_score||0))}%"></div></div>
    <div class="gscale"><span>0 ample</span><span>50</span><span>100 acute</span></div>
    <div style="font-size:12px;color:var(--fg-1);margin-top:9px">aggregate: <b>${esc(lq.aggregate_liquidity_regime||'—')}</b></div>
    ${lq.flickers&&lq.flickers.length?`<div style="margin-top:6px">${lq.flickers.map(f=>`<div class="flick">${esc(f)}</div>`).join('')}</div>`:`<div style="font-size:12px;color:var(--green);margin-top:6px">no draining flickers</div>`}</div>`;
  const roro=rk.roro_score;
  h+=`<div class="panel"><h3>Cross-asset risk · RORO</h3>
    <div class="big" style="color:${roro==null?'#fff':roro>15?'var(--green)':roro<-15?'var(--red)':'var(--amber)'}">${roro==null?'—':(roro>0?'+':'')+r1(roro)} · ${esc(rk.read||'')}</div>
    <div class="roro"><div class="pin" style="position:absolute;top:-4px;width:3px;height:17px;background:#fff;border-radius:2px;left:${Math.max(0,Math.min(100,50+(roro||0)/2))}%"></div></div>
    <div class="gscale"><span>−100 off</span><span>0</span><span>+100 on</span></div>
    <div style="font-size:11.5px;color:var(--fg-2);margin-top:9px;font-family:var(--mono)">FX · options · VIX · credit</div>
    ${rk.tells&&rk.tells.length?`<div style="font-size:11px;color:var(--fg-3);margin-top:5px">${esc((rk.tells||[]).slice(0,3).join(' · '))}</div>`:''}</div>`;
  h+=`</div>`;

  // ── global liquidity ──
  h+=globalLiqPanel(d.global_liquidity);

  // ── cross-asset risk & regime ──
  const car=d.cross_asset_risk||{};const yc=car.yen_carry||{};const cr=car.correlation_regime||{};const tc=car.tic||{};const cc=car.commodity_curve||{};
  h+=tileGrid('Cross-asset risk & regime',[
    tile('Yen-carry unwind',yc.unwind_score==null?'—':`${r1(yc.unwind_score)}/100`,yc.unwind_label,(yc.unwind_score!=null&&yc.unwind_score>=50)?'#ff5c6c':(yc.unwind_score!=null&&yc.unwind_score>=30)?'#f5b343':'#3fd68c'),
    tile('Correlation regime',cr.r20d,cr.r60d?`60d ${cr.r60d}`:'','#46c8ff'),
    tile('Foreign UST demand',tc.regime,tc.note?String(tc.note).slice(0,38):'',/STRONG/i.test(tc.regime||'')?'#3fd68c':/STRESS|WEAK/i.test(tc.regime||'')?'#ff5c6c':'#46c8ff'),
    tile('Commodity curve',cc.regime,cc.signal?String(cc.signal).slice(0,44):'','#46c8ff'),
  ],(cr.top_alert?`⚠ ${cr.top_alert}. `:'')+(yc.trigger?`Yen trigger: ${yc.trigger}`:''));
  h+=cryptoSection(d.crypto);

  // ── stress ladder ──
  const C2=lq.components||{};
  const lcol=v=>v==null?'#536074':v>=50?'#ff5c6c':v>=35?'#f5b343':'#3fd68c';
  const lrows=[['global stress',C2.global_stress],['crisis composite',C2.crisis_composite],['plumbing strain',C2.plumbing_health==null?null:100-C2.plumbing_health],['funding stress',C2.funding_stress],['systemic',C2.systemic_stress],['crisis canaries',C2.crisis_canaries]];
  h+=`<h2>Stress stack — squeeze-risk inputs</h2><div class="panel"><div class="ladder">`;
  for(const [k,v] of lrows){h+=`<div class="lrow"><div class="lh"><span>${k}</span><b style="color:${lcol(v)}">${v==null?'—':Math.round(v)}</b></div><div class="ltrack"><i style="width:${v==null?0:Math.max(3,Math.min(100,v))}%;background:${lcol(v)}"></i></div></div>`;}
  h+=`</div></div>`;

  // ── analogs ──
  const near=an.nearest||[];
  if(near.length){
    h+=`<h2>Nearest historical analogs — what followed</h2><div class="panel">`;
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap">`;
    near.forEach((a,i)=>{const sim=Math.round((a.similarity||0)*100);const f=a.forward_63d_pct;const col=i===0?(f>=0?'#3fd68c':'#ff5c6c'):'#7c8ba0';
      h+=`<div class="acard" style="border-left-color:${col}"><div class="ad">${esc((a.date||'').slice(0,7))}</div><div class="as">${sim}% similar</div><div style="color:${f>=0?'var(--green)':'var(--red)'};margin-top:3px">fwd 63d ${f>=0?'+':''}${r1(f)}%</div></div>`;});
    h+=`</div>`;
    const up=an.unprecedentedness||{};
    h+=`<div style="font-size:11.5px;color:var(--fg-2);margin-top:10px;font-family:var(--mono)">directional read: <b style="color:var(--fg-1)">${esc(an.directional_call||'—')}</b>${up.pctile_vs_history!=null?` · configuration ${r1(up.pctile_vs_history)}th pctile unusual`:''}</div>`;
    if(up.note)h+=`<div style="font-size:11px;color:var(--amber);margin-top:4px">⚠ ${esc(up.note)}</div>`;
    h+=`<div style="font-size:10.5px;color:var(--fg-3);margin-top:7px">Descriptive distribution of what followed similar configurations — not a forecast.</div></div>`;
  }

  // ── forward path cone + scenario playbook + stress scenarios ──
  h+=forwardCone((an||{}).forward_distribution);
  h+=scenarioPlaybook((cy||{}).scenario_playbook);
  h+=stressSection(d.stress_scenarios);
  h+=trackRecordSection(d.track_record);
  h+=trajectorySection(d.trajectory);

  // ── divergences ──
  if(d.divergences&&d.divergences.length){
    h+=`<h2>Divergences — what disagrees (and why it matters)</h2>`;
    for(const dv of d.divergences){const parts=esc(dv).split(':');h+=`<div class="diverge"><b>${parts[0]}:</b>${parts.slice(1).join(':')}</div>`;}
  }

  // ── provenance + falsifier ──
  h+=`<h2>Data provenance</h2><div class="panel"><div class="prov">`;
  for(const [k,v] of Object.entries(d.availability||{}))h+=`<span>${esc(k)}: <b style="color:${String(v).includes('MISSING')?'var(--red)':'var(--fg-2)'}">${esc(v)}</b></span>`;
  h+=`</div></div>`;
  h+=`<div class="note"><b>Falsifier:</b> ${esc(d.falsifier||'')}<br><br>${esc(d.methodology||'')}</div>`;
  w.innerHTML=h;
})();
</script>  <script src="/jh-page-ai.js" defer></script>
<script src="/jh-nav-drawer.js?v=3335" defer></script>
