<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Market Leaders · JustHodl</title>
<style>
:root{--bg:#0a0e14;--fg:#e6edf3;--fg2:#9aa5b1;--fg3:#6b7480;--bd:#1d242e;--card:#0f141b;
--grn:#34d399;--red:#f87171;--amb:#fbbf24;--cyan:#38bdf8;--vio:#a78bfa}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:24px 16px 90px}
.hd{border-bottom:1px solid var(--bd);padding-bottom:12px;margin-bottom:14px}
h1{font-size:21px;margin:0 0 2px;letter-spacing:-.3px}.sub{color:var(--fg2);font-size:12.5px}.meta{color:var(--fg3);font-size:11.5px;margin-top:3px}
.thesis{background:var(--card);border:1px solid var(--bd);border-left:3px solid var(--vio);border-radius:8px;padding:11px 14px;font-size:12.5px;color:var(--fg2);line-height:1.5;margin-bottom:8px}
.sec{margin:22px 0 6px;font-size:15px;font-weight:700;letter-spacing:.3px}.sec.fade{color:var(--amb)}.sec .n{color:var(--fg3);font-weight:400;font-size:11.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:9px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;border-left:3px solid var(--grn)}
.card.fade{border-left-color:var(--amb)}
.r1{display:flex;justify-content:space-between;align-items:center}
.tk{font-weight:700;font-size:16px}.lead{font-size:11px;color:var(--fg3)}
.spark{margin:8px 0 6px}
.perf{display:flex;gap:12px;font-size:11.5px;margin-top:2px}
.perf .it{text-align:center}.perf .v{font-weight:700;font-size:13px}.perf .lb{color:var(--fg3);font-size:9.5px;text-transform:uppercase}
.up{color:var(--grn)}.dn{color:var(--red)}
.tags{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:9px;font-weight:700;letter-spacing:.3px;border-radius:4px;padding:2px 6px;text-transform:uppercase}
.foot{color:var(--fg3);font-size:11px;margin-top:24px;line-height:1.55}.loading{color:var(--fg3);padding:40px 0}
</style></head><body><div class="wrap" id="w"><div class="loading">Loading market leaders…</div></div>
<script>
const PROXY="https://justhodl-data-proxy.raafouis.workers.dev";
async function gj(p){try{const r=await fetch(`https://justhodl.ai/${p}?t=${Date.now()}`);if(r.ok)return r.json();}catch(e){}try{const r=await fetch(`${PROXY}/${p}?t=${Date.now()}`);if(r.ok)return r.json();}catch(e){}return null;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function pf(v){if(v==null)return '<span class="v" style="color:var(--fg3)">—</span>';return `<span class="v ${v>=0?'up':'dn'}">${v>=0?'+':''}${v}%</span>`;}
const PHC={ACCUMULATION:'var(--cyan)',MARKUP:'var(--grn)',DISTRIBUTION:'var(--amb)',MARKDOWN:'var(--red)',NEUTRAL:'var(--fg3)'};
function sparkSVG(arr,color){
  if(!arr||arr.length<2)return '';
  const w=260,h=42,mn=Math.min(...arr),mx=Math.max(...arr),rng=(mx-mn)||1;
  const pts=arr.map((v,i)=>`${(i/(arr.length-1)*w).toFixed(1)},${(h-((v-mn)/rng)*(h-4)-2).toFixed(1)}`).join(' ');
  const up=arr[arr.length-1]>=arr[0];const c=color||(up?'var(--grn)':'var(--red)');
  return `<svg class="spark" width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" height="42"><polyline fill="none" stroke="${c}" stroke-width="1.6" points="${pts}"/></svg>`;
}
function card(r,fade){
  const ph=PHC[r.phase]||'var(--fg3)';
  return `<div class="card ${fade?'fade':''}"><div class="r1"><span class="tk">${esc(r.ticker)}</span>`
   +`<span class="lead">leadership ${r.leadership_score} · RS₆ₘ ${r.rs_126d>=0?'+':''}${r.rs_126d}</span></div>`
   +sparkSVG(r.spark,fade?'var(--amb)':null)
   +`<div class="perf"><div class="it"><div class="lb">1M</div>${pf(r.ret_21d)}</div>`
   +`<div class="it"><div class="lb">3M</div>${pf(r.ret_63d)}</div>`
   +`<div class="it"><div class="lb">6M</div>${pf(r.ret_126d)}</div>`
   +`<div class="it"><div class="lb">px</div><span class="v">$${r.price}</span></div></div>`
   +`<div class="tags"><span class="tag" style="color:${ph};border:1px solid ${ph}55">${esc(r.phase)}</span>`
   +`<span class="tag" style="color:${r.cmf>=0?'var(--grn)':'var(--red)'};border:1px solid ${r.cmf>=0?'rgba(52,211,153,.4)':'rgba(248,113,113,.4)'}">${r.cmf>=0?'inflow':'outflow'} CMF ${r.cmf}</span>`
   +`</div></div>`;
}
(async function(){
  const d=await gj('data/accumulation-radar.json');const w=document.getElementById('w');
  if(!d||!d.market_leaders){w.innerHTML='<div class="hd"><h1>Market Leaders</h1></div><div class="loading">No data yet — runs daily after close.</div>';return;}
  let h=`<div class="hd"><h1>🏆 Market Leaders</h1><div class="sub">The generals leading the tape — highest relative strength vs the S&amp;P, under accumulation, near highs. Tracked by inflows/outflows, chart &amp; performance.</div><div class="meta">${(d.generated_at||'').slice(0,16).replace('T',' ')}Z · ${d.market_leaders.length} leaders · vs SPY · v${esc(d.version||'')}</div></div>`;
  h+=`<div class="thesis">Leadership = relative strength (excess return vs SPY over 1/3/6 months) + uptrend (above rising 50/200-DMA, near 52-wk highs) + accumulation (Chaikin money flow + OBV confirming). These are the names institutions are buying that lead market advances; when a leader starts distributing it moves to "fading".</div>`;
  h+=`<div class="sec">🏆 Leaders <span class="n">— relative strength + accumulation, ranked by leadership score</span></div>`;
  h+=`<div class="grid">${d.market_leaders.map(r=>card(r,false)).join('')}</div>`;
  const lf=d.leaders_fading||[];
  if(lf.length){
    h+=`<div class="sec fade">⚠️ Leaders fading <span class="n">— were strong, now distributing / rolling over</span></div>`;
    h+=`<div class="grid">${lf.map(r=>card(r,true)).join('')}</div>`;
  }
  h+=`<div class="foot">Relative strength is excess return vs SPY (the index). Inflow/outflow is read from Chaikin Money Flow + OBV (volume confirming price = accumulation). Phase from the accumulation-radar Wyckoff classifier. Leaders rolling into distribution are the early warning that market leadership is narrowing — historically a late-cycle tell.</div>`;
  w.innerHTML=h;
})();
</script><script src="/jh-nav-drawer.js?v=3335" defer></script>

<script defer src="/jh-page-ai.js"></script>
</body></html>
