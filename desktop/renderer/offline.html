<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><style>
:root{--bg:#0a0e14;--fg-1:#e1e8f4;--fg-3:#6f7b91;--cyan:#22d3ee;--green:#26ffaf}
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;background:var(--bg);color:var(--fg-1);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;text-align:center}
.box{max-width:380px}.dot{width:12px;height:12px;background:#ff5577;border-radius:50%;margin:0 auto 18px;box-shadow:0 0 12px #ff5577}
h1{font-size:20px;margin-bottom:10px}p{color:var(--fg-3);font-size:13px;line-height:1.6;margin-bottom:22px}
button{background:var(--green);color:var(--bg);border:none;padding:10px 22px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
</style></head><body>
<div class="box"><div class="dot"></div>
<h1>No connection</h1>
<p>JustHodl AI needs an internet connection to load live market data and your tools. Check your network and try again.</p>
<button onclick="location.reload()">Retry</button></div>
</body></html>
