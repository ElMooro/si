<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eurodollar Funding Plumbing · JustHodl.AI</title>
<style>
:root{--bg:#0a0a0a;--c1:#131313;--bd:#262626;--fg:#e5e5e5;--fg2:#a3a3a3;--fg3:#666;
--red:#ef4444;--green:#22c55e;--amber:#f59e0b;--gold:#eab308;--blue:#3b82f6;--cyan:#22d3ee;
--mono:ui-monospace,'SF Mono',Menlo,monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--fg);font-size:13px;line-height:1.5;padding:18px;max-width:1180px;margin:0 auto;}
.head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--bd);padding-bottom:12px;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
h1{font-size:20px;font-weight:700;}h1 .s{color:var(--fg3);font-weight:400;font-size:13px;}
.nav a{color:var(--fg2);text-decoration:none;margin-left:14px;font-size:12px;}.nav a:hover{color:var(--gold);}
.sec{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin:22px 0 10px;border-bottom:1px solid var(--bd);padding-bottom:5px;}
.hero{border-radius:14px;padding:18px 20px;margin-bottom:10px;border:1px solid var(--bd);background:linear-gradient(180deg,#0e1512,#111);}
.hero .lab{font-size:30px;font-weight:800;letter-spacing:.5px;}
.hero .meta{font-family:var(--mono);font-size:11px;color:var(--fg2);margin-top:4px;}
.gauge{height:10px;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:6px;overflow:hidden;margin:12px 0 4px;max-width:560px;}
.gauge .fill{height:100%;border-radius:6px;}
.hero .sum{font-size:13.5px;color:var(--fg);margin-top:12px;max-width:840px;}
.hero .stl{font-size:12.5px;color:var(--fg2);margin-top:8px;max-width:840px;border-left:2px solid var(--gold);padding-left:10px;}
.flags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.fl{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;}
.fl.red{background:#ef44441a;color:var(--red);border:1px solid #ef444455;}
.fl.yellow{background:#f59e0b1a;color:var(--amber);border:1px solid #f59e0b55;}
.fl.ok{background:#22c55e1a;color:var(--green);border:1px solid #22c55e44;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px;}
.card{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;}
.card h3{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;color:var(--cyan);margin-bottom:8px;}
.row{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-top:1px solid #1c1c1c;}
.row:first-of-type{border-top:none;}
.dot{width:9px;height:9px;border-radius:50%;margin-top:4px;flex:0 0 auto;}
.dot.green{background:var(--green);}.dot.yellow{background:var(--amber);}.dot.red{background:var(--red);}
.dot.info,.dot.unknown{background:#555;}
.row .body{flex:1;}
.row .nm{font-size:12.5px;font-weight:600;display:flex;justify-content:space-between;gap:8px;}
.row .v{font-family:var(--mono);font-weight:700;white-space:nowrap;}
.row .v.green{color:var(--green);}.row .v.yellow{color:var(--amber);}.row .v.red{color:var(--red);}.row .v.info,.row .v.unknown{color:var(--fg2);}
.row .dt{font-size:11px;color:var(--fg3);margin-top:2px;}
.row .px{font-family:var(--mono);font-size:9.5px;color:var(--fg3);}
.drv{background:#0e1512;border:1px solid #22c55e22;border-radius:10px;padding:11px 14px;margin-bottom:8px;}
.drv li{font-size:12px;color:var(--fg2);margin:3px 0 3px 16px;}
.note{color:var(--fg3);font-size:10.5px;font-family:var(--mono);margin-top:18px;border-top:1px solid var(--bd);padding-top:8px;line-height:1.7;}
.err{color:var(--red);font-family:var(--mono);font-size:12px;}
</style>
</head>
<body>
<div class="head">
  <h1>Eurodollar Funding Plumbing <span class="s">· is the offshore dollar working or seizing?</span></h1>
  <div class="nav"><a href="/">← home</a><a href="/plumbing.html">plumbing</a><a href="/sovereign.html">sovereign</a><a href="/repo.html">repo</a><a href="/directory.html">all pages</a></div>
</div>

<div id="hero" class="hero"><div class="lab" style="color:var(--fg3)">loading…</div></div>

<div class="sec">AI desk read · key drivers</div>
<div id="drivers" class="drv"></div>

<div class="sec">The funding board · green normal · yellow watch · red stress</div>
<div id="layers" class="grid"></div>

<div id="note" class="note"></div>

<script>
const PX='https://justhodl-data-proxy.raafouis.workers.dev';
const S3='https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com';
async function getJSON(path){
  for(const u of [`https://justhodl.ai/${path}`,`${PX}/${path}`,`${S3}/${path}`]){
    try{const r=await fetch(u,{cache:'no-store'});if(r.ok)return await r.json();}catch(e){}
  }
  throw new Error('fetch failed: '+path);
}
const VCOL={'FUNCTIONING':'var(--green)','MILD STRAIN':'var(--gold)','STRAINED':'var(--amber)','SEIZING':'var(--red)'};
(async()=>{
  let d; try{d=await getJSON('data/eurodollar-plumbing.json');}catch(e){
    document.getElementById('hero').innerHTML='<div class="err">Could not load eurodollar-plumbing.json — the daily engine may not have run yet.</div>';return;}
  const v=d.verdict||'—', col=VCOL[v]||'var(--fg2)', h=d.plumbing_health;
  const ai=d.ai||{};
  document.getElementById('hero').innerHTML=
    `<div class="lab" style="color:${col}">${v}</div>
     <div class="meta">Offshore U.S. dollar funding · plumbing-health ${h}/100 · ${(d.generated_at||'').replace('T',' ').replace('Z',' UTC')}</div>
     <div class="gauge"><div class="fill" style="width:${Math.max(2,h)}%;background:${col}"></div></div>
     ${ai.summary?`<div class="sum">${ai.summary}</div>`:''}
     ${ai.short_term?`<div class="stl"><b style="color:var(--gold)">Short-term (1–4wk):</b> ${ai.short_term}</div>`:''}
     <div class="flags">
       ${(d.red_flags||[]).map(f=>`<span class="fl red">● ${f}</span>`).join('')}
       ${(d.yellow_flags||[]).map(f=>`<span class="fl yellow">● ${f}</span>`).join('')}
       ${(!d.red_flags?.length&&!d.yellow_flags?.length)?'<span class="fl ok">● all layers normal</span>':''}
     </div>`;

  const drv=document.getElementById('drivers');
  if(Array.isArray(ai.key_drivers)&&ai.key_drivers.length){
    drv.innerHTML='<ul>'+ai.key_drivers.map(x=>`<li>${x}</li>`).join('')+'</ul>';
  } else { drv.innerHTML='<div style="color:var(--fg3);font-family:var(--mono);font-size:11px">AI driver detail unavailable this run — board below is authoritative.</div>'; }

  const wrap=document.getElementById('layers');
  for(const [lk,lv] of Object.entries(d.layers||{})){
    if(!lv.metrics||!lv.metrics.length) continue;
    let rows='';
    for(const m of lv.metrics){
      const val=(m.value===null||m.value===undefined)?'n/a':m.value+(m.unit?(' '+m.unit):'');
      rows+=`<div class="row"><div class="dot ${m.status}"></div><div class="body">
        <div class="nm"><span>${m.label}</span><span class="v ${m.status}">${val}</span></div>
        <div class="dt">${m.detail||''}</div>
        ${(m.pctile!=null||m.asof)?`<div class="px">${m.pctile!=null?('pctile '+m.pctile+' · '):''}${m.asof||''}</div>`:''}
      </div></div>`;
    }
    wrap.insertAdjacentHTML('beforeend',`<div class="card"><h3>${lv.title}</h3>${rows}</div>`);
  }

  document.getElementById('note').innerHTML=
    `${d.methodology||''}<br>${d.honesty||''}<br>Engine: ${d.engine} ${d.version} · generated ${d.generated_at||''}.`;
})();
</script>
  <script src="/jh-page-ai.js" defer></script>
<script src="/jh-nav-drawer.js?v=3335" defer></script>

<script>/* ops 3245: series-fusion card — independent fetch, additive */
(function(){
 var C={feed:"data/eurodollar-plumbing.json",field:"euro_policy_corridor",title:"EURO POLICY CORRIDOR \u2014 SERIES FUSION"};
 function esc(s){return String(s==null?'\u2014':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
 function grab(u){return fetch(u+'?t='+Date.now()).then(function(r){if(!r.ok)throw 0;return r.json();});}
 grab('/'+C.feed).catch(function(){return grab('https://s3.amazonaws.com/justhodl-dashboard-live/'+C.feed);})
 .then(function(d){
  var b=d&&d[C.field];if(!b||!b.series)return;
  var ks=Object.keys(b.series);
  var rows=ks.map(function(k){var s=b.series[k];
   var zc=(s.z_1y>=1)?'var(--neg,#e05252)':((s.z_1y<=-1)?'var(--pos,#3fa46a)':'var(--text-muted,#8a8f98)');
   var ch=(s.chg_13w_pct==null)?'':' <span style="opacity:.55">13w '+esc(s.chg_13w_pct)+'%</span>';
   return '<div style="display:flex;gap:12px;align-items:baseline;font-family:var(--font-mono,monospace);font-size:11px;padding:2.5px 0">'
    +'<span style="color:'+zc+';min-width:56px">z '+esc(s.z_1y)+'</span>'
    +'<b style="min-width:86px;color:var(--text,#ddd)">'+esc(s.last)+'</b>'
    +'<span style="color:var(--text-dim,#aaa)">'+esc(s.label)+ch+'</span></div>';}).join('');
  var comp=(b.composite_z!=null)?'<div style="font-family:var(--font-mono,monospace);font-size:12px;margin:4px 0 8px;color:var(--accent,#e8b45a)">COMPOSITE z '+esc(b.composite_z)+' <span style="opacity:.6">(n='+esc(b.composite_n)+')</span></div>':'';
  var card=document.createElement('div');
  card.id='jh-fusion-'+C.field;
  card.style.cssText='border:1px solid var(--border-strong,#333);border-radius:10px;background:var(--bg-card,#141414);padding:14px 16px;margin:14px 0';
  card.innerHTML='<div style="font-size:11px;letter-spacing:.12em;color:var(--accent,#e8b45a);margin-bottom:6px">'+esc(C.title)+'</div>'
   +comp+rows
   +'<div style="font-size:10px;color:var(--text-muted,#777);margin-top:8px">direct model inputs \u00b7 series fusion \u00b7 asof '+esc(String(b.asof||'').slice(0,10))+'</div>';
  var host=document.querySelector('main')||document.body;
  host.insertBefore(card,host.firstChild);
 }).catch(function(){});
})();
</script>
</body>
</html>
