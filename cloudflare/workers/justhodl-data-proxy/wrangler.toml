# Publish to <worker>.raafouis.workers.dev — same pattern as siblings.
workers_dev = true

[observability]
enabled = true

# Polygon key for the /quotes batch snapshot route (live watchlist data).
[vars]
POLYGON_KEY = "zvEY_KYYMHoAN0JqY7n2Ze6q0kBuJX_d"

# Per-user data store (watchlists, flags, settings) for the public site.
[[kv_namespaces]]
binding = "USER_DATA"
id = "43a046649f05407dac2b9e50a489e2e9"

