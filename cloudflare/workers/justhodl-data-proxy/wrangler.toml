name = "justhodl-data-proxy"
main = "src/index.js"
compatibility_date = "2025-10-01"

# Publish to <worker>.raafouis.workers.dev — same pattern as siblings.
workers_dev = true

# Zone routes: makes relative fetch('data/*.json') work on the live domain
# for EVERY page, current and future (ops 2730 — Surveillance Desk 404 was
# a class defect: the domain never had a /data/* route; legacy pages used
# absolute proxy URLs, this month's pages use the clean relative form).
routes = [
  { pattern = "justhodl.ai/data/*", zone_name = "justhodl.ai" },
  { pattern = "www.justhodl.ai/data/*", zone_name = "justhodl.ai" }
]

[observability]
enabled = true

# Polygon key for the /quotes batch snapshot route (live watchlist data).
[vars]
POLYGON_KEY = "zvEY_KYYMHoAN0JqY7n2Ze6q0kBuJX_d"
FRED_KEY = "2f057499936072679d8843d7fce99989"
SUPABASE_URL = "https://bdmjenqcyvzouusfcgow.supabase.co"

# Per-user data store (watchlists, flags, settings) for the public site.
[[kv_namespaces]]
binding = "USER_DATA"
id = "43a046649f05407dac2b9e50a489e2e9"

