name = "justhodl-yahoo-proxy"
main = "src/index.js"
compatibility_date = "2025-10-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

# Bind branded custom domain — wrangler auto-provisions DNS + TLS on the
# justhodl.ai zone. This bypasses the account-level workers.dev allowlist.
[[routes]]
pattern = "yahoo-proxy.justhodl.ai"
custom_domain = true

[observability]
enabled = true

# Secrets set by deploy-workers.yml from AWS SSM:
#   PROXY_TOKEN — same value as /justhodl/ai-chat/auth-token
