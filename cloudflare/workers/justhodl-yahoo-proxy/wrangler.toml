name = "justhodl-yahoo-proxy"
main = "src/index.js"
compatibility_date = "2025-10-01"
compatibility_flags = ["nodejs_compat"]

# Publish to <worker>.raafouis.workers.dev — same pattern as justhodl-ai-proxy.
# Custom domain (yahoo-proxy.justhodl.ai) was attempted but requires the
# domain to be pre-configured as a CF Custom Domain on this worker. workers.dev
# subdomain works without that step. If we later want a branded domain, add it
# via Cloudflare dashboard, then re-introduce the [[routes]] block.
workers_dev = true

[observability]
enabled = true

# Secrets set by deploy-workers.yml from AWS SSM:
#   PROXY_TOKEN — same value as /justhodl/ai-chat/auth-token
