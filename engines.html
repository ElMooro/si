<style>
:root{--bg:#0a0e14;--bg-1:#0c1018;--bg-2:#0f1420;--border:#1c2433;--border-bright:#2a3550;--fg-0:#fff;--fg-1:#e1e8f4;--fg-2:#a8b3c7;--fg-3:#6f7b91;--cyan:#22d3ee;--green:#26ffaf;--amber:#fbbf24;--violet:#a78bfa;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg-1);font-family:var(--sans);font-size:14px;min-height:100vh}
a{color:var(--cyan);text-decoration:none}
.header{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 22px;background:var(--bg-1);position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-weight:700}
.brand-dot{width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 9px var(--green)}
.nav{display:flex;gap:3px;margin-left:10px;flex-wrap:wrap}.nav a{padding:6px 10px;font-size:12px;color:var(--fg-3);border-radius:5px;font-family:var(--mono)}.nav a.active{color:var(--green)}
.wrap{max-width:1180px;margin:0 auto;padding:22px}
.hero h1{font-size:25px;font-weight:800;color:var(--fg-0)}
.hero h1 .grad{background:linear-gradient(90deg,var(--green),var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--fg-2);margin:5px 0 14px;font-size:13px}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.controls input{flex:1;min-width:220px;background:var(--bg-2);border:1px solid var(--border-bright);border-radius:8px;color:var(--fg-1);padding:9px 13px;font-size:14px}
.cat-chip{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:8px;border:1px solid var(--border-bright);background:var(--bg-1);color:var(--fg-2);cursor:pointer}
.cat-chip.on{background:var(--green);border-color:var(--green);color:var(--bg);font-weight:700}
.catsec{margin:18px 0 8px;font-family:var(--mono);font-size:13px;color:var(--cyan);letter-spacing:.4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.eng-card{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;transition:border-color .12s}
.eng-card:hover{border-color:var(--cyan)}
.eng-card .nm{font-family:var(--mono);font-size:12.5px;color:var(--fg-1);font-weight:600;flex:1}
.eng-card .badge{font-family:var(--mono);font-size:8.5px;padding:1px 6px;border-radius:7px}
.badge.page{background:rgba(38,255,175,.13);color:var(--green)}
.badge.view{background:rgba(34,211,238,.1);color:var(--cyan)}
.count{font-family:var(--mono);font-size:11px;color:var(--fg-3)}
.note{font-family:var(--mono);font-size:10px;color:var(--fg-3);margin-top:18px;line-height:1.5}
</style></head><body>

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let FILTER_CAT='all',Q='';
const CATS=[...new Set(ENGINES.map(e=>e.c))].sort();
function href(e){return e.p?('/'+e.p):('/engine.html?e='+encodeURIComponent(e.d));}
function render(){
  document.getElementById('cnt').textContent=ENGINES.length+' engines · '+ENGINES.filter(e=>e.p).length+' with pages';
  const rows=ENGINES.filter(e=>{
    if(FILTER_CAT!=='all'&&e.c!==FILTER_CAT)return false;
    if(Q&&!(e.n+' '+e.d).toLowerCase().includes(Q))return false;
    return true;
  });
  // group by category
  const byCat={};rows.forEach(e=>{(byCat[e.c]=byCat[e.c]||[]).push(e);});
  let h='';
  Object.keys(byCat).sort().forEach(c=>{
    h+=`<div class="catsec">${esc(c)} <span class="count">(${byCat[c].length})</span></div><div class="grid">`;
    byCat[c].sort((a,b)=>a.n.localeCompare(b.n)).forEach(e=>{
      h+=`<a class="eng-card" href="${href(e)}"><span class="nm">${esc(e.n)}</span><span class="badge ${e.p?'page':'view'}">${e.p?'PAGE':'VIEW'}</span></a>`;
    });
    h+='</div>';
  });
  document.getElementById('list').innerHTML=h||'<div class="count" style="padding:30px">No engines match.</div>';
}
document.getElementById('cats').innerHTML='<span class="cat-chip on" data-c="all">All</span>'+CATS.map(c=>`<span class="cat-chip" data-c="${esc(c)}">${esc(c)}</span>`).join('');
document.querySelectorAll('.cat-chip').forEach(el=>el.onclick=()=>{document.querySelectorAll('.cat-chip').forEach(x=>x.classList.remove('on'));el.classList.add('on');FILTER_CAT=el.dataset.c;render();});
document.getElementById('q').addEventListener('input',e=>{Q=e.target.value.toLowerCase().trim();render();});
render();
</script>
