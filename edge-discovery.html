<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edge Discovery · Research Factory · JustHodl</title>
<style>
:root{--bg:#0a0e14;--bg-1:#121822;--bg-2:#1a2330;--border:#24303f;--fg-0:#e8eef6;--fg-1:#aebccd;--fg-2:#7c8ba0;--fg-3:#536074;--green:#3fd68c;--amber:#f5b343;--red:#ff5c6c;--cyan:#46c8ff;--mono:'SF Mono',ui-monospace,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg-0);font-family:var(--sans);line-height:1.5}
.wrap{max-width:1000px;margin:0 auto;padding:22px 16px 80px}
h1{font-size:21px;margin:0 0 2px}.sub{color:var(--fg-2);font-size:13px;margin-bottom:12px;max-width:840px}
.meta{color:var(--fg-3);font-family:var(--mono);font-size:11px;margin-bottom:14px}
h2{font-size:12px;color:var(--fg-2);margin:22px 0 9px;text-transform:uppercase;letter-spacing:.06em}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{background:var(--bg-1);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-family:var(--mono);font-size:13px;font-weight:700}
.chip b{display:block;font-size:9.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;color:var(--fg-3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--border)}
td{padding:5px 8px;border-bottom:1px solid var(--bg-2);font-family:var(--mono)}
.pos{color:var(--green)}.neg{color:var(--red)}.grad{color:var(--green);font-weight:700}
.banner{background:var(--bg-1);border:1px solid var(--amber);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12.5px;color:var(--fg-1)}
.note{color:var(--fg-3);font-size:11px;margin-top:18px;line-height:1.6}a{color:var(--cyan)}
.loading{padding:50px;text-align:center;color:var(--fg-2)}
</style></head><body><div class="wrap" id="wrap"><div class="loading">Running the factory…</div></div>
<script>
const PROXY="https://justhodl-data-proxy.raafouis.workers.dev";
async function gj(p){try{const r=await fetch(`https://justhodl.ai/${p}?t=${Date.now()}`);if(r.ok)return await r.json();}catch(e){}try{const r=await fetch(`${PROXY}/${p}?t=${Date.now()}`);if(r.ok)return await r.json();}catch(e){}return null;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
(async function(){
  const d=await gj('data/edge-discovery.json');const w=document.getElementById('wrap');
  if(!d||!d.ok){w.innerHTML='<h1>Edge Discovery</h1><div class="loading">No run yet — updates weekly Sun 11:00 UTC.</div>';return;}
  const mt=d.multiple_testing||{};
  let h=`<h1>🔬 Edge Discovery <span style="color:var(--fg-3);font-size:13px">autonomous research factory</span></h1>`;
  h+=`<div class="sub">${esc(d.thesis||'')}</div>`;
  h+=`<div class="meta">${(d.generated_at||'').slice(0,16).replace('T',' ')}Z · ${d.history_days} days history · ${(d.oos_fraction*100).toFixed(0)}% out-of-sample · cost ${d.cost_per_trade_pct}%/trade</div>`;
  h+=`<div class="chips">
    <div class="chip"><b>Candidates tested</b>${d.n_candidates_tested}</div>
    <div class="chip"><b>FDR survivors</b>${mt.fdr_survivors}</div>
    <div class="chip"><b>Graduated</b><span class="${d.n_graduated_this_run>0?'pos':''}">${d.n_graduated_this_run}</span></div>
    <div class="chip"><b>Live graduated</b>${(d.graduated_live||[]).length}</div>
    <div class="chip"><b>Retired</b>${(d.retired_this_run||[]).length}</div>
    <div class="chip"><b>Null max-SR/trade</b>${mt.expected_max_sharpe_per_trade_null}</div>
  </div>`;
  h+=`<div class="banner">⚖️ <b>Multiple-testing discipline:</b> with ${mt.n_trials} trials, the best Sharpe expected from pure luck is real — so each candidate is discounted by the <b>Deflated Sharpe Ratio</b> (Bailey & López de Prado) and filtered by <b>Benjamini-Hochberg FDR</b> (q=${mt.fdr_q}). A run that graduates nothing means nothing cleared the bar — that's the factory protecting you from data-mined noise, not a failure.</div>`;
  if((d.graduated_live||[]).length){h+=`<h2>✅ Graduated edges (live)</h2><table><tr><th>Feature → Target</th><th>Horizon</th><th>Dir</th><th>Grad Sharpe</th><th>Current Sharpe</th><th>DSR</th></tr>`;
    for(const g of d.graduated_live){h+=`<tr><td class="grad">${esc(g.feature)} → ${esc(g.target)}</td><td>${g.horizon}d</td><td>${g.direction>0?'long':'short'}</td><td class="pos">${g.graduation_sharpe_ann}</td><td>${g.current_sharpe_ann}</td><td>${g.current_dsr}</td></tr>`;}
    h+=`</table>`;}
  h+=`<h2>Top candidates by Deflated-Sharpe</h2><table><tr><th>Feature → Target</th><th>H</th><th>Dir</th><th>OOS Sharpe</th><th>DSR</th><th>Hit</th><th>n</th><th>Grad?</th></tr>`;
  for(const c of (d.top_candidates||[])){h+=`<tr><td>${esc(c.feature)} → ${esc(c.target)}</td><td>${c.horizon}d</td><td>${c.direction>0?'L':'S'}</td><td class="${c.sharpe_ann>0?'pos':'neg'}">${c.sharpe_ann>0?'+':''}${c.sharpe_ann}</td><td>${c.dsr}</td><td>${c.hit_pct}%</td><td>${c.n_trades}</td><td>${c.graduate?'<span class="grad">✓</span>':'—'}</td></tr>`;}
  h+=`</table>`;
  h+=`<div class="note">${esc(d.note||'')} Research, not investment advice.</div>`;
  w.innerHTML=h;
})();
</script>  <script src="/jh-page-ai.js" defer></script>
<script src="/jh-nav-drawer.js?v=3335" defer></script>
</body></html>
