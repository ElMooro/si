<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Early-Warning War Room — JustHodl AI</title>
<style>
  :root{--bg:#0a0e14;--card:#121822;--card2:#0f141d;--bd:#1e2836;--tx:#e6edf3;--mut:#8b98a9;
    --calm:#2ea043;--watch:#2f81f7;--elev:#d29922;--warn:#e8730c;--crit:#f85149;--acc:#39d0d8;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:1240px;margin:0 auto;padding:22px 18px 60px}
  a{color:var(--acc);text-decoration:none}
  h1{font-size:26px;margin:0 0 2px;letter-spacing:-.02em}
  .sub{color:var(--mut);font-size:13px;margin-bottom:18px}
  .hero{display:flex;gap:20px;align-items:center;background:linear-gradient(135deg,#121822,#0d1420);border:1px solid var(--bd);border-radius:16px;padding:22px 24px;margin-bottom:18px;flex-wrap:wrap}
  .gauge{text-align:center;min-width:150px}
  .gauge .n{font-size:52px;font-weight:800;line-height:1}
  .gauge .b{font-size:13px;font-weight:700;letter-spacing:.08em;margin-top:4px}
  .hero .hl{flex:1;min-width:260px;font-size:15px;color:#cdd7e2}
  .hero .stat{display:flex;gap:26px;margin-top:12px;flex-wrap:wrap}
  .hero .stat div span{display:block;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .hero .stat div b{font-size:22px}
  .sechd{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:26px 0 12px}
  .grid{display:grid;gap:14px}
  .mechs{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card .lbl{font-weight:700;font-size:14px}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.04em;white-space:nowrap}
  .card .sc{font-size:30px;font-weight:800;margin:6px 0 2px}
  .card .hd{color:var(--mut);font-size:12.5px;margin-top:6px}
  .card .ff{color:var(--mut);font-size:12px;margin-top:8px}
  .diverg .card{border-left:3px solid var(--elev);background:linear-gradient(90deg,#1a1710,#121822 60%)}
  .diverg .card .lbl{color:var(--elev)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--bd);cursor:pointer;user-select:none}
  td{padding:9px 10px;border-bottom:1px solid #171f2b;vertical-align:top}
  tr:hover td{background:#0e141d}
  .tag{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;background:#182230;color:var(--acc)}
  .bar{height:6px;border-radius:4px;background:#1b2534;overflow:hidden;min-width:60px}
  .bar>i{display:block;height:100%}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .filters button{background:var(--card2);border:1px solid var(--bd);color:var(--mut);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer}
  .filters button.on{background:#16324e;border-color:#2f81f7;color:#cfe3ff}
  .pb{background:var(--card2);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;font-size:13px;color:#cdd7e2}
  .pb .cat{font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:.06em}
  .pin{font-size:10px;color:var(--elev);font-weight:700}
  .muted{color:var(--mut)} .rt{text-align:right}
</style>
</head>
<body>
<div class="wrap">
  <div><a href="/">← JustHodl</a></div>
  <h1>🚨 Early-Warning War Room</h1>
  <div class="sub" id="sub">Loading every canary mechanism…</div>

  <div class="hero" id="hero"></div>

  <div id="baro"></div>

  <div id="divWrap"></div>

  <div class="sechd">Twelve Mechanisms</div>
  <div class="grid mechs" id="mechs"></div>

  <div class="sechd">Canaries — ranked by stress &amp; lead-time ("Everything watched" shows the full inventory incl. calm)</div>
  <div class="filters" id="filters"></div>
  <div class="card" style="padding:4px 4px 0"><table id="tbl"><thead></thead><tbody></tbody></table></div>

  <div class="sechd">🧠 Operator Playbook — from the Brain</div>
  <div class="grid" id="playbook" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr))"></div>
</div>
<script>
const COL={CALM:'var(--calm)',WATCH:'var(--watch)',ELEVATED:'var(--elev)',WARNING:'var(--warn)',CRITICAL:'var(--crit)','NO DATA':'var(--mut)',ACTIVE:'var(--watch)',QUIET:'var(--calm)'};
const col=b=>COL[(b||'').toUpperCase()]||'var(--mut)';
async function getJSON(p){for(const u of [`https://justhodl.ai/${p}`,`https://s3.amazonaws.com/justhodl-dashboard-live/${p}`]){try{const r=await fetch(u,{cache:'no-store'});if(r.ok)return await r.json();}catch(e){}}throw 0;}
let DATA=null,filt='all';
function fmt(v){return v==null?'—':(typeof v==='number'?(Math.round(v*100)/100):v);}
function render(d){
  DATA=d;const m=d.master||{};
  document.getElementById('sub').textContent='Unified across 6 mechanisms · updated '+new Date(d.generated_at).toLocaleString();
  const ew=m.early_warning_0_100, c=col(m.band);
  document.getElementById('hero').innerHTML=
    `<div class="gauge"><div class="n" style="color:${c}">${ew==null?'—':ew}</div><div class="b" style="color:${c}">${m.band||''}</div><div class="muted" style="font-size:11px;margin-top:4px">early-warning</div></div>
     <div class="hl">${m.headline||''}
       <div class="stat">
         <div><span>Firing</span><b>${m.n_firing}</b> <span style="display:inline">of ${m.n_canaries}</span></div>
         <div><span>Divergences</span><b style="color:var(--elev)">${m.n_divergences}</b></div>
       </div></div>`;
  // divergences
  const dv=d.divergences||[];
  document.getElementById('divWrap').innerHTML = dv.length? 
    `<div class="sechd">⚠️ Cross-Mechanism Divergences</div><div class="grid diverg" style="grid-template-columns:repeat(auto-fill,minmax(360px,1fr))">`+
    dv.map(x=>`<div class="card"><div class="top"><div class="lbl">${x.title}</div><span class="pill" style="background:#231b0e;color:var(--elev)">${x.severity}</span></div><div class="hd">${x.read}</div></div>`).join('')+`</div>`:'';
  // mechanism cards
  document.getElementById('mechs').innerHTML=(d.mechanisms||[]).map(mc=>{
    if(mc.unavailable)return `<div class="card"><div class="lbl muted">${mc.label}</div><div class="ff">feed unavailable</div></div>`;
    const b=mc.band||'',cc=col(b);
    const extra=mc.flashing_buckets?`<div class="ff">flashing: ${(mc.flashing_buckets||[]).join(', ')||'none'}</div>`:
                mc.recent?`<div class="ff">${(mc.recent||[]).slice(0,2).map(r=>'· '+r).join('<br>')}</div>`:'';
    return `<div class="card"><div class="top"><div class="lbl">${mc.label}</div><span class="pill" style="background:#0e1622;color:${cc};border:1px solid ${cc}55">${b||'—'}</span></div>
      <div class="sc" style="color:${cc}">${mc.score==null?(mc.signal||'—'):mc.score}</div>
      <div class="ff">${mc.n_firing==null?'':mc.n_firing+' firing / '+(mc.n_total||'?')+' watched'} · <span class="muted">${mc.scale||''}</span></div>
      <div class="hd">${(mc.headline||'').slice(0,150)}</div>${extra}</div>`;}).join('');
  // ── RISK VISUAL BAROMETER (mock-faithful, LIVE data) ──
  const B=d.barometer||{},V=(B.views||{}),PM=V.per_mechanism||{},PC=V.per_canary||{},EW=V.earned||{};
  window._BARO={pm:PM,pc:PC,ew:EW};window._VIEW=window._VIEW||'pm';
  const GOLD='#e8c26a',B5=['CALM','GUARDED','ELEVATED','HIGH RISK','CRISIS'];
  const B5C=['var(--calm)','var(--watch)','var(--elev)','var(--warn)','var(--crit)'];
  const GUIDE={CALM:'Normal conditions. Low stress.',GUARDED:'Early signs of stress.',ELEVATED:'Heightened risk conditions. Stay vigilant and monitor closely.','HIGH RISK':'Significant stress. Mitigate risk.',CRISIS:'Extreme stress. High probability of dislocation.'};
  window.renderBaro=function(){
    const vw=window._VIEW,cur=vw=='pm'?PM:(vw=='ew'?EW:PC);
    const s=Math.max(0,Math.min(100,cur.score==null?0:cur.score));
    const bi=Math.min(4,Math.floor(s/20)),bc=B5C[bi],b5=cur.band5||B5[bi];
    const cx=170,cy=158,R=126;
    const P=a=>[cx+R*Math.cos(Math.PI*(1-a/100)),cy-R*Math.sin(Math.PI*(1-a/100))];
    const seg=(a0,a1,c)=>{const[x0,y0]=P(a0),[x1,y1]=P(a1);return `<path d="M ${x0} ${y0} A ${R} ${R} 0 0 1 ${x1} ${y1}" stroke="${c}" stroke-width="24" fill="none"/>`};
    const lab=(a,t)=>{const x=cx+(R+28)*Math.cos(Math.PI*(1-a/100)),y=cy-(R+28)*Math.sin(Math.PI*(1-a/100));return `<text x="${x}" y="${y}" text-anchor="middle" style="font-size:9px;letter-spacing:1px;fill:#cbd3df;font-weight:600">${t}</text>`};
    const[nx,ny]=P(s);
    const mechCard=([k,m],i)=>{
      const mi=Math.min(4,Math.floor((m.score||0)/20));
      const segs=B5C.map((c,j)=>`<div style="flex:1;height:11px;border-radius:2px;background:${c};opacity:${j==mi?1:.22};box-shadow:${j==mi?'0 0 6px '+c:'none'}"></div>`).join('');
      const pos=Math.max(2,Math.min(98,m.score||0));
      const wbadge=m.weight!=null?`<span style="color:${GOLD}">×${m.weight}${m.weight_status=='LEARNED'?'':'*'}</span>`:'';
      return `<div class="card" style="padding:10px 13px;border:1px solid #2a3444">
        <div style="display:flex;align-items:center;gap:9px">
          <span style="background:#132033;border:1px solid ${GOLD}66;color:${GOLD};font-weight:700;font-size:11px;border-radius:4px;padding:2px 7px">${i+1}</span>
          <b style="font-size:12.5px;flex:1">${m.label||k}</b>
          <span style="font-size:11px;color:${B5C[mi]}">${m.score} ${wbadge}</span></div>
        <div style="position:relative;margin-top:8px">
          <div style="display:flex;gap:3px">${segs}</div>
          <div style="position:absolute;top:-5px;left:${pos}%;transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:#fff;border:1.5px solid #0a0f18;box-shadow:0 0 4px #fff"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:4px" class="ff muted">
          ${B5.map((t,j)=>`<span style="font-size:8px;letter-spacing:.5px;color:${j==mi?B5C[mi]:'var(--mut)'}">${t}</span>`).join('')}</div></div>`;};
    const entries=Object.entries(PM.by_mechanism||{});
    const left=entries.slice(0,6).map(mechCard).join(''),right=entries.slice(6).map((e,i)=>mechCard(e,i+6)).join('');
    const mScores=Object.fromEntries(entries.map(([k,m])=>[m.label||k,{s:m.score,w:m.weight,st:m.weight_status}]));
    document.getElementById('baro').innerHTML=`
    <div class="card" style="padding:18px;border:1px solid ${GOLD}44">
      <div style="text-align:center">
        <div style="font-size:26px;font-weight:800;letter-spacing:2px">EARLY-WARNING WAR ROOM</div>
        <div style="color:${GOLD};letter-spacing:4px;font-size:13px;margin-top:2px">— RISK VISUAL BAROMETER —</div>
        <div style="display:inline-block;margin-top:8px;border:1px solid ${GOLD}88;border-radius:6px;padding:4px 16px;color:${GOLD};font-weight:700;letter-spacing:2px;font-size:12px">${entries.length||12} CANARY MECHANISMS · LIVE</div>
        <div style="margin-top:9px">
          <button class="${vw=='pm'?'on':''}" onclick="_VIEW='pm';renderBaro()" style="font-size:11px">Equal per mechanism</button>
          <button class="${vw=='ew'?'on':''}" onclick="_VIEW='ew';renderBaro()" style="font-size:11px">Earned weights (${EW.n_learned||0} learned)</button>
          <button class="${vw=='pc'?'on':''}" onclick="_VIEW='pc';renderBaro()" style="font-size:11px">Per canary (${PC.n_votes||'?'})</button></div></div>
      <div style="display:flex;gap:16px;align-items:stretch;flex-wrap:wrap;margin-top:12px">
        <div style="flex:1;min-width:300px;display:grid;gap:9px">${left}</div>
        <div style="min-width:350px;max-width:380px;text-align:center;align-self:center">
          <svg width="350" height="196" viewBox="0 0 350 196">
            ${seg(0,20,B5C[0])}${seg(20,40,B5C[1])}${seg(40,60,B5C[2])}${seg(60,80,B5C[3])}${seg(80,100,B5C[4])}
            ${lab(10,'CALM')}${lab(30,'GUARDED')}${lab(50,'ELEVATED')}${lab(70,'HIGH RISK')}${lab(90,'CRISIS')}
            <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${GOLD}" stroke-width="6" stroke-linecap="round"/>
            <circle cx="${cx}" cy="${cy}" r="9" fill="#131a26" stroke="${GOLD}" stroke-width="3"/>
            <text x="${cx}" y="${cy-42}" text-anchor="middle" style="font-size:38px;font-weight:800;fill:${bc}">${s}</text></svg>
          <div class="card" style="border:1.5px solid ${bc};padding:12px;margin-top:-4px;background:#0d1420">
            <div style="font-size:22px;font-weight:800;letter-spacing:3px;color:${bc}">${b5}</div>
            <div class="ff" style="margin-top:4px">${GUIDE[b5]||''}</div>
            <div class="ff muted" style="margin-top:6px;font-size:10px">${vw=='pm'?'Each mechanism = one equal vote (canaries equal within).':vw=='ew'?'Event-study weights vs 8 crisis windows, 50% shrunk to equal, clamp [0.6,1.6]. * = equal prior.':(B.note||'')}</div></div></div>
        <div style="flex:1;min-width:300px;display:grid;gap:9px">${right}</div></div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;border-top:1px solid #22304433;padding-top:11px">
        ${B5.map((t,j)=>`<div style="text-align:center;min-width:118px"><div style="height:12px;border-radius:3px;background:${B5C[j]};margin-bottom:4px"></div><b style="font-size:10px;letter-spacing:1px;color:${B5C[j]}">${t}</b><div class="ff muted" style="font-size:9px">${GUIDE[B5[j]]}</div></div>`).join('')}</div>
    </div>
    <div class="card" style="margin-top:12px;padding:16px;border:1px solid #2a3444">
      <div style="text-align:center;font-size:19px;font-weight:800;letter-spacing:1px">HOW THE BAROMETER WAS BUILT</div>
      <div style="text-align:center;color:${GOLD};font-size:11px;letter-spacing:2px">METHODOLOGY — LIVE VALUES, NOT ILLUSTRATIVE</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:12px">
        <div><div class="lbl" style="color:${GOLD}">STEP 1 — THE ${entries.length} MECHANISMS</div>
          <div class="ff" style="margin-top:6px">${entries.map(([k,m],i)=>`<div style="display:flex;justify-content:space-between;padding:2px 0"><span><span class="tag">${i+1}</span> ${m.label||k}</span><span class="muted">${m.n_canaries} canaries</span></div>`).join('')}</div></div>
        <div><div class="lbl" style="color:${GOLD}">STEP 2 — 0-100 STRESS → 5 LEVELS</div>
          <div class="ff" style="margin-top:6px">${B5.map((t,j)=>`<div style="display:flex;align-items:center;gap:8px;padding:3px 0"><i style="width:26px;height:12px;border-radius:3px;background:${B5C[j]};display:inline-block"></i><b style="width:78px;color:${B5C[j]}">${t}</b><span class="muted">${j*20}–${j*20+20}</span><span class="muted" style="flex:1;text-align:right;font-size:10px">${GUIDE[t]}</span></div>`).join('')}
          <div class="muted" style="margin-top:6px;font-size:10px">Every canary is normalised to 0-100 stress by its own engine (percentile of its full history, z-score, or status map) — mechanical readings, no forecasts.</div></div></div>
        <div><div class="lbl" style="color:${GOLD}">STEP 3 — LIVE SCORES × WEIGHTS</div>
          <div class="ff" style="margin-top:6px">${entries.map(([k,m])=>{const mi=Math.min(4,Math.floor((m.score||0)/20));return `<div style="display:flex;justify-content:space-between;padding:2px 0"><span>${m.label||k}</span><span><b style="color:${B5C[mi]}">${m.score}</b> <span style="color:${GOLD};font-size:10px">×${m.weight!=null?m.weight:1}${m.weight_status=='LEARNED'?'':'*'}</span></span></div>`}).join('')}
          <div class="muted" style="margin-top:5px;font-size:10px">Weights are EARNED: event-study vs 8 crisis windows (1997→2023) — hit-rate, lead months, false-alarm penalty — 50% shrunk to equal, clamped [0.6,1.6]. * = equal prior (no deep history).</div></div>
        <div><div class="lbl" style="color:${GOLD}">STEP 4 — THE COMPOSITES (LIVE)</div>
          <div class="ff" style="margin-top:6px">
            <div style="display:flex;justify-content:space-between;padding:3px 0"><span>Equal per mechanism (${entries.length} votes)</span><b style="color:${B5C[Math.min(4,Math.floor((PM.score||0)/20))]}">${PM.score} ${PM.band5||''}</b></div>
            <div style="display:flex;justify-content:space-between;padding:3px 0"><span>Earned weights (${EW.n_learned||0} learned)</span><b style="color:${B5C[Math.min(4,Math.floor((EW.score||0)/20))]}">${EW.score} ${EW.band5||''}</b></div>
            <div style="display:flex;justify-content:space-between;padding:3px 0"><span>Equal per canary (${PC.n_votes||'?'} votes)</span><b style="color:${B5C[Math.min(4,Math.floor((PC.score||0)/20))]}">${PC.score} ${PC.band5||''}</b></div>
            <div class="muted" style="margin-top:6px;font-size:10px">Composite = Σ(weight × mechanism stress) ÷ Σ weights. All three views computed every run from the same 290+ live canaries — pick your lens with the toggle above. Weights re-studied monthly. Full method + per-mechanism evidence in <a href="https://justhodl.ai/data/warroom-weights.json" style="color:${GOLD}">warroom-weights.json</a>.</div></div></div></div>
    </div>`;
  };
  if(PM.score!=null||PC.score!=null)renderBaro();
  // filters
  const mechs=[...new Set((d.all_canaries||[]).map(c=>c.mechanism))];
  document.getElementById('filters').innerHTML=['all','everything',...mechs].map(f=>`<button class="${f==filt?'on':''}" onclick="filt='${f}';renderTbl()">${f=='all'?'All firing':f=='everything'?'Everything watched':f.replace('_',' ')}</button>`).join('');
  renderTbl();
  // playbook
  document.getElementById('playbook').innerHTML=(d.brain_playbook||[]).map(p=>
    `<div class="pb">${p.pinned?'<span class="pin">📌 PINNED</span> ':''}${p.cat?'<span class="cat">'+p.cat+'</span>':''}<div style="margin-top:5px">${(p.text||'').replace(/[\r\n]+/g,' ')}</div></div>`).join('')||'<div class="muted">No canary notes surfaced from the brain.</div>';
}
function renderTbl(){
  const rows=(filt=='everything'
      ? (DATA.all_canaries||[]).slice().sort((a,b)=>(b.stress||0)-(a.stress||0))
      : (DATA.firing||[]).filter(c=>filt=='all'||c.mechanism==filt));
  document.querySelector('#tbl thead').innerHTML='<tr><th>Mechanism</th><th>Canary</th><th>Band</th><th class="rt">Stress</th><th class="rt">Lead (mo)</th><th>Value</th><th>Read</th></tr>';
  document.querySelector('#tbl tbody').innerHTML=rows.map(c=>{
    const cc=col(c.band),st=c.stress==null?0:c.stress;
    return `<tr><td><span class="tag">${c.mech_label||c.mechanism}</span></td>
      <td><b>${c.name||''}</b></td>
      <td><span class="pill" style="background:#0e1622;color:${cc}">${c.band||''}</span></td>
      <td class="rt"><div style="display:flex;align-items:center;gap:8px;justify-content:flex-end"><span>${c.stress==null?'—':Math.round(st)}</span><div class="bar" style="width:64px"><i style="width:${st}%;background:${cc}"></i></div></div></td>
      <td class="rt muted">${c.lead_months==null?'—':c.lead_months}</td>
      <td class="muted">${fmt(c.value)} ${c.unit||''}</td>
      <td class="muted">${(c.detail||'').slice(0,120)}</td></tr>`;}).join('')
    ||'<tr><td colspan="7" class="muted" style="padding:18px">No firing canaries in this view — grid is calm.</td></tr>';
}
getJSON('data/canary-warroom.json').then(render).catch(()=>{document.getElementById('sub').textContent='Could not load war-room feed.';});
</script>

<script defer src="/jh-nav-drawer.js"></script>
<script defer src="/jh-page-ai.js"></script>
</body>
</html>
