<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Buyback Blackout Curve — JustHodl.AI</title>
<style>
:root{--bg:#0a0e14;--bg-2:#111722;--card:#0e1420;--line:#1e2836;--fg:#dfe7f3;--fg-2:#9db0c8;--fg-3:#5c6f88;--cyan:#46c8ff;--amber:#ffd24a;--red:#ff5d6c;--green:#37d99a;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:26px 18px 60px}
h1{font-size:21px;margin:0 0 4px;letter-spacing:.4px}
.sub{color:var(--fg-3);font-family:var(--mono);font-size:11.5px;margin-bottom:22px}
.hero{display:flex;gap:22px;align-items:center;background:linear-gradient(135deg,var(--card),var(--bg-2));border:1px solid var(--line);border-radius:14px;padding:22px 26px;margin-bottom:20px;flex-wrap:wrap}
.score{font-family:var(--mono);font-size:54px;font-weight:700;line-height:1}
.phase{font-family:var(--mono);font-size:13px;letter-spacing:2px;padding:7px 14px;border-radius:8px;border:1px solid var(--line);background:var(--bg-2)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:14px;margin-bottom:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.card h3{margin:0 0 8px;font-size:12px;letter-spacing:1.4px;color:var(--fg-2);font-weight:600}
.big{font-family:var(--mono);font-size:24px;font-weight:700}
.kv{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--fg-2);margin-top:4px}
.note{color:var(--fg-3);font-size:11px;margin-top:9px;line-height:1.45}
.method{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:13px 16px;color:var(--fg-2);font-size:12px;line-height:1.6}
.g{color:var(--green)}.a{color:var(--amber)}.r{color:var(--red)}.c{color:var(--cyan)}
.loading{color:var(--fg-3);font-family:var(--mono);padding:40px;text-align:center}
</style></head><body><div class="wrap">
<h1>🔇 BUYBACK BLACKOUT CURVE</h1>
<div class="sub" id="sub">Loading the corporate-bid switch…</div>
<div id="app" class="loading">Loading…</div>
<script src="/jh-nav-drawer.js?v=3335" defer></script>
<script>
const PX=['','https://s3.amazonaws.com/justhodl-dashboard-live/'];
async function getJSON(k){for(const p of PX){try{const r=await fetch(p+k,{cache:'no-store'});if(r.ok)return await r.json()}catch(e){}}return null}
const col=s=>({DEEP_BLACKOUT:'r',HEAVY_BLACKOUT:'a',MIXED:'c',WINDOW_OPEN:'g'}[s]||'c');
(async()=>{
 const d=await getJSON('data/earnings-blackout.json');
 const app=document.getElementById('app');
 if(!d||!d.now){app.textContent='Feed unavailable.';return}
 const N=d.now,P=d.peak||{},T=d.trough||{};
 document.getElementById('sub').innerHTML=`S&amp;P 500 · ${N.n_caps_matched}/${N.n_members} caps matched · $${N.total_cap_t}T · ${(d.generated_at||'').slice(0,16).replace('T',' ')} UTC`;
 app.className='';app.innerHTML=`
 <div class="hero">
   <div><div class="score ${col(N.state)}">${N.blackout_mktcap_pct}%</div>
   <div style="color:var(--fg-3);font-family:var(--mono);font-size:11px">of S&amp;P 500 market cap in blackout today</div></div>
   <div class="phase ${col(N.state)}">${(N.state||'').replace(/_/g,' ')}</div>
 </div>
 <div class="grid">
  <div class="card"><h3>NEXT 14 DAYS — REPORTING</h3><div class="big c">${(d.next_14d||{}).reporting_mktcap_pct}%</div>
    <div class="note">Share of index cap printing earnings in the next two weeks — event-vol intensity.</div></div>
  <div class="card"><h3>CURVE PEAK</h3><div class="big r">${P.value}%</div><div class="kv"><span>on</span><b>${P.date}</b></div>
    <div class="note">Deepest blackout ahead — corporate bid most absent.</div></div>
  <div class="card"><h3>CURVE TROUGH</h3><div class="big g">${T.value}%</div><div class="kv"><span>on</span><b>${T.date}</b></div>
    <div class="note">Widest buyback window ahead — repurchase flow resumes.</div></div>
  <div class="card"><h3>COVERAGE</h3><div class="big">${N.n_with_dates}</div>
    <div class="kv"><span>members w/ dated earnings</span><b>${N.n_members}</b></div>
    <div class="note">FMP earnings-calendar match inside the ±window.</div></div>
 </div>
 <div id="chart-anchor"><h1 style="font-size:14px;letter-spacing:1.5px;color:var(--fg-2)">42-DAY FORWARD BLACKOUT CURVE (% OF S&amp;P CAP)</h1></div>
 <div class="method" style="margin-top:18px"><b>METHOD</b> — ${d.method||''}</div>`;
 const s=document.createElement('script');s.src='/jh-enhance.js';
 s.setAttribute('data-feed','data/earnings-blackout.json');
 s.setAttribute('data-line','curve');
 document.getElementById('chart-anchor').appendChild(s);
})();
</script></div>
<script defer src="/jh-page-ai.js"></script>
</body></html>
