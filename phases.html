<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0a0f18">
<title>Accumulation & Distribution Phases · JustHodl.AI</title>
<link rel="stylesheet" href="/jh-theme.css">
<style>
body{background:#070b12;color:#e8ecf3;font-family:'IBM Plex Sans',system-ui,sans-serif;margin:0}
.wrap{max-width:1320px;margin:0 auto;padding:18px}
.card{background:#0d131d;border:1px solid #2a3444;border-radius:12px;padding:14px}
.lbl{font-size:11px;letter-spacing:2px;color:#8b96a8;font-weight:700}
.ff{font-size:12px}.muted{color:#8b96a8}
table{width:100%;border-collapse:collapse;font-size:12px}
th{color:#8b96a8;text-align:left;padding:6px 8px;font-size:10px;letter-spacing:1px;border-bottom:1px solid #22304466;cursor:pointer}
td{padding:6px 8px;border-bottom:1px solid #16202f}
.pos{color:#2e9e4f}.neg{color:#e03d2f}
.badge{display:inline-block;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:800;letter-spacing:.5px}
.b-acc{background:#0e2b18;color:#3fd57a;border:1px solid #2e9e4f}
.b-dis{background:#2b0e0e;color:#ff7b6e;border:1px solid #e03d2f}
.b-mup{background:#0e1f2b;color:#4fc3f7;border:1px solid #35b6e0}
.b-mdn{background:#241026;color:#d879e0;border:1px solid #a04ab0}
.b-neu{background:#161c28;color:#9aa4b5;border:1px solid #3a4658}
.ev{display:inline-block;background:#132033;border:1px solid #2a3444;border-radius:3px;padding:0 5px;margin:1px;font-size:9.5px;font-weight:700}
.cf{display:inline-block;border-radius:3px;padding:0 5px;margin:1px;font-size:9.5px;font-weight:700;border:1px solid #b8912f;color:#e8c86a}
.pbar{width:70px;height:8px;background:#1a2333;border-radius:4px;position:relative;display:inline-block;vertical-align:middle}
.pbar i{position:absolute;top:0;bottom:0;border-radius:4px}
button{background:#121a28;border:1px solid #2a3444;color:#cfd6e2;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer}
button.on{border-color:#b8912f;color:#e8c86a}
input{background:#0b111c;border:1px solid #2a3444;color:#e8ecf3;border-radius:6px;padding:5px 10px;font-size:12px}
@media(max-width:760px){.grid3{grid-template-columns:1fr!important}}
</style></head><body>
<div class="wrap">
<h1 style="font-size:30px;font-weight:900;letter-spacing:1px;margin:8px 0 2px">ACCUMULATION &amp; DISTRIBUTION — PHASE MAP</h1>
<div class="ff muted" id="sub">Dated BEGIN and END of each phase, per stock — Wyckoff-grounded, volume-confirmed. Loading…</div>
<div id="boards" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px" class="grid3"></div>
<div class="card" style="margin-top:12px">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <span class="lbl">ALL TRACKED NAMES</span>
    <input id="q" placeholder="search ticker…" style="width:150px" oninput="renderT()">
    <span id="tabs"></span></div>
  <div style="overflow-x:auto;margin-top:8px"><table id="tbl"><thead><tr>
    <th>TICKER</th><th>PHASE</th><th>BEGIN</th><th>DAYS</th><th>PRESSURE</th><th>RANGE</th><th>EVENTS</th><th>CONFIRMATIONS</th><th>PRIOR PHASE (begin → end)</th></tr></thead><tbody></tbody></table></div></div>
<div class="card" style="margin-top:12px" id="method"></div>
</div>
<script>
let D=null,PH='all';
const BAD={ACCUMULATION:'b-acc',DISTRIBUTION:'b-dis',MARKUP:'b-mup',MARKDOWN:'b-mdn',NEUTRAL_RANGE:'b-neu',NEUTRAL:'b-neu'};
const pb=p=>{if(p==null)return '';const w=Math.min(100,Math.abs(p)*100);const c=p>=0?'#2e9e4f':'#e03d2f';const side=p>=0?'left:50%':'right:50%';return `<span class="pbar"><i style="${side};width:${w/2}%;background:${c}"></i></span> <span class="${p>=0?'pos':'neg'}">${p>0?'+':''}${p}</span>`};
fetch('data/phase-detector.json?v='+Date.now()).then(r=>r.json()).then(d=>{D=d;
  const pc=d.phase_counts||{};
  document.getElementById('sub').innerHTML=`Dated <b>BEGIN</b> and <b>END</b> of each phase, per stock — Wyckoff-grounded, volume-confirmed · ${d.analyzed_n} names analyzed · in accumulation <b class="pos">${pc.ACCUMULATION||0}</b> · in distribution <b class="neg">${pc.DISTRIBUTION||0}</b> · markup ${pc.MARKUP||0} · markdown ${pc.MARKDOWN||0} · updated ${(d.generated_at||'').slice(0,10)}`;
  const B=[["✨ ACCUMULATION BEGINNING","accumulation_beginning","just entered a base — pressure positive"],["🧲 ACCUMULATION MATURE","accumulation_mature","weeks of absorption"],["🚀 ACCUMULATION ENDED → MARKUP","accumulation_ended_markup","volume-confirmed breakout (SOS)"],["🩸 DISTRIBUTION BEGINNING","distribution_beginning","just topped — pressure negative"],["📦 DISTRIBUTION MATURE","distribution_mature","weeks of supply"],["⬇️ DISTRIBUTION ENDED → MARKDOWN","distribution_ended_markdown","volume-confirmed breakdown (SOW)"]];
  document.getElementById('boards').innerHTML=B.map(([t,k,sub])=>`<div class="card"><div class="lbl">${t}</div><div class="ff muted" style="font-size:10px">${sub}</div>
    ${((d.boards||{})[k]||[]).slice(0,8).map(r=>`<div style="display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:1px solid #16202f">
      <span><b>${r.ticker}</b> <span class="ff muted">began ${r.begin||'—'} · ${r.days??'—'}d</span></span>${pb(r.pressure)}</div>`).join('')||'<div class="ff muted" style="margin-top:4px">none today</div>'}</div>`).join('');
  const phases=['all','ACCUMULATION','DISTRIBUTION','MARKUP','MARKDOWN','NEUTRAL_RANGE'];
  document.getElementById('tabs').innerHTML=phases.map(p=>`<button class="${PH==p?'on':''}" onclick="PH='${p}';renderT()">${p=='all'?'ALL':p.replace('_',' ')}</button>`).join(' ');
  renderT();
  document.getElementById('method').innerHTML=`<div class="lbl">HOW PHASES ARE DETECTED — the research behind this page</div>
    <div class="ff" style="margin-top:8px;line-height:1.6;color:#cfd6e2">${(d.method||'')}</div>
    <div class="ff" style="margin-top:8px;line-height:1.6;color:#cfd6e2"><b style="color:#e8c86a">Honest limits:</b> ${(d.honesty||'')}</div>
    <div class="ff muted" style="margin-top:8px;font-size:11px">Grounding: the Wyckoff schematic sequence (PS→SC→AR→ST→Spring→SOS for accumulation; PSY→BC→AR→ST→UT/UTAD→SOW for distribution), climax volume signatures (2–3× average volume, wide spread, close off the extreme), the UTAD's 1–3-bar reversal, and the SOW/SOS as the phase-completion events — per <a href="https://www.wyckoffanalytics.com/wyckoff-method/" style="color:#e8c86a">Wyckoff Analytics</a>, <a href="https://www.bitmex.com/blog/wyckoff-distribution" style="color:#e8c86a">BitMEX Research</a>, <a href="https://journalplus.co/learn/glossary/wyckoff-method/" style="color:#e8c86a">JournalPlus</a>, <a href="https://ftmo.com/en/blog/the-wyckoff-theory-and-its-application-in-trading/" style="color:#e8c86a">FTMO</a>. In-range pressure uses OBV & Chaikin A/D slope divergence, up/down volume and close-location value — the computable form of "volume heavier than the price result justifies."</div>`;
}).catch(e=>{document.getElementById('sub').textContent='feed unavailable: '+e});
function renderT(){if(!D)return;const q=(document.getElementById('q').value||'').toUpperCase();
  const phases=['all','ACCUMULATION','DISTRIBUTION','MARKUP','MARKDOWN','NEUTRAL_RANGE'];
  document.getElementById('tabs').innerHTML=phases.map(p=>`<button class="${PH==p?'on':''}" onclick="PH='${p}';renderT()">${p=='all'?'ALL':p.replace('_',' ')}</button>`).join(' ');
  const rows=Object.entries(D.tickers||{}).filter(([t,v])=>(PH=='all'||v.phase==PH)&&(!q||t.includes(q)))
    .sort((a,b)=>Math.abs(b[1].pressure||0)-Math.abs(a[1].pressure||0)).slice(0,250);
  document.querySelector('#tbl tbody').innerHTML=rows.map(([t,v])=>{const h=(v.history||[]).slice(-1)[0];
    return `<tr><td><b>${t}</b> <span class="ff muted">$${v.price}</span></td>
    <td><span class="badge ${BAD[v.phase]||'b-neu'}">${v.phase.replace('_',' ')}</span></td>
    <td><b>${v.begin||'—'}</b></td><td>${v.days_in_phase??'—'}</td>
    <td>${pb(v.pressure)}</td>
    <td class="ff muted">${v.range_low!=null?v.range_low+'–'+v.range_high:'—'}</td>
    <td>${(v.events||[]).map(e=>`<span class="ev" title="${e.date}">${e.type}</span>`).join('')}</td>
    <td>${v.confirmations?.dark_pool?`<span class="cf">DP:${v.confirmations.dark_pool.slice(0,4)}</span>`:''}${v.confirmations?.whales_flow_usd?`<span class="cf">WHALES ${v.confirmations.whales_flow_usd>0?'+':'−'}</span>`:''}${v.confirmations?.resilience_flow?`<span class="cf">FLOW✓</span>`:''}</td>
    <td class="ff muted">${h?`${h.type.slice(0,4)} ${h.begin} → ${h.end||'…'} (${h.resolved})`:'—'}</td></tr>`}).join('');
}
</script>
<script src="/jh-nav-drawer.js" defer></script>
<script src="/jh-page-ai.js" defer></script>
</body></html>
