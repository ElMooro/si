<style>
:root {
  --bg: #0a0e14; --p: #10151f; --p2: #161d2a; --l: #1d2636;
  --fg: #e8edf5; --fg2: #a8b3c7; --fg3: #5d6b82;
  --cyan: #22d3ee; --green: #26ffaf; --red: #ff5c7c; --violet: #a78bfa; --amber: #fbbf24;
  --mono: 'IBM Plex Mono', ui-monospace, monospace; --sans: Inter, system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--fg); line-height: 1.5; -webkit-font-smoothing: antialiased; }
a { color: inherit; }
.wrap { max-width: 1360px; margin: 0 auto; padding: 22px 20px 60px; }

/* ---- topbar ---- */
.topbar { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; margin-bottom: 20px; }
.brand { font-family: var(--mono); font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.brand .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }
.brand b { color: var(--fg3); font-weight: 600; }
.topmeta { color: var(--fg3); font-size: 12px; font-family: var(--mono); }
.toplinks { margin-left: auto; display: flex; gap: 14px; font-size: 12.5px; }
.toplinks a { color: var(--fg2); text-decoration: none; }
.toplinks a:hover { color: var(--cyan); }

/* ---- hero: spotlight + regime ---- */
.hero { display: grid; grid-template-columns: 1.1fr 1fr; gap: 14px; margin-bottom: 22px; }
.spotlight { background: linear-gradient(135deg, rgba(38,255,175,.06), rgba(34,211,238,.03) 60%);
             border: 1px solid var(--l); border-left: 3px solid var(--green); border-radius: 12px;
             padding: 20px 22px; }
.spotlight .eyebrow { font-family: var(--mono); font-size: 10.5px; letter-spacing: 1.3px; text-transform: uppercase;
                       color: var(--green); margin-bottom: 10px; }
.spotlight-row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 4px; flex-wrap: wrap; }
.spotlight-ticker { font-family: var(--mono); font-weight: 800; font-size: 34px; color: var(--fg); }
.spotlight-score { font-family: var(--mono); font-weight: 700; font-size: 20px; color: var(--green); }
.spotlight-meter { margin: 8px 0 10px; }
.spotlight-why { font-size: 13.5px; color: var(--fg2); line-height: 1.55; max-width: 640px; }

.regime-panel { background: var(--p); border: 1px solid var(--l); border-radius: 12px; padding: 18px 20px; }
.rp-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 3px; }
.rp-label { font-family: var(--mono); font-size: 10.5px; letter-spacing: 1.3px; text-transform: uppercase; color: var(--fg3); }
.rp-value { font-size: 18px; font-weight: 700; }
.regime-EXPANSION, .regime-STRONG-EXPANSION { color: var(--green); }
.regime-SLOWING, .regime-CONTRACTION { color: var(--red); }
.regime-MUDDLE, .regime-NEUTRAL { color: var(--amber); }
.rp-sub { font-size: 11.5px; color: var(--fg3); font-family: var(--mono); margin-bottom: 14px; }
.rp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 14px; }
.rp-stat { border-left: 1px solid var(--l); padding-left: 10px; }
.rp-stat b { display: block; font-size: 17px; font-weight: 700; font-family: var(--mono); }
.rp-stat span { font-size: 10.5px; color: var(--fg3); text-transform: uppercase; letter-spacing: .04em; }
#calibNote { grid-column: span 2; border-left: 1px solid var(--l); padding-left: 10px; }
#calibNote b { font-size: 12px; color: var(--fg2); font-family: var(--sans); font-weight: 600; }

/* ---- watchlist filter ---- */
.wlbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 9px 14px;
         background: var(--p); border: 1px solid var(--l); border-radius: 9px; font-size: 12.5px; flex-wrap: wrap; }
.wlbar strong { color: var(--cyan); font-weight: 600; }
.wlbar label { cursor: pointer; color: var(--fg2); display: flex; align-items: center; gap: 6px; }
.wlbar select { background: var(--p2); border: 1px solid var(--l); color: var(--fg); padding: 5px 10px;
                border-radius: 6px; font-size: 11.5px; }
.wlbar .wlinfo { color: var(--fg3); margin-left: auto; font-size: 11px; font-family: var(--mono); }

/* ---- sections ---- */
.section { margin-bottom: 24px; }
.section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.section-head h2 { font-family: var(--mono); font-size: 12px; font-weight: 800; letter-spacing: 1.2px;
                    text-transform: uppercase; color: var(--fg2); }
.section-head .count { color: var(--fg3); font-size: 11.5px; font-weight: 500; margin-left: 8px; }
.sortbar { display: flex; gap: 4px; }
.sortbar button { background: var(--p); border: 1px solid var(--l); color: var(--fg3); font-size: 11px;
                   font-family: var(--mono); padding: 5px 11px; border-radius: 6px; cursor: pointer; }
.sortbar button.on { color: var(--cyan); border-color: var(--cyan); background: rgba(34,211,238,.08); }
.sortbar button:hover { color: var(--fg); }

/* ---- leaderboard cards ---- */
.tcard { background: var(--p); border: 1px solid var(--l); border-radius: 10px; margin-bottom: 6px;
         overflow: hidden; cursor: pointer; transition: border-color .12s; }
.tcard:hover { border-color: #2a3550; }
.tcard.tier-5 { border-left: 3px solid var(--green); }
.tcard.tier-4 { border-left: 3px solid rgba(38,255,175,.5); }
.tcard.tier-3 { border-left: 3px solid var(--amber); }
.tcard-main { display: grid; grid-template-columns: 34px 90px 130px 1fr; align-items: center;
              gap: 14px; padding: 11px 16px; }
.tc-rank { font-family: var(--mono); font-weight: 700; color: var(--fg3); font-size: 13px; }
.tc-ticker-wrap { display: flex; align-items: baseline; gap: 9px; }
.tc-ticker { font-family: var(--mono); font-weight: 800; font-size: 16px; color: var(--fg); }
.tc-score { font-family: var(--mono); font-weight: 700; font-size: 13px; color: var(--fg2); }
.tc-flag { color: var(--red); font-size: 12px; }
.meter { display: flex; gap: 3px; align-items: center; }
.meter-dot { width: 8px; height: 8px; border-radius: 2px; background: var(--l); }
.meter-dot.on { background: var(--fg3); }
.meter-dot.on.trusted { background: var(--green); }
.meter-dot.on.distrusted { background: var(--red); }
.meter-n { font-family: var(--mono); font-size: 10.5px; color: var(--fg3); margin-left: 4px; }
.tc-body { min-width: 0; }
.tc-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
.pill { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 9.5px; font-weight: 600;
        letter-spacing: .02em; white-space: nowrap; }
.pill.cat-fund { background: rgba(38,255,175,.13); color: var(--green); }
.pill.cat-inst { background: rgba(34,211,238,.13); color: var(--cyan); }
.pill.cat-tech { background: rgba(251,191,36,.15); color: var(--amber); }
.pill.cat-flow { background: rgba(167,139,250,.15); color: var(--violet); }
.pill.cat-macro { background: rgba(96,165,250,.15); color: #60a5fa; }
.pill.more { background: rgba(255,255,255,.06); color: var(--fg3); }
.tc-rationale { font-size: 12px; color: var(--fg3); line-height: 1.45; }
.tc-nc { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 8px; margin-left: 6px; vertical-align: middle; }
.tc-nc.up { background: rgba(34,197,94,.15); color: var(--green); }
.tc-nc.dn { background: rgba(239,68,68,.13); color: var(--red); }

.expand-chevron { font-size: 10px; color: var(--fg3); transition: transform .15s; }
.tcard.open .expand-chevron { transform: rotate(90deg); color: var(--cyan); }

.detail-panel { background: var(--p2); border-top: 1px solid var(--l); padding: 16px 20px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
@media (max-width: 780px) { .detail-grid { grid-template-columns: 1fr; } }
.detail-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
                color: var(--fg3); margin-bottom: 8px; }
.contrib-row { display: grid; grid-template-columns: 120px 1fr 36px 46px; gap: 8px; align-items: center;
               margin-bottom: 5px; font-size: 11px; color: var(--fg2); }
.contrib-bar-track { background: var(--l); border-radius: 3px; height: 6px; overflow: hidden; }
.contrib-bar-fill { background: var(--fg3); height: 100%; border-radius: 3px; }
.contrib-bar-fill.trusted { background: var(--green); }
.contrib-bar-fill.distrusted { background: var(--red); }
.mult-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 5px; font-size: 10.5px;
              font-weight: 700; font-family: var(--mono); margin: 0 5px 5px 0; }
.mult-badge.up { background: rgba(38,255,175,.13); color: var(--green); }
.mult-badge.down { background: rgba(255,92,124,.13); color: var(--red); }
.flag-chip { display: inline-block; padding: 3px 9px; border-radius: 5px; font-size: 11px; font-weight: 600;
             margin: 0 6px 6px 0; }
.flag-chip.redflag { background: rgba(255,92,124,.15); color: var(--red); }
.flag-chip.cycle { background: rgba(251,191,36,.15); color: var(--amber); }
.flag-chip.structural { background: rgba(34,211,238,.15); color: var(--cyan); }
.detail-empty { color: var(--fg3); font-size: 11.5px; }

/* ---- macro grid ---- */
.macro-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
.mcard { background: var(--p); border: 1px solid var(--l); border-radius: 10px; padding: 14px 16px; }
.type-pill { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 9.5px; font-weight: 700;
             letter-spacing: .04em; text-transform: uppercase; margin-bottom: 8px; }
.type-divergence { background: rgba(255,92,124,.15); color: var(--red); }
.type-pair { background: rgba(167,139,250,.15); color: var(--violet); }
.type-sector_tilt { background: rgba(38,255,175,.13); color: var(--green); }
.type-cross_asset_regime { background: rgba(34,211,238,.13); color: var(--cyan); }
.type-regime_anomaly { background: rgba(251,191,36,.15); color: var(--amber); }
.type-liquidity_inflection { background: rgba(34,211,238,.13); color: var(--cyan); }
.mcard .mname { font-weight: 600; font-size: 13.5px; margin-bottom: 4px; }
.mcard .mmeta { font-size: 11px; color: var(--fg3); font-family: var(--mono); margin-bottom: 6px; }
.mcard .maction { font-size: 12px; color: var(--green); margin-bottom: 5px; }
.mcard .mrationale { font-size: 11.5px; color: var(--fg3); line-height: 1.45; }
.zbar-track { background: var(--l); border-radius: 3px; height: 4px; margin: 6px 0; overflow: hidden; }
.zbar-fill { height: 100%; border-radius: 3px; background: var(--red); }

/* ---- health strip / loader ---- */
.health-strip { display: flex; flex-wrap: wrap; gap: 14px; padding: 10px 4px; margin-top: 6px;
                font-size: 10.5px; color: var(--fg3); border-top: 1px solid var(--l); }
.health-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 5px; background: var(--red); }
.loader { text-align: center; padding: 40px; color: var(--fg3); font-size: 13px; }

@media (max-width: 980px) {
  .hero { grid-template-columns: 1fr; }
  .tcard-main { grid-template-columns: 26px 70px 100px 1fr; gap: 10px; padding: 10px 12px; }
}
@media (max-width: 600px) {
  .tcard-main { grid-template-columns: 1fr; }
  .rp-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="dot"></span>Master Ranker<b>· JustHodl.AI</b></div>

<script>
const URL = 'https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com/data/master-ranker.json';
const WL_URL = 'https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com/data/user-watchlist.json';

let DATA = null;
let SORT = { col: 'score', dir: 'desc' };
let WATCHLIST = null;
let WL_FILTER_ON = localStorage.getItem('wl_filter_master') === '1';
let WL_CATEGORY = localStorage.getItem('wl_category_master') || 'all';

async function loadWatchlist() {
  try {
    const r = await fetch(WL_URL + '?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    WATCHLIST = await r.json();
    const total = Object.values(WATCHLIST.categories || {}).reduce((s,a)=>s+(a||[]).length, 0);
    document.getElementById('wlInfo').textContent = `${total} tickers · v${WATCHLIST.version || '?'}`;
  } catch (e) {
    WATCHLIST = null;
    document.getElementById('wlInfo').textContent = 'no watchlist (set up at /watchlist.html)';
  }
}

function getWatchlistTickers(category) {
  if (!WATCHLIST?.categories) return new Set();
  if (category === 'all') {
    const all = new Set();
    for (const cat of ['holdings','watching','research','exit_zone']) {
      (WATCHLIST.categories[cat] || []).forEach(t => all.add(t));
    }
    return all;
  }
  return new Set(WATCHLIST.categories[category] || []);
}

function filterByWatchlist(rows) {
  if (!WL_FILTER_ON || !WATCHLIST) return rows;
  const wl = getWatchlistTickers(WL_CATEGORY);
  if (!wl.size) return rows;
  return rows.filter(r => wl.has(r.ticker));
}

function fmt(v, d=2) {
  if (v === null || v === undefined || v === '') return '—';
  const n = Number(v);
  if (isNaN(n)) return String(v).slice(0,30);
  if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(d);
}

function fmtZ(v) {
  if (v === null || v === undefined) return '—';
  const n = Number(v);
  if (isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + 'σ';
}

function applySort(rows, col, dir) {
  return [...rows].sort((a, b) => {
    let av = a[col], bv = b[col];
    if (Array.isArray(av)) av = av.length;
    if (Array.isArray(bv)) bv = bv.length;
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av === undefined || av === null) av = dir === 'asc' ? Infinity : -Infinity;
    if (bv === undefined || bv === null) bv = dir === 'asc' ? Infinity : -Infinity;
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

// ── system → category color mapping (5 meaningful categories, not 19 arbitrary colors) ──
const CATS = {
  'cat-fund': new Set(['compound','deep_value','eps_velocity','revenue_accel','buyback','earnings_confluence','earnings_quality_hi','forward_orders','estimate_revisions']),
  'cat-inst': new Set(['smart_money','insider','institutional_13f']),
  'cat-tech': new Set(['momentum_breakout','volatility_squeeze','squeeze_setup','pead','theme_tiers']),
  'cat-flow': new Set(['options_flow','massive','options_confluence','flow_confluence','nobrainers']),
};
function catOf(sys) {
  for (const [c, set] of Object.entries(CATS)) if (set.has(sys)) return c;
  return 'cat-macro';
}

function avgTrust(contributions) {
  const c = (contributions || []).filter(x => x.trust_mult !== undefined);
  if (!c.length) return 1.0;
  return c.reduce((s,x) => s + x.trust_mult, 0) / c.length;
}

function renderMeter(n, trust) {
  const capped = Math.min(n, 5);
  const trustCls = trust > 1.02 ? 'trusted' : (trust < 0.98 ? 'distrusted' : '');
  let dots = '';
  for (let i = 0; i < 5; i++) dots += `<span class="meter-dot ${i < capped ? 'on '+trustCls : ''}"></span>`;
  return `<div class="meter">${dots}<span class="meter-n">${n}</span></div>`;
}

function fmtMult(m, label) {
  if (m === null || m === undefined || Math.abs(m - 1.0) < 0.005) return '';
  const cls = m > 1 ? 'up' : 'down';
  const pct = ((m - 1) * 100).toFixed(0);
  return `<span class="mult-badge ${cls}">${label} ${pct>0?'+':''}${pct}%</span>`;
}

function renderContribRow(c) {
  const trustCls = c.trust_mult > 1.01 ? 'trusted' : (c.trust_mult < 0.99 ? 'distrusted' : '');
  const pct = Math.max(2, Math.min(100, c.normalized || 0));
  return `<div class="contrib-row">
    <span>${(c.system||'').replace(/_/g,' ')}</span>
    <span class="contrib-bar-track"><span class="contrib-bar-fill ${trustCls}" style="width:${pct}%"></span></span>
    <span>${c.normalized}</span>
    <span>${c.contribution}</span>
  </div>`;
}

function renderDetailPanel(r) {
  const contribs = (r.contributions || []).slice().sort((a,b) => b.contribution - a.contribution);
  const mults = [
    fmtMult(r.capital_flow_mult, 'capital flow'),
    fmtMult(r.risk_regime_mult, 'RORO'),
    fmtMult(r.liquidity_regime_mult, 'liquidity'),
    fmtMult(r.nowcast_regime_mult, 'nowcast'),
  ].filter(Boolean).join('');
  const flags = [
    r.red_flags && r.red_flags.length ? `<span class="flag-chip redflag">⚠ ${r.red_flags.join('; ')}</span>` : '',
    r.cycle_warning ? `<span class="flag-chip cycle">⏳ ${r.cycle_warning.replace(/_/g,' ')}</span>` : '',
    r.structural_chokepoint ? `<span class="flag-chip structural">🔗 structural chokepoint${r.chokepoint_criticality ? ' ('+r.chokepoint_criticality+')' : ''}</span>` : '',
  ].filter(Boolean).join('');
  return `<div class="detail-panel">
    <div class="detail-grid">
      <div>
        <div class="detail-label">Per-system contribution</div>
        ${contribs.map(renderContribRow).join('') || '<span class="detail-empty">no system breakdown</span>'}
      </div>
      <div>
        <div class="detail-label">Regime multipliers</div>
        <div style="margin-bottom:10px">${mults || '<span class="detail-empty">no active regime tilt</span>'}</div>
        <div class="detail-label">Flags</div>
        <div>${flags || '<span class="detail-empty">none</span>'}</div>
      </div>
    </div>
  </div>`;
}

function renderSpotlight(top) {
  if (!top) { document.getElementById('spotlight').innerHTML = '<div class="loader">No ranked tickers</div>'; return; }
  const trust = avgTrust(top.contributions);
  const firstClause = (top.rationale || '').split(' · ')[0].replace(/^\d+ systems agree \([^)]*\)\s*/, '').trim();
  const restClauses = (top.rationale || '').split(' · ').slice(1, 3).join(' · ');
  document.getElementById('spotlight').innerHTML = `
    <div class="eyebrow">Today's top conviction</div>
    <div class="spotlight-row">
      <span class="spotlight-ticker">${top.ticker}</span>
      <span class="spotlight-score">${(top.score||0).toFixed(1)}</span>
    </div>
    <div class="spotlight-meter">${renderMeter(top.n_systems || 0, trust)}</div>
    <div class="spotlight-why">${(top.systems||[]).slice(0,6).join(' + ').replace(/_/g,' ')} agree${restClauses ? ' · ' + restClauses : ''}</div>
  `;
}

function renderTickers() {
  let rows = applySort(DATA.top_tickers || [], SORT.col, SORT.dir);
  rows = filterByWatchlist(rows);
  document.getElementById('tickerCount').textContent =
    WL_FILTER_ON && WATCHLIST ? `${rows.length} ranked (watchlist)` : `${rows.length} ranked`;

  renderSpotlight(rows[0]);

  const html = rows.map((r, i) => {
    const tier = r.n_systems >= 5 ? 'tier-5' : (r.n_systems >= 4 ? 'tier-4' : (r.n_systems >= 3 ? 'tier-3' : ''));
    const trust = avgTrust(r.contributions);
    const allSys = r.systems || [];
    const shown = allSys.slice(0, 5);
    const extra = allSys.length - shown.length;
    const sysPills = shown.map(s => `<span class="pill ${catOf(s)}">${s.replace(/_/g,' ')}</span>`).join('')
      + (extra > 0 ? `<span class="pill more">+${extra}</span>` : '');
    const flagDot = (r.red_flags && r.red_flags.length) ? '<span class="tc-flag">⚠</span>' : '';

  function sfLine(t){
    const f=(window.SFMAP||{})[t];if(!f)return'';
    const b=[];const mc=f.market_cap;
    if(mc)b.push('MCAP '+(mc>=1e12?(mc/1e12).toFixed(2)+'T':mc>=1e9?(mc/1e9).toFixed(1)+'B':(mc/1e6).toFixed(0)+'M'));
    if(f.pe_ttm!=null)b.push('PE '+f.pe_ttm.toFixed(1));
    if(f.peg!=null)b.push('PEG '+f.peg.toFixed(1));
    if(f.ps_ttm!=null)b.push('P/S '+f.ps_ttm.toFixed(1));
    if(f.fcf_yield_pct!=null)b.push('FCF '+f.fcf_yield_pct.toFixed(1)+'%');
    if(f.sh_yoy_pct!=null)b.push('SHARES '+(f.sh_yoy_pct>0?'+':'')+f.sh_yoy_pct+'% yoy');
    if(f.buyback_net_yield_pct)b.push('NET BB '+f.buyback_net_yield_pct+'%');
    return b.length?'<div style="font-size:10px;color:var(--fg3);font-family:var(--mono,monospace);margin-top:3px;letter-spacing:.2px">'+b.join(' · ')+'</div>':'';
  }
    const ncm = r.nowcast_regime_mult;
    const ncTilt = (ncm && ncm !== 1)
      ? `<span class="tc-nc ${ncm>1?'up':'dn'}" title="Fed nowcast ${(DATA.nowcast_regime||{}).regime||''} sector tilt (×${ncm})">${ncm>1?'▲':'▼'} macro</span>`
      : '';
    return `
      <div class="tcard" data-i="${i}">
        <div class="tcard-main">
          <div class="tc-rank">${i+1}</div>
          <div class="tc-ticker-wrap"><span class="tc-ticker">${r.ticker || '?'}</span>${flagDot}${ncTilt}</div>
          ${renderMeter(r.n_systems || 0, trust)}
          <div class="tc-body">
            <div class="tc-pills">${sysPills}</div>
            <div class="tc-rationale">${r.rationale||''}</div>
            ${sfLine(r.ticker)}
          </div>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('tickerHost').innerHTML = html || '<div class="loader">No tickers match</div>';

  document.querySelectorAll('.tcard').forEach(card => {
    card.addEventListener('click', () => {
      const i = +card.dataset.i;
      const wasOpen = card.classList.contains('open');
      document.querySelectorAll('.tcard.open').forEach(c => {
        c.classList.remove('open');
        const dp = c.querySelector('.detail-panel'); if (dp) dp.remove();
      });
      if (!wasOpen) {
        card.classList.add('open');
        card.insertAdjacentHTML('beforeend', renderDetailPanel(rows[i]));
      }
    });
  });

  document.querySelectorAll('#sortbar button').forEach(btn => {
    btn.addEventListener('click', () => {
      const c = btn.dataset.col;
      SORT.dir = (SORT.col === c && SORT.dir === 'desc') ? 'asc' : 'desc';
      SORT.col = c;
      document.querySelectorAll('#sortbar button').forEach(b => b.classList.toggle('on', b === btn));
      renderTickers();
    });
  });
}

function renderMacro() {
  const macros = DATA.top_macro || [];
  document.getElementById('macroCount').textContent = `${macros.length} signals`;
  if (!macros.length) {
    document.getElementById('macroHost').innerHTML = '<div class="loader">No actionable macro signals right now</div>';
    return;
  }
  const maxZ = Math.max(...macros.map(m => Math.abs(m.z || 0)), 1);
  const html = macros.map(m => {
    const meta = [];
    if (m.z !== null && m.z !== undefined) meta.push(`z=${fmtZ(m.z)}`);
    if (m.rr) meta.push(`R:R=${m.rr.toFixed(1)}:1`);
    if (m.half_life_days) meta.push(`hl=${m.half_life_days}d`);
    if (m.regime) meta.push(`regime=${m.regime}`);
    const zPct = m.z !== null && m.z !== undefined ? Math.min(100, Math.abs(m.z) / maxZ * 100) : 0;
    return `
      <div class="mcard">
        <span class="type-pill type-${m.type}">${(m.type||'').replace(/_/g,' ')}</span>
        <div class="mname">${m.name || '?'}</div>
        ${m.z !== null && m.z !== undefined ? `<div class="zbar-track"><span class="zbar-fill" style="width:${zPct}%"></span></div>` : ''}
        ${meta.length ? `<div class="mmeta">${meta.join(' · ')}</div>` : ''}
        ${m.action_hint ? `<div class="maction">📍 ${m.action_hint}</div>` : ''}
        ${m.rationale ? `<div class="mrationale">${m.rationale}</div>` : ''}
      </div>
    `;
  }).join('');
  document.getElementById('macroHost').innerHTML = html;
}

function renderHeader() {
  const ctx = DATA.regime_context || {};
  const alerts = DATA.alerts || {};
  const regime = ctx.regime || '—';
  const regEl = document.getElementById('regime');
  regEl.textContent = regime;
  regEl.className = 'rp-value regime-' + regime.replace(/\s+/g, '-');
  document.getElementById('regimeMeta').textContent = `score: ${ctx.composite_z ?? '—'} · coverage ${ctx.coverage_pct ?? '—'}%`;
  const nc = DATA.nowcast_regime || {};
  const ncHero = document.getElementById('nowcastRegime');
  if (nc.regime) {
    const hot = /STAGFLATION|OVERHEAT/.test(nc.regime);
    const cool = /GOLDILOCKS|SOFT LANDING|DISINFLATION/.test(nc.regime);
    const col = hot ? 'var(--red)' : cool ? 'var(--green)' : 'var(--amber)';
    ncHero.innerHTML = `<span style="color:${col};font-weight:700">Fed nowcast: ${nc.regime}</span>` +
      ` · growth ${nc.growth||'—'}${nc.gdpnow!=null?' ('+nc.gdpnow+'%)':''} · inflation ${nc.inflation||'—'}${nc.underlying_inflation!=null?' ('+nc.underlying_inflation+'%)':''}` +
      (nc.tilt ? ` · tilt → <b>${nc.tilt}</b>` : '');
  } else { ncHero.textContent = ''; }
  document.getElementById('fwd12m').textContent = ctx.spy_fwd_12m || '—';
  document.getElementById('nTier5').textContent = alerts.n_tier_5_plus_systems ?? '—';
  document.getElementById('nTier3').textContent = alerts.n_tier_3_plus_systems ?? '—';
  document.getElementById('nExtremeMacro').textContent = alerts.n_extreme_macro ?? '—';
  document.getElementById('nStructural').textContent = alerts.n_structural_chokepoints ?? '—';
  document.getElementById('calibNote').innerHTML = `<b>${alerts.calibration_active ? 'Calibration active' : 'Calibration warming up'}</b>`;
  document.getElementById('metaLine').innerHTML =
    `${DATA.n_tickers_total} tickers · ${new Date(DATA.as_of).toLocaleString()} · ${DATA.duration_s}s`;
}

function renderHealthStrip() {
  const fh = DATA.feed_health || {};
  const missing = DATA.missing_feeds || [];
  const stale = DATA.stale_feeds_excluded || [];
  const entries = Object.entries(fh);
  if (!entries.length && !missing.length && !stale.length) {
    document.getElementById('healthStrip').style.display = 'none';
    return;
  }
  const loaded = entries.filter(([,v]) => v && v.loaded).length;
  let html = `<span>${loaded}/${entries.length} signal feeds loaded</span>`;
  if (stale.length) html += `<span><span class="health-dot"></span>${stale.length} stale (excluded): ${stale.slice(0,4).join(', ')}${stale.length>4?'…':''}</span>`;
  if (missing.length) html += `<span><span class="health-dot"></span>${missing.length} missing: ${missing.slice(0,4).join(', ')}${missing.length>4?'…':''}</span>`;
  document.getElementById('healthStrip').innerHTML = html;
}

async function load() {
  try {
    window.SFMAP=window.SFMAP||{};fetch('https://justhodl-dashboard-live.s3.us-east-1.amazonaws.com/data/share-flows.json?_='+Date.now()).then(x=>x.ok?x.json():null).then(d=>{if(d&&d.tickers){window.SFMAP=d.tickers;try{applyFilters()}catch(e){}}}).catch(()=>{});
  const [r] = await Promise.all([fetch(URL + '?_=' + Date.now()), loadWatchlist()]);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    renderHeader();
    renderTickers();
    renderMacro();
    renderHealthStrip();
  } catch (e) {
    document.getElementById('tickerHost').innerHTML = `<div class="loader">Failed: ${e.message}</div>`;
    console.error(e);
  }
}

document.getElementById('wlEnabled').checked = WL_FILTER_ON;
document.getElementById('wlCategory').value = WL_CATEGORY;
document.getElementById('wlEnabled').addEventListener('change', e => {
  WL_FILTER_ON = e.target.checked;
  localStorage.setItem('wl_filter_master', WL_FILTER_ON ? '1' : '0');
  if (DATA) renderTickers();
});
document.getElementById('wlCategory').addEventListener('change', e => {
  WL_CATEGORY = e.target.value;
  localStorage.setItem('wl_category_master', WL_CATEGORY);
  if (DATA) renderTickers();
});

load();
setInterval(load, 5*60*1000);
</script>
