<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustHodl | KA Metrics — Redirecting</title>
<meta http-equiv="refresh" content="0; url=/ka/">
<link rel="canonical" href="https://justhodl.ai/ka/">
<meta name="robots" content="noindex">
<style>
  body{margin:0;background:#06080d;color:#94a3b8;font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:480px;text-align:center;padding:32px;background:#0c1017;border:1px solid #1e293b;border-radius:8px}
  .gold{background:linear-gradient(135deg,#ffd700,#ff9100);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;font-size:18px}
  .small{font-size:12px;color:#64748b;margin-top:14px;letter-spacing:1.2px;text-transform:uppercase}
  a{color:#18ffff;text-decoration:none}
  a:hover{color:#fff}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #1e293b;border-top-color:#ffd700;border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="card">
    <div class="gold">KA Metrics</div>
    <p style="margin-top:18px"><span class="spinner"></span>Redirecting to <a href="/ka/">/ka/</a>…</p>
    <div class="small">This page moved as part of a brand rename · /khalid/ → /ka/</div>
  </div>
  <script>
    // JS fallback in case meta-refresh is blocked. 0-second delay matches the meta tag.
    location.replace('/ka/' + location.search + location.hash);
  </script>
</body>
</html>
