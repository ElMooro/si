<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock X-Ray — JustHodl.AI</title>
<style>
:root{--bg:#0a0e14;--bg2:#111722;--card:#0e1420;--line:#1e2836;--fg:#dfe7f3;--fg2:#9db0c8;--fg3:#5c6f88;--cy:#46c8ff;--am:#ffd24a;--rd:#ff5d6c;--gr:#37d99a;--vi:#a78bfa;--mono:'SF Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:1280px;margin:0 auto;padding:24px 18px 60px}
h1{font-size:20px;margin:0 0 4px}
.sub{color:var(--fg3);font-family:var(--mono);font-size:11px;margin-bottom:16px}
.srch{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
input{background:var(--bg2);border:1px solid var(--line);color:var(--fg);font:16px var(--mono);padding:10px 14px;border-radius:10px;width:180px;text-transform:uppercase}
button,.lnk{background:var(--cy);color:#04121f;border:0;font:600 13px -apple-system,sans-serif;padding:10px 16px;border-radius:10px;cursor:pointer;text-decoration:none}
.lnk{background:var(--bg2);color:var(--cy);border:1px solid var(--line)}
.strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chip{font-family:var(--mono);font-size:11px;color:var(--fg2);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer}
.chip b{color:var(--cy)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:13px;margin-bottom:16px}
.c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px}
.c h3{margin:0 0 8px;font-size:11.5px;letter-spacing:1.4px;color:var(--fg2)}
.kv{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--fg2);margin:4px 0}
.big{font-family:var(--mono);font-size:24px;font-weight:700}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--line);margin:2px 4px 2px 0;background:var(--bg2)}
.hero{display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:linear-gradient(135deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:16px 20px;margin-bottom:14px}
.tk{font-family:var(--mono);font-size:34px;font-weight:800}
.g{color:var(--gr)}.a{color:var(--am)}.r{color:var(--rd)}.cy{color:var(--cy)}.vi{color:var(--vi)}
.ma{display:flex;gap:6px}.ma span{font-family:var(--mono);font-size:10px;padding:4px 8px;border-radius:6px;border:1px solid var(--line)}
.note{color:var(--fg3);font-size:10.5px;margin-top:7px;line-height:1.45}
.load{color:var(--fg3);font-family:var(--mono);padding:30px;text-align:center}
</style></head><body><div class="wrap">
<h1>🩻 STOCK X-RAY — THE INSTITUTIONAL DOSSIER</h1>
<div class="sub" id="meta">Loading X-Ray card map…</div>
<div class="srch">
 <input id="tk" placeholder="TICKER" value="NVDA" maxlength="6">
 <button onclick="show()">X-RAY</button>
 <a class="lnk" id="cp" href="/chart-pro.html?symbol=NVDA" target="_blank">📈 Open in Chart-Pro</a>
 <a class="lnk" id="dl" href="/master-rank.html" target="_blank">Master Rank</a>
</div>
<div class="strip" id="boards"></div>
<div id="app" class="load">Type a ticker and hit X-RAY.</div>
<script src="/jh-nav-drawer.js?v=3335" defer></script>
<script>
const F=v=>(v===null||v===undefined||v==='')?'—':v;
const pc=v=>v==null?'—':(v>0?'+':'')+v+'%';
let X=null,LEG={};
async function j(k){try{const r=await fetch(k,{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}
(async()=>{
 X=await j('data/stock-xray.json');
 const m=document.getElementById('meta');
 if(!X||!X.cards){m.textContent='X-Ray feed unavailable.';return}
 m.innerHTML=`${X.n_cards} names carded · joins ${Object.entries(X.joins||{}).map(([k,v])=>k+':'+v).join(' ')} · ${(X.generated_at||'').slice(0,16).replace('T',' ')} UTC`;
 const B=X.boards||{},lbl={multibagger_candidates:'🚀 Multibagger',turning_profitable:'🐣 Turning Profitable',accumulation_leaders:'🌑 Accumulation',dis_warnings:'⚠️ Distribution-into-Strength',full_stack_highs:'📶 Full-Stack Highs',laggards_watch:'🐢 Laggards (strong peers)'};
 document.getElementById('boards').innerHTML=Object.entries(B).map(([k,v])=>
   `<span class="chip" onclick="pick('${(v[0]||'')}')"><b>${lbl[k]||k}</b> ${v.slice(0,6).join(' ')}${v.length>6?' +'+(v.length-6):''}</span>`).join('');
 // legacy deep feeds (client-joined per view)
 for(const [k,key] of [['bl','data/backlog.json'],['tf','data/13f-positions.json'],['rf','data/redflag-alerts.json'],['et','data/earnings-tracker.json']]) LEG[k]=await j(key);
 show();
})();
function pick(t){if(!t)return;document.getElementById('tk').value=t;show()}
function legFind(doc,t){if(!doc)return null;const w=(n,d)=>{if(d>4||!n)return null;if(Array.isArray(n)){for(const x of n){const r=w(x,d+1);if(r)return r}}else if(typeof n==='object'){if((n.ticker===t||n.symbol===t))return n;if(n[t]&&typeof n[t]==='object')return n[t];for(const v of Object.values(n)){const r=w(v,d+1);if(r)return r}}return null};return w(doc,0)}
function show(){
 const t=(document.getElementById('tk').value||'').toUpperCase().trim();
 document.getElementById('cp').href='/chart-pro.html?symbol='+t;
 const app=document.getElementById('app');
 const c=(X&&X.cards||{})[t];
 if(!c){app.className='load';app.textContent=t+' not in the liquid X-Ray universe (>$250M mcap, >$3).';return}
 const ma=c.ma||{},D=c.dark||{},V=c.val||{},G=c.grow||{},O=c.own||{},P=c.perf||{};
 const bl=legFind(LEG.bl,t),tf=legFind(LEG.tf,t),rf=legFind(LEG.rf,t),et=legFind(LEG.et,t);
 const stC=s=>s==='ACCUMULATION'?'g':s==='DISTRIBUTION'?'r':'cy';
 const maT=(on,l)=>`<span style="border-color:${on?'var(--gr)':'var(--rd)'};color:${on?'var(--gr)':'var(--rd)'}">${l} ${on?'▲':'▼'}</span>`;
 app.className='';app.innerHTML=`
 <div class="hero">
   <div class="tk">${t}</div>
   <div><div class="big">$${F(c.px)}</div><div class="note">${c.sec||''} · $${F(c.mc_b)}B</div></div>
   <div class="ma">${maT(ma.a20,'20MA')}${maT(ma.a50,'50MA')}${maT(ma.a200,'200MA')}<span class="${ma.stack==='FULL_BULL'?'g':ma.stack==='FULL_BEAR'?'r':'a'}">${F(ma.stack)}</span></div>
   <span class="tag vi">${F(c.stage)}</span>
   <span class="tag">52w pos ${F(c.pos52)}%</span>
   ${c.resil?`<span class="tag cy">resilience: ${c.resil}</span>`:''}
   ${(c.factors||[]).map(f=>`<span class="tag ${f.endsWith('+')?'g':'r'}">${f}</span>`).join('')}
 </div>
 <div class="grid">
  <div class="c"><h3>MOMENTUM & CYCLE</h3>
    <div class="big ${c.momo_12_1>0?'g':'r'}">${pc(c.momo_12_1)}</div><div class="note">12-1 momentum</div>
    <div class="kv"><span>w / m / q / y</span><b>${pc(P.w)} · ${pc(P.m)} · ${pc(P.q)} · ${pc(P.y)}</b></div>
    <div class="kv"><span>RSI · beta</span><b>${F(c.rsi)} · ${F(c.beta)}</b></div>
    <div class="kv"><span>Weinstein stage</span><b>${F(c.stage)}</b></div></div>
  <div class="c"><h3>VALUATION (sector-relative "CAPE")</h3>
    <div class="big ${V.sec_pctile>80?'r':V.sec_pctile<30?'g':'cy'}">${F(V.sec_pctile)}<span style="font-size:12px;color:var(--fg3)">pctile</span></div>
    <div class="kv"><span>P/E · fwd P/E</span><b>${F(V.pe)} · ${F(V.fwd_pe)}</b></div>
    <div class="note">Percentile of P/E within its own sector cross-section.</div></div>
  <div class="c"><h3>GROWTH & PROFITABILITY</h3>
    <div class="kv"><span>sales QoQ</span><b class="${(G.sales_qoq||0)>20?'g':''}">${pc(G.sales_qoq)}</b></div>
    <div class="kv"><span>EPS next-yr est</span><b>${pc(G.eps_ny)}</b></div>
    <div class="kv"><span>profitable now</span><b>${c.profit&&c.profit.now?'YES':'NO'}</b></div>
    ${c.profit&&c.profit.turning?'<span class="tag g">🐣 TURNING PROFITABLE (fwd)</span>':''}
    <div class="kv"><span>backlog / RPO</span><b>${F(bl&&(bl.backlog||bl.rpo||bl.value))}</b></div></div>
  <div class="c"><h3>DARK POOL — BUY/SELL</h3>
    <div class="big ${stC(D.st)}">${F(D.dp)}%</div><div class="note">off-exchange share (weekly ATS)</div>
    <div class="kv"><span>state · accel</span><b class="${stC(D.st)}">${F(D.st)} ${D.acc!=null?(D.acc>0?'+':'')+D.acc:''}</b></div>
    <div class="kv"><span>daily short-z</span><b class="${(D.sz||0)>0.8?'r':(D.sz||0)<-0.5?'g':''}">${F(D.sz)}</b></div>
    ${D.cv?'<span class="tag g">HIGH CONVICTION</span>':''}${D.fl?'<span class="tag r">⚠ '+D.fl.replace(/_/g,' ')+'</span>':''}</div>
  <div class="c"><h3>SIGNAL ENGINES</h3>
    <div class="kv"><span>master-rank</span><b>${c.rank?F(c.rank.score)+' (#'+F(c.rank.rank)+')':'—'}</b></div>
    <div class="kv"><span>confluence</span><b>${c.confl?F(c.confl.comp)+' · n_eff '+F(c.confl.n_eff):'—'}</b></div>
    <div class="kv"><span>est. revisions</span><b class="${c.est_rev==='UP'?'g':c.est_rev==='DOWN'?'r':''}">${F(c.est_rev)}</b></div>
    <div class="kv"><span>best-setups</span><b>${F(c.setup)}</b></div>
    <div class="kv"><span>red flags</span><b class="${rf?'r':''}">${rf?(rf.flag||rf.reason||'FLAGGED'):'none'}</b></div></div>
  <div class="c"><h3>OWNERSHIP & FLOW</h3>
    <div class="kv"><span>institutional own</span><b>${pc(O.inst)}</b></div>
    <div class="kv"><span>inst Δ (trans)</span><b class="${(O.inst_tr||0)>0?'g':'r'}">${pc(O.inst_tr)}</b></div>
    <div class="kv"><span>insider Δ</span><b class="${(O.insider_tr||0)>0?'g':''}">${pc(O.insider_tr)}</b></div>
    <div class="kv"><span>short float</span><b>${pc(O.short_flt)}</b></div>
    <div class="kv"><span>13F holders</span><b>${F(tf&&(tf.n_holders||tf.holders))}</b></div></div>
  <div class="c"><h3>ROTATION & PEERS</h3>
    ${(c.peers||[]).map(p=>{const q=(X.cards||{})[p];return `<div class="kv"><span onclick="pick('${p}')" style="cursor:pointer;color:var(--cy)">${p}</span><b class="${(q&&q.momo_12_1||0)>0?'g':'r'}">${q?pc(q.momo_12_1):'—'}</b></div>`}).join('')||'<div class="note">no supply-chain peers mapped</div>'}
    <div class="note">Peer 12-1 momentum — laggard vs its own chain shows here.</div></div>
  <div class="c"><h3>EARNINGS</h3>
    <div class="kv"><span>next / last</span><b>${F(et&&(et.next_date||et.date))}</b></div>
    <div class="kv"><span>last surprise</span><b>${F(et&&(et.surprise_pct||et.eps_surprise))}</b></div>
    <div class="note">Market context: see cycle-clock + bond-desk regimes on the board.</div></div>
 </div>
 <div class="note">Card built ${(X.generated_at||'').slice(0,16).replace('T',' ')} UTC · ${X.method||''}</div>`;
}
document.getElementById('tk').addEventListener('keydown',e=>{if(e.key==='Enter')show()});
</script></div>
<script defer src="/jh-page-ai.js"></script>
</body></html>
